<style>
:root{--bg:#f1f5f9;--card:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b}
.container{max-width:820px;margin:0 auto}
textarea{width:100%;height:220px;padding:.65rem .75rem;border:1px solid var(--border);border-radius:.5rem;font-family:'Courier New',monospace;font-size:.82rem;line-height:1.6;background:#0f172a;color:#e2e8f0;resize:vertical;outline:none}
textarea:focus{border-color:var(--brand)}
.size-row{display:flex;gap:.75rem;align-items:flex-end;flex-wrap:wrap;margin-top:.75rem}
.size-row .field{display:flex;flex-direction:column;min-width:100px}
input[type=number]{padding:.55rem .65rem;border:1px solid var(--border);border-radius:.5rem;font-size:.9rem;background:#fff;color:var(--text);outline:none;font-family:inherit;width:100%}
input:focus{border-color:var(--brand)}
.cb-row{display:flex;align-items:center;gap:.4rem;font-size:.85rem}
.cb-row input{width:16px;height:16px;accent-color:var(--brand)}

.btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.btn:hover{opacity:.85}
.actions{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:.75rem}
.upload-btn{padding:.55rem 1.1rem;border-radius:.5rem;border:1px solid var(--border);font-size:.875rem;font-weight:600;cursor:pointer;background:#fff;color:var(--text);font-family:inherit}
.upload-btn:hover{border-color:var(--brand);color:var(--brand)}
.preview-wrap{display:flex;gap:1rem;flex-wrap:wrap}
.preview-box{flex:1;min-width:200px;text-align:center}
.preview-box label{margin-bottom:.4rem}
.preview-box img,.preview-box canvas{max-width:100%;border-radius:.5rem;border:1px solid var(--border);background:repeating-conic-gradient(#e2e8f0 0% 25%,#fff 0% 50%) 0 0/20px 20px}
.error{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;border-radius:.5rem;padding:.65rem;font-size:.85rem;margin-top:.5rem;display:none}
#previewSection{display:none}
@media (max-width: 600px) {
  body { overflow-x: hidden; }
  canvas { max-width: 100% !important; height: auto !important; }
  input[type=text], input[type=number], select { width: 100% !important; min-width: 0 !important; }
  .preview-wrap { flex-direction: column !important; }

<body>
<div class="container">
  <header>
    <h1>SVG to PNG Converter</h1>
    <p>Paste SVG code or upload an SVG file, set dimensions, and download as PNG.</p>
  </header>

  <div class="card">
    <label for="svgInput">SVG Code</label>
    <textarea id="svgInput" placeholder="Paste your SVG code here, e.g.&#10;&lt;svg xmlns=&quot;http://www.w3.org/2000/svg&quot; viewBox=&quot;0 0 100 100&quot;&gt;&#10;  &lt;circle cx=&quot;50&quot; cy=&quot;50&quot; r=&quot;40&quot; fill=&quot;#3B82F6&quot;/&gt;&#10;&lt;/svg&gt;"></textarea>
    <div class="size-row">
      <div class="field">
        <label for="outWidth">Width (px)</label>
        <input type="number" id="outWidth" value="512" min="1" max="4096">
      </div>
      <div class="field">
        <label for="outHeight">Height (px)</label>
        <input type="number" id="outHeight" value="512" min="1" max="4096">
      </div>
      <div class="cb-row">
        <input type="checkbox" id="transparent" checked>
        <label for="err" style="text-transform:none;letter-spacing:0;font-size:.85rem;font-weight:500;color:var(--text);margin-bottom:0">Transparent background</label>
      </div>
    </div>
    <div class="error" id="err"></div>
    <div class="actions">
      <button class="btn btn-primary" onclick="(function(b){b.disabled=true;b.dataset.orig=b.innerHTML;b.innerHTML='<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'16\' height=\'16\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\' class=\'spin-icon\'><path d=\'M21 12a9 9 0 1 1-6.219-8.56\'/></svg> Working…';Promise.resolve(convert()).catch(function(){}).finally(function(){b.disabled=false;b.innerHTML=b.dataset.orig})})(this)">Convert to PNG</button>
      <label class="upload-btn" for="svgFile">Upload SVG File</label>
      <input type="file" id="svgFile" accept=".svg,image/svg+xml" style="display:none">
      <button class="btn btn-secondary" onclick="loadSample()">Load Sample</button>
    </div>
  </div>

  <div id="previewSection">
    <div class="card">
      <div class="preview-wrap">
        <div class="preview-box">
          <label for="svgPreview">SVG Preview</label>
          <div id="svgPreview" style="border:1px solid var(--border);border-radius:.5rem;padding:.5rem;background:repeating-conic-gradient(#e2e8f0 0% 25%,#fff 0% 50%) 0 0/20px 20px;min-height:80px;display:flex;align-items:center;justify-content:center"></div>
        </div>
        <div class="preview-box">
          <label for="canvas">PNG Output</label>
          <canvas id="canvas"></canvas>
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-primary" onclick="downloadPNG()">Download PNG</button>
        <span id="sizeInfo" style="font-size:.8rem;color:var(--muted);align-self:center"></span>
      </div>
    </div>
  </div>
</div>

<script>
function convert(){
  const svgCode=document.getElementById('svgInput').value.trim();
  const err=document.getElementById('err');
  err.style.display='none';
  if(!svgCode){err.textContent='Please paste SVG code or upload an SVG file.';err.style.display='block';return;}
  if(!svgCode.includes('<svg')&&!svgCode.includes('<SVG')){err.textContent='This does not look like valid SVG — must contain an <svg> tag.';err.style.display='block';return;}
  const w=parseInt(document.getElementById('outWidth').value)||512;
  const h=parseInt(document.getElementById('outHeight').value)||512;
  const transparent=document.getElementById('transparent').checked;

  document.getElementById('svgPreview').innerHTML=svgCode;
  const svgEl=document.getElementById('svgPreview').querySelector('svg');
  if(svgEl){svgEl.style.maxWidth='100%';svgEl.style.maxHeight='200px';}

  const blob=new Blob([svgCode],{type:'image/svg+xml;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const img=new Image();
  img.onload=()=>{
    const canvas=document.getElementById('canvas');
    canvas.width=w;canvas.height=h;
    const ctx=canvas.getContext('2d');
    if(!transparent){ctx.fillStyle='#ffffff';ctx.fillRect(0,0,w,h);}
    ctx.drawImage(img,0,0,w,h);
    URL.revokeObjectURL(url);
    document.getElementById('previewSection').style.display='block';
    document.getElementById('sizeInfo').textContent=`${w} × ${h} px`;
  };
  img.onerror=()=>{
    URL.revokeObjectURL(url);
    err.textContent='Failed to render SVG. Check that your SVG code is valid.';
    err.style.display='block';
  };
  img.src=url;
}

function downloadPNG(){
  const canvas=document.getElementById('canvas');
  const a=document.createElement('a');
  a.href=canvas.toDataURL('image/png');
  a.download='converted.png';
  a.click();
}

function loadSample(){
  document.getElementById('svgInput').value=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#g)"/>
  <circle cx="100" cy="80" r="30" fill="white" opacity="0.9"/>
  <rect x="60" y="120" width="80" height="12" rx="6" fill="white" opacity="0.7"/>
  <rect x="70" y="142" width="60" height="12" rx="6" fill="white" opacity="0.5"/>
</svg>`;
  convert();
}

document.getElementById('svgFile').addEventListener('change',e=>{
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{document.getElementById('svgInput').value=ev.target.result;convert();};
  reader.readAsText(file);
});

document.getElementById('svgInput').addEventListener('input',()=>{
  document.getElementById('previewSection').style.display='none';
});
</script>

</body>
