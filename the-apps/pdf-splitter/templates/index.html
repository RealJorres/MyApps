<style>

  header h1 { font-size: 1.4rem; font-weight: 700; }
  header p { font-size: 0.85rem; opacity: 0.85; margin-top: 0.2rem; }

    border: 2px dashed #c7d2fe; border-radius: 10px; padding: 2.5rem 1rem;

  .drop-zone .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
  .drop-zone p { color: #64748b; font-size: 0.9rem; }
  .drop-zone strong { color: #4f46e5; cursor: pointer; }

  .range-section label { font-size: 0.85rem; font-weight: 600; color: #475569; display: block; margin-bottom: 0.4rem; }
  .range-section input {
    width: 100%; padding: 0.6rem 0.75rem; border: 2px solid #e2e8f0;

<body>
<header>
  <h1>PDF Splitter</h1>
  <p>Split a PDF into individual pages or custom page ranges</p>
</header>
<main>
  <div class="card">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".pdf">
      <div class="icon"></div>
      <p>Drag & drop your PDF here, or <strong onclick="document.getElementById('fileInput').click()">browse</strong></p>
      <p style="margin-top:0.4rem;font-size:0.78rem;color:#94a3b8">Max file size: 100 MB</p>
    </div>
    <div class="file-info hidden" id="fileInfo">
      
      <div class="file-details">
        <div class="file-name" id="fileName"></div>
        <div class="file-meta" id="fileMeta"></div>
      </div>
      <button class="btn" style="background:#fee2e2;color:#dc2626;padding:0.4rem 0.8rem;font-size:0.82rem;" onclick="resetFile()">Remove</button>
    </div>
  </div>

  <div class="card" id="splitCard" style="display:none">
    <h2 style="font-size:1.05rem;font-weight:700;margin-bottom:1rem;color:#1e293b">Split Options</h2>
    <div class="mode-tabs">
      <button class="mode-tab active" id="tabAll" onclick="setMode('all')">All Pages</button>
      <button class="mode-tab" id="tabRange" onclick="setMode('range')">Custom Range</button>
    </div>
    <div class="range-section hidden" id="rangeSection">
      <label for="rangeInput">Page Ranges</label>
      <input type="text" id="rangeInput" placeholder="e.g. 1-3, 5, 7-9" oninput="updateEstimate()">
      <div class="range-hint">Enter page numbers or ranges separated by commas</div>
    </div>
    <div class="estimate" id="estimate"></div>
    <div class="error-box hidden" id="errorBox"></div>
    <div class="progress-bar" id="progressBar"><div class="progress-bar-inner"></div></div>
    <button class="btn btn-primary" id="splitBtn" onclick="doSplit()" style="margin-top:1rem">
      Split & Download ZIP
    </button>
  </div>
</main>

<script>
let currentFile = null;
let pageCount = 0;
let currentMode = 'all';

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type === 'application/pdf') handleFile(file);
  else showError('Please drop a valid PDF file.');
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

async function handleFile(file) {
  currentFile = file;
  const fd = new FormData();
  fd.append('file', file);
  try {
    const res = await fetch('api/info', { method: 'POST', body: fd });
    const data = await res.json();
    if (data.error) { showError(data.error); return; }
    pageCount = data.pages;
    document.getElementById('fileName').textContent = file.name;
    document.getElementById('fileMeta').textContent = `${pageCount} pages · ${(file.size/1024/1024).toFixed(2)} MB${data.title ? ' · ' + data.title : ''}`;
    document.getElementById('dropZone').classList.add('hidden');
    document.getElementById('fileInfo').classList.remove('hidden');
    document.getElementById('splitCard').style.display = 'block';
    updateEstimate();
  } catch(e) { showError('Failed to read PDF: ' + e.message); }
}

function resetFile() {
  currentFile = null; pageCount = 0;
  document.getElementById('dropZone').classList.remove('hidden');
  document.getElementById('fileInfo').classList.add('hidden');
  document.getElementById('splitCard').style.display = 'none';
  document.getElementById('errorBox').classList.add('hidden');
  fileInput.value = '';
}

function setMode(mode) {
  currentMode = mode;
  document.getElementById('tabAll').classList.toggle('active', mode === 'all');
  document.getElementById('tabRange').classList.toggle('active', mode === 'range');
  document.getElementById('rangeSection').classList.toggle('hidden', mode !== 'range');
  updateEstimate();
}

function parseRanges(str, total) {
  const pages = new Set();
  if (!str.trim()) return [];
  for (let part of str.split(',')) {
    part = part.trim();
    if (/^\d+-\d+$/.test(part)) {
      const [a, b] = part.split('-').map(Number);
      for (let i = a; i <= Math.min(b, total); i++) if (i >= 1) pages.add(i);
    } else if (/^\d+$/.test(part)) {
      const n = parseInt(part);
      if (n >= 1 && n <= total) pages.add(n);
    }
  }
  return [...pages].sort((a,b) => a-b);
}

function updateEstimate() {
  const el = document.getElementById('estimate');
  if (!pageCount) return;
  if (currentMode === 'all') {
    el.textContent = `Will create ${pageCount} PDF file${pageCount !== 1 ? 's' : ''} (one per page)`;
  } else {
    const pages = parseRanges(document.getElementById('rangeInput').value, pageCount);
    el.textContent = pages.length > 0
      ? `Will create ${pages.length} PDF file${pages.length !== 1 ? 's' : ''} — pages: ${pages.join(', ')}`
      : 'Enter page ranges above';
  }
}

function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = msg;
  el.classList.remove('hidden');
}

async function doSplit() {
  if (!currentFile) return;
  document.getElementById('errorBox').classList.add('hidden');
  if (currentMode === 'range') {
    const pages = parseRanges(document.getElementById('rangeInput').value, pageCount);
    if (!pages.length) { showError('No valid pages in your range.'); return; }
  }
  const btn = document.getElementById('splitBtn');
  btn.disabled = true; btn.textContent = 'Splitting...';
  document.getElementById('progressBar').style.display = 'block';
  const fd = new FormData();
  fd.append('file', currentFile);
  fd.append('mode', currentMode);
  if (currentMode === 'range') fd.append('ranges', document.getElementById('rangeInput').value);
  try {
    const res = await fetch('api/split', { method: 'POST', body: fd });
    if (res.ok) {
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'split_pages.zip'; a.click();
      URL.revokeObjectURL(url);
    } else {
      const data = await res.json();
      showError(data.error || 'Split failed');
    }
  } catch(e) { showError('Error: ' + e.message); }
  finally {
    btn.disabled = false; btn.textContent = 'Split & Download ZIP';
    document.getElementById('progressBar').style.display = 'none';
  }
}
</script>
