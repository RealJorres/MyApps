<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="canonical" href="https://jorresapps.onrender.com/break-even-calculator/">
<meta name="robots" content="index, follow">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='6' y='6' width='40' height='40' rx='12' fill='%233B82F6'/%3E%3Crect x='54' y='6' width='40' height='40' rx='12' fill='%238B5CF6'/%3E%3Crect x='6' y='54' width='40' height='40' rx='12' fill='%2310B981'/%3E%3Crect x='54' y='54' width='40' height='40' rx='12' fill='%23F97316'/%3E%3C/svg%3E">
<link rel="stylesheet" href="/static/base.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Break-Even Calculator | Jorres Apps</title>
<style>
:root{--primary:#dc2626; --brand: var(--primary);--bg:#f1f5f9;--card:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b}
body{ padding:2rem 1rem 4rem; }
.container{max-width:820px;margin:0 auto}
header{text-align:center;margin-bottom:2rem}
header h1{font-size:2rem;font-weight:800}
header p{color:var(--muted);margin-top:.4rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:1rem;padding:1.75rem;margin-bottom:1.25rem}
.input-group{position:relative}
.input-group input{padding-left:1.6rem}
.input-group .prefix{position:absolute;left:.65rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.9rem;pointer-events:none}
input{width:100%;padding:.6rem .75rem;border:1px solid var(--border);border-radius:.5rem;font-size:.9rem;background:#fff;color:var(--text);outline:none;font-family:inherit}
input:focus{border-color:var(--primary)}
.grid3{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem}
.results{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1rem;margin-bottom:1.25rem}
.rc{background:var(--bg);border:1px solid var(--border);border-radius:.75rem;padding:1rem;text-align:center}
.rc .rl{font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:.3rem}
.rc .rv{font-size:1.4rem;font-weight:800;color:var(--primary)}
canvas{display:block;width:100%;height:auto;border-radius:.5rem}
.dl-row{display:flex;justify-content:flex-end;margin-top:.5rem}
.btn{padding:.55rem 1.1rem;border:none;border-radius:.5rem;font-size:.875rem;font-weight:600;cursor:pointer;background:#fff;border:1px solid var(--border);color:var(--text)}
.legend{display:flex;gap:1rem;flex-wrap:wrap;margin-top:.5rem;font-size:.78rem}
.leg-item{display:flex;align-items:center;gap:.3rem}
.leg-dot{width:14px;height:3px;border-radius:2px}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Break-Even Calculator</h1>
    <p>Find the point where revenue equals total costs.</p>
  </header>

  <div class="card">
    <div class="grid3">
      <div>
        <label for="fixed">Fixed Costs</label>
        <div class="input-group">
          <span class="prefix">$</span>
          <input type="number" id="fixed" value="50000" min="0" oninput="calc()">
        </div>
        <small style="color:var(--muted);font-size:.75rem">Rent, salaries, equipment</small>
      </div>
      <div>
        <label for="varCost">Variable Cost per Unit</label>
        <div class="input-group">
          <span class="prefix">$</span>
          <input type="number" id="varCost" value="12" min="0" step="0.01" oninput="calc()">
        </div>
        <small style="color:var(--muted);font-size:.75rem">Material, labor per unit</small>
      </div>
      <div>
        <label for="price">Selling Price per Unit</label>
        <div class="input-group">
          <span class="prefix">$</span>
          <input type="number" id="price" value="32" min="0" step="0.01" oninput="calc()">
        </div>
        <small style="color:var(--muted);font-size:.75rem">Revenue per unit sold</small>
      </div>
    </div>
    <div class="grid3" style="margin-top:1rem">
      <div>
        <label for="curSales">Current Sales Volume (optional)</label>
        <input type="number" id="curSales" value="3000" min="0" oninput="calc()">
        <small style="color:var(--muted);font-size:.75rem">For margin of safety</small>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="results" id="results"></div>
    <canvas id="chart" width="760" height="360"></canvas>
    <div class="legend">
      <div class="leg-item"><div class="leg-dot" style="background:#dc2626"></div>Total Costs</div>
      <div class="leg-item"><div class="leg-dot" style="background:#059669"></div>Revenue</div>
      <div class="leg-item"><div class="leg-dot" style="background:#f59e0b;width:2px;height:12px;border-radius:0;border:none"></div>Break-Even</div>
    </div>
    <div class="dl-row"><button class="btn" onclick="download()">Download PNG</button></div>
  </div>
</div>
<script>
function fmtK(v){ return v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(1)+'K':v.toFixed(0);}
function fmt$(v){ return '$'+fmtK(v); }

function calc(){
  const fc = parseFloat(document.getElementById('fixed').value)||0;
  const vc = parseFloat(document.getElementById('varCost').value)||0;
  const sp = parseFloat(document.getElementById('price').value)||0;
  const curSales = parseFloat(document.getElementById('curSales').value)||0;

  if(sp<=vc){
    document.getElementById('results').innerHTML='<p style="color:#dc2626;font-weight:600">Price must exceed variable cost per unit to calculate a break-even point.</p>';
    return;
  }

  const cm = sp - vc; // contribution margin per unit
  const cmRatio = cm / sp;
  const beUnits = Math.ceil(fc / cm);
  const beRevenue = beUnits * sp;
  const mos = curSales > beUnits ? curSales - beUnits : 0;
  const mosPct = curSales > 0 ? (mos/curSales*100).toFixed(1) : 0;

  document.getElementById('results').innerHTML = `
    <div class="rc"><div class="rl">Break-Even Units</div><div class="rv">${beUnits.toLocaleString()}</div></div>
    <div class="rc"><div class="rl">Break-Even Revenue</div><div class="rv">${fmt$(beRevenue)}</div></div>
    <div class="rc"><div class="rl">Contribution Margin</div><div class="rv">${fmt$(cm)}/unit</div></div>
    <div class="rc"><div class="rl">CM Ratio</div><div class="rv">${(cmRatio*100).toFixed(1)}%</div></div>
    ${curSales>0?`<div class="rc"><div class="rl">Margin of Safety</div><div class="rv">${mos.toLocaleString()} units (${mosPct}%)</div></div>`:''}
  `;

  drawChart(fc, vc, sp, beUnits, curSales);
}

function drawChart(fc, vc, sp, beUnits, curSales){
  const canvas = document.getElementById('chart');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const maxUnits = Math.max(beUnits * 2.2, curSales * 1.2, 100);
  const maxVal = Math.max(fc + vc * maxUnits, sp * maxUnits) * 1.05;
  const pad = {top:40,right:30,bottom:50,left:72};
  const cw = W-pad.left-pad.right, ch = H-pad.top-pad.bottom;

  ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);

  // Grid
  for(let i=0;i<=5;i++){
    const y = pad.top + ch - (i/5)*ch;
    ctx.strokeStyle='#e2e8f0'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(pad.left+cw,y); ctx.stroke();
    ctx.fillStyle='#94a3b8'; ctx.font='11px system-ui'; ctx.textAlign='right';
    ctx.fillText(fmt$(maxVal*i/5), pad.left-6, y+4);
  }
  for(let i=0;i<=5;i++){
    const x = pad.left + (i/5)*cw;
    ctx.strokeStyle='#f1f5f9'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x,pad.top); ctx.lineTo(x,pad.top+ch); ctx.stroke();
    ctx.fillStyle='#94a3b8'; ctx.font='11px system-ui'; ctx.textAlign='center';
    ctx.fillText(fmtK(maxUnits*i/5), x, pad.top+ch+18);
  }
  ctx.fillStyle='#64748b'; ctx.font='12px system-ui'; ctx.textAlign='center';
  ctx.fillText('Units Sold', pad.left+cw/2, H-8);

  // Fixed cost line
  const fcY = pad.top + ch - (fc/maxVal)*ch;
  ctx.strokeStyle='#94a3b8'; ctx.lineWidth=1.5; ctx.setLineDash([5,4]);
  ctx.beginPath(); ctx.moveTo(pad.left,fcY); ctx.lineTo(pad.left+cw,fcY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='#94a3b8'; ctx.font='10px system-ui'; ctx.textAlign='left';
  ctx.fillText('Fixed Cost', pad.left+4, fcY-4);

  const pts = 60;
  // Total cost line
  ctx.beginPath();
  for(let i=0;i<=pts;i++){
    const u = (i/pts)*maxUnits;
    const tc = fc + vc*u;
    const x = pad.left + (i/pts)*cw;
    const y = pad.top + ch - (tc/maxVal)*ch;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.strokeStyle='#dc2626'; ctx.lineWidth=2.5; ctx.stroke();

  // Revenue line
  ctx.beginPath();
  for(let i=0;i<=pts;i++){
    const u = (i/pts)*maxUnits;
    const rev = sp*u;
    const x = pad.left + (i/pts)*cw;
    const y = pad.top + ch - (rev/maxVal)*ch;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.strokeStyle='#059669'; ctx.lineWidth=2.5; ctx.stroke();

  // Break-even point
  const bx = pad.left + (beUnits/maxUnits)*cw;
  const beRev = sp*beUnits;
  const by = pad.top + ch - (beRev/maxVal)*ch;
  ctx.strokeStyle='#f59e0b'; ctx.lineWidth=1.5; ctx.setLineDash([4,3]);
  ctx.beginPath(); ctx.moveTo(bx,pad.top); ctx.lineTo(bx,pad.top+ch); ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath(); ctx.arc(bx,by,7,0,Math.PI*2);
  ctx.fillStyle='#f59e0b'; ctx.fill();
  ctx.fillStyle='#1e293b'; ctx.font='bold 11px system-ui'; ctx.textAlign='left';
  ctx.fillText(`BE: ${beUnits.toLocaleString()} units`, bx+10, by-6);

  // Current sales marker
  if(curSales>0 && curSales<=maxUnits){
    const cx2 = pad.left + (curSales/maxUnits)*cw;
    const cy2 = pad.top + ch - (sp*curSales/maxVal)*ch;
    ctx.beginPath(); ctx.arc(cx2,cy2,5,0,Math.PI*2);
    ctx.fillStyle='#3b82f6'; ctx.fill();
    ctx.fillStyle='#3b82f6'; ctx.font='bold 11px system-ui'; ctx.textAlign='left';
    ctx.fillText(`Now: ${fmtK(curSales)}`, cx2+8, cy2-4);
  }
}

function download(){
  const a=document.createElement('a'); a.download='break-even.png';
  a.href=document.getElementById('chart').toDataURL(); a.click();
}

calc();
</script>
<script src="/static/footer.js"></script>
<script src="/static/app-nav.js"></script>
</body>
</html>
