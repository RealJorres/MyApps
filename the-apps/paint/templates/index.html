<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { display: flex; flex-direction: column; }
header { background: #1e3a5f; padding: .6rem 1.5rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; border-bottom: none; }
header h1 { color: #fff; margin-right: .5rem; }
.toolbar { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; }
.tool { padding: .35rem .65rem; border: 1px solid #334155; border-radius: 6px; background: #1e293b; color: #94a3b8; font-size: .8rem; cursor: pointer; transition: background .12s, color .12s; font-family: inherit; }
.tool.active, .tool:hover { background: #2563eb; color: #fff; border-color: #2563eb; }
.sep { width: 1px; height: 24px; background: #334155; }
input[type=color] { width: 32px; height: 32px; padding: 1px; border: 1px solid #334155; border-radius: 6px; background: #1e293b; cursor: pointer; }
input[type=range] { width: 80px; accent-color: #3b82f6; }
label { font-size: .75rem; color: #94a3b8; }
.btn-sm { padding: .3rem .7rem; border: 1px solid #334155; border-radius: 6px; background: #1e293b; color: #e2e8f0; font-size: .8rem; cursor: pointer; font-family: inherit; transition: background .12s; }
.btn-sm:hover { background: #334155; }
.canvas-wrap { flex: 1; overflow: auto; display: flex; align-items: flex-start; justify-content: center; padding: 1rem; }
canvas { background: #fff; cursor: crosshair; display: block; border: 2px solid #334155; border-radius: 4px; max-width: 100%; }
.palette { display: flex; gap: 4px; align-items: center; }
.swatch { width: 22px; height: 22px; border-radius: 4px; cursor: pointer; border: 2px solid transparent; transition: transform .1s; }
.swatch:hover { transform: scale(1.2); }
@media (max-width: 600px) { body { overflow-x: hidden; } }
</style>
</head>
<body>
<header>
  <h1>Paint</h1>
  <div class="toolbar">
    <button class="tool active" id="tBrush" onclick="setTool('brush')">Brush</button>
    <button class="tool" id="tEraser" onclick="setTool('eraser')">Eraser</button>
    <button class="tool" id="tLine" onclick="setTool('line')">╱ Line</button>
    <button class="tool" id="tRect" onclick="setTool('rect')">▭ Rect</button>
    <button class="tool" id="tCircle" onclick="setTool('circle')">○ Circle</button>
    <button class="tool" id="tFill" onclick="setTool('fill')">Fill</button>
    <div class="sep"></div>
    <input type="color" id="colorPick" value="#000000" title="Color">
    <div class="palette">
      <div class="swatch" style="background:#000" onclick="setColor('#000')"></div>
      <div class="swatch" style="background:#fff;border-color:#aaa" onclick="setColor('#fff')"></div>
      <div class="swatch" style="background:#ef4444" onclick="setColor('#ef4444')"></div>
      <div class="swatch" style="background:#f97316" onclick="setColor('#f97316')"></div>
      <div class="swatch" style="background:#eab308" onclick="setColor('#eab308')"></div>
      <div class="swatch" style="background:#22c55e" onclick="setColor('#22c55e')"></div>
      <div class="swatch" style="background:#3b82f6" onclick="setColor('#3b82f6')"></div>
      <div class="swatch" style="background:#8b5cf6" onclick="setColor('#8b5cf6')"></div>
      <div class="swatch" style="background:#ec4899" onclick="setColor('#ec4899')"></div>
    </div>
    <div class="sep"></div>
    <label>Size <input type="range" id="sizeR" min="1" max="60" value="8" oninput="document.getElementById('sizeV').textContent=this.value"> <span id="sizeV">8</span></label>
    <div class="sep"></div>
    <button class="btn-sm" onclick="clearCanvas()">Clear</button>
    <button class="btn-sm" onclick="saveImg()">Save PNG</button>
  </div>
</header>
<div class="canvas-wrap">
  <canvas id="c" width="1000" height="650"></canvas>
</div>
<script>
const canvas=document.getElementById('c');
const ctx=canvas&&canvas.getContext('2d');
let tool='brush', drawing=false, startX,startY, snapshot;
let color='#000000', size=8;

if (ctx) { ctx.fillStyle='#fff'; ctx.fillRect(0,0,canvas.width,canvas.height); }

function setTool(t){
  tool=t;
  document.querySelectorAll('.tool').forEach(b=>b.classList.remove('active'));
  document.getElementById('t'+t.charAt(0).toUpperCase()+t.slice(1))?.classList.add('active');
  canvas.style.cursor=t==='fill'?'cell':t==='eraser'?'cell':'crosshair';
}

function setColor(c){ color=c; document.getElementById('colorPick').value=c; }
document.getElementById('colorPick').addEventListener('input',e=>{ color=e.target.value; });
document.getElementById('sizeR').addEventListener('input',e=>{ size=+e.target.value; });

function getPos(e){
  const r=canvas.getBoundingClientRect();
  const src=e.touches?e.touches[0]:e;
  return [src.clientX-r.left, src.clientY-r.top];
}

function startDraw(e){
  e.preventDefault();
  drawing=true;
  [startX,startY]=getPos(e);
  if(tool==='fill'){floodFill(Math.round(startX),Math.round(startY),color);drawing=false;return;}
  snapshot=ctx.getImageData(0,0,canvas.width,canvas.height);
  ctx.beginPath();
  ctx.moveTo(startX,startY);
}

function draw(e){
  if(!drawing) return;
  e.preventDefault();
  const [x,y]=getPos(e);
  ctx.lineWidth=size; ctx.lineCap='round'; ctx.lineJoin='round';
  if(tool==='brush'){ctx.strokeStyle=color;ctx.lineTo(x,y);ctx.stroke();}
  else if(tool==='eraser'){ctx.strokeStyle='#fff';ctx.lineTo(x,y);ctx.stroke();}
  else {
    ctx.putImageData(snapshot,0,0);
    ctx.strokeStyle=color; ctx.fillStyle=color+'33';
    if(tool==='line'){ctx.beginPath();ctx.moveTo(startX,startY);ctx.lineTo(x,y);ctx.stroke();}
    else if(tool==='rect'){ctx.strokeRect(startX,startY,x-startX,y-startY);}
    else if(tool==='circle'){
      ctx.beginPath();
      const rx=(x-startX)/2,ry=(y-startY)/2;
      ctx.ellipse(startX+rx,startY+ry,Math.abs(rx),Math.abs(ry),0,0,Math.PI*2);
      ctx.stroke();
    }
  }
}

function stopDraw(e){drawing=false;}

canvas.addEventListener('mousedown',startDraw);
canvas.addEventListener('mousemove',draw);
canvas.addEventListener('mouseup',stopDraw);
canvas.addEventListener('mouseleave',stopDraw);
canvas.addEventListener('touchstart',startDraw,{passive:false});
canvas.addEventListener('touchmove',draw,{passive:false});
canvas.addEventListener('touchend',stopDraw);

function hexToRgba(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return [r,g,b,255];
}

function floodFill(sx,sy,fillColor){
  const imgData=ctx.getImageData(0,0,canvas.width,canvas.height);
  const d=imgData.data,W=canvas.width,H=canvas.height;
  const i=(sy*W+sx)*4;
  const target=[d[i],d[i+1],d[i+2],d[i+3]];
  const fill=hexToRgba(fillColor);
  if(target.every((v,j)=>v===fill[j])) return;
  const stack=[sx,sy];
  while(stack.length){
    const y=stack.pop(),x=stack.pop();
    if(x<0||x>=W||y<0||y>=H) continue;
    const pi=(y*W+x)*4;
    if(!target.every((v,j)=>d[pi+j]===v)) continue;
    fill.forEach((v,j)=>d[pi+j]=v);
    stack.push(x+1,y,x-1,y,x,y+1,x,y-1);
  }
  ctx.putImageData(imgData,0,0);
}

function clearCanvas(){
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,canvas.width,canvas.height);
}

function saveImg(){
  const a=document.createElement('a');
  a.download='paint.png'; a.href=canvas.toDataURL(); a.click();
}
</script>
