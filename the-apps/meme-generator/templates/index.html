<title>Meme Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #fffbeb; color: #1e293b; min-height: 100vh; }
  header { background: #d97706; color: #fff; padding: 1rem 2rem; box-shadow: 0 2px 8px rgba(217,119,6,.3); }
  header h1 { font-size: 1.4rem; font-weight: 700; }
  header p { font-size: .85rem; opacity: .85; }
  main { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; display: grid; grid-template-columns: 340px 1fr; gap: 1.5rem; }
  .card { background: #fff; border-radius: 12px; padding: 1.5rem; box-shadow: 0 1px 6px rgba(0,0,0,.08); }
  .card-title { font-size: .85rem; font-weight: 700; color: #d97706; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 1rem; border-bottom: 2px solid #fde68a; padding-bottom: .5rem; }
  .form-group { margin-bottom: 1rem; }
  label { display: block; font-size: .78rem; font-weight: 600; color: #475569; margin-bottom: .3rem; }
  input[type=text] { width: 100%; border: 1px solid #e2e8f0; border-radius: 6px; padding: .5rem .75rem; font-size: .9rem; color: #1e293b; }
  input[type=text]:focus { outline: none; border-color: #d97706; }
  input[type=range] { width: 100%; accent-color: #d97706; }
  .color-row { display: flex; gap: .75rem; align-items: center; }
  .color-group { flex: 1; }
  input[type=color] { width: 100%; height: 36px; border: 1px solid #e2e8f0; border-radius: 6px; padding: 2px; cursor: pointer; }
  .slider-row { display: flex; justify-content: space-between; font-size: .78rem; color: #64748b; }
  .drop-zone {
    border: 2px dashed #fde68a; border-radius: 10px; padding: 2rem 1rem;
    text-align: center; cursor: pointer; transition: all .2s; background: #fffbeb; margin-bottom: 1rem;
  }
  .drop-zone:hover, .drop-zone.over { border-color: #d97706; background: #fef3c7; }
  .drop-zone p { color: #6b7280; font-size: .875rem; }
  .drop-zone strong { color: #d97706; }
  .file-name { font-size: .8rem; color: #d97706; font-weight: 600; margin-top: .4rem; }
  #fileInput { display: none; }
  .btn { width: 100%; padding: .75rem; border: none; border-radius: 8px; font-size: .9rem; font-weight: 600; cursor: pointer; margin-top: .75rem; transition: all .2s; }
  .btn-primary { background: #d97706; color: #fff; }
  .btn-primary:hover { background: #b45309; }
  .btn-primary:disabled { background: #fbbf24; cursor: not-allowed; }
  .btn-secondary { background: #f59e0b; color: #fff; }
  .btn-secondary:hover { background: #d97706; }
  .preview-panel { display: flex; flex-direction: column; }
  .canvas-wrap { background: #1e293b; border-radius: 10px; display: flex; align-items: center; justify-content: center; min-height: 300px; overflow: hidden; }
  canvas { max-width: 100%; border-radius: 6px; display: block; }
  @media (max-width: 700px) { main { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<header>
  <h1>Meme Generator</h1>
  <p>Upload an image, add captions, download your meme</p>
</header>
<main>
  <div>
    <div class="card">
      <div class="card-title">Upload Image</div>
      <div class="drop-zone" id="dropZone">
        <p>Drop image here or <strong onclick="document.getElementById('fileInput').click()">browse</strong></p>
        <div class="file-name" id="fileName"></div>
      </div>
      <input type="file" id="fileInput" accept="image/*">

      <div class="card-title" style="margin-top:1.25rem">Caption</div>
      <div class="form-group">
        <label>Top Text</label>
        <input type="text" id="topText" placeholder="TOP TEXT" oninput="updatePreview()">
      </div>
      <div class="form-group">
        <label>Bottom Text</label>
        <input type="text" id="bottomText" placeholder="BOTTOM TEXT" oninput="updatePreview()">
      </div>
      <div class="form-group">
        <label>Font Size: <span id="fontSizeVal">48</span>px</label>
        <input type="range" id="fontSize" min="20" max="120" value="48" oninput="document.getElementById('fontSizeVal').textContent=this.value;updatePreview()">
        <div class="slider-row"><span>20</span><span>120</span></div>
      </div>
      <div class="form-group">
        <div class="color-row">
          <div class="color-group">
            <label>Text Color</label>
            <input type="color" id="textColor" value="#ffffff" oninput="updatePreview()">
          </div>
          <div class="color-group">
            <label>Stroke Color</label>
            <input type="color" id="strokeColor" value="#000000" oninput="updatePreview()">
          </div>
        </div>
      </div>
      <button class="btn btn-primary" id="genBtn" disabled onclick="generateMeme()">Generate &amp; Download</button>
      <button class="btn btn-secondary" id="dlPreviewBtn" disabled onclick="downloadPreview()">Download Preview (Instant)</button>
    </div>
  </div>
  <div class="preview-panel">
    <div class="card" style="margin-bottom:.75rem">
      <div class="card-title">Live Preview</div>
      <div class="canvas-wrap" id="canvasWrap">
        <canvas id="memeCanvas"></canvas>
      </div>
    </div>
  </div>
</main>
<script>
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const canvas = document.getElementById('memeCanvas');
  const ctx = canvas.getContext('2d');
  let loadedImg = null;

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
  dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('over'); const f = e.dataTransfer.files[0]; if (f) loadFile(f); });
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });

  function loadFile(f) {
    document.getElementById('fileName').textContent = f.name;
    const reader = new FileReader();
    reader.onload = e => {
      loadedImg = new Image();
      loadedImg.onload = () => {
        document.getElementById('genBtn').disabled = false;
        document.getElementById('dlPreviewBtn').disabled = false;
        updatePreview();
      };
      loadedImg.src = e.target.result;
    };
    reader.readAsDataURL(f);
  }

  function updatePreview() {
    if (!loadedImg) return;
    const maxW = 600, maxH = 500;
    let w = loadedImg.naturalWidth, h = loadedImg.naturalHeight;
    if (w > maxW) { h = h * maxW / w; w = maxW; }
    if (h > maxH) { w = w * maxH / h; h = maxH; }
    canvas.width = Math.round(w); canvas.height = Math.round(h);
    ctx.drawImage(loadedImg, 0, 0, canvas.width, canvas.height);
    const topText = document.getElementById('topText').value.toUpperCase();
    const bottomText = document.getElementById('bottomText').value.toUpperCase();
    const fontSize = parseInt(document.getElementById('fontSize').value);
    const scale = canvas.width / loadedImg.naturalWidth;
    const scaledSize = Math.round(fontSize * scale);
    const textColor = document.getElementById('textColor').value;
    const strokeColor = document.getElementById('strokeColor').value;
    ctx.font = `bold ${scaledSize}px Impact, Arial Black, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';

    function drawText(text, yPct) {
      if (!text) return;
      const x = canvas.width / 2;
      const metrics = ctx.measureText(text);
      const approxH = scaledSize;
      const y = canvas.height * yPct - approxH / 2;
      ctx.strokeStyle = strokeColor;
      ctx.lineWidth = scaledSize * 0.1;
      ctx.lineJoin = 'round';
      ctx.strokeText(text, x, y);
      ctx.fillStyle = textColor;
      ctx.fillText(text, x, y);
    }

    drawText(topText, 0.07);
    drawText(bottomText, 0.88);
  }

  async function generateMeme() {
    if (!loadedImg) return;
    const fullCanvas = document.createElement('canvas');
    fullCanvas.width = loadedImg.naturalWidth;
    fullCanvas.height = loadedImg.naturalHeight;
    const fc = fullCanvas.getContext('2d');
    fc.drawImage(loadedImg, 0, 0);
    const b64 = fullCanvas.toDataURL('image/png');
    const payload = {
      image: b64,
      top: document.getElementById('topText').value,
      bottom: document.getElementById('bottomText').value,
      font_size: parseInt(document.getElementById('fontSize').value),
      text_color: document.getElementById('textColor').value,
      stroke_color: document.getElementById('strokeColor').value
    };
    try {
      const resp = await fetch('api/generate', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
      if (!resp.ok) { const d = await resp.json(); alert('Error: ' + d.error); return; }
      const blob = await resp.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'meme.jpg'; a.click();
      URL.revokeObjectURL(url);
    } catch(e) { alert('Error: ' + e.message); }
  }

  function downloadPreview() {
    canvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'meme_preview.png'; a.click();
      URL.revokeObjectURL(url);
    }, 'image/png');
  }
</script>
</body>
</html>
