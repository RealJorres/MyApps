<body>
<header><h1>Budget Tracker</h1></header>

<div class="month-nav">
  <div class="month-nav-left">
    <button class="nav-btn" onclick="changeMonth(-1)">&#8592;</button>
    <div class="month-label" id="month-label"></div>
    <button class="nav-btn" onclick="changeMonth(1)">&#8594;</button>
  </div>
  <button class="btn btn-secondary" onclick="exportCSV()">Export CSV</button>
</div>

<div class="main">
  <div class="summary-row">
    <div class="summary-card"><div class="label">Income</div><div class="amount income-val" id="sum-income">₱0.00</div></div>
    <div class="summary-card"><div class="label">Expenses</div><div class="amount expense-val" id="sum-expense">₱0.00</div></div>
    <div class="summary-card"><div class="label">Balance</div><div class="amount" id="sum-balance">₱0.00</div></div>
  </div>

  <div class="panel">
    <div class="panel-title">Add Transaction</div>
    <div class="form-group">
      <label for="btn-income">Type</label>
      <div class="type-toggle">
        <button class="type-btn income active" id="btn-income" onclick="setType('income')">Income</button>
        <button class="type-btn expense" id="btn-expense" onclick="setType('expense')">Expense</button>
      </div>
    </div>
    <div class="form-group">
      <label for="amount">Amount</label>
      <input type="number" id="amount" placeholder="0.00" min="0" step="0.01">
    </div>
    <div class="form-group">
      <label for="category">Category</label>
      <select id="category"></select>
    </div>
    <div class="form-group">
      <label for="description">Description</label>
      <input type="text" id="description" placeholder="What was this for?">
    </div>
    <div class="form-group">
      <label for="date">Date</label>
      <input type="date" id="date">
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="addTransaction()">Add Transaction</button>
  </div>

  <div class="transactions panel">
    <div class="panel-title">Transactions</div>
    <div id="tx-list"></div>
  </div>

  <div class="breakdown panel">
    <div class="breakdown-toggle" onclick="toggleBreakdown()">
      <div class="panel-title" style="margin-bottom:0">Category Breakdown</div>
      <span id="breakdown-arrow">▼</span>
    </div>
    <div class="breakdown-content" id="breakdown-content"></div>
  </div>
</div>

<script>
const INCOME_CATS = [{name:'Salary'},{name:'Freelance'},{name:'Other'}];
const EXPENSE_CATS = [{name:'Food'},{name:'Transport'},{name:'Utilities'},{name:'Entertainment'},{name:'Health'},{name:'Shopping'},{name:'Rent'},{name:'Other'}];

let txType = 'income';
let currentDate = new Date();
let currentYear = currentDate.getFullYear();
let currentMonth = currentDate.getMonth();

function storageKey() { return `budget_${currentYear}-${String(currentMonth+1).padStart(2,'0')}`; }
function getTransactions() { try { return JSON.parse(localStorage.getItem(storageKey()) || '[]'); } catch { return []; } }
function saveTransactions(txs) { localStorage.setItem(storageKey(), JSON.stringify(txs)); }

function updateMonthLabel() {
  const d = new Date(currentYear, currentMonth, 1);
  document.getElementById('month-label').textContent = d.toLocaleDateString('en-US', {month:'long',year:'numeric'});
}

function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  updateMonthLabel(); render();
}

function setType(t) {
  txType = t;
  document.getElementById('btn-income').classList.toggle('active', t === 'income');
  document.getElementById('btn-expense').classList.toggle('active', t === 'expense');
  updateCategorySelect();
}

function updateCategorySelect() {
  const sel = document.getElementById('category');
  const cats = txType === 'income' ? INCOME_CATS : EXPENSE_CATS;
  sel.innerHTML = cats.map(c => `<option value="${c.name}">${c.icon} ${c.name}</option>`).join('');
}

function addTransaction() {
  const amount = parseFloat(document.getElementById('amount').value);
  if (!amount || amount <= 0) { alert('Please enter a valid amount'); return; }
  const category = document.getElementById('category').value;
  const description = document.getElementById('description').value || category;
  const date = document.getElementById('date').value || new Date().toISOString().split('T')[0];
  const txs = getTransactions();
  txs.push({ id: Date.now(), type: txType, amount, category, description, date });
  saveTransactions(txs);
  document.getElementById('amount').value = '';
  document.getElementById('description').value = '';
  render();
}

function deleteTransaction(id) {
  const txs = getTransactions().filter(t => t.id !== id);
  saveTransactions(txs); render();
}

function fmt(n) { return '₱' + n.toLocaleString('en-PH', {minimumFractionDigits:2,maximumFractionDigits:2}); }

function render() {
  const txs = getTransactions();
  const income = txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense = txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const balance = income - expense;
  document.getElementById('sum-income').textContent = fmt(income);
  document.getElementById('sum-expense').textContent = fmt(expense);
  const balEl = document.getElementById('sum-balance');
  balEl.textContent = fmt(balance);
  balEl.className = 'amount ' + (balance >= 0 ? 'balance-pos' : 'balance-neg');

  const groups = {};
  txs.forEach(t => { if (!groups[t.date]) groups[t.date] = []; groups[t.date].push(t); });
  const sortedDates = Object.keys(groups).sort().reverse();
  const list = document.getElementById('tx-list');
  if (!sortedDates.length) {
    list.innerHTML = '<div class="empty-state"><p>No transactions yet. Add your first one!</p></div>';
  } else {
    list.innerHTML = sortedDates.map(d => {
      const dateStr = new Date(d + 'T00:00:00').toLocaleDateString('en-US', {weekday:'short',month:'short',day:'numeric'});
      const rows = groups[d].map(t => {
        const allCats = [...INCOME_CATS, ...EXPENSE_CATS];
        const catObj = allCats.find(c=>c.name===t.category) || {name:t.category||'Other'};
        return `<div class="tx-row">
          <div class="tx-icon" style="background:${t.type==='income'?'#d1fae5':'#fee2e2'};font-size:.75rem;font-weight:700;color:${t.type==='income'?'#065f46':'#991b1b'}">${(catObj.name||'?')[0].toUpperCase()}</div>
          <div class="tx-details">
            <div class="tx-desc">${t.description}</div>
            <div class="tx-cat">${t.category}</div>
          </div>
          <div class="tx-amount ${t.type}">${t.type==='income'?'+':'-'}${fmt(t.amount)}</div>
          <button class="del-btn" onclick="deleteTransaction(${t.id})">×</button>
        </div>`;
      }).join('');
      return `<div class="date-group"><div class="date-header">${dateStr}</div>${rows}</div>`;
    }).join('');
  }

  renderBreakdown(txs, expense);
}

function renderBreakdown(txs, totalExpense) {
  const cats = {};
  txs.filter(t=>t.type==='expense').forEach(t => { cats[t.category] = (cats[t.category]||0)+t.amount; });
  const el = document.getElementById('breakdown-content');
  if (!Object.keys(cats).length) { el.innerHTML = '<p style="color:#9ca3af;font-size:0.85rem">No expense data yet.</p>'; return; }
  const sorted = Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  el.innerHTML = sorted.map(([cat, amt]) => {
    const pct = totalExpense > 0 ? (amt/totalExpense*100).toFixed(1) : 0;
    const allCats = [...INCOME_CATS, ...EXPENSE_CATS];
    const catObj = allCats.find(c=>c.name===cat) || {name:'Other'};
    return `<div class="cat-row">
      <div class="cat-name">${cat}</div>
      <div class="cat-bar-wrap"><div class="cat-bar" style="width:${pct}%"></div></div>
      <div class="cat-amount">${fmt(amt)}</div>
      <div class="cat-pct">${pct}%</div>
    </div>`;
  }).join('');
}

function toggleBreakdown() {
  const el = document.getElementById('breakdown-content');
  const arrow = document.getElementById('breakdown-arrow');
  el.classList.toggle('open');
  arrow.textContent = el.classList.contains('open') ? '▲' : '▼';
}

function exportCSV() {
  const txs = getTransactions();
  if (!txs.length) { alert('No transactions to export'); return; }
  const header = 'Date,Type,Category,Description,Amount';
  const rows = txs.map(t => `${t.date},${t.type},${t.category},"${t.description}",${t.amount}`);
  const csv = [header, ...rows].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
  a.download = `budget_${currentYear}-${String(currentMonth+1).padStart(2,'0')}.csv`;
  a.click();
}

document.getElementById('date').value = new Date().toISOString().split('T')[0];
updateMonthLabel();
updateCategorySelect();
render();
</script>
<!-- Data portability -->
<div class="card" style="margin-top:0">
  <p style="font-size:.8rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem">Data</p>
  <div style="display:flex;gap:.5rem;flex-wrap:wrap">
    <button onclick="exportData()" style="padding:.45rem .9rem;border:1px solid var(--border);border-radius:.5rem;background:var(--bg);color:var(--text);font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit">Export JSON</button>
    <button onclick="importData()" style="padding:.45rem .9rem;border:1px solid var(--border);border-radius:.5rem;background:var(--bg);color:var(--text);font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit">Import JSON</button>
  </div>
  <p style="font-size:.72rem;color:var(--muted);margin-top:.5rem">Export saves a backup file. Import restores from a previously exported file.</p>
</div>
<script src="/static/footer.js?v=8"></script>

<script>
function exportData() {
  var all = {};
  for (var i = 0; i < localStorage.length; i++) {
    var k = localStorage.key(i);
    if (k && k.startsWith('budget_')) { try { all[k] = JSON.parse(localStorage.getItem(k)); } catch(e){} }
  }
  var a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(all)],{type:'application/json'}));
  a.download = 'budget-tracker-backup.json'; a.click();
}
function importData() {
  var inp = document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange = function(e) {
    var f = e.target.files[0]; if(!f) return;
    var r = new FileReader();
    r.onload = function(ev) {
      try {
        var d = JSON.parse(ev.target.result);
        Object.keys(d).forEach(function(k) { if(k.startsWith('budget_')) localStorage.setItem(k, JSON.stringify(d[k])); });
        location.reload();
      } catch(err) { alert('Invalid JSON file.'); }
    };
    r.readAsText(f);
  };
  inp.click();
}
</script>
<script src="/static/app-nav.js?v=3"></script>
