// =========================================================
//  FONT REGISTRY
// =========================================================
const FONTS = {
  'Block':    { data: BLOCK,    rows: 7, sample: 'ABC' },
  'Banner':   { data: BANNER,   rows: 5, sample: 'ABC' },
  'Shadow':   { data: SHADOW,   rows: 6, sample: 'ABC' },
  'Bubble':   { data: BUBBLE,   rows: 5, sample: 'AB'  },
  'Mini':     { data: MINI,     rows: 3, sample: 'ABC' },
  'Standard': { data: STANDARD, rows: 6, sample: 'ABC' },
  'Retro':    { data: RETRO,    rows: 5, sample: 'ABC' },
  'Simple':   { data: SIMPLE,   rows: 5, sample: 'ABC' },
};

let currentFont = 'Block';
let currentSize = 1;
let debounceTimer = null;

// =========================================================
//  RENDER ENGINE
// =========================================================
function renderASCII(text, fontName, size) {
  const font = FONTS[fontName];
  if (!font) return '';
  const chars = text.toUpperCase().split('');
  const numRows = font.rows;
  const lines = Array.from({ length: numRows }, () => '');
  const gap = size === 2 ? '  ' : ' ';

  chars.forEach((ch, idx) => {
    const charData = font.data[ch] || font.data[' '] || Array(numRows).fill('  ');
    const padded = padRows([...charData]);
    for (let r = 0; r < numRows; r++) {
      const row = padded[r] || '';
      if (size === 2) {
        // Double spacing: duplicate each char
        lines[r] += row.split('').map(c => c === ' ' ? '  ' : c + c).join('') + '   ';
      } else {
        lines[r] += row + gap;
      }
    }
  });

  return lines.join('\n');
}

function generateSample(fontName) {
  const font = FONTS[fontName];
  if (!font) return '';
  return renderASCII(font.sample, fontName, 1);
}

// =========================================================
//  UI
// =========================================================
function buildFontGrid() {
  const grid = document.getElementById('fontGrid');
  grid.innerHTML = '';
  Object.keys(FONTS).forEach(name => {
    const card = document.createElement('div');
    card.className = 'font-preview-card' + (name === currentFont ? ' active' : '');
    card.dataset.font = name;
    const sample = generateSample(name);
    card.innerHTML = `<div class="font-name">${name}</div><pre class="font-sample">${escapeHtml(sample)}</pre>`;
    card.addEventListener('click', () => selectFont(name));
    grid.appendChild(card);
  });
}

function selectFont(name) {
  currentFont = name;
  document.querySelectorAll('.font-preview-card').forEach(c => {
    c.classList.toggle('active', c.dataset.font === name);
  });
  scheduleUpdate();
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function updateOutput() {
  const text = document.getElementById('textInput').value;
  const output = document.getElementById('asciiOutput');
  const placeholder = document.getElementById('placeholder');
  if (!text.trim()) {
    output.style.display = 'none';
    placeholder.style.display = 'block';
    return;
  }
  const art = renderASCII(text, currentFont, currentSize);
  output.textContent = art;
  output.style.display = 'block';
  placeholder.style.display = 'none';
}

function scheduleUpdate() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(updateOutput, 300);
}

function updateCharCount() {
  const len = document.getElementById('textInput').value.length;
  const el = document.getElementById('charCount');
  el.textContent = `${len} / 15 characters`;
  el.className = 'char-count ' + (len >= 15 ? 'over' : len >= 12 ? 'warn' : 'ok');
}

document.getElementById('textInput').addEventListener('input', () => {
  updateCharCount();
  scheduleUpdate();
});

document.querySelectorAll('.size-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSize = parseInt(btn.dataset.size, 10);
    scheduleUpdate();
  });
});

document.getElementById('copyBtn').addEventListener('click', () => {
  const text = document.getElementById('asciiOutput').textContent;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const msg = document.getElementById('copyMsg');
    msg.classList.add('show');
    setTimeout(() => msg.classList.remove('show'), 2000);
  });
});

document.getElementById('downloadBtn').addEventListener('click', () => {
  const text = document.getElementById('asciiOutput').textContent;
  if (!text) return;
  const blob = new Blob([text], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'ascii-art.txt';
  a.click();
  URL.revokeObjectURL(url);
});

buildFontGrid();
updateCharCount();
