<title>Notepad</title>
<style>
:root{--primary:#1d4ed8;--primary-h:#1e40af;--bg:#f8fafc;--card:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh}
.top-bar{background:var(--card);border-bottom:1px solid var(--border);padding:.6rem 1.25rem;display:flex;align-items:center;gap:1rem;flex-shrink:0;flex-wrap:wrap}
.top-bar h1{font-size:1rem;font-weight:800;color:var(--text)}
.top-bar h1 span{color:var(--primary)}
.meta{font-size:.78rem;color:var(--muted);display:flex;gap:1rem}
.save-indicator{font-size:.78rem;font-weight:600;margin-left:.25rem}
.save-indicator.saved{color:#16a34a}
.save-indicator.saving{color:var(--muted)}
.actions{margin-left:auto;display:flex;gap:.4rem}
.btn{display:inline-flex;align-items:center;gap:.3rem;padding:.4rem .9rem;border-radius:.45rem;border:none;font-size:.8rem;font-weight:600;cursor:pointer;transition:background .15s;font-family:inherit}
.btn-ghost{background:var(--bg);color:var(--text);border:1px solid var(--border)}.btn-ghost:hover{background:var(--border)}
.btn-danger{background:transparent;color:#dc2626;border:1px solid #fca5a5}.btn-danger:hover{background:#fef2f2}
.editor-wrap{flex:1;min-height:0;display:flex;flex-direction:column}
#editor{flex:1;min-height:0;width:100%;padding:1.75rem 2rem;border:none;outline:none;resize:none;font-family:'Georgia','Times New Roman',serif;font-size:1.05rem;line-height:1.85;color:var(--text);background:var(--card);caret-color:var(--primary);overflow-y:auto}
@media(max-width:600px){ #editor{padding:1rem}}
</style>
</head>
<body>
<div class="top-bar">
  <h1>📝 <span>Notepad</span></h1>
  <div class="meta">
    <span id="wordCount">0 words</span>
    <span id="charCount">0 chars</span>
  </div>
  <span class="save-indicator saved" id="saveIndicator">✓ Saved</span>
  <div class="actions">
    <button class="btn btn-ghost" onclick="copyAll()">Copy All</button>
    <button class="btn btn-ghost" onclick="downloadTxt()">Download .txt</button>
    <button class="btn btn-danger" onclick="clearAll()">Clear</button>
  </div>
</div>
<div class="editor-wrap">
  <textarea id="editor" placeholder="Start typing… your notes are saved automatically in this browser."></textarea>
</div>

<script>
const STORAGE_KEY = 'notepad_content';
const editor = document.getElementById('editor');
let saveTimer = null;

// Restore saved content
editor.value = localStorage.getItem(STORAGE_KEY) || '';
updateStats();

editor.addEventListener('input', () => {
  updateStats();
  scheduleSave();
});

function updateStats() {
  const text = editor.value;
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  document.getElementById('wordCount').textContent = words.toLocaleString() + ' word' + (words!==1?'s':'');
  document.getElementById('charCount').textContent = text.length.toLocaleString() + ' char' + (text.length!==1?'s':'');
}

function scheduleSave() {
  const ind = document.getElementById('saveIndicator');
  ind.textContent = 'Saving…';
  ind.className = 'save-indicator saving';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    localStorage.setItem(STORAGE_KEY, editor.value);
    ind.textContent = '✓ Saved';
    ind.className = 'save-indicator saved';
  }, 500);
}

function copyAll() {
  navigator.clipboard.writeText(editor.value);
}

function downloadTxt() {
  const blob = new Blob([editor.value], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'notes.txt';
  a.click();
}

function clearAll() {
  if (editor.value && !confirm('Clear all notes? This cannot be undone.')) return;
  editor.value = '';
  localStorage.removeItem(STORAGE_KEY);
  updateStats();
  const ind = document.getElementById('saveIndicator');
  ind.textContent = '✓ Saved'; ind.className = 'save-indicator saved';
}
</script>
</body>
</html>
