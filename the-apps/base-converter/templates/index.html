<body>
<div class="container">
  <header>
    <h1>Base Converter</h1>
    <p>Convert numbers between Binary, Octal, Decimal, and Hex instantly</p>
  </header>

  <div class="card">
    <div class="bases-grid">
      <div class="base-box">
        <div class="base-label-row">
          <label for="binInput" style="margin:0;">Binary</label>
          <span class="base-tag">Base 2</span>
        </div>
        <input type="text" id="binInput" placeholder="e.g. 11111111" oninput="convertFrom(this,'bin')" autocomplete="off" spellcheck="false">
        <button class="btn btn-ghost copy-btn-small" onclick="copyInput('binInput')">Copy</button>
      </div>
      <div class="base-box">
        <div class="base-label-row">
          <label for="octInput" style="margin:0;">Octal</label>
          <span class="base-tag">Base 8</span>
        </div>
        <input type="text" id="octInput" placeholder="e.g. 377" oninput="convertFrom(this,'oct')" autocomplete="off" spellcheck="false">
        <button class="btn btn-ghost copy-btn-small" onclick="copyInput('octInput')">Copy</button>
      </div>
      <div class="base-box">
        <div class="base-label-row">
          <label for="decInput" style="margin:0;">Decimal</label>
          <span class="base-tag">Base 10</span>
        </div>
        <input type="text" id="decInput" placeholder="e.g. 255" oninput="convertFrom(this,'dec')" autocomplete="off" spellcheck="false">
        <button class="btn btn-ghost copy-btn-small" onclick="copyInput('decInput')">Copy</button>
      </div>
      <div class="base-box">
        <div class="base-label-row">
          <label for="hexInput" style="margin:0;">Hexadecimal</label>
          <span class="base-tag">Base 16</span>
        </div>
        <input type="text" id="hexInput" placeholder="e.g. FF" oninput="convertFrom(this,'hex')" autocomplete="off" spellcheck="false">
        <button class="btn btn-ghost copy-btn-small" onclick="copyInput('hexInput')">Copy</button>
      </div>
    </div>
    <div id="errorMsg" class="status error" style="display:none; margin-top:1rem;"></div>
  </div>

  <div class="card">
    <label for="wordsBox">Decimal Value in Words</label>
    <div class="words-box" id="wordsBox">Enter a number above to see it in words.</div>
  </div>
</div>

<div id="copyToast" style="position:fixed;bottom:2rem;right:2rem;background:#1e293b;color:#fff;padding:0.6rem 1.2rem;border-radius:0.5rem;font-size:0.85rem;font-weight:600;opacity:0;transition:opacity 0.2s;pointer-events:none;">Copied!</div>

<script>
const patterns = {
  bin: /^[01]+$/,
  oct: /^[0-7]+$/,
  dec: /^[0-9]+$/,
  hex: /^[0-9a-fA-F]+$/
};
const bases = { bin:2, oct:8, dec:10, hex:16 };
const ids = { bin:'binInput', oct:'octInput', dec:'decInput', hex:'hexInput' };
let updating = false;

function convertFrom(el, from) {
  if(updating) return;
  const val = el.value.trim();
  const errEl = document.getElementById('errorMsg');
  if(!val) {
    Object.keys(ids).forEach(k=>{ if(k!==from) document.getElementById(ids[k]).value=''; });
    document.getElementById('wordsBox').textContent='Enter a number above to see it in words.';
    errEl.style.display='none';
    return;
  }
  if(!patterns[from].test(val)) {
    errEl.textContent = `Invalid ${from} value: "${val}"`;
    errEl.style.display='block';
    return;
  }
  errEl.style.display='none';
  const decimal = parseInt(val, bases[from]);
  updating = true;
  Object.keys(ids).forEach(k => {
    if(k!==from) {
      document.getElementById(ids[k]).value = decimal.toString(bases[k]).toUpperCase().replace(/^[A-F0-9]+$/, m => from==='hex'?m:m);
      if(k!=='hex') document.getElementById(ids[k]).value = decimal.toString(bases[k]);
      else document.getElementById(ids[k]).value = decimal.toString(16).toUpperCase();
    }
  });
  updating = false;
  // Words
  const wb = document.getElementById('wordsBox');
  if(decimal <= 999999) {
    wb.innerHTML = `<span>${decimal}</span> = ${numberToWords(decimal)}`;
  } else {
    wb.innerHTML = `<span>${decimal}</span> (number too large for word conversion)`;
  }
}

function numberToWords(n) {
  if(n===0) return 'zero';
  const ones=['','one','two','three','four','five','six','seven','eight','nine','ten','eleven','twelve','thirteen','fourteen','fifteen','sixteen','seventeen','eighteen','nineteen'];
  const tens=['','','twenty','thirty','forty','fifty','sixty','seventy','eighty','ninety'];
  function say(n) {
    if(n<20) return ones[n];
    if(n<100) return tens[Math.floor(n/10)]+(n%10?' '+ones[n%10]:'');
    if(n<1000) return ones[Math.floor(n/100)]+' hundred'+(n%100?' '+say(n%100):'');
    if(n<1000000) return say(Math.floor(n/1000))+' thousand'+(n%1000?' '+say(n%1000):'');
    return n.toString();
  }
  return say(n);
}

function copyInput(id) {
  navigator.clipboard.writeText(document.getElementById(id).value).then(showToast);
}
let toastTimer;
function showToast() {
  const t=document.getElementById('copyToast');
  t.style.opacity='1';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.style.opacity='0',1500);
}
</script>
