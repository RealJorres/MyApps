<title>Focus Timer | Jorres Apps</title>
<style>
:root {
  --primary: #dc2626; --brand: var(--primary); --primary-h: #b91c1c;
  --bg: #f1f5f9; --card: #ffffff; --border: #e2e8f0;
  --text: #1e293b; --muted: #64748b;
  --success-bg: #f0fdf4; --success-fg: #16a34a;
  --error-bg: #fef2f2; --error-fg: #dc2626;
}
body { padding: 2rem 1rem 4rem; }
.container { max-width: 560px; margin: 0 auto; }
header { text-align: center; margin-bottom: 2rem; }
header h1 { font-size: 2rem; font-weight: 800; color: var(--primary); }
header p { color: var(--muted); margin-top: 0.4rem; }
 

input[type=number] { width: 100%; padding: 0.55rem 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem; font-size: 0.9rem; background: #fff; color: var(--text); outline: none; font-family: inherit; }
input:focus { border-color: var(--primary); }
.section-title { font-size: 0.85rem; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 2px solid var(--border); }
.timer-wrap { display: flex; justify-content: center; padding: 1rem 0; }
.timer-circle-container { position: relative; width: 240px; height: 240px; }
.timer-circle-container svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
.timer-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.mode-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--primary); margin-bottom: 0.3rem; }
.time-display { font-size: 3.5rem; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; line-height: 1; }
.controls { display: flex; justify-content: center; gap: 0.75rem; margin-bottom: 1rem; }
.controls .btn { padding: 0.65rem 1.5rem; font-size: 0.95rem; }
.btn-start { background: var(--primary); color: white; min-width: 110px; justify-content: center; }
.btn-start:hover { background: var(--primary-h); }
.sessions-row { display: flex; justify-content: center; gap: 0.35rem; margin-bottom: 0.5rem; flex-wrap: wrap; }
.session-icon { font-size: 1.2rem; opacity: 0.3; transition: opacity 0.2s; }
.session-icon.done { opacity: 1; }
.mode-tabs { display: flex; border: 1px solid var(--border); border-radius: 0.5rem; overflow: hidden; margin-bottom: 1.25rem; }
.mode-tab { flex: 1; padding: 0.5rem; font-size: 0.82rem; font-weight: 600; text-align: center; cursor: pointer; border: none; background: var(--bg); color: var(--muted); font-family: inherit; transition: all 0.15s; }
.mode-tab.active { background: var(--primary); color: white; }
details summary { cursor: pointer; font-weight: 600; font-size: 0.9rem; list-style: none; display: flex; align-items: center; gap: 0.5rem; color: var(--muted); }
details summary::before { content: '▶'; font-size: 0.65rem; transition: transform 0.2s; }
details[open] summary::before { transform: rotate(90deg); }
.settings-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-top: 1rem; }
@media (max-width: 600px) {
  body { overflow-x: hidden; }
  .settings-grid { grid-template-columns: 1fr 1fr !important; }
  input[type=number] { width: 100% !important; min-width: 0 !important; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Focus Timer</h1>
    <p>Pomodoro sessions and custom countdowns in one place.</p>
  </header>

  <!-- Top-level mode switcher -->
  <div style="display:flex;gap:0;background:var(--card);border:1px solid var(--border);border-radius:.75rem;padding:.3rem;margin-bottom:1.5rem">
    <button id="appTabPom" onclick="switchAppTab('pom',this)" style="flex:1;padding:.6rem;border:none;background:var(--primary);color:#fff;font-size:.9rem;font-weight:700;cursor:pointer;border-radius:.5rem;font-family:inherit" aria-pressed="true">Pomodoro</button>
    <button id="appTabCd" onclick="switchAppTab('cd',this)" style="flex:1;padding:.6rem;border:none;background:none;color:var(--muted);font-size:.9rem;font-weight:700;cursor:pointer;border-radius:.5rem;font-family:inherit" aria-pressed="false">Countdown</button>
  </div>

  <!-- ── POMODORO PANEL ────────────────────────────── -->
  <div id="panelPom">
  <div class="card">
    <!-- Mode tabs -->
    <div class="mode-tabs">
      <button class="mode-tab active" id="tab-focus" onclick="setMode('focus')">Focus</button>
      <button class="mode-tab" id="tab-short" onclick="setMode('short')">Short Break</button>
      <button class="mode-tab" id="tab-long" onclick="setMode('long')">Long Break</button>
    </div>

    <!-- Circular timer -->
    <div class="timer-wrap">
      <div class="timer-circle-container">
        <svg width="240" height="240" viewBox="0 0 240 240">
          <circle cx="120" cy="120" r="108" fill="none" stroke="#f1f5f9" stroke-width="12"/>
          <circle id="progressArc" cx="120" cy="120" r="108" fill="none" stroke="#dc2626" stroke-width="12"
            stroke-dasharray="678.6" stroke-dashoffset="0" stroke-linecap="round" style="transition:stroke-dashoffset 0.5s ease,stroke 0.3s"/>
        </svg>
        <div class="timer-center">
          <div class="mode-label" id="modeLabel">FOCUS</div>
          <div class="time-display" id="timeDisplay">25:00</div>
        </div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="btn btn-start" id="startBtn" onclick="toggleTimer()">▶ Start</button>
      <button class="btn btn-ghost" onclick="resetTimer()">↺ Reset</button>
      <button class="btn btn-ghost" onclick="skipMode()">⏭ Skip</button>
    </div>

    <!-- Session counter -->
    <div class="sessions-row" id="sessionsRow"></div>
    <div style="text-align:center;font-size:0.78rem;color:var(--muted);margin-top:0.3rem" id="sessionText">Session 1 of 4</div>
  </div>

  <!-- Settings -->
  <div class="card">
    <details id="settingsDetails">
      <summary>Settings</summary>
      <div class="settings-grid">
        <div>
          <label for="set-focus">Focus (min)</label>
          <input type="number" id="set-focus" value="25" min="1" max="120" onchange="saveSettings()">
        </div>
        <div>
          <label for="set-short">Short Break (min)</label>
          <input type="number" id="set-short" value="5" min="1" max="60" onchange="saveSettings()">
        </div>
        <div>
          <label for="set-long">Long Break (min)</label>
          <input type="number" id="set-long" value="15" min="1" max="60" onchange="saveSettings()">
        </div>
      </div>
    </details>
  </div>
  </div><!-- /panelPom -->

  <!-- ── COUNTDOWN PANEL ──────────────────────────── -->
  <div id="panelCd" style="display:none">
    <div class="card">
      <div style="margin-bottom:1.25rem">
        <label for="cdLabel">Event Name</label>
        <input type="text" id="cdLabel" placeholder="e.g. Project deadline, Birthday…" oninput="cdUpdate()">
      </div>
      <div style="margin-bottom:1.25rem">
        <label for="cdTarget">Target Date &amp; Time</label>
        <input type="datetime-local" id="cdTarget" oninput="cdUpdate()">
      </div>
      <div id="cdDisplay" style="text-align:center;padding:1.5rem 0">
        <p style="color:var(--muted);font-size:.9rem">Set a target date to start the countdown.</p>
      </div>
    </div>
    <div class="card">
      <p style="font-size:.8rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem">Saved Countdowns</p>
      <div id="cdSaved"></div>
      <button onclick="cdSave()" style="margin-top:.5rem;padding:.5rem 1.1rem;border:1px solid var(--border);border-radius:.5rem;background:var(--bg);color:var(--text);font-size:.875rem;font-weight:600;cursor:pointer;font-family:inherit">Save Current</button>
    </div>
  </div>
</div>

<script>
const CIRCUMFERENCE = 2 * Math.PI * 108; // 678.6
let settings = { focus: 25, short: 5, long: 15 };
let state = { mode: 'focus', timeLeft: 25*60, running: false, sessions: 0, interval: null };
let audioCtx = null;

function loadSettings() {
  const s = localStorage.getItem('pomodoro_settings');
  if (s) { try { settings = {...settings, ...JSON.parse(s)}; } catch(e) {} }
  document.getElementById('set-focus').value = settings.focus;
  document.getElementById('set-short').value = settings.short;
  document.getElementById('set-long').value = settings.long;
}
function saveSettings() {
  settings.focus = parseInt(document.getElementById('set-focus').value) || 25;
  settings.short = parseInt(document.getElementById('set-short').value) || 5;
  settings.long = parseInt(document.getElementById('set-long').value) || 15;
  localStorage.setItem('pomodoro_settings', JSON.stringify(settings));
  if (!state.running) resetTimer();
}

function getDuration(mode) {
  return { focus: settings.focus * 60, short: settings.short * 60, long: settings.long * 60 }[mode];
}

function setMode(mode) {
  clearInterval(state.interval);
  state.mode = mode;
  state.running = false;
  state.timeLeft = getDuration(mode);
  updateAllTabs();
  render();
}

function updateAllTabs() {
  ['focus','short','long'].forEach(m => {
    document.getElementById('tab-'+m).classList.toggle('active', state.mode === m);
  });
  const colors = { focus: '#dc2626', short: '#16a34a', long: '#0891b2' };
  document.getElementById('progressArc').style.stroke = colors[state.mode];
  document.getElementById('modeLabel').style.color = colors[state.mode];
  document.getElementById('modeLabel').textContent = {focus:'FOCUS', short:'SHORT BREAK', long:'LONG BREAK'}[state.mode];
}

function toggleTimer() {
  if (state.running) {
    clearInterval(state.interval);
    state.running = false;
    document.getElementById('startBtn').textContent = '▶ Resume';
  } else {
    state.running = true;
    document.getElementById('startBtn').textContent = '⏸ Pause';
    state.interval = setInterval(tick, 1000);
  }
}

function tick() {
  if (state.timeLeft <= 0) {
    clearInterval(state.interval);
    state.running = false;
    playBeep();
    onTimerEnd();
    return;
  }
  state.timeLeft--;
  render();
  updateTitle();
}

function onTimerEnd() {
  if (state.mode === 'focus') {
    state.sessions++;
    renderSessions();
    if (state.sessions % 4 === 0) setMode('long');
    else setMode('short');
  } else {
    setMode('focus');
  }
  updateTitle();
}

function resetTimer() {
  clearInterval(state.interval);
  state.running = false;
  state.timeLeft = getDuration(state.mode);
  document.getElementById('startBtn').textContent = '▶ Start';
  render();
  document.title = 'Pomodoro Timer';
}

function skipMode() {
  clearInterval(state.interval);
  state.running = false;
  onTimerEnd();
}

function render() {
  const total = getDuration(state.mode);
  const fraction = state.timeLeft / total;
  const offset = CIRCUMFERENCE * (1 - fraction);
  document.getElementById('progressArc').style.strokeDashoffset = offset;
  document.getElementById('timeDisplay').textContent = fmt(state.timeLeft);
  if (!state.running) document.getElementById('startBtn').textContent = state.timeLeft === total ? '▶ Start' : '▶ Resume';
}

function renderSessions() {
  const row = document.getElementById('sessionsRow');
  row.innerHTML = '';
  for (let i = 0; i < Math.max(4, state.sessions); i++) {
    const span = document.createElement('span');
    span.className = 'session-icon' + (i < state.sessions ? ' done' : '');
    span.textContent = '';
    row.appendChild(span);
  }
  const cycle = Math.floor(state.sessions / 4);
  const inCycle = state.sessions % 4 || (state.sessions > 0 ? 4 : 0);
  document.getElementById('sessionText').textContent = `${state.sessions} pomodoro${state.sessions !== 1 ? 's' : ''} completed`;
}

function fmt(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function updateTitle() {
  const emoji = { focus: '', short: '', long: '' }[state.mode];
  document.title = `${emoji} ${fmt(state.timeLeft)} — ${state.mode === 'focus' ? 'Focus' : state.mode === 'short' ? 'Short Break' : 'Long Break'}`;
}

function playBeep() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const times = [0, 0.15, 0.3];
    times.forEach(t => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = 880;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0, audioCtx.currentTime + t);
      gain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + t + 0.02);
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + t + 0.12);
      osc.start(audioCtx.currentTime + t);
      osc.stop(audioCtx.currentTime + t + 0.15);
    });
  } catch(e) {}
}

loadSettings();

/* ── App-level tab switching ──────────────────── */
function switchAppTab(tab, btn) {
  const isPom = tab === 'pom';
  document.getElementById('panelPom').style.display = isPom ? '' : 'none';
  document.getElementById('panelCd').style.display  = isPom ? 'none' : '';
  const p = document.getElementById('appTabPom');
  const c = document.getElementById('appTabCd');
  p.style.background = isPom ? 'var(--primary)' : 'none';
  p.style.color = isPom ? '#fff' : 'var(--muted)';
  c.style.background = isPom ? 'none' : 'var(--primary)';
  c.style.color = isPom ? 'var(--muted)' : '#fff';
  p.setAttribute('aria-pressed', isPom ? 'true' : 'false');
  c.setAttribute('aria-pressed', isPom ? 'false' : 'true');
  if (!isPom) { cdUpdate(); cdRenderSaved(); }
}

/* ── Countdown timer ──────────────────────────── */
const CD_KEY = 'jorres_countdowns_v1';
let cdInterval = null;

function cdSavedList() {
  try { return JSON.parse(localStorage.getItem(CD_KEY)) || []; } catch(e) { return []; }
}
function cdSaveList(list) {
  localStorage.setItem(CD_KEY, JSON.stringify(list));
}

function cdPad(n) { return String(Math.floor(n)).padStart(2,'0'); }

function cdUpdate() {
  clearInterval(cdInterval);
  const target = document.getElementById('cdTarget').value;
  const label  = document.getElementById('cdLabel').value || 'Countdown';
  if (!target) { document.getElementById('cdDisplay').innerHTML = '<p style="color:var(--muted);font-size:.9rem">Set a target date to start the countdown.</p>'; return; }
  function tick() {
    const now  = new Date();
    const end  = new Date(target);
    const diff = end - now;
    const el   = document.getElementById('cdDisplay');
    if (!el) { clearInterval(cdInterval); return; }
    if (diff <= 0) {
      clearInterval(cdInterval);
      el.innerHTML = '<div style="font-size:1.4rem;font-weight:800;color:var(--primary)">Time\'s up!</div><div style="color:var(--muted);margin-top:.4rem;font-size:.9rem">' + label + '</div>';
      return;
    }
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    el.innerHTML = `
      <div style="font-size:.85rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem">${label}</div>
      <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap">
        ${[['Days',d],['Hours',h],['Min',m],['Sec',s]].map(([u,v])=>`
          <div style="text-align:center">
            <div style="font-size:2.5rem;font-weight:800;font-variant-numeric:tabular-nums;line-height:1">${cdPad(v)}</div>
            <div style="font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;margin-top:.25rem">${u}</div>
          </div>`).join('')}
      </div>`;
  }
  tick();
  cdInterval = setInterval(tick, 1000);
}

function cdSave() {
  const target = document.getElementById('cdTarget').value;
  const label  = document.getElementById('cdLabel').value.trim() || 'Countdown';
  if (!target) { alert('Set a target date first.'); return; }
  const list = cdSavedList();
  if (list.find(c => c.target === target && c.label === label)) return;
  list.unshift({ id: Date.now(), label, target });
  cdSaveList(list.slice(0, 8));
  cdRenderSaved();
}

function cdLoad(item) {
  document.getElementById('cdLabel').value  = item.label;
  document.getElementById('cdTarget').value = item.target;
  cdUpdate();
}

function cdDelete(id) {
  cdSaveList(cdSavedList().filter(c => c.id !== id));
  cdRenderSaved();
}

function cdRenderSaved() {
  const list = cdSavedList();
  const el   = document.getElementById('cdSaved');
  if (!list.length) { el.innerHTML = '<p style="font-size:.85rem;color:var(--muted)">No saved countdowns yet.</p>'; return; }
  el.innerHTML = list.map(item => `
    <div style="display:flex;align-items:center;gap:.5rem;padding:.45rem 0;border-bottom:1px solid var(--border)">
      <div style="flex:1;font-size:.85rem;font-weight:600">${item.label}</div>
      <div style="font-size:.75rem;color:var(--muted)">${new Date(item.target).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>
      <button onclick="cdLoad(${JSON.stringify(item).replace(/"/g,'&quot;')})" style="padding:.25rem .6rem;border:1px solid var(--border);border-radius:.4rem;background:var(--bg);font-size:.75rem;font-weight:600;cursor:pointer;font-family:inherit">Load</button>
      <button onclick="cdDelete(${item.id})" style="padding:.25rem .6rem;border:1px solid #fca5a5;border-radius:.4rem;background:#fee2e2;color:#dc2626;font-size:.75rem;font-weight:600;cursor:pointer;font-family:inherit" aria-label="Delete countdown">&#x2715;</button>
    </div>`).join('');
}

cdRenderSaved();
renderSessions();
updateAllTabs();
render();

function exportData() {
  var out = {}; out['pomodoro_settings']=localStorage.getItem('pomodoro_settings');
  var b = new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  var a = document.createElement('a'); a.href=URL.createObjectURL(b);
  a.download='pomodoro-timer-backup.json'; a.click(); URL.revokeObjectURL(a.href);
}
function importData() {
  var inp=document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange=function(e){
    var file=e.target.files[0]; if(!file)return;
    var r=new FileReader();
    r.onload=function(ev){
      try{var d=JSON.parse(ev.target.result);Object.keys(d).forEach(function(k){localStorage.setItem(k,d[k]);});location.reload();}
      catch(err){alert('Invalid backup file.');}
    };r.readAsText(file);
  };inp.click();
}
</script>
<div class="card" style="margin-top:0">
  <p style="font-size:.8rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem">Data</p>
  <div style="display:flex;gap:.5rem;flex-wrap:wrap">
    <button class="btn btn-ghost" onclick="exportData()">Export</button>
    <button class="btn btn-ghost" onclick="importData()">Import</button>
  </div>
</div>
<script src="/static/footer.js?v=3"></script>

<script src="/static/app-nav.js?v=3"></script>
</body>
</html>
