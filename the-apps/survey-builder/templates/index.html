<style>
:root{--bg:#f1f5f9;--card:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b}
.container{max-width:800px;margin:0 auto}

/* Mode selector */
.mode-bar{display:flex;gap:0;background:var(--card);border:1px solid var(--border);border-radius:.75rem;padding:.3rem;margin-bottom:1.5rem}
.mode-btn{flex:1;padding:.6rem 1rem;border:none;background:none;font-size:.9rem;font-weight:600;color:var(--muted);cursor:pointer;border-radius:.5rem;transition:all .15s;font-family:inherit}
.mode-btn.active{background:var(--brand);color:#fff}

/* Sub-tabs */
.tabs{display:flex;gap:.5rem;margin-bottom:1.5rem;border-bottom:2px solid var(--border)}
.tab{padding:.5rem 1.1rem;border:none;background:none;font-size:.9rem;font-weight:600;color:var(--muted);cursor:pointer;border-radius:.4rem .4rem 0 0;margin-bottom:-2px;border-bottom:3px solid transparent}
.tab.active{color:var(--brand);border-bottom-color:var(--brand)}

input,select,textarea{width:100%;padding:.6rem .75rem;border:1px solid var(--border);border-radius:.5rem;font-size:.9rem;background:#fff;color:var(--text);outline:none;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--brand)}

.btn-danger{background:#dc2626;color:#fff}
.btn-outline{background:#fff;border:1px solid var(--border);color:var(--text)}
.btn-sm{padding:.3rem .7rem;font-size:.78rem}
.btn:hover{opacity:.87}

/* Survey mode */
.qblock{background:var(--bg);border:1px solid var(--border);border-radius:.75rem;padding:1.1rem;margin-bottom:.75rem}
.qblock h4{font-size:.95rem;font-weight:700;margin-bottom:.5rem}
.qtype-badge{display:inline-block;font-size:.7rem;background:var(--brand);color:#fff;padding:.15rem .5rem;border-radius:.3rem;font-weight:700;margin-right:.4rem}
.star-btn{background:none;border:none;font-size:1.4rem;cursor:pointer;padding:0}
.rating-row{display:flex;gap:.5rem}
.bar-wrap{height:22px;background:#e2e8f0;border-radius:.4rem;overflow:hidden;margin-top:.25rem}
.bar-fill{height:100%;background:var(--brand);border-radius:.4rem;transition:width .3s}
.result-row{margin-bottom:.75rem}
.result-row label{margin-bottom:.2rem;color:var(--text);text-transform:none;letter-spacing:0;font-size:.85rem}
.resp-count{font-size:.78rem;color:var(--muted);float:right}
.empty{text-align:center;color:var(--muted);padding:2rem}

/* Quiz mode */
.question-block{background:#f8f8fe;border:1px solid #e0d9f7;border-radius:.65rem;padding:1rem;margin-bottom:1rem;position:relative}
.question-block .q-num{font-size:.8rem;font-weight:700;color:var(--brand);margin-bottom:.5rem}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:.5rem}
.opt-row{display:flex;align-items:center;gap:.4rem}
.opt-row input[type=radio]{accent-color:var(--brand);cursor:pointer;width:auto;flex-shrink:0}
.opt-row input[type=text]{flex:1}
.remove-q-btn{position:absolute;top:.6rem;right:.75rem;background:none;border:none;color:#94a3b8;cursor:pointer;font-size:1rem;padding:0}
.remove-q-btn:hover{color:#dc2626}
.quiz-list-item{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;border:1px solid var(--border);border-radius:.6rem;margin-bottom:.6rem}
.quiz-list-item .qz-name{font-weight:600;font-size:.9rem}
.quiz-list-item .qz-meta{font-size:.75rem;color:var(--muted)}
.quiz-list-item .qz-actions{display:flex;gap:.4rem}
.option-choice{display:flex;align-items:center;gap:.6rem;padding:.5rem .75rem;border:1.5px solid var(--border);border-radius:.5rem;cursor:pointer;margin-bottom:.4rem;font-size:.875rem;transition:all .15s}
.option-choice:hover{border-color:var(--brand);background:#f5f0ff}
.option-choice.selected{border-color:var(--brand);background:#ede9fe}
.option-choice.correct{border-color:#059669;background:#ecfdf5}
.option-choice.wrong{border-color:#dc2626;background:#fef2f2}
.score-display{text-align:center;padding:2rem}
.score-display .score-val{font-size:3rem;font-weight:800;color:var(--brand)}
.score-display .score-sub{font-size:1rem;color:var(--muted);margin-top:.25rem}
.timer-bar{font-size:.85rem;font-weight:600;color:var(--brand);margin-bottom:1rem}
.toggle-wrap{display:flex;align-items:center;gap:.6rem;margin-bottom:1rem;font-size:.82rem;font-weight:600;color:var(--muted)}
.toggle{position:relative;width:38px;height:20px}
.toggle input{opacity:0;width:0;height:0}
.stoggle{position:absolute;inset:0;background:#cbd5e1;border-radius:10px;cursor:pointer;transition:.2s}
.stoggle::before{content:'';position:absolute;height:14px;width:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
input:checked + .stoggle{background:var(--brand)}
input:checked + .stoggle::before{transform:translateX(18px)}

/* Mode panels */
.mode-panel{display:none}
.mode-panel.active{display:block}

@media(max-width:600px){
  body{ overflow-x:hidden; }
  .options-grid{grid-template-columns:1fr}
  input,select,textarea{width:100%!important;min-width:0!important}
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Form Builder</h1>
    <p>Build surveys to collect open-ended responses, or quizzes with scored multiple-choice answers.</p>
  </header>

  <!-- Mode selector -->
  <div class="mode-bar">
    <button class="mode-btn active" onclick="switchMode('survey',this)">Survey</button>
    <button class="mode-btn" onclick="switchMode('quiz',this)">Quiz</button>
  </div>

  <!-- ══════════ SURVEY MODE ══════════ -->
  <div id="mode-survey" class="mode-panel active">
    <div class="tabs">
      <button class="tab active" onclick="showSurveyTab('build',this)">Build</button>
      <button class="tab" onclick="showSurveyTab('take',this)">Take Survey</button>
      <button class="tab" onclick="showSurveyTab('results',this)">Results</button>
    </div>

    <!-- Build -->
    <div id="stab-build">
      <div class="card">
        <label for="surveyTitle">Survey Title</label>
        <input type="text" id="surveyTitle" value="Employee Satisfaction Survey" oninput="saveSurveyMeta()">
        <div style="margin-top:.75rem">
          <label for="surveyDesc">Description</label>
          <textarea id="surveyDesc" rows="2" placeholder="Optional description…" oninput="saveSurveyMeta()"></textarea>
        </div>
      </div>
      <div id="questionList"></div>
      <div class="card">
        <p style="font-weight:700;margin-bottom:.75rem">Add Question</p>
        <div style="display:flex;gap:.75rem;flex-wrap:wrap;align-items:flex-end">
          <div style="flex:2;min-width:200px"><label for="newQText">Question Text</label><input type="text" id="newQText" placeholder="Enter question…"></div>
          <div style="flex:1;min-width:130px"><label for="newQType">Type</label>
            <select id="newQType" onchange="document.getElementById('choiceEditor').style.display=this.value==='choice'?'':'none'">
              <option value="choice">Multiple Choice</option>
              <option value="text">Free Text</option>
              <option value="rating">Rating (1–5)</option>
              <option value="yesno">Yes / No</option>
            </select>
          </div>
          <div><button class="btn btn-primary" onclick="addSurveyQuestion()">+ Add</button></div>
        </div>
        <div id="choiceEditor" style="margin-top:.75rem">
          <label for="choicesText">Choices (one per line)</label>
          <textarea id="choicesText" rows="3" placeholder="Option A&#10;Option B&#10;Option C"></textarea>
        </div>
      </div>
    </div>

    <!-- Take Survey -->
    <div id="stab-take" style="display:none">
      <div class="card">
        <h2 id="takeTitle" style="font-size:1.4rem;font-weight:800"></h2>
        <p id="takeDesc" style="color:var(--muted);margin-top:.4rem"></p>
      </div>
      <div id="takeForm"></div>
      <div class="card" style="text-align:center">
        <button class="btn btn-primary" onclick="submitSurveyResponse()" style="font-size:1rem;padding:.7rem 2.5rem">Submit Response</button>
      </div>
    </div>

    <!-- Results -->
    <div id="stab-results" style="display:none">
      <div class="card" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem">
        <div>
          <p style="font-size:1.1rem;font-weight:800" id="resTitle"></p>
          <p style="color:var(--muted);font-size:.85rem"><span id="resCount">0</span> responses collected</p>
        </div>
        <button class="btn btn-danger btn-sm" onclick="clearSurveyResults()">Clear Responses</button>
      </div>
      <div id="resultsDiv"></div>
    </div>
  </div>

  <!-- ══════════ QUIZ MODE ══════════ -->
  <div id="mode-quiz" class="mode-panel">
    <div class="tabs">
      <button class="tab active" onclick="showQuizTab('create',this)">Create</button>
      <button class="tab" id="quizTakeTabBtn" onclick="showQuizTab('take',this)">Take Quiz</button>
    </div>

    <!-- Create -->
    <div id="qtab-create">
      <div class="card">
        <p style="font-size:.8rem;font-weight:700;color:var(--brand);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.85rem">New Quiz</p>
        <div style="margin-bottom:.75rem"><label for="quizTitle">Quiz Title</label><input type="text" id="quizTitle" placeholder="My Quiz"></div>
        <div id="questionsContainer"></div>
        <div style="margin-top:.5rem;display:flex;gap:.5rem">
          <button class="btn btn-outline" onclick="addQuizQuestion()">+ Add Question</button>
          <button class="btn btn-primary" onclick="saveQuiz()">Save Quiz</button>
        </div>
      </div>
      <div class="card">
        <p style="font-size:.8rem;font-weight:700;color:var(--brand);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.85rem">Saved Quizzes</p>
        <div id="quizList"><p style="color:var(--muted);font-size:.85rem">No quizzes saved yet.</p></div>
      </div>
    </div>

    <!-- Take Quiz -->
    <div id="qtab-take" style="display:none">
      <div id="takeInner"></div>
    </div>
  </div>

</div>

<script>
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ══════════ MODE SWITCHING ══════════ */
function switchMode(mode, btn) {
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.mode-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('mode-'+mode).classList.add('active');
  if (mode==='survey') renderSurveyBuild();
  if (mode==='quiz') renderQuizList();
}

/* ══════════ SURVEY ══════════ */
let surveyQuestions = JSON.parse(localStorage.getItem('sv_questions')||'[]');
let surveyResponses = JSON.parse(localStorage.getItem('sv_responses')||'[]');
let surveyTitle = localStorage.getItem('sv_title')||'Employee Satisfaction Survey';
let surveyDesc = localStorage.getItem('sv_desc')||'';

function saveSurveyMeta(){
  surveyTitle = document.getElementById('surveyTitle').value;
  surveyDesc = document.getElementById('surveyDesc').value;
  localStorage.setItem('sv_title', surveyTitle);
  localStorage.setItem('sv_desc', surveyDesc);
}
function saveSurveyQuestions(){ localStorage.setItem('sv_questions', JSON.stringify(surveyQuestions)); }
function saveSurveyResponses(){ localStorage.setItem('sv_responses', JSON.stringify(surveyResponses)); }

function showSurveyTab(tab, btn) {
  document.querySelectorAll('#mode-survey .tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['build','take','results'].forEach(t => document.getElementById('stab-'+t).style.display = t===tab?'':'none');
  if (tab==='take') renderSurveyTake();
  if (tab==='results') renderSurveyResults();
  if (tab==='build') renderSurveyBuild();
}

function addSurveyQuestion(){
  const text = document.getElementById('newQText').value.trim();
  const type = document.getElementById('newQType').value;
  if (!text) return;
  const q = { id:Date.now(), text, type };
  if (type==='choice'){
    q.choices = document.getElementById('choicesText').value.split('\n').map(c=>c.trim()).filter(Boolean);
    if (!q.choices.length) q.choices = ['Option A','Option B','Option C'];
  }
  surveyQuestions.push(q);
  saveSurveyQuestions();
  renderSurveyBuild();
  document.getElementById('newQText').value = '';
}

function deleteSurveyQuestion(id){
  surveyQuestions = surveyQuestions.filter(q=>q.id!==id);
  saveSurveyQuestions(); renderSurveyBuild();
}

function renderSurveyBuild(){
  const el = document.getElementById('questionList');
  if (!surveyQuestions.length){ el.innerHTML='<div class="card empty">No questions yet. Add one below.</div>'; return; }
  el.innerHTML = surveyQuestions.map((q,i)=>`
    <div class="qblock">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <h4><span class="qtype-badge">${q.type}</span>${i+1}. ${esc(q.text)}</h4>
        <button class="btn btn-danger btn-sm" onclick="deleteSurveyQuestion(${q.id})"><span aria-hidden="true">&#x2715;</span><span class="sr-only">Remove</span></button>
      </div>
      ${q.type==='choice'?'<ul style="margin:.4rem 0 0 1.2rem;color:var(--muted);font-size:.85rem">'+q.choices.map(c=>`<li>${esc(c)}</li>`).join('')+'</ul>':''}
      ${q.type==='rating'?'<p style="color:var(--muted);font-size:.85rem">&#9733;&#9733;&#9733;&#9733;&#9733; (1–5 stars)</p>':''}
      ${q.type==='yesno'?'<p style="color:var(--muted);font-size:.85rem">Yes / No</p>':''}
    </div>`).join('');
}

function renderSurveyTake(){
  document.getElementById('takeTitle').textContent = surveyTitle;
  document.getElementById('takeDesc').textContent = surveyDesc;
  const form = document.getElementById('takeForm');
  if (!surveyQuestions.length){ form.innerHTML='<div class="card empty">No questions yet. Go to Build first.</div>'; return; }
  form.innerHTML = surveyQuestions.map(q=>`
    <div class="card">
      <label for="sas_${q.id}" style="font-size:.95rem;color:var(--text);text-transform:none;letter-spacing:0;font-weight:700;margin-bottom:.6rem">${esc(q.text)}</label>
      ${renderSurveyInput(q)}
    </div>`).join('');
}

function renderSurveyInput(q){
  if (q.type==='text') return `<textarea rows="3" id="sas_${q.id}" style="width:100%" placeholder="Your answer…"></textarea>`;
  if (q.type==='choice') return q.choices.map(c=>`
    <label style="display:flex;align-items:center;gap:.5rem;margin-bottom:.4rem;font-size:.9rem;color:var(--text);text-transform:none;letter-spacing:0;font-weight:500">
      <input type="radio" name="sas_${q.id}" value="${esc(c)}" style="width:auto"> ${esc(c)}
    </label>`).join('');
  if (q.type==='yesno') return `
    <label style="display:flex;align-items:center;gap:.5rem;margin-bottom:.4rem;font-size:.9rem;color:var(--text);text-transform:none;letter-spacing:0;font-weight:500"><input type="radio" name="sas_${q.id}" value="Yes" style="width:auto"> Yes</label>
    <label style="display:flex;align-items:center;gap:.5rem;font-size:.9rem;color:var(--text);text-transform:none;letter-spacing:0;font-weight:500"><input type="radio" name="sas_${q.id}" value="No" style="width:auto"> No</label>`;
  if (q.type==='rating') return `<div class="rating-row" id="srs_${q.id}" data-val="0">
    ${[1,2,3,4,5].map(n=>`<button class="star-btn" onclick="setSurveyRating(${q.id},${n})">&#9734;</button>`).join('')}
    </div>`;
  return '';
}

function setSurveyRating(qId, val){
  const c = document.getElementById('srs_'+qId);
  c.dataset.val=val;
  c.querySelectorAll('.star-btn').forEach((b,i)=>b.innerHTML=i<val?'&#9733;':'&#9734;');
}

function submitSurveyResponse(){
  const resp={ts:Date.now(),answers:{}};
  let valid=true;
  surveyQuestions.forEach(q=>{
    if (q.type==='text') resp.answers[q.id]=document.getElementById('sas_'+q.id).value.trim();
    else if (q.type==='rating'){
      const v=parseInt(document.getElementById('srs_'+q.id).dataset.val);
      if (!v){valid=false;alert('Please rate: '+q.text);return;}
      resp.answers[q.id]=v;
    } else {
      const sel=document.querySelector(`input[name="sas_${q.id}"]:checked`);
      if (!sel){valid=false;alert('Please answer: '+q.text);return;}
      resp.answers[q.id]=sel.value;
    }
  });
  if (!valid) return;
  surveyResponses.push(resp);
  saveSurveyResponses();
  alert('Response submitted! Thank you.');
  renderSurveyTake();
}

function renderSurveyResults(){
  document.getElementById('resTitle').textContent = surveyTitle;
  document.getElementById('resCount').textContent = surveyResponses.length;
  const div = document.getElementById('resultsDiv');
  if (!surveyQuestions.length||!surveyResponses.length){ div.innerHTML='<div class="card empty">No responses yet.</div>'; return; }
  div.innerHTML = surveyQuestions.map(q=>{
    let content='';
    if (q.type==='text'){
      const ans=surveyResponses.map(r=>r.answers[q.id]).filter(Boolean);
      content=ans.length?`<ul style="list-style:none">${ans.slice(-5).map(a=>`<li style="padding:.3rem 0;border-bottom:1px solid var(--border);color:var(--muted);font-size:.875rem">${esc(a)}</li>`).join('')}</ul>`:'<p style="color:var(--muted)">No text responses.</p>';
    } else if (q.type==='rating'){
      const ans=surveyResponses.map(r=>r.answers[q.id]).filter(v=>v!=null&&v!=='');
      if (!ans.length){ content='<p style="color:var(--muted)">No ratings yet.</p>'; }
      else {
        const avg=ans.reduce((a,b)=>a+b,0)/ans.length;
        const rounded=Math.round(avg);
        content=`<p style="font-size:1.2rem;font-weight:800">${avg.toFixed(1)} / 5 <span style="color:#f59e0b">${'&#9733;'.repeat(rounded)}${'&#9734;'.repeat(5-rounded)}</span></p><p style="color:var(--muted);font-size:.8rem">${ans.length} rating${ans.length!==1?'s':''}</p>`;
      }
    } else {
      const opts=q.type==='yesno'?['Yes','No']:q.choices;
      const total=surveyResponses.filter(r=>r.answers[q.id]).length;
      content=opts.map(o=>{
        const cnt=surveyResponses.filter(r=>r.answers[q.id]===o).length;
        const pct=total?Math.round(cnt/total*100):0;
        return `<div class="result-row"><label>${esc(o)} <span class="resp-count">${cnt} (${pct}%)</span></label><div class="bar-wrap"><div class="bar-fill" style="width:${pct}%"></div></div></div>`;
      }).join('');
    }
    return `<div class="card"><p style="font-weight:700;margin-bottom:.75rem">${esc(q.text)}</p>${content}</div>`;
  }).join('');
}

function clearSurveyResults(){
  if (!confirm('Clear all responses?')) return;
  surveyResponses=[];
  saveSurveyResponses();
  renderSurveyResults();
}

// Init survey
document.getElementById('surveyTitle').value=surveyTitle;
document.getElementById('surveyDesc').value=surveyDesc;
renderSurveyBuild();

/* ══════════ QUIZ ══════════ */
let quizQuestions = [];
let quizQCounter = 0;
let takingQuiz = null;
let quizUserAnswers = {};
let quizSubmitted = false;
let timerInterval = null;
let timerSeconds = 0;

function showQuizTab(tab, btn){
  document.querySelectorAll('#mode-quiz .tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['create','take'].forEach(t=>document.getElementById('qtab-'+t).style.display=t===tab?'':'none');
  if (tab==='create') renderQuizList();
}

function addQuizQuestion(data){
  const id=quizQCounter++;
  const q=data||{id,prompt:'',options:['','','',''],correct:0};
  if (!data) q.id=id;
  quizQuestions.push(q);
  renderQuizQuestions();
}

function removeQuizQuestion(id){
  quizQuestions=quizQuestions.filter(q=>q.id!==id);
  renderQuizQuestions();
}

function renderQuizQuestions(){
  const c=document.getElementById('questionsContainer');
  c.innerHTML='';
  quizQuestions.forEach((q,idx)=>{
    const div=document.createElement('div');
    div.className='question-block';
    div.innerHTML=`
      <button class="remove-q-btn" onclick="removeQuizQuestion(${q.id})"><span aria-hidden="true">&#x2715;</span><span class="sr-only">Remove</span></button>
      <div class="q-num">Question ${idx+1}</div>
      <div style="margin-bottom:.6rem"><label for="qprompt-${q.id}">Question Prompt</label>
        <input id="qprompt-${q.id}" type="text" placeholder="Enter question…" value="${esc(q.prompt)}" oninput="quizQuestions[${idx}].prompt=this.value">
      </div>
      <p style="font-size:.75rem;font-weight:600;color:var(--muted);margin-bottom:.35rem">Options — select the correct answer</p>
      <div class="options-grid">
        ${q.options.map((opt,oi)=>`
          <div class="opt-row">
            <input type="radio" name="qcor_${q.id}" value="${oi}" ${q.correct===oi?'checked':''} onchange="quizQuestions[${idx}].correct=${oi}">
            <input type="text" placeholder="Option ${oi+1}" value="${esc(opt)}" oninput="quizQuestions[${idx}].options[${oi}]=this.value">
          </div>`).join('')}
      </div>`;
    c.appendChild(div);
  });
}

function saveQuiz(){
  const title=document.getElementById('quizTitle').value.trim();
  if (!title){alert('Please enter a quiz title.');return;}
  if (!quizQuestions.length){alert('Please add at least one question.');return;}
  const quizzes=getQuizzes();
  quizzes.push({id:Date.now(),title,questions:quizQuestions.map(q=>({...q,options:[...q.options]}))});
  localStorage.setItem('quizzes',JSON.stringify(quizzes));
  document.getElementById('quizTitle').value='';
  quizQuestions=[]; quizQCounter=0;
  renderQuizQuestions(); renderQuizList();
  alert('Quiz saved!');
}

function getQuizzes(){try{return JSON.parse(localStorage.getItem('quizzes'))||[];}catch(e){return [];}}

function renderQuizList(){
  const quizzes=getQuizzes();
  const c=document.getElementById('quizList');
  if (!quizzes.length){c.innerHTML='<p style="color:var(--muted);font-size:.85rem">No quizzes saved yet.</p>';return;}
  c.innerHTML=quizzes.map(qz=>`
    <div class="quiz-list-item">
      <div>
        <div class="qz-name">${esc(qz.title)}</div>
        <div class="qz-meta">${qz.questions.length} question${qz.questions.length!==1?'s':''}</div>
      </div>
      <div class="qz-actions">
        <button class="btn btn-primary btn-sm" onclick="startQuiz(${qz.id})">Take</button>
        <button class="btn btn-danger btn-sm" onclick="deleteQuiz(${qz.id})">Delete</button>
      </div>
    </div>`).join('');
}

function deleteQuiz(id){
  if (!confirm('Delete this quiz?')) return;
  localStorage.setItem('quizzes',JSON.stringify(getQuizzes().filter(q=>q.id!==id)));
  renderQuizList();
}

function startQuiz(id){
  const quizzes=getQuizzes();
  takingQuiz=quizzes.find(q=>q.id===id);
  if (!takingQuiz) return;
  quizUserAnswers={}; quizSubmitted=false; timerSeconds=0; clearInterval(timerInterval);
  showQuizTab('take',document.getElementById('quizTakeTabBtn'));
  renderTakeQuiz();
}

function renderTakeQuiz(){
  const c=document.getElementById('takeInner');
  let html=`<div class="card">
    <p style="font-size:1rem;font-weight:800;margin-bottom:.85rem">${esc(takingQuiz.title)}</p>
    <div style="display:flex;gap:1.5rem;flex-wrap:wrap">
      <div class="toggle-wrap"><label class="toggle"><input type="checkbox" id="timedTgl" onchange="toggleTimer()"><span class="stoggle"></span></label> Timed</div>
    </div>
    <div class="timer-bar" id="timerDisplay" style="display:none">Time: 0:00</div>
  </div><div id="quizQArea">`;
  takingQuiz.questions.forEach((q,qi)=>{
    html+=`<div class="card" id="qcard_${qi}">
      <p style="font-weight:700;margin-bottom:.75rem">Q${qi+1}. ${esc(q.prompt)}</p>
      ${q.options.map((opt,oi)=>`
        <div class="option-choice" id="qopt_${qi}_${oi}" onclick="selectQuizOpt(${qi},${oi})">
          <input type="radio" name="qq_${qi}" value="${oi}" id="qr_${qi}_${oi}" style="width:auto;flex-shrink:0">
          <label for="qr_${qi}_${oi}" style="cursor:pointer;font-size:.875rem">${esc(opt)}</label>
        </div>`).join('')}
    </div>`;
  });
  html+=`</div><div class="card" style="text-align:center;display:flex;gap:.75rem;justify-content:center">
    <button class="btn btn-primary" onclick="submitQuiz()">Submit Quiz</button>
    <button class="btn btn-outline" onclick="showQuizTab('create',document.querySelector('#mode-quiz .tab'))">Back to Quizzes</button>
  </div>`;
  c.innerHTML=html;
}

function toggleTimer(){
  const timed=document.getElementById('timedTgl')?.checked;
  const disp=document.getElementById('timerDisplay');
  if (!disp) return;
  if (timed){
    disp.style.display='block'; timerSeconds=0; clearInterval(timerInterval);
    timerInterval=setInterval(()=>{
      timerSeconds++;
      const m=Math.floor(timerSeconds/60),s=timerSeconds%60;
      if (disp) disp.textContent='Time: '+m+':'+String(s).padStart(2,'0');
    },1000);
  } else { disp.style.display='none'; clearInterval(timerInterval); }
}

function selectQuizOpt(qi,oi){
  if (quizSubmitted) return;
  quizUserAnswers[qi]=oi;
  for (let i=0;i<takingQuiz.questions[qi].options.length;i++){
    const el=document.getElementById('qopt_'+qi+'_'+i);
    if (el) el.classList.toggle('selected',i===oi);
  }
  const r=document.getElementById('qr_'+qi+'_'+oi);
  if (r) r.checked=true;
}

function submitQuiz(){
  quizSubmitted=true; clearInterval(timerInterval);
  let score=0;
  takingQuiz.questions.forEach((q,qi)=>{
    const ua=quizUserAnswers[qi], correct=q.correct;
    for (let oi=0;oi<q.options.length;oi++){
      const el=document.getElementById('qopt_'+qi+'_'+oi);
      if (!el) continue;
      el.classList.remove('selected');
      if (oi===correct) el.classList.add('correct');
      else if (oi===ua&&ua!==correct) el.classList.add('wrong');
    }
    if (ua===correct) score++;
  });
  const pct=Math.round(score/takingQuiz.questions.length*100);
  const div=document.createElement('div');
  div.className='card score-display';
  div.innerHTML=`<div class="score-val">${score}/${takingQuiz.questions.length}</div>
    <div class="score-sub">${pct}% correct</div>
    <div style="margin-top:1.5rem;display:flex;gap:.75rem;justify-content:center">
      <button class="btn btn-primary" onclick="startQuiz(${takingQuiz.id})">Retry</button>
      <button class="btn btn-outline" onclick="showQuizTab('create',document.querySelector('#mode-quiz .tab'))">Back to Quizzes</button>
    </div>`;
  document.getElementById('takeInner').appendChild(div);
  div.scrollIntoView({behavior:'smooth'});
}
</script>
<script src="/static/footer.js?v=5"></script>
<script src="/static/app-nav.js?v=3"></script>
</body>
