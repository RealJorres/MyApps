<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>API Tester | Jorres Apps</title>
<style>
:root { --primary: #be185d; --brand: var(--primary); --primary-h: #9d174d; --bg: #f1f5f9; --card: #ffffff; --border: #e2e8f0; --text: #1e293b; --muted: #64748b; --success-bg: #f0fdf4; --success-fg: #16a34a; --error-bg: #fef2f2; --error-fg: #dc2626; }
.container { max-width: 1000px; margin: 0 auto; }
header { text-align: center; margin-bottom: 2rem; }
header h1 { font-size: 2rem; font-weight: 800; }
header p { color: var(--muted); margin-top: 0.4rem; }
 

.btn-sm { padding: 0.35rem 0.7rem; font-size: 0.78rem; }
input[type=text], input[type=number], textarea, select { width: 100%; padding: 0.55rem 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem; font-size: 0.9rem; background: #fff; color: var(--text); outline: none; font-family: inherit; }
input:focus, textarea:focus, select:focus { border-color: var(--primary); }
.status { padding: 0.65rem 1rem; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 500; margin-top: 0.75rem; }
.status.error { background: var(--error-bg); color: var(--error-fg); }

.url-bar { display: flex; gap: 0.5rem; align-items: center; }
.url-bar select { width: 120px; flex-shrink: 0; font-weight: 700; }
.url-bar input { flex: 1; }
.timeout-row { display: flex; align-items: center; gap: 0.5rem; font-size: 0.82rem; color: var(--muted); margin-top: 0.5rem; }
.timeout-row input { width: 60px; }

.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 1rem; }
.tab-btn { padding: 0.55rem 1rem; border: none; background: none; cursor: pointer; font-size: 0.875rem; font-weight: 600; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.1s, border-color 0.1s; }
.tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

.kv-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 0.4rem; margin-bottom: 0.4rem; align-items: center; }
.kv-row input { padding: 0.4rem 0.6rem; }
.kv-remove { background: none; border: none; cursor: pointer; color: var(--muted); padding: 0.3rem; }
.kv-remove:hover { color: var(--error-fg); }

.status-badge {
  display: inline-flex; align-items: center; gap: 0.35rem;
  padding: 0.3rem 0.65rem; border-radius: 9999px; font-size: 0.82rem; font-weight: 700;
}
.status-2xx { background: var(--success-bg); color: var(--success-fg); }
.status-3xx { background: #fef9c3; color: #92400e; }
.status-4xx { background: #fef2f2; color: #dc2626; }
.status-5xx { background: #f5f3ff; color: #6d28d9; }
.status-err { background: var(--error-bg); color: var(--error-fg); }

.resp-meta { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; }
.resp-chip { font-size: 0.8rem; color: var(--muted); }
.resp-chip strong { color: var(--text); }

.resp-body { border-radius: 0.5rem; font-size: 0.8rem; max-height: 400px; overflow: auto; white-space: pre-wrap; word-break: break-all; }

.history-list { list-style: none; }
.history-item {
  display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.65rem;
  border: 1px solid var(--border); border-radius: 0.375rem; margin-bottom: 0.35rem;
  cursor: pointer; transition: background 0.1s;
}
.history-item:hover { background: var(--bg); }
.history-method { font-size: 0.72rem; font-weight: 800; color: var(--primary); min-width: 40px; }
.history-url { flex: 1; font-size: 0.82rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.history-status { font-size: 0.72rem; font-weight: 700; }

.resp-headers-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
.resp-headers-table th, .resp-headers-table td { padding: 0.4rem 0.6rem; border-bottom: 1px solid var(--border); text-align: left; }
.resp-headers-table th { font-weight: 700; color: var(--muted); font-size: 0.75rem; text-transform: uppercase; }
.resp-headers-table td:first-child { font-weight: 600; white-space: nowrap; }
.resp-headers-table td:last-child { word-break: break-all; }
@media (max-width: 600px) {
  body { overflow-x: hidden; }

  /* URL bar: method + send full-width, URL below them */
  .url-bar { flex-wrap: wrap; gap: 0.4rem; }
  .url-bar select { width: auto; flex: 1; min-width: 90px; }
  .url-bar input { width: 100% !important; order: 3; flex-basis: 100%; min-width: 0; }
  .url-bar .btn { flex-shrink: 0; }

  /* Key-value rows: stack key & value, keep remove on same line */
  .kv-row { grid-template-columns: 1fr auto; gap: 0.3rem; }
  .kv-row input:first-of-type { grid-column: 1; }
  .kv-row input:nth-of-type(2) { grid-column: 1; }
  .kv-row .kv-remove { grid-row: 1 / 3; grid-column: 2; align-self: center; }

  input[type=text], input[type=number], textarea, select { width: 100% !important; min-width: 0 !important; }
  /* Restore compact width for inline utility inputs */
  #timeoutInput { width: 60px !important; }
  .resp-headers-table { display: block; overflow-x: auto; }
  .resp-body { max-height: 300px; font-size: 0.75rem; word-break: break-all; }
  .tabs { overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab-btn { white-space: nowrap; padding: 0.55rem 0.7rem; font-size: 0.8rem; }
  .resp-meta { gap: 0.5rem; }
  /* History items: truncate long URLs */
  .history-url { max-width: 180px; }
  /* Send button always full-width on small screens for easy tap */
  .url-bar .btn { min-width: 70px; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>API Tester</h1>
    <p>Send HTTP requests and inspect responses.</p>
  </header>

  <div class="card">
    <div class="url-bar">
      <select id="methodSelect">
        <option>GET</option><option>POST</option><option>PUT</option>
        <option>PATCH</option><option>DELETE</option><option>HEAD</option>
      </select>
      <input type="text" id="urlInput" placeholder="https://api.example.com/endpoint">
      <button class="btn btn-primary" id="sendBtn">Send</button>
    </div>
    <div class="timeout-row">
      <span>Timeout:</span>
      <input type="number" id="timeoutInput" value="10" min="1" max="30" style="width:60px">
      <span>seconds</span>
    </div>

    <div class="tabs" style="margin-top:1rem">
      <button class="tab-btn active" data-tab="headers">Headers</button>
      <button class="tab-btn" data-tab="body">Body</button>
    </div>

    <div class="tab-panel active" id="tab-headers">
      <div id="headerRows"></div>
      <button class="btn btn-ghost btn-sm" id="addHeaderBtn" style="margin-top:0.5rem">+ Add Header</button>
    </div>
    <div class="tab-panel" id="tab-body">
      <div style="margin-bottom:0.5rem; display:flex; gap:0.5rem">
        <button class="fmt-btn active" data-type="json">JSON</button>
        <button class="fmt-btn" data-type="raw">Raw</button>
      </div>
      <textarea id="bodyInput" rows="8" style="font-family:monospace; font-size:0.82rem" placeholder='{"key": "value"}'></textarea>
    </div>
    <div id="reqStatus"></div>
  </div>

  <div class="card" id="responseCard" style="display:none">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem">
      <strong style="font-size:1rem">Response</strong>
      <button class="btn btn-ghost btn-sm" id="copyRespBtn">Copy Body</button>
    </div>
    <div class="resp-meta" id="respMeta"></div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="resp-body">Body</button>
      <button class="tab-btn" data-tab="resp-headers">Headers</button>
    </div>
    <div class="tab-panel active" id="tab-resp-body">
      <div class="resp-body" id="respBody"></div>
    </div>
    <div class="tab-panel" id="tab-resp-headers">
      <table class="resp-headers-table" id="respHeadersTable">
        <thead><tr><th>Header</th><th>Value</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div class="card" id="historyCard" style="display:none">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.75rem">
      <strong>History</strong>
      <button class="btn btn-ghost btn-sm" id="clearHistoryBtn">Clear</button>
    </div>
    <ul class="history-list" id="historyList"></ul>
  </div>
</div>

<style>
.fmt-btn { padding: 0.3rem 0.65rem; border: 1px solid var(--border); border-radius: 0.375rem; background: var(--bg); cursor: pointer; font-size: 0.78rem; font-weight: 600; color: var(--text); }
.fmt-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
</style>

<script>
let headerRows = [];
let lastResp = null;
const history = JSON.parse(sessionStorage.getItem('api_history') || '[]');

function renderHeaderRows() {
  const container = document.getElementById('headerRows');
  container.innerHTML = '';
  headerRows.forEach((row, i) => {
    const div = document.createElement('div');
    div.className = 'kv-row';
    div.innerHTML = `
      <input type="text" placeholder="Header name" value="${escHtml(row.key)}" data-field="key" data-idx="${i}">
      <input type="text" placeholder="Value" value="${escHtml(row.val)}" data-field="val" data-idx="${i}">
      <button class="kv-remove" data-idx="${i}" title="Remove" aria-label="Remove row">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    `;
    div.querySelectorAll('input').forEach(inp => {
      inp.addEventListener('input', function() {
        headerRows[this.dataset.idx][this.dataset.field] = this.value;
        saveSession();
      });
    });
    div.querySelector('.kv-remove').addEventListener('click', function() {
      headerRows.splice(parseInt(this.dataset.idx), 1);
      renderHeaderRows();
    });
    container.appendChild(div);
  });
}

document.getElementById('addHeaderBtn').addEventListener('click', () => {
  headerRows.push({ key: '', val: '' });
  renderHeaderRows();
});

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function saveSession() {
  sessionStorage.setItem('api_url', document.getElementById('urlInput').value);
  sessionStorage.setItem('api_method', document.getElementById('methodSelect').value);
  sessionStorage.setItem('api_headers', JSON.stringify(headerRows));
  sessionStorage.setItem('api_body', document.getElementById('bodyInput').value);
}

function loadSession() {
  document.getElementById('urlInput').value = sessionStorage.getItem('api_url') || '';
  document.getElementById('methodSelect').value = sessionStorage.getItem('api_method') || 'GET';
  document.getElementById('bodyInput').value = sessionStorage.getItem('api_body') || '';
  headerRows = JSON.parse(sessionStorage.getItem('api_headers') || '[]');
  renderHeaderRows();
}

document.getElementById('urlInput').addEventListener('input', saveSession);
document.getElementById('methodSelect').addEventListener('change', saveSession);
document.getElementById('bodyInput').addEventListener('input', saveSession);

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    const group = this.closest('.card, .container') || document;
    this.closest('.tabs').querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    const tabId = this.dataset.tab;
    const panels = this.closest('.card') ? this.closest('.card').querySelectorAll('.tab-panel') : document.querySelectorAll('.tab-panel');
    panels.forEach(p => {
      if (p.id === 'tab-' + tabId) p.classList.add('active');
      else if (p.closest('.card') === this.closest('.card')) p.classList.remove('active');
    });
  });
});

document.querySelectorAll('.fmt-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.fmt-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
  });
});

document.getElementById('sendBtn').addEventListener('click', sendRequest);
document.getElementById('urlInput').addEventListener('keydown', e => { if (e.key === 'Enter') sendRequest(); });

async function sendRequest() {
  const url = document.getElementById('urlInput').value.trim();
  const method = document.getElementById('methodSelect').value;
  const body = document.getElementById('bodyInput').value.trim();
  const timeout = parseInt(document.getElementById('timeoutInput').value) || 10;
  const statusEl = document.getElementById('reqStatus');

  if (!url) { statusEl.innerHTML = '<div class="status error">Please enter a URL.</div>'; return; }

  const headers = {};
  headerRows.forEach(r => { if (r.key.trim()) headers[r.key.trim()] = r.val; });

  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true; sendBtn.textContent = 'Sending…';
  statusEl.innerHTML = '';

  try {
    const resp = await fetch('api/request', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, method, headers, body, timeout })
    });
    const data = await resp.json();

    if (data.error) {
      statusEl.innerHTML = `<div class="status error">${data.error}</div>`;
      addToHistory({ url, method, status: 'ERR', statusText: data.error.slice(0, 40) });
      return;
    }

    showResponse(data);
    addToHistory({ url, method, status: data.status, statusText: data.status_text });
    saveSession();
  } catch (err) {
    statusEl.innerHTML = `<div class="status error">${err.message}</div>`;
  } finally {
    sendBtn.disabled = false; sendBtn.textContent = 'Send';
  }
}

function showResponse(data) {
  lastResp = data;
  const card = document.getElementById('responseCard');
  card.style.display = 'block';

  const statusClass = data.status >= 500 ? 'status-5xx' : data.status >= 400 ? 'status-4xx' : data.status >= 300 ? 'status-3xx' : 'status-2xx';
  document.getElementById('respMeta').innerHTML = `
    <span class="status-badge ${statusClass}">${data.status} ${data.status_text}</span>
    <span class="resp-chip">Time: <strong>${data.elapsed_ms}ms</strong></span>
    <span class="resp-chip">Size: <strong>${(data.size / 1024).toFixed(2)} KB</strong></span>
  `;

  let bodyText = '';
  if (data.body_type === 'json') {
    bodyText = JSON.stringify(data.body, null, 2);
  } else {
    bodyText = data.body;
  }
  document.getElementById('respBody').textContent = bodyText;

  const tbody = document.querySelector('#respHeadersTable tbody');
  tbody.innerHTML = '';
  Object.entries(data.headers || {}).forEach(([k, v]) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${escHtml(k)}</td><td>${escHtml(v)}</td>`;
    tbody.appendChild(tr);
  });

  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

document.getElementById('copyRespBtn').addEventListener('click', () => {
  if (!lastResp) return;
  const text = lastResp.body_type === 'json' ? JSON.stringify(lastResp.body, null, 2) : lastResp.body;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyRespBtn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy Body', 1500);
  });
});

function addToHistory(item) {
  history.unshift(item);
  if (history.length > 10) history.pop();
  sessionStorage.setItem('api_history', JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('historyList');
  const card = document.getElementById('historyCard');
  list.innerHTML = '';
  if (history.length === 0) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  history.forEach(item => {
    const li = document.createElement('li');
    li.className = 'history-item';
    const statusClass = item.status === 'ERR' ? 'status-err' : item.status >= 500 ? 'status-5xx' : item.status >= 400 ? 'status-4xx' : item.status >= 300 ? 'status-3xx' : 'status-2xx';
    li.innerHTML = `
      <span class="history-method">${item.method}</span>
      <span class="history-url">${escHtml(item.url)}</span>
      <span class="history-status status-badge ${statusClass}" style="font-size:0.7rem; padding:0.15rem 0.5rem">${item.status}</span>
    `;
    li.addEventListener('click', () => {
      document.getElementById('urlInput').value = item.url;
      document.getElementById('methodSelect').value = item.method;
      saveSession();
    });
    list.appendChild(li);
  });
}

document.getElementById('clearHistoryBtn').addEventListener('click', () => {
  history.length = 0;
  sessionStorage.removeItem('api_history');
  renderHistory();
});

loadSession();
renderHistory();
</script>
<script src="/static/footer.js?v=3"></script>

<script src="/static/app-nav.js?v=3"></script>
</body>
