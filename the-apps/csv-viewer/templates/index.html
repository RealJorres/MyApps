<style>
:root {
  --primary: #059669; --brand: var(--primary);
  --primary-h: #047857;
  --bg: #f1f5f9; --card: #ffffff; --border: #e2e8f0;
  --text: #1e293b; --muted: #64748b;
  --success-bg: #f0fdf4; --success-fg: #16a34a;
  --error-bg: #fef2f2;   --error-fg: #dc2626;
}
body { padding: 2rem 1rem 4rem; }
.container { max-width: 1200px; margin: 0 auto; }
header { text-align: center; margin-bottom: 2rem; }
header h1 { font-size: 2rem; font-weight: 800; }
header p { color: var(--muted); margin-top: 0.4rem; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 1rem; padding: 1.75rem; margin-bottom: 1.25rem; }
.btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.65rem 1.4rem; border-radius: 0.5rem; border: none; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: background 0.15s; font-family: inherit; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-h); }
.btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }
.btn-ghost { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--border); }
.status { margin-top: 1rem; padding: 0.7rem 1rem; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 500; }
.status.error { background: var(--error-bg); color: var(--error-fg); }
.status.success { background: var(--success-bg); color: var(--success-fg); }
input[type=text], input[type=number], textarea, select { width: 100%; padding: 0.55rem 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem; font-size: 0.9rem; background: #fff; color: var(--text); outline: none; font-family: inherit; }
input:focus, textarea:focus, select:focus { border-color: var(--primary); }

.drop-zone {
  border: 2px dashed var(--border);
  border-radius: 1rem;
  padding: 3rem 2rem;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
}
.drop-zone:hover, .drop-zone.drag-over { border-color: var(--primary); background: #f0fdf9; }
.drop-zone input[type=file] { display: none; }
.drop-zone-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
.drop-zone p { color: var(--muted); font-size: 0.9rem; }
.drop-zone strong { color: var(--primary); cursor: pointer; }

.info-bar {
  display: none;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 0.75rem;
  margin-bottom: 1rem;
}
.info-bar.show { display: flex; }
.info-pills { display: flex; gap: 0.5rem; flex-wrap: wrap; }
.pill { background: var(--bg); border: 1px solid var(--border); border-radius: 2rem; padding: 0.25rem 0.75rem; font-size: 0.8rem; font-weight: 600; color: var(--muted); }
.pill span { color: var(--primary); }

.search-row { display: flex; gap: 0.75rem; align-items: center; margin-bottom: 1rem; }
.search-row input { flex: 1; }

.table-wrap {
  overflow-x: auto;
  border: 1px solid var(--border);
  border-radius: 0.75rem;
}
table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
thead { position: sticky; top: 0; z-index: 2; background: #f8fafc; }
thead th {
  padding: 0.6rem 0.75rem;
  text-align: left;
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  border-bottom: 2px solid var(--border);
  white-space: nowrap;
  user-select: none;
  cursor: pointer;
}
thead th:hover { color: var(--primary); }
tbody tr:nth-child(even) { background: #f8fafc; }
tbody tr:hover { background: #f0fdf9; }
tbody td { padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.pagination {
  display: none;
  align-items: center;
  justify-content: space-between;
  margin-top: 1rem;
  flex-wrap: wrap;
  gap: 0.5rem;
}
.pagination.show { display: flex; }
.page-info { font-size: 0.85rem; color: var(--muted); }
.page-btns { display: flex; gap: 0.4rem; }

.trunc-notice {
  display: none;
  background: #fffbeb;
  border: 1px solid #fbbf24;
  color: #92400e;
  border-radius: 0.5rem;
  padding: 0.6rem 1rem;
  font-size: 0.85rem;
  font-weight: 500;
  margin-bottom: 0.75rem;
}
.trunc-notice.show { display: block; }
@media (max-width: 600px) {
  body { overflow-x: hidden; }
  input[type=text] { width: 100% !important; min-width: 0 !important; }
}

<body>
<div class="container">
  <header>
    <h1>CSV Viewer</h1>
    <p>Upload a CSV or Excel file to explore and search your data</p>
  </header>

  <div class="card">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".csv,.xlsx,.xls">
      <div class="drop-zone-icon"></div>
      <p>Drag &amp; drop a CSV or Excel file here, or <strong onclick="document.getElementById('fileInput').click()">browse</strong></p>
      <p style="margin-top:0.3rem;font-size:0.8rem;">.csv, .xlsx, .xls — up to 50 MB</p>
    </div>
    <div id="statusDiv"></div>
  </div>

  <div class="card" id="tableCard" style="display:none;">
    <div class="info-bar show" id="infoBar">
      <div class="info-pills">
        <div class="pill">Rows: <span id="infoRows">0</span></div>
        <div class="pill">Columns: <span id="infoCols">0</span></div>
        <div class="pill" id="infoFile">File: <span id="infoFileName">—</span></div>
      </div>
      <button class="btn btn-ghost" onclick="resetFile()" style="font-size:0.8rem;">Load new file</button>
    </div>

    <div class="trunc-notice" id="truncNotice">
      This file has more than 10,000 rows. Only the first 10,000 rows are shown.
    </div>

    <div class="search-row">
      <input type="text" id="searchInput" placeholder="Search all columns…" oninput="onSearch()">
    </div>

    <div class="table-wrap">
      <table id="dataTable">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <div class="pagination" id="pagination">
      <div class="page-info" id="pageInfo"></div>
      <div class="page-btns">
        <button class="btn btn-ghost" id="prevBtn" onclick="changePage(-1)">← Prev</button>
        <button class="btn btn-ghost" id="nextBtn" onclick="changePage(1)">Next →</button>
      </div>
    </div>
  </div>
</div>

<script>
let allRows = [];
let filteredRows = [];
let columns = [];
let currentPage = 0;
const PAGE_SIZE = 50;
let sortCol = -1;
let sortAsc = true;

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
if (dropZone && fileInput) {
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) loadFile(file);
  });
  dropZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });
}

function loadFile(file) {
  const statusDiv = document.getElementById('statusDiv');
  statusDiv.innerHTML = '<div class="status success">Loading…</div>';
  const fd = new FormData();
  fd.append('file', file);
  fetch('api/load', { method: 'POST', body: fd })
    .then(r => r.json())
    .then(d => {
      statusDiv.innerHTML = '';
      if (d.error) {
        statusDiv.innerHTML = '<div class="status error">' + d.error + '</div>';
        return;
      }
      columns = d.columns;
      allRows = d.rows;
      filteredRows = [...allRows];
      currentPage = 0;
      sortCol = -1;
      sortAsc = true;

      document.getElementById('infoRows').textContent = d.total;
      document.getElementById('infoCols').textContent = columns.length;
      document.getElementById('infoFileName').textContent = file.name;
      document.getElementById('truncNotice').classList.toggle('show', d.truncated);
      document.getElementById('searchInput').value = '';

      buildHeader();
      renderPage();
      document.getElementById('tableCard').style.display = 'block';
    })
    .catch(err => {
      statusDiv.innerHTML = '<div class="status error">Error: ' + err.message + '</div>';
    });
}

function resetFile() {
  document.getElementById('tableCard').style.display = 'none';
  document.getElementById('fileInput').value = '';
  allRows = []; filteredRows = []; columns = [];
}

function buildHeader() {
  const head = document.getElementById('tableHead');
  head.innerHTML = '<tr>' + columns.map((c, i) =>
    `<th onclick="sortBy(${i})">${escHtml(c)}</th>`
  ).join('') + '</tr>';
}

function sortBy(col) {
  if (sortCol === col) { sortAsc = !sortAsc; } else { sortCol = col; sortAsc = true; }
  filteredRows.sort((a, b) => {
    const av = a[col] || '', bv = b[col] || '';
    const an = parseFloat(av), bn = parseFloat(bv);
    if (!isNaN(an) && !isNaN(bn)) return sortAsc ? an - bn : bn - an;
    return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
  });
  currentPage = 0;
  renderPage();
}

function onSearch() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  if (!q) {
    filteredRows = [...allRows];
  } else {
    filteredRows = allRows.filter(row => row.some(cell => cell.toLowerCase().includes(q)));
  }
  currentPage = 0;
  if (sortCol >= 0) sortBy(sortCol);
  else renderPage();
}

function renderPage() {
  const start = currentPage * PAGE_SIZE;
  const end = Math.min(start + PAGE_SIZE, filteredRows.length);
  const pageRows = filteredRows.slice(start, end);
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = pageRows.map(row =>
    '<tr>' + row.map(cell => `<td title="${escHtml(cell)}">${escHtml(cell)}</td>`).join('') + '</tr>'
  ).join('');

  const totalPages = Math.ceil(filteredRows.length / PAGE_SIZE);
  const pagination = document.getElementById('pagination');
  pagination.classList.toggle('show', filteredRows.length > PAGE_SIZE);
  document.getElementById('pageInfo').textContent =
    `Showing ${start + 1}–${end} of ${filteredRows.length} rows` +
    (filteredRows.length < allRows.length ? ` (filtered from ${allRows.length})` : '');
  document.getElementById('prevBtn').disabled = currentPage === 0;
  document.getElementById('nextBtn').disabled = currentPage >= totalPages - 1;
}

function changePage(delta) {
  const totalPages = Math.ceil(filteredRows.length / PAGE_SIZE);
  currentPage = Math.max(0, Math.min(totalPages - 1, currentPage + delta));
  renderPage();
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
