<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
    <link rel="canonical" href="https://jorresapps.onrender.com/image-filters/">
    <meta name="robots" content="index, follow">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='6' y='6' width='40' height='40' rx='12' fill='%233B82F6'/%3E%3Crect x='54' y='6' width='40' height='40' rx='12' fill='%238B5CF6'/%3E%3Crect x='6' y='54' width='40' height='40' rx='12' fill='%2310B981'/%3E%3Crect x='54' y='54' width='40' height='40' rx='12' fill='%23F97316'/%3E%3C/svg%3E">
<link rel="stylesheet" href="/static/base.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Filters &amp; Effects | Jorres Apps</title>
<style>
:root{--primary:#7c3aed; --brand: var(--primary);--bg:#f1f5f9;--card:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:2rem 1rem 4rem}
.container{max-width:820px;margin:0 auto}
header{text-align:center;margin-bottom:2rem}
header h1{font-size:2rem;font-weight:800}
header p{color:var(--muted);margin-top:.4rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:1rem;padding:1.5rem;margin-bottom:1.25rem}
.upload-zone{border:2px dashed var(--border);border-radius:.75rem;padding:2.5rem 1rem;text-align:center;cursor:pointer;transition:border-color .2s;background:#fafafa}
.upload-zone:hover,.upload-zone.drag{border-color:var(--primary);background:#f5f0ff}
.upload-zone p{color:var(--muted);margin-top:.5rem;font-size:.875rem}
.btn{padding:.5rem 1.1rem;border-radius:.5rem;border:none;font-size:.875rem;font-weight:600;cursor:pointer;font-family:inherit;background:var(--primary);color:#fff;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.preview-wrap{display:flex;gap:1rem;flex-wrap:wrap}
.preview-box{flex:1;min-width:220px}
.preview-box label{display:block;font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.4rem}
.preview-box img,.preview-box canvas{width:100%;border-radius:.5rem;border:1px solid var(--border);display:block}
.sliders{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.85rem}
.slider-row{display:flex;flex-direction:column;gap:.25rem}
.slider-row label{display:flex;justify-content:space-between;font-size:.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.slider-row label span{font-size:.82rem;font-weight:700;color:var(--primary);text-transform:none;letter-spacing:0}
input[type=range]{width:100%;accent-color:var(--primary);height:4px}
.presets{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.75rem}
.preset-btn{padding:.3rem .75rem;border-radius:.4rem;border:1px solid var(--border);font-size:.78rem;font-weight:600;cursor:pointer;background:#fff;color:var(--text);font-family:inherit}
.preset-btn:hover{border-color:var(--primary);color:var(--primary)}
.actions{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:.75rem}
#editorSection{display:none}
@media (max-width: 600px) {
  body { overflow-x: hidden; }
  canvas { max-width: 100% !important; height: auto !important; }
  .sliders { grid-template-columns: 1fr !important; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Image Filters &amp; Effects</h1>
    <p>Upload an image and apply filters with live sliders. Download the result.</p>
  </header>

  <div class="card" id="uploadCard">
    <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      
      <div style="font-weight:700;margin-top:.5rem">Click or drag an image here</div>
      <p>PNG, JPEG, WEBP supported</p>
    </div>
    <input type="file" id="fileInput" accept="image/*" style="display:none">
  </div>

  <div id="editorSection">
    <div class="card">
      <div class="preview-wrap">
        <div class="preview-box"><label>Original</label><img id="origImg" alt="Original"></div>
        <div class="preview-box"><label>Preview</label><canvas id="canvas"></canvas></div>
      </div>
    </div>

    <div class="card">
      <div style="font-size:.875rem;font-weight:700;margin-bottom:.6rem">Quick Presets</div>
      <div class="presets">
        <button class="preset-btn" onclick="applyPreset('original')">Original</button>
        <button class="preset-btn" onclick="applyPreset('grayscale')">Grayscale</button>
        <button class="preset-btn" onclick="applyPreset('sepia')">Sepia</button>
        <button class="preset-btn" onclick="applyPreset('vivid')">Vivid</button>
        <button class="preset-btn" onclick="applyPreset('faded')">Faded</button>
        <button class="preset-btn" onclick="applyPreset('dramatic')">Dramatic</button>
        <button class="preset-btn" onclick="applyPreset('cool')">Cool</button>
        <button class="preset-btn" onclick="applyPreset('warm')">Warm</button>
      </div>
      <div class="sliders" id="sliders"></div>
      <div class="actions">
        <button class="btn" onclick="downloadResult()">Download PNG</button>
        <button class="btn btn-secondary" onclick="resetFilters()">Reset Filters</button>
        <button class="btn btn-secondary" onclick="changeImage()">Change Image</button>
      </div>
    </div>
  </div>
</div>

<script>
const SLIDERS=[
  {id:'brightness',label:'Brightness',min:0,max:200,def:100,unit:'%'},
  {id:'contrast',label:'Contrast',min:0,max:200,def:100,unit:'%'},
  {id:'saturation',label:'Saturation',min:0,max:200,def:100,unit:'%'},
  {id:'grayscale',label:'Grayscale',min:0,max:100,def:0,unit:'%'},
  {id:'sepia',label:'Sepia',min:0,max:100,def:0,unit:'%'},
  {id:'hueRotate',label:'Hue Rotate',min:0,max:360,def:0,unit:'°'},
  {id:'invert',label:'Invert',min:0,max:100,def:0,unit:'%'},
  {id:'blur',label:'Blur',min:0,max:20,def:0,unit:'px'},
  {id:'opacity',label:'Opacity',min:10,max:100,def:100,unit:'%'},
];

const PRESETS={
  original:{brightness:100,contrast:100,saturation:100,grayscale:0,sepia:0,hueRotate:0,invert:0,blur:0,opacity:100},
  grayscale:{brightness:100,contrast:110,saturation:0,grayscale:100,sepia:0,hueRotate:0,invert:0,blur:0,opacity:100},
  sepia:{brightness:100,contrast:100,saturation:100,grayscale:0,sepia:100,hueRotate:0,invert:0,blur:0,opacity:100},
  vivid:{brightness:105,contrast:120,saturation:160,grayscale:0,sepia:0,hueRotate:0,invert:0,blur:0,opacity:100},
  faded:{brightness:110,contrast:80,saturation:70,grayscale:0,sepia:20,hueRotate:0,invert:0,blur:0,opacity:100},
  dramatic:{brightness:90,contrast:160,saturation:80,grayscale:0,sepia:0,hueRotate:0,invert:0,blur:0,opacity:100},
  cool:{brightness:100,contrast:100,saturation:100,grayscale:0,sepia:0,hueRotate:200,invert:0,blur:0,opacity:100},
  warm:{brightness:105,contrast:100,saturation:110,grayscale:0,sepia:30,hueRotate:0,invert:0,blur:0,opacity:100},
};

let origImage=null;

function buildSliders(){
  document.getElementById('sliders').innerHTML=SLIDERS.map(s=>`
    <div class="slider-row">
      <label>${s.label}<span id="${s.id}Val">${s.def}${s.unit}</span></label>
      <input type="range" id="${s.id}" min="${s.min}" max="${s.max}" value="${s.def}" oninput="onSlider('${s.id}','${s.unit}')">
    </div>
  `).join('');
}

function onSlider(id,unit){
  const val=document.getElementById(id).value;
  document.getElementById(id+'Val').textContent=val+unit;
  applyFilters();
}

function getFilter(){
  const v=id=>parseInt(document.getElementById(id).value);
  return `brightness(${v('brightness')}%) contrast(${v('contrast')}%) saturate(${v('saturation')}%) grayscale(${v('grayscale')}%) sepia(${v('sepia')}%) hue-rotate(${v('hueRotate')}deg) invert(${v('invert')}%) blur(${v('blur')}px) opacity(${v('opacity')}%)`;
}

function applyFilters(){
  if(!origImage)return;
  const canvas=document.getElementById('canvas');
  const ctx=canvas.getContext('2d');
  canvas.width=origImage.naturalWidth;
  canvas.height=origImage.naturalHeight;
  ctx.filter=getFilter();
  ctx.drawImage(origImage,0,0);
}

function applyPreset(name){
  const p=PRESETS[name];
  SLIDERS.forEach(s=>{
    document.getElementById(s.id).value=p[s.id];
    document.getElementById(s.id+'Val').textContent=p[s.id]+s.unit;
  });
  applyFilters();
}

function resetFilters(){applyPreset('original');}

function downloadResult(){
  const canvas=document.getElementById('canvas');
  const a=document.createElement('a');
  a.href=canvas.toDataURL('image/png');
  a.download='filtered-image.png';
  a.click();
}

function changeImage(){
  origImage=null;
  document.getElementById('editorSection').style.display='none';
  document.getElementById('uploadCard').style.display='block';
}

function loadFile(file){
  if(!file||!file.type.startsWith('image/'))return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      origImage=img;
      document.getElementById('origImg').src=e.target.result;
      document.getElementById('uploadCard').style.display='none';
      document.getElementById('editorSection').style.display='block';
      buildSliders();
      applyFilters();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

document.getElementById('fileInput').addEventListener('change',e=>loadFile(e.target.files[0]));
const dz=document.getElementById('dropZone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');loadFile(e.dataTransfer.files[0]);});
</script>
<script src="/static/footer.js"></script>

<script src="/static/app-nav.js"></script>
</body>
</html>
