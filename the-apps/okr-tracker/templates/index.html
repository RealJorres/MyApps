<style>
:root{--bg:#f1f5f9;--card:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b}
.container{max-width:780px;margin:0 auto}

.btn-danger{background:#dc2626;color:#fff}
.btn-sm{padding:.3rem .65rem;font-size:.78rem}
input,textarea{width:100%;padding:.55rem .75rem;border:1px solid var(--border);border-radius:.5rem;font-size:.9rem;background:#fff;color:var(--text);outline:none;font-family:inherit}
input:focus,textarea:focus{border-color:var(--brand)}
.overview{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:1rem;margin-bottom:1.25rem}
.stat{background:var(--card);border:1px solid var(--border);border-radius:.75rem;padding:1rem;text-align:center}
.stat .val{font-size:1.6rem;font-weight:800;color:var(--brand)}
.stat .lbl{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:.15rem}
.obj-card{border:1px solid var(--border);border-radius:.75rem;padding:1.25rem;margin-bottom:1rem;background:#fff}
.obj-header{display:flex;justify-content:space-between;align-items:flex-start;gap:.75rem;margin-bottom:.75rem}
.obj-title{font-size:1rem;font-weight:800;flex:1}
.obj-pct{font-size:1.2rem;font-weight:800;color:var(--brand);white-space:nowrap}
.progress-bar{height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden;margin-bottom:.75rem}
.progress-fill{height:100%;background:var(--brand);border-radius:4px;transition:width .3s}
.kr-row{display:flex;align-items:center;gap:.75rem;margin-bottom:.5rem;flex-wrap:wrap}
.kr-text{flex:1;min-width:160px;font-size:.875rem}
.kr-slider{flex:1;min-width:100px;accent-color:var(--brand)}
.kr-pct{font-size:.85rem;font-weight:700;color:var(--brand);min-width:36px;text-align:right}
.add-kr{display:flex;gap:.5rem;margin-top:.5rem}
.add-kr input{flex:1}
.add-obj{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}
.add-obj input{flex:1;min-width:200px}
@media (max-width: 600px) { input[type=text], input[type=number], input[type=email], input[type=date], input[type=password], input[type=search], select, textarea { font-size: 16px !important; }   .overview { grid-template-columns: 1fr 1fr !important; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>OKR Tracker</h1>
    <p>Define Objectives and Key Results, track your progress.</p>
  </header>

  <div class="overview" id="overview"></div>

  <div class="card">
    <p style="font-weight:700;margin-bottom:.75rem">Add Objective</p>
    <div class="add-obj">
      <input type="text" id="objInput" placeholder="e.g. Launch new product line by Q3..." onkeydown="if(event.key==='Enter')addObjective()">
      <button class="btn btn-primary" onclick="addObjective()">+ Add Objective</button>
    </div>
  </div>

  <div id="objList"></div>
</div>
<script>
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
const KEY = 'okr_data';
let objectives = JSON.parse(localStorage.getItem(KEY) || '[]');

// Sample data if empty
if (!objectives.length) {
  objectives = [
    {id:1, title:'Grow monthly revenue by 30%', krs:[
      {id:11, text:'Close 10 new enterprise contracts', progress:60},
      {id:12, text:'Launch upsell campaign to existing customers', progress:40},
      {id:13, text:'Reduce churn rate below 3%', progress:80},
    ]},
    {id:2, title:'Improve team productivity', krs:[
      {id:21, text:'Implement weekly sprint reviews', progress:100},
      {id:22, text:'Reduce average ticket resolution time by 20%', progress:50},
    ]},
  ];
  save();
}

function save() { localStorage.setItem(KEY, JSON.stringify(objectives)); }

function objProgress(obj) {
  if (!obj.krs.length) return 0;
  return Math.round(obj.krs.reduce((a,k)=>a+k.progress,0) / obj.krs.length);
}

function overallProgress() {
  if (!objectives.length) return 0;
  const total = objectives.reduce((a,o)=>a+objProgress(o), 0);
  return Math.round(total / objectives.length);
}

function renderOverview() {
  const overall = overallProgress();
  const done = objectives.filter(o=>objProgress(o)===100).length;
  const totalKRs = objectives.reduce((a,o)=>a+o.krs.length,0);
  document.getElementById('overview').innerHTML = `
    <div class="stat"><div class="val">${overall}%</div><div class="lbl">Overall</div></div>
    <div class="stat"><div class="val">${objectives.length}</div><div class="lbl">Objectives</div></div>
    <div class="stat"><div class="val">${totalKRs}</div><div class="lbl">Key Results</div></div>
    <div class="stat"><div class="val">${done}</div><div class="lbl">Completed</div></div>
  `;
}

function addObjective() {
  const text = document.getElementById('objInput').value.trim();
  if (!text) return;
  objectives.push({ id: Date.now(), title: text, krs: [] });
  document.getElementById('objInput').value = '';
  save(); render();
}

function deleteObjective(id) {
  if (!confirm('Delete this objective?')) return;
  objectives = objectives.filter(o => o.id !== id);
  save(); render();
}

function addKR(objId) {
  const inp = document.getElementById('kr_inp_'+objId);
  const text = inp.value.trim();
  if (!text) return;
  const obj = objectives.find(o=>o.id===objId);
  if (!obj) return;
  obj.krs.push({ id: Date.now(), text, progress: 0 });
  inp.value = '';
  save(); render();
}

function deleteKR(objId, krId) {
  const obj = objectives.find(o=>o.id===objId);
  if (!obj) return;
  obj.krs = obj.krs.filter(k=>k.id!==krId);
  save(); render();
}

function updateProgress(objId, krId, val) {
  const obj = objectives.find(o=>o.id===objId);
  if (!obj) return;
  const kr = obj.krs.find(k=>k.id===krId);
  if (!kr) return;
  kr.progress = parseInt(val);
  // Update display
  document.getElementById('pct_'+krId).textContent = val+'%';
  const pct = objProgress(obj);
  const fill = document.getElementById('fill_'+objId);
  const opct = document.getElementById('opct_'+objId);
  if (fill) fill.style.width = pct+'%';
  if (opct) opct.textContent = pct+'%';
  fill && (fill.style.background = pct===100?'#059669':pct>=70?'#16a34a':pct>=40?'#d97706':'#dc2626');
  save(); renderOverview();
}

function colorForProgress(p) {
  return p===100?'#059669':p>=70?'#16a34a':p>=40?'#d97706':'#dc2626';
}

function render() {
  renderOverview();
  const list = document.getElementById('objList');
  if (!objectives.length) {
    list.innerHTML = '<div class="card" style="text-align:center;color:var(--muted)">No objectives yet. Add one above.</div>';
    return;
  }
  list.innerHTML = objectives.map(obj => {
    const pct = objProgress(obj);
    const color = colorForProgress(pct);
    return `
    <div class="obj-card">
      <div class="obj-header">
        <div class="obj-title">${esc(obj.title)}</div>
        <div style="display:flex;align-items:center;gap:.5rem">
          <span class="obj-pct" id="opct_${obj.id}" style="color:${color}">${pct}%</span>
          <button class="btn btn-danger btn-sm" onclick="deleteObjective(${obj.id})"><span aria-hidden="true">&#x2715;</span><span class="sr-only">Remove</span></button>
        </div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="fill_${obj.id}" style="width:${pct}%;background:${color}"></div></div>
      ${obj.krs.map(kr => `
        <div class="kr-row">
          <div class="kr-text">– ${esc(kr.text)}</div>
          <input type="range" class="kr-slider" min="0" max="100" value="${kr.progress}" oninput="updateProgress(${obj.id},${kr.id},this.value)">
          <div class="kr-pct" id="pct_${kr.id}">${kr.progress}%</div>
          <button class="btn btn-danger btn-sm" onclick="deleteKR(${obj.id},${kr.id})"><span aria-hidden="true">&#x2715;</span><span class="sr-only">Remove</span></button>
        </div>
      `).join('')}
      <div class="add-kr">
        <input type="text" id="kr_inp_${obj.id}" placeholder="Add key result..." onkeydown="if(event.key==='Enter')addKR(${obj.id})">
        <button class="btn btn-primary btn-sm" onclick="addKR(${obj.id})">+ KR</button>
      </div>
    </div>`;
  }).join('');
}

render();
</script>
<!-- Data portability -->
<div class="card" style="margin-top:0">
  <p style="font-size:.8rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem">Data</p>
  <div style="display:flex;gap:.5rem;flex-wrap:wrap">
    <button onclick="exportData()" style="padding:.45rem .9rem;border:1px solid var(--border);border-radius:.5rem;background:var(--bg);color:var(--text);font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit">Export JSON</button>
    <button onclick="importData()" style="padding:.45rem .9rem;border:1px solid var(--border);border-radius:.5rem;background:var(--bg);color:var(--text);font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit">Import JSON</button>
  </div>
  <p style="font-size:.72rem;color:var(--muted);margin-top:.5rem">Export saves a backup file. Import restores from a previously exported file.</p>
</div>
<script src="/static/footer.js?v=3"></script>
<script>
function exportData() {
  var d = localStorage.getItem('okr_data') || '[]';
  var a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([d],{type:'application/json'}));
  a.download = 'okr-tracker-backup.json'; a.click();
}
function importData() {
  var inp = document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange = function(e) {
    var f = e.target.files[0]; if(!f) return;
    var r = new FileReader();
    r.onload = function(ev) {
      try {
        var data = JSON.parse(ev.target.result);
        localStorage.setItem('okr_data', JSON.stringify(data));
        objectives = Array.isArray(data) ? data : []; save(); render();
        alert('Imported successfully.');
      } catch(err) { alert('Invalid JSON file.'); }
    };
    r.readAsText(f);
  };
  inp.click();
}
</script>
<script src="/static/app-nav.js?v=3"></script>
</body>
</html>
