<title>Markdown to PDF</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0fdfa; color: #1e293b; min-height: 100vh; display: flex; flex-direction: column; }
  header { background: linear-gradient(135deg, #0f766e, #0d6b63); color: white; padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
  header h1 { font-size: 1.4rem; font-weight: 700; }
  header p { font-size: 0.85rem; opacity: 0.85; }
  .options-bar { background: white; border-bottom: 1.5px solid #e2e8f0; padding: 0.75rem 2rem; display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; }
  .options-bar label { font-size: 0.82rem; font-weight: 600; color: #374151; }
  .options-bar input[type="text"] { padding: 0.4rem 0.75rem; border: 1.5px solid #d1d5db; border-radius: 6px; font-size: 0.85rem; width: 220px; }
  .options-bar input[type="text"]:focus { outline: none; border-color: #0f766e; }
  .options-bar input[type="number"] { padding: 0.4rem 0.5rem; border: 1.5px solid #d1d5db; border-radius: 6px; font-size: 0.85rem; width: 65px; }
  .options-bar input[type="number"]:focus { outline: none; border-color: #0f766e; }
  .field-group { display: flex; align-items: center; gap: 0.5rem; }
  .btn { padding: 0.55rem 1.25rem; border: none; border-radius: 7px; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: all 0.18s; display: inline-flex; align-items: center; gap: 0.5rem; }
  .btn-primary { background: #0f766e; color: white; }
  .btn-primary:hover { background: #0d6b63; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(15,118,110,0.3); }
  .btn-primary:active { transform: translateY(0); }
  .main { display: grid; grid-template-columns: 1fr 1fr; flex: 1; overflow: hidden; }
  .pane { display: flex; flex-direction: column; height: calc(100vh - 130px); }
  .pane-label { padding: 0.6rem 1rem; font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #6b7280; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
  .left-pane { border-right: 2px solid #e2e8f0; }
  textarea { flex: 1; width: 100%; padding: 1rem; font-family: 'Courier New', Courier, monospace; font-size: 0.85rem; border: none; resize: none; background: white; line-height: 1.6; color: #1e293b; }
  textarea:focus { outline: none; }
  .preview { flex: 1; padding: 1.5rem 2rem; overflow-y: auto; background: white; }
  .preview h1 { font-size: 2rem; font-weight: 800; color: #0f766e; margin: 1rem 0 0.5rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.5rem; }
  .preview h2 { font-size: 1.4rem; font-weight: 700; color: #1e293b; margin: 1.2rem 0 0.4rem; }
  .preview h3 { font-size: 1.1rem; font-weight: 700; color: #374151; margin: 1rem 0 0.3rem; }
  .preview p { margin: 0.6rem 0; line-height: 1.7; color: #374151; }
  .preview ul, .preview ol { padding-left: 1.5rem; margin: 0.5rem 0; }
  .preview li { margin: 0.3rem 0; line-height: 1.6; }
  .preview code { background: #f1f5f9; padding: 0.1rem 0.4rem; border-radius: 4px; font-family: 'Courier New', monospace; font-size: 0.85em; color: #0f766e; }
  .preview pre { background: #f1f5f9; padding: 1rem; border-radius: 8px; margin: 0.75rem 0; overflow-x: auto; border-left: 3px solid #0f766e; }
  .preview pre code { background: none; padding: 0; color: #1e293b; }
  .preview blockquote { border-left: 3px solid #0f766e; padding-left: 1rem; margin: 0.75rem 0; color: #6b7280; font-style: italic; }
  .preview hr { border: none; border-top: 1.5px solid #e2e8f0; margin: 1rem 0; }
  .preview strong { font-weight: 700; color: #1e293b; }
  .preview em { font-style: italic; color: #4b5563; }
  .preview a { color: #0f766e; text-decoration: underline; }
  .preview table { width: 100%; border-collapse: collapse; margin: 0.75rem 0; font-size: 0.9rem; }
  .preview th { background: #0f766e; color: white; padding: 0.5rem 0.75rem; text-align: left; }
  .preview td { padding: 0.45rem 0.75rem; border-bottom: 1px solid #e2e8f0; }
  .preview tr:nth-child(even) { background: #f8fafc; }
  .error-toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: #fef2f2; border: 1.5px solid #fca5a5; color: #dc2626; padding: 0.75rem 1.25rem; border-radius: 8px; font-size: 0.85rem; max-width: 350px; display: none; z-index: 100; }
  @media (max-width: 768px) { .main { grid-template-columns: 1fr; } .pane { height: 50vh; } }
</style>
</head>
<body>
<header>
  <div>
    <h1>Markdown to PDF</h1>
    <p>Write Markdown and export to a beautiful PDF</p>
  </div>
</header>

<div class="options-bar">
  <div class="field-group">
    <label for="doc-title">Document Title:</label>
    <input type="text" id="doc-title" value="My Document" placeholder="Document title...">
  </div>
  <div class="field-group">
    <label for="font-size">Font Size:</label>
    <input type="number" id="font-size" value="11" min="8" max="14">
  </div>
  <button class="btn btn-primary" onclick="downloadPDF()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Download PDF
  </button>
</div>

<div class="main">
  <div class="pane left-pane">
    <div class="pane-label">Markdown Editor</div>
    <textarea id="md-input" placeholder="Type your Markdown here..." oninput="updatePreview()" spellcheck="false"># Welcome to Markdown to PDF

This is a **live preview** editor. Write your content here and download it as a PDF.

## Features

- Real-time HTML preview
- Beautiful PDF output
- Supports **bold**, *italic*, and `code`
- Code blocks with syntax highlighting
- Headers, lists, and tables

## Code Example

```python
def hello_world():
    print("Hello, World!")

hello_world()
```

## About

This tool converts your Markdown to a professionally formatted PDF using ReportLab.

---

*Happy writing!*
</textarea>
  </div>
  <div class="pane">
    <div class="pane-label">Live Preview</div>
    <div class="preview" id="preview"></div>
  </div>
</div>

<div class="error-toast" id="error-toast"></div>

<script>
function parseMarkdown(md) {
  let html = md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^```(\w*)\n([\s\S]*?)```$/gm, (m,lang,code) => `<pre><code>${code.replace(/&lt;/g,'<').replace(/&gt;/g,'>')}</code></pre>`)
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/^\> (.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/^[-*]{3,}$/gm, '<hr>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
  const lines = html.split('\n');
  const out = []; let inList = false;
  for (const line of lines) {
    if (/^[*-] (.+)$/.test(line)) {
      if (!inList) { out.push('<ul>'); inList = true; }
      out.push('<li>' + line.replace(/^[*-] /, '') + '</li>');
    } else {
      if (inList) { out.push('</ul>'); inList = false; }
      if (line.trim() && !line.startsWith('<')) out.push('<p>' + line + '</p>');
      else out.push(line);
    }
  }
  if (inList) out.push('</ul>');
  return out.join('\n');
}

function updatePreview() {
  const md = document.getElementById('md-input').value;
  document.getElementById('preview').innerHTML = parseMarkdown(md);
}

async function downloadPDF() {
  const text = document.getElementById('md-input').value;
  const title = document.getElementById('doc-title').value || 'Document';
  const font_size = parseInt(document.getElementById('font-size').value) || 11;
  try {
    const r = await fetch('api/convert', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({text, title, font_size})
    });
    if (!r.ok) {
      const d = await r.json();
      showError(d.error || 'Conversion failed');
      return;
    }
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = title.replace(/[^\w\- ]/g,'_').substring(0,40) + '.pdf';
    a.click(); URL.revokeObjectURL(url);
  } catch(e) { showError(e.message); }
}

function showError(msg) {
  const el = document.getElementById('error-toast');
  el.textContent = 'Error: ' + msg; el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 5000);
}

updatePreview();
</script>
</body>
</html>
