<style>
:root {

  --bg: #0f172a; --surface: #1e293b; --surface2: #334155;
  --text: #f1f5f9; --muted: #94a3b8; --border: #334155;
}
body { padding: 20px; }
header h1 { color: var(--brand); }
.controls { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; align-items: center; margin-bottom: 24px; }
.btn { background: var(--brand); color: #fff; }
.btn:hover { background: var(--brand-dark); }
.add-wrapper { position: relative; }
.dropdown { display: none; position: absolute; top: calc(100% + 8px); left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border); border-radius: 12px; width: 300px; max-width: 90vw; z-index: 100; box-shadow: 0 8px 32px rgba(0,0,0,0.5); overflow: hidden; }
.dropdown.open { display: block; }
.dropdown input { width: 100%; padding: 12px 14px; background: var(--surface2); border: none; border-bottom: 1px solid var(--border); color: var(--text); font-size: 0.9rem; outline: none; font-family: inherit; }
.dropdown input::placeholder { color: var(--muted); }
.city-list { max-height: 220px; overflow-y: auto; }
.city-opt { padding: 10px 14px; cursor: pointer; font-size: 0.88rem; display: flex; justify-content: space-between; align-items: center; transition: background 0.12s; }
.city-opt:hover { background: var(--surface2); }
.city-opt .tz { color: var(--muted); font-size: 0.75rem; }
.city-opt.added { opacity: 0.4; pointer-events: none; }
.format-toggle { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--muted); }
.toggle { position: relative; width: 42px; height: 22px; cursor: pointer; }
.toggle input { display: none; }
.track { position: absolute; inset: 0; background: var(--surface2); border-radius: 11px; transition: background 0.2s; }
.toggle input:checked + .track { background: var(--brand); }
.thumb { position: absolute; top: 3px; left: 3px; width: 16px; height: 16px; background: #fff; border-radius: 50%; transition: transform 0.2s; pointer-events: none; }
.toggle input:checked ~ .thumb { transform: translateX(20px); }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; max-width: 1100px; margin: 0 auto; }
@media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 480px) { body { overflow-x: hidden; } .grid { grid-template-columns: 1fr; } }
.card { border-radius: 14px; padding: 18px; cursor: pointer; position: relative; border: 2px solid transparent; transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s; }
.card:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,0.3); }
.card.highlighted { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(8,145,178,0.2); }
.card.day { background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%); color: #0c4a6e; }
.card.night { background: linear-gradient(135deg, #1e3a5f 0%, #0f2645 100%); color: #bae6fd; }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.city-name { font-size: 1rem; font-weight: 700; }
.utc-off { font-size: 0.73rem; opacity: 0.7; margin-top: 2px; }
.remove-btn { background: rgba(0,0,0,0.15); border: none; border-radius: 50%; width: 26px; height: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: inherit; opacity: 0.7; transition: opacity 0.15s; flex-shrink: 0; font-size: 1rem; line-height: 1; }
.remove-btn:hover { opacity: 1; background: rgba(0,0,0,0.3); }
.dni { position: absolute; top: 14px; right: 44px; font-size: 1rem; }
.time-val { font-size: clamp(1.5rem, 4vw, 2.1rem); font-weight: 800; letter-spacing: -1px; line-height: 1; margin-bottom: 4px; font-variant-numeric: tabular-nums; }
.ampm { font-size: 0.85rem; font-weight: 600; margin-left: 4px; opacity: 0.8; }
.date-val { font-size: 0.8rem; opacity: 0.75; margin-bottom: 6px; }
.comp { margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(0,0,0,0.15); font-size: 0.78rem; opacity: 0.85; display: none; }
.comp strong { display: block; margin-bottom: 2px; }
.empty { text-align: center; padding: 60px 20px; color: var(--muted); grid-column: 1 / -1; }
.empty .icon { font-size: 3rem; margin-bottom: 12px; }

<body>
<header>
  <h1>World Clock</h1>
  <p>Track time across the globe</p>
</header>
<div class="controls">
  <div class="add-wrapper" id="addWrapper">
    <button class="btn" id="addBtn">+ Add City</button>
    <div class="dropdown" id="dropdown">
      <input type="text" id="citySearch" placeholder="Search cities…" autocomplete="off">
      <div class="city-list" id="cityList"></div>
    </div>
  </div>
  <label class="format-toggle">
    <span>12h</span>
    <label class="toggle">
      <input type="checkbox" id="fmt24">
      <div class="track"></div>
      <div class="thumb"></div>
    </label>
    <span>24h</span>
  </label>
</div>
<div class="grid" id="grid"></div>

<script>
const CITIES = [
  {name:'Manila',tz:'Asia/Manila'},{name:'New York',tz:'America/New_York'},
  {name:'Los Angeles',tz:'America/Los_Angeles'},{name:'Chicago',tz:'America/Chicago'},
  {name:'Toronto',tz:'America/Toronto'},{name:'London',tz:'Europe/London'},
  {name:'Paris',tz:'Europe/Paris'},{name:'Berlin',tz:'Europe/Berlin'},
  {name:'Madrid',tz:'Europe/Madrid'},{name:'Rome',tz:'Europe/Rome'},
  {name:'Amsterdam',tz:'Europe/Amsterdam'},{name:'Moscow',tz:'Europe/Moscow'},
  {name:'Istanbul',tz:'Europe/Istanbul'},{name:'Athens',tz:'Europe/Athens'},
  {name:'Warsaw',tz:'Europe/Warsaw'},{name:'Stockholm',tz:'Europe/Stockholm'},
  {name:'Dubai',tz:'Asia/Dubai'},{name:'Mumbai',tz:'Asia/Kolkata'},
  {name:'Bangalore',tz:'Asia/Kolkata'},{name:'Karachi',tz:'Asia/Karachi'},
  {name:'Dhaka',tz:'Asia/Dhaka'},{name:'Bangkok',tz:'Asia/Bangkok'},
  {name:'Jakarta',tz:'Asia/Jakarta'},{name:'Singapore',tz:'Asia/Singapore'},
  {name:'Kuala Lumpur',tz:'Asia/Kuala_Lumpur'},{name:'Hong Kong',tz:'Asia/Hong_Kong'},
  {name:'Shanghai',tz:'Asia/Shanghai'},{name:'Beijing',tz:'Asia/Shanghai'},
  {name:'Taipei',tz:'Asia/Taipei'},{name:'Tokyo',tz:'Asia/Tokyo'},
  {name:'Seoul',tz:'Asia/Seoul'},{name:'Sydney',tz:'Australia/Sydney'},
  {name:'Auckland',tz:'Pacific/Auckland'},{name:'Sao Paulo',tz:'America/Sao_Paulo'},
  {name:'Buenos Aires',tz:'America/Argentina/Buenos_Aires'},
  {name:'Mexico City',tz:'America/Mexico_City'},{name:'Cairo',tz:'Africa/Cairo'},
  {name:'Nairobi',tz:'Africa/Nairobi'},{name:'Lagos',tz:'Africa/Lagos'},
  {name:'Cape Town',tz:'Africa/Johannesburg'},
];

const DEFAULTS = ['Manila','New York','London','Tokyo','Sydney','Dubai'];
let active = [], highlighted = null, fmt24 = false;

// Safe DOM ID from city name
function sid(name) { return name.replace(/[^a-zA-Z0-9]/g,'_'); }

function load() {
  try {
    const s = localStorage.getItem('wc_cities');
    active = s ? JSON.parse(s) : DEFAULTS.slice();
    fmt24 = localStorage.getItem('wc_24h') === 'true';
  } catch { active = DEFAULTS.slice(); }
}
function save() {
  localStorage.setItem('wc_cities', JSON.stringify(active));
  localStorage.setItem('wc_24h', String(fmt24));
}

function cityOf(name) { return CITIES.find(c => c.name === name); }

// Get individual time parts in a timezone reliably using Intl
function timeParts(tz) {
  const now = new Date();
  const f = new Intl.DateTimeFormat('en-US', {
    timeZone: tz, hour: 'numeric', minute: '2-digit', second: '2-digit',
    hour12: true, weekday: 'short', month: 'short', day: 'numeric'
  }).formatToParts(now);
  const get = type => (f.find(p => p.type === type) || {}).value || '';
  const hour = parseInt(get('hour'));
  const minute = get('minute');
  const second = get('second');
  const dayperiod = get('dayPeriod'); // AM/PM
  const weekday = get('weekday');
  const month = get('month');
  const day = get('day');
  return { hour, minute, second, dayperiod, weekday, month, day };
}

function getUTCOffset(tz) {
  const now = new Date();
  const local = new Date(now.toLocaleString('en-US', {timeZone: tz}));
  const diff = Math.round((local - now + now.getTimezoneOffset()*60000) / 60000);
  const sign = diff >= 0 ? '+' : '-';
  const h = Math.floor(Math.abs(diff) / 60), m = Math.abs(diff) % 60;
  return `UTC${sign}${h}${m ? ':'+String(m).padStart(2,'0') : ''}`;
}

function formatTime(tz) {
  const {hour, minute, second, dayperiod} = timeParts(tz);
  if (fmt24) {
    return { t: `${String(hour).padStart(2,'0')}:${minute}:${second}`, ap: '' };
  }
  return { t: `${String(hour).padStart(2,'0')}:${minute}:${second}`, ap: dayperiod };
}

function formatDate(tz) {
  const {weekday, month, day} = timeParts(tz);
  return `${weekday}, ${month} ${day}`;
}

function isDay(tz) {
  const {hour, dayperiod} = timeParts(tz);
  // AM hours 6+ or PM hours before midnight = day (6:00–19:59)
  let h24 = hour;
  if (dayperiod === 'PM' && hour !== 12) h24 += 12;
  if (dayperiod === 'AM' && hour === 12) h24 = 0;
  return h24 >= 6 && h24 < 20;
}

function getComparison(tz) {
  const now = new Date();
  const their = new Date(now.toLocaleString('en-US', {timeZone: tz}));
  const mine = new Date(now.toLocaleString('en-US', {timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone}));
  const diff = Math.round((their - mine) / 60000);
  if (diff === 0) return 'Same time as you';
  const abs = Math.abs(diff), h = Math.floor(abs/60), m = abs%60;
  const label = (h ? h+'h ' : '') + (m ? m+'min' : '');
  return (diff > 0 ? 'Ahead' : 'Behind') + ' by ' + label.trim();
}

function createCard(name) {
  const id = sid(name);
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.city = name;
  card.innerHTML = `
    <span class="dni" id="dni${id}"></span>
    <div class="card-top">
      <div>
        <div class="city-name">${name}</div>
        <div class="utc-off" id="utc${id}"></div>
      </div>
      <button class="remove-btn" title="Remove"><span aria-hidden="true">&#x2715;</span><span class="sr-only">Remove</span></button>
    </div>
    <div class="time-val" id="tv${id}"></div>
    <div class="date-val" id="dv${id}"></div>
    <div class="comp" id="cp${id}"><strong>vs. your time</strong><span></span></div>
  `;
  card.querySelector('.remove-btn').addEventListener('click', e => { e.stopPropagation(); removeCity(name); });
  card.addEventListener('click', () => toggleHL(name));
  return card;
}

function updateCard(name) {
  const id = sid(name);
  const city = cityOf(name);
  if (!city) return;
  const tz = city.tz;
  const card = document.querySelector(`[data-city="${name}"]`);
  if (!card) return;
  const day = isDay(tz);
  card.className = 'card ' + (day ? 'day' : 'night') + (highlighted === name ? ' highlighted' : '');
  document.getElementById('dni'+id).textContent = day ? 'Day' : 'Night';
  document.getElementById('utc'+id).textContent = getUTCOffset(tz);
  const {t, ap} = formatTime(tz);
  document.getElementById('tv'+id).innerHTML = t + (ap ? `<span class="ampm">${ap}</span>` : '');
  document.getElementById('dv'+id).textContent = formatDate(tz);
  const cp = document.getElementById('cp'+id);
  if (highlighted === name) {
    cp.style.display = 'block';
    cp.querySelector('span').textContent = getComparison(tz);
  } else {
    cp.style.display = 'none';
  }
}

function updateAll() { active.forEach(updateCard); }

function toggleHL(name) {
  highlighted = highlighted === name ? null : name;
  updateAll();
}

function removeCity(name) {
  active = active.filter(c => c !== name);
  if (highlighted === name) highlighted = null;
  save();
  const card = document.querySelector(`[data-city="${name}"]`);
  if (card) card.remove();
  if (active.length === 0) showEmpty();
  buildList('');
}

function addCity(name) {
  if (active.includes(name)) return;
  active.push(name);
  save();
  const grid = document.getElementById('grid');
  const empty = grid.querySelector('.empty');
  if (empty) empty.remove();
  const card = createCard(name);
  grid.appendChild(card);
  updateCard(name);
  buildList(document.getElementById('citySearch').value);
  closeDD();
}

function showEmpty() {
  document.getElementById('grid').innerHTML = '<div class="empty"><div class="icon"></div><p>No cities added.<br>Click "+ Add City" to get started.</p></div>';
}

function renderGrid() {
  const grid = document.getElementById('grid');
  if (active.length === 0) { showEmpty(); return; }
  active.forEach(name => {
    const card = createCard(name);
    grid.appendChild(card);
  });
  updateAll();
}

function buildList(q) {
  const list = document.getElementById('cityList');
  const filtered = CITIES.filter(c => c.name.toLowerCase().includes(q.toLowerCase()));
  if (!filtered.length) { list.innerHTML = '<div class="city-opt" style="opacity:.5;pointer-events:none">No results</div>'; return; }
  list.innerHTML = '';
  filtered.forEach(c => {
    const d = document.createElement('div');
    d.className = 'city-opt' + (active.includes(c.name) ? ' added' : '');
    d.innerHTML = `<span>${c.name}</span><span class="tz">${c.tz}</span>`;
    d.addEventListener('click', () => addCity(c.name));
    list.appendChild(d);
  });
}

function openDD() {
  document.getElementById('dropdown').classList.add('open');
  document.getElementById('citySearch').value = '';
  buildList('');
  document.getElementById('citySearch').focus();
}
function closeDD() { document.getElementById('dropdown').classList.remove('open'); }

document.getElementById('addBtn').addEventListener('click', e => {
  e.stopPropagation();
  document.getElementById('dropdown').classList.contains('open') ? closeDD() : openDD();
});
document.getElementById('citySearch').addEventListener('input', e => buildList(e.target.value));
document.addEventListener('click', e => { if (!document.getElementById('addWrapper').contains(e.target)) closeDD(); });
document.getElementById('fmt24').addEventListener('change', e => { fmt24 = e.target.checked; save(); updateAll(); });

load();
document.getElementById('fmt24').checked = fmt24;
renderGrid();
setInterval(updateAll, 1000);
</script>
