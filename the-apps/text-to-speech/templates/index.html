<style>
:root { --bg: #f5f3ff; --card: #ffffff; --border: #e2e8f0; --text: #1e293b; --muted: #64748b; }
.container { max-width: 720px; margin: 0 auto; }
header h1 { color: var(--brand); }
.btn-play  { background: var(--brand); color: #fff; }
.btn-play:hover { background: var(--brand-hover); }
.btn-pause { background: #f59e0b; color: #fff; }
.btn-pause:hover { background: #d97706; }
.btn-stop  { background: #e2e8f0; color: var(--text); }
.btn-stop:hover { background: #cbd5e1; }

textarea { width: 100%; padding: .75rem; border: 1px solid var(--border); border-radius: .5rem; font-size: .95rem; font-family: inherit; background: #fff; color: var(--text); outline: none; resize: vertical; min-height: 180px; line-height: 1.6; }
textarea:focus { border-color: var(--brand); }
select { width: 100%; padding: .55rem .75rem; border: 1px solid var(--border); border-radius: .5rem; font-size: .875rem; background: #fff; color: var(--text); outline: none; font-family: inherit; }
select:focus { border-color: var(--brand); }
.label { font-size: .75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: .4rem; display: block; }
.slider-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
.slider-field label { font-size: .8rem; color: var(--muted); font-weight: 600; display: flex; justify-content: space-between; }
input[type=range] { width: 100%; margin-top: .35rem; accent-color: var(--brand); }
.action-row { display: flex; gap: .6rem; flex-wrap: wrap; margin-top: 1rem; align-items: center; }
.char-count { font-size: .75rem; color: var(--muted); margin-left: auto; }
.progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: .75rem; }
.progress-fill { height: 100%; background: var(--brand); width: 0%; transition: width .3s; border-radius: 2px; }
.voice-meta { font-size: .75rem; color: var(--muted); margin-top: .3rem; }
.no-support { background: #fef3c7; border: 1px solid #fde68a; color: #92400e; border-radius: .5rem; padding: .75rem 1rem; font-size: .875rem; font-weight: 500; display: none; }
@media (max-width: 600px) {
  body { overflow-x: hidden; }
  .slider-row { grid-template-columns: 1fr; }
  .action-row .btn { flex: 1; justify-content: center; }
  .char-count { margin-left: 0; width: 100%; text-align: right; }
}

<body>
<div class="container">
  <header>
    <h1>Text to Speech</h1>
    <p>Listen to any text using your browser's built-in voices.</p>
  </header>

  <div class="no-support" id="noSupport">
    Your browser does not support the Web Speech API. Try Chrome, Edge, or Safari.
  </div>

  <div class="card">
    <label class="label" for="textInput">Text</label>
    <textarea id="textInput" placeholder="Type or paste text here…" oninput="updateCount()"></textarea>
    <div class="action-row">
      <button class="btn btn-play"  id="btnPlay"  onclick="speak()">Play</button>
      <button class="btn btn-pause" id="btnPause" onclick="togglePause()" disabled>Pause</button>
      <button class="btn btn-stop"  id="btnStop"  onclick="stopSpeech()" disabled>Stop</button>
      <button class="btn btn-ghost" onclick="clearText()">Clear</button>
      <span class="char-count" id="charCount">0 chars</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <div class="card">
    <div style="margin-bottom:1rem">
      <label class="label" for="voiceSelect">Voice</label>
      <select id="voiceSelect"></select>
      <div class="voice-meta" id="voiceMeta"></div>
    </div>

    <div class="slider-row">
      <div class="slider-field">
        <label for="rateSlider">Speed <span id="rateVal">1.0x</span></label>
        <input type="range" id="rateSlider" min="0.5" max="2" step="0.1" value="1"
               oninput="document.getElementById('rateVal').textContent=parseFloat(this.value).toFixed(1)+'x'">
      </div>
      <div class="slider-field">
        <label for="pitchSlider">Pitch <span id="pitchVal">1.0</span></label>
        <input type="range" id="pitchSlider" min="0" max="2" step="0.1" value="1"
               oninput="document.getElementById('pitchVal').textContent=parseFloat(this.value).toFixed(1)">
      </div>
      <div class="slider-field">
        <label for="volSlider">Volume <span id="volVal">100%</span></label>
        <input type="range" id="volSlider" min="0" max="1" step="0.05" value="1"
               oninput="document.getElementById('volVal').textContent=Math.round(this.value*100)+'%'">
      </div>
    </div>
  </div>
</div>

<script>
const synth = window.speechSynthesis;
let voices = [];
let utterance = null;
let paused = false;

if (!synth) {
  document.getElementById('noSupport').style.display = 'block';
}

function loadVoices() {
  voices = synth ? synth.getVoices() : [];
  if (!voices.length) return;
  const sel = document.getElementById('voiceSelect');
  sel.innerHTML = '';
  voices.forEach((v, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${v.name} (${v.lang})`;
    if (v.default) opt.selected = true;
    sel.appendChild(opt);
  });
  updateVoiceMeta();
}

function updateVoiceMeta() {
  const sel = document.getElementById('voiceSelect');
  const v = voices[parseInt(sel.value)];
  if (!v) return;
  document.getElementById('voiceMeta').textContent =
    `${v.lang} · ${v.localService ? 'Local' : 'Network'} voice`;
}

if (synth) {
  if (synth.onvoiceschanged !== undefined) {
    synth.onvoiceschanged = loadVoices;
  }
  loadVoices();
  setTimeout(loadVoices, 200);
}

document.getElementById('voiceSelect').addEventListener('change', updateVoiceMeta);

function speak() {
  if (!synth) return;
  const text = document.getElementById('textInput').value.trim();
  if (!text) { document.getElementById('textInput').focus(); return; }
  synth.cancel();
  paused = false;
  utterance = new SpeechSynthesisUtterance(text);
  const v = voices[parseInt(document.getElementById('voiceSelect').value)];
  if (v) utterance.voice = v;
  utterance.rate   = parseFloat(document.getElementById('rateSlider').value);
  utterance.pitch  = parseFloat(document.getElementById('pitchSlider').value);
  utterance.volume = parseFloat(document.getElementById('volSlider').value);

  utterance.onstart = () => {
    setButtons('playing');
    animateProgress(utterance.text.length / utterance.rate);
  };
  utterance.onend = utterance.onerror = () => {
    setButtons('idle');
    document.getElementById('progressFill').style.width = '0%';
    clearInterval(_progressTimer);
  };
  utterance.onpause = () => { clearInterval(_progressTimer); };
  utterance.onresume = () => { /* progress resumes */ };

  synth.speak(utterance);
}

let _progressTimer = null;
function animateProgress(durationSec) {
  clearInterval(_progressTimer);
  const fill = document.getElementById('progressFill');
  const startTime = Date.now();
  const durationMs = Math.min(durationSec * 1000, 60000);
  fill.style.width = '0%';
  _progressTimer = setInterval(() => {
    const elapsed = Date.now() - startTime;
    const pct = Math.min((elapsed / durationMs) * 100, 99);
    fill.style.width = pct + '%';
    if (elapsed >= durationMs) clearInterval(_progressTimer);
  }, 200);
}

function togglePause() {
  if (!synth) return;
  if (paused) {
    synth.resume();
    paused = false;
    document.getElementById('btnPause').textContent = 'Pause';
  } else {
    synth.pause();
    paused = true;
    document.getElementById('btnPause').textContent = 'Resume';
  }
}

function stopSpeech() {
  if (!synth) return;
  synth.cancel();
  paused = false;
  setButtons('idle');
  document.getElementById('progressFill').style.width = '0%';
  clearInterval(_progressTimer);
}

function setButtons(state) {
  const play  = document.getElementById('btnPlay');
  const pause = document.getElementById('btnPause');
  const stop  = document.getElementById('btnStop');
  const playing = state === 'playing';
  play.textContent  = playing ? 'Playing...' : 'Play';
  play.disabled     = playing;
  pause.disabled    = !playing;
  stop.disabled     = !playing;
  if (!playing) document.getElementById('btnPause').textContent = 'Pause';
}

function clearText() {
  stopSpeech();
  document.getElementById('textInput').value = '';
  updateCount();
}

function updateCount() {
  const len = document.getElementById('textInput').value.length;
  document.getElementById('charCount').textContent = len.toLocaleString() + ' char' + (len !== 1 ? 's' : '');
}
</script>
