<title>Base64 Tool | Jorres Apps</title>
<style>
:root{--bg:#f1f5f9;--card:#ffffff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;--error-bg:#fef2f2;--error-fg:#dc2626}
.container{max-width:860px;margin:0 auto}
.tabs{display:flex;background:var(--card);border:1px solid var(--border);border-radius:.85rem;padding:.3rem;margin-bottom:1.5rem;gap:.3rem}
.tab{flex:1;padding:.6rem 1rem;border:none;background:none;border-radius:.6rem;font-size:.9rem;font-weight:600;cursor:pointer;color:var(--muted);font-family:inherit;transition:background .15s,color .15s}
.tab.active{background:var(--brand);color:#fff}
.tab:not(.active):hover{background:var(--bg);color:var(--text)}
.panel{display:none}.panel.active{display:block}
textarea{width:100%;padding:.65rem .75rem;border:1px solid var(--border);border-radius:.5rem;font-size:.82rem;font-family:'Courier New',monospace;background:#fff;color:var(--text);outline:none;resize:vertical;line-height:1.6}
textarea:focus{border-color:var(--brand)}
input[type=text]{width:100%;padding:.55rem .75rem;border:1px solid var(--border);border-radius:.5rem;font-size:.9rem;background:#fff;color:var(--text);outline:none;font-family:inherit}
input:focus{border-color:var(--brand)}
select{padding:.55rem .75rem;border:1px solid var(--border);border-radius:.5rem;font-size:.875rem;background:#fff;color:var(--text);outline:none}

.btn-ghost{background:var(--bg);color:var(--text);border:1px solid var(--border)}.btn-ghost:hover{background:var(--border)}
.btn-sm{padding:.35rem .75rem;font-size:.78rem}
.actions{display:flex;gap:.5rem;margin-top:.75rem;flex-wrap:wrap;align-items:center}
.between{display:flex;gap:.5rem;justify-content:center;padding:1rem 0}
.drop-zone{border:2px dashed var(--border);border-radius:.75rem;padding:2rem 1.5rem;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;user-select:none}
.drop-zone:hover,.drop-zone.over{border-color:var(--brand);background:#fff3ed}
.drop-zone .icon{font-size:2rem;margin-bottom:.5rem}
.drop-zone p{color:var(--muted);font-size:.875rem}
.drop-zone strong{color:var(--brand)}
.char-count{font-size:.75rem;color:var(--muted);margin-left:auto}
.status{padding:.65rem 1rem;border-radius:.5rem;font-size:.875rem;font-weight:500;margin-top:.75rem}
.status.error{background:var(--error-bg);color:var(--error-fg)}
@media (max-width: 600px) {
  body { overflow-x: hidden; }
  .actions { flex-direction: column; }
  .actions .btn { width: 100%; }
  input[type=text], textarea, select { width: 100% !important; min-width: 0 !important; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Base64 Tool</h1>
    <p>Encode and decode text or files to and from Base64</p>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('text')">Text</button>
    <button class="tab" onclick="switchTab('file')">File</button>
  </div>

  <!-- Text tab -->
  <div id="tab-text" class="panel active">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.35rem">
        <label for="encoding" style="margin:0">Plain Text</label>
        <select id="encoding" onchange="">
          <option value="utf-8">UTF-8</option>
          <option value="latin-1">Latin-1</option>
        </select>
      </div>
      <textarea id="plainText" rows="7" placeholder="Type or paste text to encode…" oninput="updateCount('plainText','countPlain')"></textarea>
      <div class="actions">
        <button class="btn btn-primary" onclick="encodeText()">Encode →</button>
        <button class="btn btn-ghost" onclick="copyTA('plainText')">Copy</button>
        <button class="btn btn-ghost btn-sm" onclick="clearBoth()">Clear</button>
        <span class="char-count" id="countPlain">0 chars</span>
      </div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.35rem">
        <label for="b64Text" style="margin:0">Base64</label>
      </div>
      <textarea id="b64Text" rows="7" placeholder="Paste Base64 to decode, or encode from above…" oninput="updateCount('b64Text','countB64')"></textarea>
      <div class="actions">
        <button class="btn btn-primary" onclick="decodeText()">← Decode</button>
        <button class="btn btn-ghost" onclick="copyTA('b64Text')">Copy</button>
        <span class="char-count" id="countB64">0 chars</span>
      </div>
      <div id="textStatus"></div>
    </div>
  </div>

  <!-- File tab -->
  <div id="tab-file" class="panel">
    <div class="card">
      <label for="dropZone">Encode File → Base64</label>
      <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div class="icon"></div>
        <p><strong>Click to choose</strong> or drag &amp; drop a file</p>
        <p style="margin-top:.25rem;font-size:.8rem">Any file type, up to 50 MB</p>
      </div>
      <input type="file" id="fileInput" style="display:none" onchange="encodeFile(this)">
      <div id="encodeResult" style="display:none;margin-top:1rem">
        <label for="fileB64Out">Base64 Output</label>
        <textarea id="fileB64Out" rows="8" readonly></textarea>
        <div class="actions">
          <button class="btn btn-ghost" onclick="copyTA('fileB64Out')">Copy</button>
          <button class="btn btn-ghost" onclick="downloadB64Text()">Download .txt</button>
          <span class="char-count" id="countFileB64"></span>
        </div>
      </div>
    </div>
    <div class="card">
      <label for="decodeB64Input">Decode Base64 → File</label>
      <textarea id="decodeB64Input" rows="6" placeholder="Paste Base64 here…"></textarea>
      <div style="margin-top:.75rem">
        <label for="decodeFilename">Output Filename</label>
        <input type="text" id="decodeFilename" placeholder="output.bin">
      </div>
      <div class="actions" style="margin-top:.75rem">
        <button class="btn btn-primary" onclick="decodeFile()">Decode &amp; Download</button>
      </div>
      <div id="decodeStatus"></div>
    </div>
  </div>
</div>

<script>
function switchTab(t) {
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',['text','file'][i]===t));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='tab-'+t));
}

function updateCount(taId, countId) {
  const len = document.getElementById(taId).value.length;
  document.getElementById(countId).textContent = len.toLocaleString() + ' chars';
}

async function encodeText() {
  const plainEl = document.getElementById('plainText');
  const encEl   = document.getElementById('encoding');
  if (!plainEl || !encEl) return;
  const text = plainEl.value;
  const enc  = encEl.value;
  const res = await fetch('api/encode-text',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text,encoding:enc})});
  const d = await res.json();
  if (d.error) showStatus('textStatus',d.error,true);
  else { const b=document.getElementById('b64Text'); if(b){b.value=d.result; updateCount('b64Text','countB64');} }
}

async function decodeText() {
  const b64El = document.getElementById('b64Text');
  const encEl = document.getElementById('encoding');
  if (!b64El || !encEl) return;
  const text = b64El.value;
  const enc  = encEl.value;
  const res = await fetch('api/decode-text',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text,encoding:enc})});
  const d = await res.json();
  if (d.error) showStatus('textStatus',d.error,true);
  else { const p=document.getElementById('plainText'); if(p){p.value=d.result; updateCount('plainText','countPlain');} }
}

function clearBoth() {
  ['plainText','b64Text'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});
  const cp=document.getElementById('countPlain'); if(cp)cp.textContent='0 chars';
  const cb=document.getElementById('countB64');   if(cb)cb.textContent='0 chars';
  const ts=document.getElementById('textStatus'); if(ts)ts.innerHTML='';
}

function copyTA(id) {
  const el = document.getElementById(id);
  if (!el) return;
  navigator.clipboard.writeText(el.value).then(()=>{});
}

async function encodeFile(input) {
  const f = input.files[0]; if (!f) return;
  const fd = new FormData(); fd.append('file',f);
  const res = await fetch('api/encode-file',{method:'POST',body:fd});
  const d = await res.json();
  if (d.error) { alert(d.error); return; }
  const out=document.getElementById('fileB64Out'); if(out) out.value=d.result;
  const er=document.getElementById('encodeResult'); if(er) er.style.display='block';
  const cf=document.getElementById('countFileB64'); if(cf) cf.textContent=d.result.length.toLocaleString()+' chars';
  const fn=document.getElementById('decodeFilename'); if(fn) fn.value=f.name+'.txt';
}

function downloadB64Text() {
  const el = document.getElementById('fileB64Out');
  if (!el) return;
  const blob = new Blob([el.value],{type:'text/plain'});
  const a = document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='encoded.txt'; a.click();
}

async function decodeFile() {
  const inEl=document.getElementById('decodeB64Input');
  const fnEl=document.getElementById('decodeFilename');
  if (!inEl || !fnEl) return;
  const text = inEl.value.trim();
  const filename = fnEl.value.trim() || 'output.bin';
  if (!text) { showStatus('decodeStatus','Please paste Base64 content.',true); return; }
  const res = await fetch('api/decode-file',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text,filename})});
  if (!res.ok) { const d=await res.json(); showStatus('decodeStatus',d.error,true); return; }
  const blob = await res.blob();
  const a = document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=filename; a.click();
  showStatus('decodeStatus','File decoded and downloaded.',false);
}

function showStatus(id,msg,err) {
  const el=document.getElementById(id); if(!el) return;
  el.innerHTML=`<div class="status ${err?'error':'success'}">${msg}</div>`;
}

// Drag-drop
(function(){
  const dz = document.getElementById('dropZone');
  if (!dz) return;
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over')});
  dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
  dz.addEventListener('drop',e=>{
    e.preventDefault();dz.classList.remove('over');
    const f=e.dataTransfer.files[0];
    if(f){const fi=document.getElementById('fileInput');if(fi){fi.files=e.dataTransfer.files;encodeFile(fi);}}
  });
}());
</script>
<script src="/static/footer.js?v=5"></script>

</body>
</html>
