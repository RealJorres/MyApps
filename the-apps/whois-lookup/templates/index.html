<body>
<header>
  <h1>WHOIS Lookup</h1>
  <p>Get domain registration information</p>
</header>
<main>
  <div class="card">
    <div class="input-row">
      <input type="text" class="domain-input" id="domainInput" placeholder="example.com" onkeydown="if(event.key==='Enter')doLookup()">
      <button class="btn btn-primary" id="lookupBtn" onclick="doLookup()">Lookup</button>
    </div>
    <div class="quick-btns">
      <span style="font-size:0.8rem;color:#94a3b8;align-self:center;">Quick:</span>
      <button class="quick-btn" onclick="setDomain('google.com')">google.com</button>
      <button class="quick-btn" onclick="setDomain('github.com')">github.com</button>
      <button class="quick-btn" onclick="setDomain('example.com')">example.com</button>
      <button class="quick-btn" onclick="setDomain('wikipedia.org')">wikipedia.org</button>
    </div>
  </div>

  <div class="error-box hidden" id="errorBox"></div>

  <div class="result-card hidden" id="resultCard">
    <div class="result-header">
      <span class="result-domain" id="resDomain"></span>
      <button class="copy-btn" onclick="copyResults()">Copy Results</button>
    </div>
    <table class="info-table" id="infoTable"></table>
  </div>
</main>

<script>
let lastResult = null;

function setDomain(d) {
  document.getElementById('domainInput').value = d;
  doLookup();
}

async function doLookup() {
  const domain = document.getElementById('domainInput').value.trim();
  if (!domain) return;
  const btn = document.getElementById('lookupBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Looking up...';
  document.getElementById('errorBox').classList.add('hidden');
  document.getElementById('resultCard').classList.add('hidden');

  try {
    const res = await fetch('api/lookup', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({domain})
    });
    const data = await res.json();
    if (data.error) { showError(data.error); return; }
    lastResult = data;
    renderResult(data);
  } catch(e) { showError('Request failed: ' + e.message); }
  finally { btn.disabled = false; btn.textContent = 'Lookup'; }
}

function parseExpiry(str) {
  if (!str || str === 'N/A') return null;
  const d = new Date(str.split(',')[0]);
  return isNaN(d) ? null : d;
}

function daysUntil(d) {
  return Math.round((d - new Date()) / (1000 * 86400));
}

function renderResult(data) {
  document.getElementById('resDomain').textContent = data.domain;
  const exp = parseExpiry(data.expiration_date);
  let expiryClass = '';
  if (exp) {
    const days = daysUntil(exp);
    if (days < 30) expiryClass = 'expiry-red expiry-warning';
    else if (days < 90) expiryClass = 'expiry-orange expiry-warning';
  }

  const rows = [
    ['Registrar', data.registrar],
    ['Created', data.creation_date],
    ['Expires', `<span class="${expiryClass}">${data.expiration_date}</span>`],
    ['Updated', data.updated_date],
    ['Name Servers', data.name_servers],
    ['Status', data.status],
    ['Organization', data.org],
    ['Country', data.country],
    ['Emails', data.emails],
  ];

  document.getElementById('infoTable').innerHTML = rows.map(([k,v]) =>
    `<tr><td>${k}</td><td>${v}</td></tr>`
  ).join('');

  document.getElementById('resultCard').classList.remove('hidden');
}

function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = 'Error: ' + msg;
  el.classList.remove('hidden');
}

function copyResults() {
  if (!lastResult) return;
  const lines = [
    `Domain: ${lastResult.domain}`,
    `Registrar: ${lastResult.registrar}`,
    `Created: ${lastResult.creation_date}`,
    `Expires: ${lastResult.expiration_date}`,
    `Updated: ${lastResult.updated_date}`,
    `Name Servers: ${lastResult.name_servers}`,
    `Status: ${lastResult.status}`,
    `Org: ${lastResult.org}`,
    `Country: ${lastResult.country}`,
    `Emails: ${lastResult.emails}`,
  ];
  navigator.clipboard.writeText(lines.join('\n'));
}
</script>
