<style>
:root{--bg:#f1f5f9;--card:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b}
.container{max-width:960px;margin:0 auto}
.layout{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
@media(max-width:700px){.layout{grid-template-columns:1fr}}
input,select,textarea{width:100%;padding:.55rem .75rem;border:1px solid var(--border);border-radius:.5rem;font-size:.9rem;background:#fff;color:var(--text);outline:none;font-family:inherit;margin-bottom:.9rem}
input:focus,textarea:focus,select:focus{border-color:var(--brand)}

.btn-outline{background:#fff;border:1px solid var(--border);color:var(--text)}
.btn:hover{opacity:.87}

/* Letter preview */
.letter-preview{background:#fff;border:1px solid var(--border);border-radius:1rem;padding:0;overflow:hidden}
.letter-actions{padding:1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;gap:.5rem}
#letterDoc{
  padding: 60px 70px;
  font-family: 'Times New Roman', Times, serif;
  font-size: 13px;
  line-height: 1.6;
  color: #000;
  min-height: 500px;
  background: #fff;
}
#letterDoc .sender-block{margin-bottom:1.5em}
#letterDoc .date-block{margin-bottom:1.5em}
#letterDoc .recipient-block{margin-bottom:1.5em}
#letterDoc .subject-line{margin-bottom:1.5em;font-weight:bold;text-decoration:underline}
#letterDoc .salutation{margin-bottom:1em}
#letterDoc .body-text{margin-bottom:1.5em;white-space:pre-wrap}
#letterDoc .closing-block{margin-top:1.5em}
#letterDoc .sig-space{height:3em}

@media print{
  .layout{display:block}
  .card,.letter-actions,header{display:none}
  .letter-preview{border:none;border-radius:0}
  #letterDoc{padding:40px 60px}
}
</style>

<body>
<div class="container">
  <header>
    <h1>Business Letter Generator</h1>
    <p>Fill in the form and print or download your formatted letter.</p>
  </header>

  <div class="layout">
    <div>
      <div class="card" style="margin-bottom:1.25rem">
        <p style="font-weight:700;margin-bottom:.9rem">Sender</p>
        <label for="senderName">Full Name / Company</label>
        <input type="text" id="senderName" value="Acme Corporation" oninput="update()">
        <label for="senderAddr1">Address Line 1</label>
        <input type="text" id="senderAddr1" value="123 Business Ave, Suite 400" oninput="update()">
        <label for="senderAddr2">Address Line 2 (City, State, ZIP)</label>
        <input type="text" id="senderAddr2" value="New York, NY 10001" oninput="update()">
        <label for="senderContact">Email / Phone (optional)</label>
        <input type="text" id="senderContact" value="info@acme.com | (212) 555-0100" oninput="update()">
      </div>

      <div class="card" style="margin-bottom:1.25rem">
        <p style="font-weight:700;margin-bottom:.9rem">Recipient</p>
        <label for="recipName">Full Name</label>
        <input type="text" id="recipName" value="Mr. John Smith" oninput="update()">
        <label for="recipTitle">Title / Company</label>
        <input type="text" id="recipTitle" value="Procurement Manager, Global Supplies Inc." oninput="update()">
        <label for="recipAddr">Address</label>
        <input type="text" id="recipAddr" value="456 Corporate Blvd, Chicago, IL 60601" oninput="update()">
      </div>

      <div class="card">
        <p style="font-weight:700;margin-bottom:.9rem">Letter Content</p>
        <label for="letterDate">Date</label>
        <input type="date" id="letterDate" oninput="update()">
        <label for="subject">Subject / Re:</label>
        <input type="text" id="subject" value="Proposal for Partnership Agreement" oninput="update()">
        <label for="salutation">Salutation</label>
        <select id="salutation" onchange="update()">
          <option>Dear Mr./Ms. [Surname],</option>
          <option>Dear Sir or Madam,</option>
          <option>To Whom It May Concern,</option>
          <option>Dear [First Name],</option>
        </select>
        <label for="bodyText">Body</label>
        <textarea id="bodyText" rows="7" oninput="update()">I am writing to express our interest in establishing a mutually beneficial partnership between our organizations.

We have reviewed your company's portfolio and believe there is a significant opportunity for collaboration. Our team would be delighted to schedule a meeting at your earliest convenience to discuss the details further.

Please do not hesitate to contact us should you require any additional information. We look forward to hearing from you.</textarea>
        <label for="closing">Closing</label>
        <select id="closing" onchange="update()">
          <option>Sincerely,</option>
          <option>Best regards,</option>
          <option>Yours faithfully,</option>
          <option>Respectfully,</option>
          <option>Kind regards,</option>
        </select>
        <label for="sigName">Signatory Name</label>
        <input type="text" id="sigName" value="Jane Doe, CEO" oninput="update()">
      </div>
    </div>

    <div>
      <div class="letter-preview">
        <div class="letter-actions">
          <button class="btn btn-primary" onclick="window.print()">Print / Save PDF</button>
          <button class="btn btn-outline" onclick="copyText()">Copy Text</button>
        </div>
        <div id="letterDoc"></div>
      </div>
    </div>
  </div>
</div>
<script>
function update() {
  const g = id => document.getElementById(id).value;
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  const salut = g('salutation').includes('[Surname]')
    ? g('salutation').replace('[Surname]', g('recipName').split(' ').pop())
    : g('salutation').replace('[First Name]', g('recipName').split(' ')[0]);

  document.getElementById('letterDoc').innerHTML = `
    <div class="sender-block">
      <strong>${esc(g('senderName'))}</strong><br>
      ${esc(g('senderAddr1'))}<br>
      ${esc(g('senderAddr2'))}<br>
      ${g('senderContact') ? esc(g('senderContact')) : ''}
    </div>
    <div class="date-block">${g('letterDate') ? new Date(g('letterDate')+'T00:00:00').toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}) : new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}</div>
    <div class="recipient-block">
      ${esc(g('recipName'))}<br>
      ${esc(g('recipTitle'))}<br>
      ${esc(g('recipAddr'))}
    </div>
    ${g('subject') ? `<div class="subject-line">Re: ${esc(g('subject'))}</div>` : ''}
    <div class="salutation">${esc(salut)}</div>
    <div class="body-text">${esc(g('bodyText'))}</div>
    <div class="closing-block">
      ${esc(g('closing'))}<br>
      <div class="sig-space"></div>
      ${esc(g('sigName'))}
    </div>
  `;
}

function copyText() {
  const doc = document.getElementById('letterDoc');
  const text = doc.innerText;
  navigator.clipboard.writeText(text).then(() => alert('Letter copied to clipboard!'));
}

// Set today's date
document.getElementById('letterDate').value = new Date().toISOString().split('T')[0];
update();
</script>
