<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="canonical" href="https://jorresapps.onrender.com/resume-builder/">
<meta name="description" content="Build a professional resume online and export it as a polished PDF. Completely free, no sign-up.">
<meta name="keywords" content="resume builder, CV maker, free resume, PDF resume, online CV">
<meta name="author" content="Jorres Apps">
<meta property="og:title" content="Resume Builder">
<meta property="og:description" content="Build a professional resume online and export it as a polished PDF. Completely free, no sign-up.">
<meta property="og:type" content="website">
<meta property="og:image" content="https://jorresapps.onrender.com/static/preview.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<meta name="twitter:image" content="https://jorresapps.onrender.com/static/preview.png">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Resume Builder">
<meta name="twitter:description" content="Build a professional resume online and export it as a polished PDF. Completely free, no sign-up.">
<title>Resume Builder</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0fdf9; color: #1e293b; min-height: 100vh; }
  header { background: #0f766e; color: #fff; padding: 1rem 2rem; box-shadow: 0 2px 8px rgba(15,118,110,.3); display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 1.4rem; font-weight: 700; }
  header p { font-size: .85rem; opacity: .85; }
  .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; padding: 1.5rem; max-width: 1400px; margin: 0 auto; }
  .form-panel { display: flex; flex-direction: column; gap: 1rem; }
  .card { background: #fff; border-radius: 10px; padding: 1.25rem; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
  .card-title { font-size: .9rem; font-weight: 700; color: #0f766e; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: .05em; border-bottom: 2px solid #ccfbf1; padding-bottom: .5rem; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
  .form-group { display: flex; flex-direction: column; gap: .3rem; margin-bottom: .75rem; }
  .form-group:last-child { margin-bottom: 0; }
  label { font-size: .78rem; font-weight: 600; color: #475569; }
  input, textarea, select { border: 1px solid #e2e8f0; border-radius: 6px; padding: .5rem .75rem; font-size: .875rem; color: #1e293b; background: #fff; transition: border-color .15s; font-family: inherit; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: #0f766e; }
  textarea { resize: vertical; min-height: 70px; }
  .repeatable-item { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 1rem; margin-bottom: .75rem; position: relative; }
  .repeatable-item .remove-btn { position: absolute; top: .5rem; right: .5rem; background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 1.1rem; line-height: 1; }
  .repeatable-item .remove-btn:hover { color: #dc2626; }
  .add-btn { width: 100%; padding: .5rem; background: #f0fdf9; border: 1.5px dashed #6ee7b7; color: #0f766e; border-radius: 6px; cursor: pointer; font-size: .85rem; font-weight: 600; transition: all .2s; }
  .add-btn:hover { background: #ccfbf1; }
  .color-row { display: flex; align-items: center; gap: .75rem; }
  .color-row input[type=color] { width: 44px; height: 36px; border: none; padding: 2px; cursor: pointer; border-radius: 6px; }
  .download-btn { width: 100%; padding: .9rem; background: #0f766e; color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background .2s; margin-top: .5rem; }
  .download-btn:hover { background: #0d6b63; }
  .preview-panel { position: sticky; top: 1.5rem; height: fit-content; }
  .preview-box { background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.07); min-height: 600px; overflow-y: auto; }
  .preview-inner { padding: 2rem 2.2rem; font-family: 'Georgia', serif; font-size: 10px; line-height: 1.5; }
  .preview-name { font-size: 22px; font-weight: bold; margin-bottom: 2px; }
  .preview-jobtitle { font-size: 11px; color: #64748b; margin-bottom: 3px; }
  .preview-contact { font-size: 9px; color: #475569; margin-bottom: 6px; }
  .preview-hr { border: none; border-top: 1.5px solid; margin: 6px 0; }
  .preview-hr-thin { border: none; border-top: 0.5px solid #e2e8f0; margin: 4px 0; }
  .preview-section { font-size: 11px; font-weight: bold; margin-top: 10px; margin-bottom: 2px; }
  .preview-item-title { font-size: 9.5px; font-weight: bold; margin-bottom: 1px; }
  .preview-item-date { font-size: 8.5px; color: #94a3b8; font-style: italic; margin-bottom: 2px; }
  .preview-bullet { font-size: 9.5px; padding-left: 10px; margin-bottom: 1px; }
  .preview-body { font-size: 9.5px; color: #1e293b; line-height: 1.5; }
  .preview-label { font-size: .75rem; color: #94a3b8; text-align: center; padding: .4rem; background: #f8fafc; border-top: 1px solid #e2e8f0; border-radius: 0 0 10px 10px; }
  @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } .preview-panel { position: static; } }
</style>
</head>
<body>
<header>
  <div><h1>Resume Builder</h1><p>Build and download a professional PDF resume</p></div>
  <button class="download-btn" style="width:auto;padding:.6rem 1.5rem;font-size:.9rem" onclick="downloadPDF()">Download PDF</button>
</header>
<div class="layout">
  <div class="form-panel">
    <div class="card">
      <div class="card-title">Personal Info</div>
      <div class="form-row">
        <div class="form-group"><label>Full Name</label><input id="f_name" placeholder="Jane Smith" oninput="updatePreview()"></div>
        <div class="form-group"><label>Job Title</label><input id="f_title" placeholder="Software Engineer" oninput="updatePreview()"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Email</label><input id="f_email" placeholder="jane@example.com" oninput="updatePreview()"></div>
        <div class="form-group"><label>Phone</label><input id="f_phone" placeholder="+1 555 000 0000" oninput="updatePreview()"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Location</label><input id="f_location" placeholder="New York, NY" oninput="updatePreview()"></div>
        <div class="form-group"><label>LinkedIn</label><input id="f_linkedin" placeholder="linkedin.com/in/jane" oninput="updatePreview()"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Summary</div>
      <textarea id="f_summary" placeholder="Brief professional summary..." rows="3" oninput="updatePreview()"></textarea>
    </div>
    <div class="card">
      <div class="card-title">Experience</div>
      <div id="experience-list"></div>
      <button class="add-btn" onclick="addItem('experience')">+ Add Experience</button>
    </div>
    <div class="card">
      <div class="card-title">Education</div>
      <div id="education-list"></div>
      <button class="add-btn" onclick="addItem('education')">+ Add Education</button>
    </div>
    <div class="card">
      <div class="card-title">Projects</div>
      <div id="projects-list"></div>
      <button class="add-btn" onclick="addItem('projects')">+ Add Project</button>
    </div>
    <div class="card">
      <div class="card-title">Skills</div>
      <textarea id="f_skills" placeholder="JavaScript, Python, React, Node.js, SQL..." rows="3" oninput="updatePreview()"></textarea>
    </div>
    <div class="card">
      <div class="card-title">Accent Color</div>
      <div class="color-row">
        <input type="color" id="f_color" value="#0f766e" onchange="updatePreview()">
        <span style="font-size:.85rem;color:#475569">Choose accent color for headings</span>
      </div>
    </div>
    <button class="download-btn" onclick="downloadPDF()">Download PDF</button>
  </div>
  <div class="preview-panel">
    <div class="preview-box">
      <div class="preview-inner" id="previewInner"></div>
    </div>
    <div class="preview-label">Live Preview</div>
  </div>
</div>
<script>
  const sections = { experience: [], education: [], projects: [] };

  function addItem(type) {
    const id = Date.now();
    sections[type].push({ id });
    renderSectionList(type);
    updatePreview();
  }

  function removeItem(type, id) {
    sections[type] = sections[type].filter(i => i.id !== id);
    renderSectionList(type);
    updatePreview();
  }

  function renderSectionList(type) {
    const container = document.getElementById(type + '-list');
    container.innerHTML = '';
    sections[type].forEach(item => {
      const div = document.createElement('div');
      div.className = 'repeatable-item';
      div.id = 'item_' + item.id;
      if (type === 'experience') {
        div.innerHTML = `<button class="remove-btn" onclick="removeItem('${type}',${item.id})">✕</button>
          <div class="form-row">
            <div class="form-group"><label>Job Title</label><input data-field="title" placeholder="Software Engineer" oninput="syncItem('${type}',${item.id},this)"></div>
            <div class="form-group"><label>Company</label><input data-field="org" placeholder="Acme Corp" oninput="syncItem('${type}',${item.id},this)"></div>
          </div>
          <div class="form-group"><label>Date Range</label><input data-field="date" placeholder="Jan 2022 – Present" oninput="syncItem('${type}',${item.id},this)"></div>
          <div class="form-group"><label>Description (one bullet per line)</label><textarea data-field="desc" rows="3" oninput="syncItem('${type}',${item.id},this)"></textarea></div>`;
      } else if (type === 'education') {
        div.innerHTML = `<button class="remove-btn" onclick="removeItem('${type}',${item.id})">✕</button>
          <div class="form-row">
            <div class="form-group"><label>Degree</label><input data-field="title" placeholder="B.S. Computer Science" oninput="syncItem('${type}',${item.id},this)"></div>
            <div class="form-group"><label>Institution</label><input data-field="org" placeholder="MIT" oninput="syncItem('${type}',${item.id},this)"></div>
          </div>
          <div class="form-group"><label>Date</label><input data-field="date" placeholder="2018 – 2022" oninput="syncItem('${type}',${item.id},this)"></div>`;
      } else {
        div.innerHTML = `<button class="remove-btn" onclick="removeItem('${type}',${item.id})">✕</button>
          <div class="form-group"><label>Project Name</label><input data-field="title" placeholder="My Project" oninput="syncItem('${type}',${item.id},this)"></div>
          <div class="form-group"><label>Description</label><textarea data-field="desc" rows="2" oninput="syncItem('${type}',${item.id},this)"></textarea></div>`;
      }
      container.appendChild(div);
    });
  }

  function syncItem(type, id, el) {
    const item = sections[type].find(i => i.id === id);
    if (item) item[el.dataset.field] = el.value;
    updatePreview();
  }

  function getColor() { return document.getElementById('f_color').value || '#0f766e'; }

  function updatePreview() {
    const color = getColor();
    const name = document.getElementById('f_name').value || 'Your Name';
    const title = document.getElementById('f_title').value;
    const email = document.getElementById('f_email').value;
    const phone = document.getElementById('f_phone').value;
    const location = document.getElementById('f_location').value;
    const linkedin = document.getElementById('f_linkedin').value;
    const summary = document.getElementById('f_summary').value;
    const skills = document.getElementById('f_skills').value;
    const contact = [email, phone, location, linkedin].filter(Boolean).join(' · ');

    let html = `<div class="preview-name" style="color:${color}">${esc(name)}</div>`;
    if (title) html += `<div class="preview-jobtitle">${esc(title)}</div>`;
    if (contact) html += `<div class="preview-contact">${esc(contact)}</div>`;
    html += `<hr class="preview-hr" style="border-color:${color}">`;

    if (summary) {
      html += `<div class="preview-section" style="color:${color}">SUMMARY</div><hr class="preview-hr-thin">`;
      html += `<div class="preview-body">${esc(summary)}</div>`;
    }

    function renderSection(title, items, fields) {
      if (!items.length) return '';
      let s = `<div class="preview-section" style="color:${color}">${title}</div><hr class="preview-hr-thin">`;
      items.forEach(item => {
        let line = item.title || '';
        if (item.org) line += ` — ${item.org}`;
        if (line) s += `<div class="preview-item-title">${esc(line)}</div>`;
        if (item.date) s += `<div class="preview-item-date">${esc(item.date)}</div>`;
        if (item.desc) item.desc.split('\n').filter(l => l.trim()).forEach(l => {
          s += `<div class="preview-bullet">• ${esc(l.trim())}</div>`;
        });
      });
      return s;
    }

    html += renderSection('EXPERIENCE', sections.experience);
    html += renderSection('EDUCATION', sections.education);
    html += renderSection('PROJECTS', sections.projects);

    if (skills) {
      html += `<div class="preview-section" style="color:${color}">SKILLS</div><hr class="preview-hr-thin">`;
      html += `<div class="preview-body">${esc(skills)}</div>`;
    }

    document.getElementById('previewInner').innerHTML = html;
  }

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function downloadPDF() {
    const color = getColor();
    const payload = {
      name: document.getElementById('f_name').value,
      title: document.getElementById('f_title').value,
      email: document.getElementById('f_email').value,
      phone: document.getElementById('f_phone').value,
      location: document.getElementById('f_location').value,
      linkedin: document.getElementById('f_linkedin').value,
      summary: document.getElementById('f_summary').value,
      skills: document.getElementById('f_skills').value,
      color: color,
      experience: sections.experience,
      education: sections.education,
      projects: sections.projects
    };
    try {
      const resp = await fetch('api/generate', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
      if (!resp.ok) { const d = await resp.json(); alert('Error: ' + d.error); return; }
      const blob = await resp.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'resume.pdf'; a.click();
      URL.revokeObjectURL(url);
    } catch(e) { alert('Error: ' + e.message); }
  }

  updatePreview();
</script>
</body>
</html>
