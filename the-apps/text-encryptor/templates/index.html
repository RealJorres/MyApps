<body>

<div class="container--narrow">
  <header>
    <h1>Text Encryptor</h1>
    <p>AES-256-GCM encryption, entirely in your browser — no server, no storage.</p>
  </header>

  <div class="card">
    <div class="tab-strip" role="tablist">
      <button class="tab-btn active" role="tab" aria-selected="true" id="tab-enc" onclick="switchTab('encrypt')">Encrypt</button>
      <button class="tab-btn" role="tab" aria-selected="false" id="tab-dec" onclick="switchTab('decrypt')">Decrypt</button>
    </div>

    <div class="field">
      <label for="passInput">Password</label>
      <div class="pass-wrap">
        <input type="password" id="passInput" autocomplete="new-password" placeholder="Enter a strong password" oninput="updateStrength()" aria-describedby="strengthLabel">
        <button class="show-pass" type="button" onclick="togglePass()" aria-label="Toggle password visibility">
          <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="strength-bar" aria-hidden="true"><div class="strength-fill" id="strengthFill"></div></div>
      <div class="strength-label" id="strengthLabel" aria-live="polite"></div>
    </div>

    <div class="field">
      <label for="inputText" id="inputLabel">Text to encrypt</label>
      <textarea id="inputText" aria-labelledby="inputLabel" placeholder="Enter text to encrypt..."></textarea>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="actionBtn" onclick="run()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Encrypt
      </button>
      <button class="btn" onclick="clearAll()">Clear</button>
    </div>
    <div class="error-msg" id="errorMsg" role="alert"></div>

    <div id="resultSection" style="display:none; margin-top:1.25rem;">
      <label id="resultLabel">Encrypted output</label>
      <div class="result-box" id="resultBox" tabindex="0" aria-labelledby="resultLabel"></div>
      <div class="result-actions">
        <button class="btn" onclick="copyResult()" id="copyBtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy
        </button>
        <button class="btn" onclick="downloadResult()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download
        </button>
      </div>
    </div>
  </div>

  <div class="notice-box">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    <span>All encryption uses <strong>AES-256-GCM</strong> with <strong>PBKDF2</strong> key derivation (100,000 iterations, SHA-256). Your text and password never leave your device.</span>
  </div>

<script src="/static/footer.js?v=6"></script>
<script>
let mode = 'encrypt';

function switchTab(m) {
  mode = m;
  document.getElementById('tab-enc').classList.toggle('active', m === 'encrypt');
  document.getElementById('tab-dec').classList.toggle('active', m === 'decrypt');
  document.getElementById('tab-enc').setAttribute('aria-selected', m === 'encrypt');
  document.getElementById('tab-dec').setAttribute('aria-selected', m === 'decrypt');
  document.getElementById('inputLabel').textContent = m === 'encrypt' ? 'Text to encrypt' : 'Ciphertext to decrypt';
  document.getElementById('inputText').placeholder = m === 'encrypt' ? 'Enter text to encrypt...' : 'Paste encrypted text here...';
  document.getElementById('actionBtn').innerHTML = m === 'encrypt'
    ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Encrypt'
    : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 5-4.9"/></svg> Decrypt';
  document.getElementById('resultLabel').textContent = m === 'encrypt' ? 'Encrypted output' : 'Decrypted text';
  clearAll();
}

function togglePass() {
  const inp = document.getElementById('passInput');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function updateStrength() {
  const p = document.getElementById('passInput').value;
  const fill = document.getElementById('strengthFill');
  const label = document.getElementById('strengthLabel');
  if (!p) { fill.style.width = '0'; label.textContent = ''; return; }
  let score = 0;
  if (p.length >= 8)  score++;
  if (p.length >= 14) score++;
  if (/[A-Z]/.test(p) && /[a-z]/.test(p)) score++;
  if (/\d/.test(p)) score++;
  if (/[^A-Za-z0-9]/.test(p)) score++;
  const levels = [
    {w:'20%', bg:'#dc2626', t:'Very weak'},
    {w:'40%', bg:'#ea580c', t:'Weak'},
    {w:'60%', bg:'#d97706', t:'Fair'},
    {w:'80%', bg:'#65a30d', t:'Strong'},
    {w:'100%',bg:'#059669', t:'Very strong'},
  ];
  const lv = levels[Math.min(score, 4)];
  fill.style.width = lv.w;
  fill.style.background = lv.bg;
  label.textContent = lv.t;
  label.style.color = lv.bg;
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}
function clearError() {
  document.getElementById('errorMsg').classList.remove('show');
}

async function run() {
  clearError();
  const password = document.getElementById('passInput').value;
  const input    = document.getElementById('inputText').value.trim();
  if (!password) { showError('Please enter a password.'); return; }
  if (!input)    { showError('Please enter text.'); return; }
  const btn = document.getElementById('actionBtn');
  btn.disabled = true;
  try {
    let result;
    if (mode === 'encrypt') {
      result = await encryptText(input, password);
    } else {
      result = await decryptText(input, password);
    }
    document.getElementById('resultBox').textContent = result;
    document.getElementById('resultSection').style.display = 'block';
    document.getElementById('resultBox').focus();
  } catch (e) {
    showError(mode === 'decrypt' ? 'Decryption failed — wrong password or corrupted data.' : 'Encryption failed: ' + e.message);
    document.getElementById('resultSection').style.display = 'none';
  } finally {
    btn.disabled = false;
  }
}

async function deriveKey(password, salt, usage) {
  const enc = new TextEncoder();
  const keyMat = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
    keyMat,
    { name: 'AES-GCM', length: 256 },
    false,
    [usage]
  );
}

async function encryptText(plaintext, password) {
  const enc  = new TextEncoder();
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv   = crypto.getRandomValues(new Uint8Array(12));
  const key  = await deriveKey(password, salt, 'encrypt');
  const ct   = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(plaintext));
  const buf  = new Uint8Array(salt.length + iv.length + ct.byteLength);
  buf.set(salt, 0);
  buf.set(iv, 16);
  buf.set(new Uint8Array(ct), 28);
  return btoa(String.fromCharCode(...buf));
}

async function decryptText(b64, password) {
  const data = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  if (data.length < 29) throw new Error('Invalid ciphertext');
  const salt = data.slice(0, 16);
  const iv   = data.slice(16, 28);
  const ct   = data.slice(28);
  const key  = await deriveKey(password, salt, 'decrypt');
  const pt   = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
  return new TextDecoder().decode(pt);
}

function copyResult() {
  const text = document.getElementById('resultBox').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    const orig = btn.innerHTML;
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.innerHTML = orig; }, 1500);
  });
}

function downloadResult() {
  const text = document.getElementById('resultBox').textContent;
  const ext  = mode === 'encrypt' ? '.enc.txt' : '.dec.txt';
  const a    = document.createElement('a');
  a.href     = 'data:text/plain;charset=utf-8,' + encodeURIComponent(text);
  a.download = 'result' + ext;
  a.click();
}

function clearAll() {
  document.getElementById('inputText').value = '';
  document.getElementById('resultSection').style.display = 'none';
  document.getElementById('resultBox').textContent = '';
  clearError();
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') run();
});
</script>
