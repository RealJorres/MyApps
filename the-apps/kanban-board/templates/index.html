  @media (max-width: 700px) { body { overflow-x: hidden; } .board { grid-template-columns: 1fr; } input[type=text], textarea { width: 100% !important; min-width: 0 !important; } }

<body>
<header>
  <h1>Kanban Board</h1>
  <button class="clear-btn" onclick="clearAll()">Clear All</button>
</header>
<div class="board" id="board"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>Edit Card</h2>
    <div class="form-group"><label for="editTitle">Title</label><input id="editTitle" type="text"></div>
    <div class="form-group"><label for="editDesc">Description</label><textarea id="editDesc"></textarea></div>
    <div class="form-group"><label for="editPriority">Priority</label>
      <select id="editPriority">
        <option value="">None</option>
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn-delete" onclick="deleteCard()">Delete</button>
      <button class="btn-close-modal" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveCard()">Save</button>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'kanban_data';
  let data = null;
  let editCardId = null;

  function load() {
    try { data = JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch(e) { data = null; }
    if (!data) data = {
      columns: [
        { id: 'col1', title: 'To Do', cards: [] },
        { id: 'col2', title: 'In Progress', cards: [] },
        { id: 'col3', title: 'Done', cards: [] }
      ]
    };
  }

  function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

  function uid() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }

  function render() {
    const board = document.getElementById('board');
    board.innerHTML = '';
    data.columns.forEach((col, colIdx) => {
      const colEl = document.createElement('div');
      colEl.className = 'column';
      colEl.innerHTML = `
        <div class="col-header">
          <span class="col-title" contenteditable="true" id="colTitle_${col.id}">${esc(col.title)}</span>
          <span class="col-count">${col.cards.length}</span>
        </div>
        <div class="cards-list" id="cards_${col.id}" data-colid="${col.id}"></div>
        <button class="add-card-btn" onclick="showInlineForm('${col.id}')">+ Add Card</button>
      `;
      board.appendChild(colEl);

      const titleEl = colEl.querySelector('.col-title');
      titleEl.addEventListener('blur', () => {
        col.title = titleEl.innerText.trim() || col.title;
        save();
        render();
      });
      titleEl.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); titleEl.blur(); } });

      const cardsList = colEl.querySelector('.cards-list');
      col.cards.forEach(card => {
        const cardEl = document.createElement('div');
        cardEl.className = 'card';
        cardEl.draggable = true;
        cardEl.dataset.cardid = card.id;
        cardEl.dataset.colid = col.id;
        const nextColIdx = (colIdx + 1) % data.columns.length;
        const hasNext = colIdx < data.columns.length - 1;
        cardEl.innerHTML = `
          <div class="card-title-text">${esc(card.title)}</div>
          ${card.desc ? `<div class="card-desc">${esc(card.desc)}</div>` : ''}
          <div class="card-footer">
            ${card.priority ? `<span class="priority p-${card.priority}">${card.priority.charAt(0).toUpperCase() + card.priority.slice(1)}</span>` : '<span></span>'}
            ${hasNext ? `<button class="move-btn" onclick="moveToNext('${col.id}','${card.id}','${data.columns[nextColIdx].id}',event)">&#8594;</button>` : '<span></span>'}
          </div>
        `;
        cardEl.addEventListener('click', () => openModal(col.id, card.id));
        cardEl.addEventListener('dragstart', e => { e.dataTransfer.setData('cardId', card.id); e.dataTransfer.setData('fromCol', col.id); cardEl.classList.add('dragging'); });
        cardEl.addEventListener('dragend', () => cardEl.classList.remove('dragging'));
        cardsList.appendChild(cardEl);
      });

      cardsList.addEventListener('dragover', e => { e.preventDefault(); cardsList.classList.add('drag-over'); });
      cardsList.addEventListener('dragleave', () => cardsList.classList.remove('drag-over'));
      cardsList.addEventListener('drop', e => {
        e.preventDefault(); cardsList.classList.remove('drag-over');
        const cardId = e.dataTransfer.getData('cardId');
        const fromColId = e.dataTransfer.getData('fromCol');
        const toColId = col.id;
        if (fromColId === toColId) return;
        const fromCol = data.columns.find(c => c.id === fromColId);
        const toCol = data.columns.find(c => c.id === toColId);
        const cardIdx = fromCol.cards.findIndex(c => c.id === cardId);
        if (cardIdx === -1) return;
        const [movedCard] = fromCol.cards.splice(cardIdx, 1);
        toCol.cards.push(movedCard);
        save(); render();
      });
    });
  }

  function showInlineForm(colId) {
    // Remove existing inline forms
    document.querySelectorAll('.inline-form').forEach(f => f.remove());
    const addBtn = document.querySelector(`[data-colid="${colId}"]`).parentElement.querySelector('.add-card-btn');
    const form = document.createElement('div');
    form.className = 'inline-form';
    form.innerHTML = `
      <input type="text" id="newTitle_${colId}" placeholder="Card title..." maxlength="100">
      <textarea id="newDesc_${colId}" placeholder="Description (optional)"></textarea>
      <select id="newPriority_${colId}">
        <option value="">No Priority</option>
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>
      <div class="inline-btns">
        <button class="btn-sm btn-add" onclick="addCard('${colId}')">Add</button>
        <button class="btn-sm btn-cancel" onclick="cancelInline()">Cancel</button>
      </div>
    `;
    addBtn.parentElement.insertBefore(form, addBtn);
    document.getElementById('newTitle_' + colId).focus();
  }

  function addCard(colId) {
    const title = document.getElementById('newTitle_' + colId).value.trim();
    if (!title) return;
    const desc = document.getElementById('newDesc_' + colId).value.trim();
    const priority = document.getElementById('newPriority_' + colId).value;
    const col = data.columns.find(c => c.id === colId);
    col.cards.push({ id: uid(), title, desc, priority });
    save(); render();
  }

  function cancelInline() { document.querySelectorAll('.inline-form').forEach(f => f.remove()); }

  function openModal(colId, cardId) {
    editCardId = { colId, cardId };
    const col = data.columns.find(c => c.id === colId);
    const card = col.cards.find(c => c.id === cardId);
    document.getElementById('editTitle').value = card.title;
    document.getElementById('editDesc').value = card.desc || '';
    document.getElementById('editPriority').value = card.priority || '';
    var _mo=document.getElementById('modalOverlay'); _mo.classList.add('open'); _trapFocus(_mo);
  }

  function _trapFocus(el){var sel='button:not([disabled]),[href],input:not([disabled]),select:not([disabled]),textarea:not([disabled]),[tabindex]:not([tabindex="-1"])';var nodes=Array.from(el.querySelectorAll(sel));var first=nodes[0],last=nodes[nodes.length-1];if(first)setTimeout(function(){first.focus();},50);function h(e){if(e.key!=='Tab')return;if(!nodes.length){e.preventDefault();return;}if(e.shiftKey){if(document.activeElement===first){e.preventDefault();if(last)last.focus();}}else{if(document.activeElement===last){e.preventDefault();if(first)first.focus();}}}el._trapH=h;el.addEventListener('keydown',h);}
  function _releaseFocus(el){if(el&&el._trapH){el.removeEventListener('keydown',el._trapH);el._trapH=null;}}
  function closeModal() { var _mo=document.getElementById('modalOverlay');if(_mo){_releaseFocus(_mo);_mo.classList.remove('open');}editCardId = null; }

  function saveCard() {
    if (!editCardId) return;
    const col = data.columns.find(c => c.id === editCardId.colId);
    const card = col.cards.find(c => c.id === editCardId.cardId);
    card.title = document.getElementById('editTitle').value.trim() || card.title;
    card.desc = document.getElementById('editDesc').value.trim();
    card.priority = document.getElementById('editPriority').value;
    save(); closeModal(); render();
  }

  function deleteCard() {
    if (!editCardId) return;
    const col = data.columns.find(c => c.id === editCardId.colId);
    col.cards = col.cards.filter(c => c.id !== editCardId.cardId);
    save(); closeModal(); render();
  }

  function moveToNext(fromColId, cardId, toColId, e) {
    e.stopPropagation();
    const fromCol = data.columns.find(c => c.id === fromColId);
    const toCol = data.columns.find(c => c.id === toColId);
    const idx = fromCol.cards.findIndex(c => c.id === cardId);
    if (idx === -1) return;
    const [card] = fromCol.cards.splice(idx, 1);
    toCol.cards.push(card);
    save(); render();
  }

  function clearAll() {
    if (!confirm('Clear all cards? This cannot be undone.')) return;
    data.columns.forEach(col => col.cards = []);
    save(); render();
  }

  function esc(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === document.getElementById('modalOverlay')) closeModal(); });

  load(); render();
</script>
<!-- Data portability -->
<div class="card" style="margin-top:0">
  <p style="font-size:.8rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem">Data</p>
  <div style="display:flex;gap:.5rem;flex-wrap:wrap">
    <button onclick="exportData()" style="padding:.45rem .9rem;border:1px solid var(--border);border-radius:.5rem;background:var(--bg);color:var(--text);font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit">Export JSON</button>
    <button onclick="importData()" style="padding:.45rem .9rem;border:1px solid var(--border);border-radius:.5rem;background:var(--bg);color:var(--text);font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit">Import JSON</button>
  </div>
  <p style="font-size:.72rem;color:var(--muted);margin-top:.5rem">Export saves a backup file. Import restores from a previously exported file.</p>
</div>
<script src="/static/footer.js?v=6"></script>

<script>
function exportData() {
  var d = localStorage.getItem('kanban_data') || '{}';
  var a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([d],{type:'application/json'}));
  a.download = 'kanban-board-backup.json'; a.click();
}
function importData() {
  var inp = document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange = function(e) {
    var f = e.target.files[0]; if(!f) return;
    var r = new FileReader();
    r.onload = function(ev) {
      try { JSON.parse(ev.target.result); localStorage.setItem('kanban_data', ev.target.result); location.reload(); }
      catch(err) { alert('Invalid JSON file.'); }
    };
    r.readAsText(f);
  };
  inp.click();
}
</script>
<script src="/static/app-nav.js?v=3"></script>
