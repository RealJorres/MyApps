<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect x='2' y='2' width='60' height='60' rx='14' fill='%230d1117'/%3E%3Crect x='14' y='14' width='12' height='12' rx='3' fill='%23ffffff'/%3E%3Crect x='30' y='14' width='12' height='12' rx='3' fill='%23ffffff' opacity='0.35'/%3E%3Crect x='30' y='30' width='12' height='12' rx='3' fill='%23ffffff'/%3E%3Crect x='14' y='46' width='12' height='12' rx='3' fill='%232f57ff'/%3E%3Crect x='30' y='46' width='12' height='12' rx='3' fill='%23ffffff'/%3E%3C/svg%3E">
<link rel="stylesheet" href="/static/base.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="canonical" href="https://jorresapps.onrender.com/email-signature/">
<meta name="description" content="Create a professional HTML email signature. Fill in your details, pick a style, and copy the HTML to paste into Gmail, Outlook, or any email client.">
<meta name="author" content="Jorres Apps">
<meta property="og:title" content="Email Signature Generator">
<meta property="og:description" content="Create a professional HTML email signature. Fill in your details, pick a style, and copy the HTML to paste into Gmail, Outlook, or any email client.">
<meta property="og:type" content="website">
<meta property="og:image" content="https://jorresapps.onrender.com/static/preview.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://jorresapps.onrender.com/static/preview.png">
<meta name="twitter:title" content="Email Signature Generator">
<meta name="twitter:description" content="Create a professional HTML email signature in seconds. No sign-up required.">
<title>Email Signature Generator | Jorres Apps</title>
<style>
:root { --primary: #0f766e; --brand: var(--primary); --primary-h: #0d6b63; --bg: #f0fdfa; --card: #ffffff; --border: #e2e8f0; --text: #1e293b; --muted: #64748b; }
.container { max-width: 1100px; margin: 0 auto; }
header h1 { color: var(--primary); }
.btn-primary { background: var(--primary); color: #fff; } .btn-primary:hover { background: var(--primary-h); }

input[type=text], input[type=email], input[type=url] { width: 100%; padding: .55rem .75rem; border: 1px solid var(--border); border-radius: .5rem; font-size: .875rem; background: #fff; color: var(--text); outline: none; font-family: inherit; }
input:focus { border-color: var(--primary); }
.label { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: .3rem; display: block; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .85rem; }
.full { grid-column: 1 / -1; }
.layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; align-items: start; }
.preview-card { position: sticky; top: 1rem; }
.preview-box { border: 1px solid var(--border); border-radius: .75rem; padding: 1.5rem; background: #fafafa; min-height: 140px; overflow: auto; }
.theme-row { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1rem; }
.theme-btn { padding: .35rem .85rem; border: 2px solid var(--border); border-radius: .4rem; font-size: .78rem; font-weight: 600; cursor: pointer; background: #fff; font-family: inherit; transition: all .15s; color: var(--text); }
.theme-btn.active { border-color: var(--primary); color: var(--primary); background: #f0fdfa; }
.color-row { display: flex; align-items: center; gap: .75rem; }
.color-row input[type=color] { width: 48px; height: 38px; padding: 2px; cursor: pointer; border-radius: .4rem; border: 1px solid var(--border); }
.color-row input[type=text] { flex: 1; }
.action-row { display: flex; gap: .6rem; flex-wrap: wrap; margin-top: 1rem; }
.status-msg { font-size: .78rem; color: var(--primary); font-weight: 600; display: none; }
@media (max-width: 768px) {
  body { overflow-x: hidden; }
  .layout { grid-template-columns: 1fr; }
  .form-grid { grid-template-columns: 1fr; }
  .preview-card { position: static; }
  input[type=text], input[type=email], input[type=url] { width: 100% !important; min-width: 0 !important; }
  .action-row .btn { flex: 1; justify-content: center; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Email Signature Generator</h1>
    <p>Build a professional HTML email signature. Paste into Gmail, Outlook, or any email client.</p>
  </header>

  <div class="layout">
    <!-- Left: Form -->
    <div>
      <div class="card">
        <p style="font-weight:700;margin-bottom:1rem">Personal Details</p>
        <div class="form-grid">
          <div><label class="label" for="fName">Full Name</label><input type="text" id="fName" placeholder="Jane Smith" oninput="update()"></div>
          <div><label class="label" for="fTitle">Job Title</label><input type="text" id="fTitle" placeholder="Product Designer" oninput="update()"></div>
          <div><label class="label" for="fCompany">Company</label><input type="text" id="fCompany" placeholder="Acme Corp" oninput="update()"></div>
          <div><label class="label" for="fDept">Department</label><input type="text" id="fDept" placeholder="Design Team" oninput="update()"></div>
          <div><label class="label" for="fEmail">Email</label><input type="email" id="fEmail" placeholder="jane@acme.com" oninput="update()"></div>
          <div><label class="label" for="fPhone">Phone</label><input type="text" id="fPhone" placeholder="+1 (555) 000-0000" oninput="update()"></div>
          <div><label class="label" for="fWebsite">Website</label><input type="url" id="fWebsite" placeholder="https://acme.com" oninput="update()"></div>
          <div><label class="label" for="fLinkedIn">LinkedIn</label><input type="url" id="fLinkedIn" placeholder="https://linkedin.com/in/jane" oninput="update()"></div>
          <div><label class="label" for="fTwitter">Twitter / X</label><input type="text" id="fTwitter" placeholder="@janesmith" oninput="update()"></div>
          <div><label class="label" for="fPhoto">Photo URL</label><input type="url" id="fPhoto" placeholder="https://…/photo.jpg" oninput="update()"></div>
          <div class="full"><label class="label" for="fDisclaimer">Disclaimer (optional)</label><input type="text" id="fDisclaimer" placeholder="This email is confidential…" oninput="update()"></div>
        </div>
      </div>

      <div class="card">
        <p style="font-weight:700;margin-bottom:.75rem">Style</p>
        <div class="theme-row" id="themeRow">
          <button class="theme-btn active" onclick="setTheme('classic',this)">Classic</button>
          <button class="theme-btn" onclick="setTheme('modern',this)">Modern</button>
          <button class="theme-btn" onclick="setTheme('minimal',this)">Minimal</button>
          <button class="theme-btn" onclick="setTheme('bold',this)">Bold</button>
        </div>
        <label class="label">Accent Color</label>
        <div class="color-row">
          <input type="color" id="accentColor" value="#0f766e" oninput="syncColor(this.value)">
          <input type="text" id="accentText" value="#0f766e" placeholder="#0f766e" oninput="syncColorText(this.value)">
        </div>
      </div>
    </div>

    <!-- Right: Preview -->
    <div class="preview-card">
      <div class="card">
        <p style="font-weight:700;margin-bottom:.75rem">Preview</p>
        <div class="preview-box" id="preview"></div>
        <div class="action-row">
          <button class="btn btn-primary" onclick="copyHTML()">Copy HTML</button>
          <button class="btn btn-ghost" onclick="downloadHTML()">Download .html</button>
          <span class="status-msg" id="statusMsg">Copied!</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let currentTheme = 'classic';
let accentColor  = '#0f766e';

function v(id) { return (document.getElementById(id).value || '').trim(); }

function syncColor(val) {
  accentColor = val;
  document.getElementById('accentText').value = val;
  update();
}
function syncColorText(val) {
  if (/^#[0-9a-fA-F]{6}$/.test(val)) {
    accentColor = val;
    document.getElementById('accentColor').value = val;
    update();
  }
}
function setTheme(t, btn) {
  currentTheme = t;
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  update();
}

function buildSignature() {
  const name       = v('fName');
  const title      = v('fTitle');
  const company    = v('fCompany');
  const dept       = v('fDept');
  const email      = v('fEmail');
  const phone      = v('fPhone');
  const website    = v('fWebsite');
  const linkedin   = v('fLinkedIn');
  const twitter    = v('fTwitter');
  const photo      = v('fPhoto');
  const disclaimer = v('fDisclaimer');
  const c          = accentColor;

  if (!name && !title && !company) {
    return '<p style="color:#94a3b8;font-size:13px">Fill in your details on the left to see a preview.</p>';
  }

  const photoBlock = photo
    ? `<img src="${esc(photo)}" alt="${esc(name)}" width="80" height="80" style="border-radius:50%;object-fit:cover;border:2px solid ${c};display:block;">`
    : '';
  const emailLink    = email    ? `<a href="mailto:${esc(email)}" style="color:${c};text-decoration:none">${esc(email)}</a>` : '';
  const phoneLink    = phone    ? `<a href="tel:${phone.replace(/\s/g,'')}" style="color:#475569;text-decoration:none">${esc(phone)}</a>` : '';
  const websiteLink  = website  ? `<a href="${esc(website)}" style="color:${c};text-decoration:none">${esc(website.replace(/^https?:\/\//,''))}</a>` : '';
  const linkedinLink = linkedin ? `<a href="${esc(linkedin)}" style="color:${c};text-decoration:none">LinkedIn</a>` : '';
  const twitterLink  = twitter  ? `<a href="https://x.com/${esc(twitter.replace('@',''))}" style="color:${c};text-decoration:none">${esc(twitter)}</a>` : '';

  const contactLines = [emailLink, phoneLink, websiteLink].filter(Boolean).join(' &nbsp;|&nbsp; ');
  const socialLines  = [linkedinLink, twitterLink].filter(Boolean).join(' &nbsp;&middot;&nbsp; ');
  const titleLine    = [title, dept ? `(${dept})` : ''].filter(Boolean).join(' ');
  const companyLine  = company;

  if (currentTheme === 'classic') {
    return `<table cellpadding="0" cellspacing="0" style="font-family:Arial,sans-serif;font-size:13px;color:#1e293b;border-collapse:collapse;">
  <tr>
    ${photo ? `<td style="padding-right:16px;vertical-align:top">${photoBlock}</td>` : ''}
    <td style="border-left:3px solid ${c};padding-left:14px;vertical-align:top">
      ${name    ? `<p style="margin:0 0 2px;font-size:16px;font-weight:700;color:#0f172a">${esc(name)}</p>` : ''}
      ${titleLine ? `<p style="margin:0 0 4px;font-size:12px;color:#64748b">${esc(titleLine)}</p>` : ''}
      ${companyLine ? `<p style="margin:0 0 8px;font-size:12px;font-weight:600;color:${c}">${esc(companyLine)}</p>` : ''}
      ${contactLines ? `<p style="margin:0 0 4px;font-size:12px">${contactLines}</p>` : ''}
      ${socialLines  ? `<p style="margin:0;font-size:11px">${socialLines}</p>` : ''}
    </td>
  </tr>
  ${disclaimer ? `<tr><td colspan="2" style="padding-top:10px;font-size:10px;color:#94a3b8;border-top:1px solid #e2e8f0;max-width:480px">${esc(disclaimer)}</td></tr>` : ''}
</table>`;
  }

  if (currentTheme === 'modern') {
    return `<table cellpadding="0" cellspacing="0" style="font-family:'Segoe UI',Arial,sans-serif;font-size:13px;color:#1e293b;border-collapse:collapse;background:#f8fafc;border-radius:8px;padding:16px;">
  <tr>
    ${photo ? `<td style="padding-right:16px;vertical-align:middle">${photoBlock}</td>` : ''}
    <td style="vertical-align:middle">
      ${name    ? `<p style="margin:0 0 1px;font-size:17px;font-weight:800;color:#0f172a;letter-spacing:-0.3px">${esc(name)}</p>` : ''}
      ${titleLine ? `<p style="margin:0 0 6px;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:${c};font-weight:700">${esc(titleLine)}</p>` : ''}
      ${companyLine ? `<p style="margin:0 0 8px;font-size:12px;color:#475569">${esc(companyLine)}</p>` : ''}
      ${contactLines ? `<p style="margin:0 0 3px;font-size:12px">${contactLines}</p>` : ''}
      ${socialLines  ? `<p style="margin:0;font-size:11px">${socialLines}</p>` : ''}
    </td>
  </tr>
  ${disclaimer ? `<tr><td colspan="2" style="padding-top:10px;font-size:10px;color:#94a3b8;border-top:1px solid #e2e8f0;max-width:480px">${esc(disclaimer)}</td></tr>` : ''}
</table>`;
  }

  if (currentTheme === 'minimal') {
    return `<table cellpadding="0" cellspacing="0" style="font-family:Georgia,serif;font-size:13px;color:#1e293b;border-collapse:collapse;">
  <tr><td>
    ${name ? `<p style="margin:0 0 2px;font-size:15px;font-style:italic;color:#0f172a">${esc(name)}</p>` : ''}
    ${[titleLine, companyLine].filter(Boolean).join(', ') ? `<p style="margin:0 0 6px;font-size:12px;color:#64748b">${esc([titleLine, companyLine].filter(Boolean).join(', '))}</p>` : ''}
    ${contactLines ? `<p style="margin:0 0 3px;font-size:12px">${contactLines}</p>` : ''}
    ${socialLines  ? `<p style="margin:0;font-size:11px">${socialLines}</p>` : ''}
  </td></tr>
  ${disclaimer ? `<tr><td style="padding-top:8px;font-size:10px;color:#94a3b8;font-style:italic;max-width:440px">${esc(disclaimer)}</td></tr>` : ''}
</table>`;
  }

  if (currentTheme === 'bold') {
    return `<table cellpadding="0" cellspacing="0" style="font-family:Arial,sans-serif;font-size:13px;border-collapse:collapse;">
  <tr>
    <td style="background:${c};padding:14px 18px;vertical-align:middle;border-radius:6px 0 0 6px">
      ${photo ? `${photoBlock}` : `<span style="font-size:28px;font-weight:900;color:rgba(255,255,255,0.9)">${esc(name ? name[0] : '?')}</span>`}
    </td>
    <td style="padding:10px 16px;vertical-align:middle;background:#f8fafc;border:1px solid #e2e8f0;border-radius:0 6px 6px 0">
      ${name ? `<p style="margin:0 0 1px;font-size:16px;font-weight:800;color:#0f172a">${esc(name)}</p>` : ''}
      ${titleLine ? `<p style="margin:0 0 5px;font-size:12px;color:#64748b">${esc(titleLine)}</p>` : ''}
      ${companyLine ? `<p style="margin:0 0 7px;font-size:12px;font-weight:700;color:${c}">${esc(companyLine)}</p>` : ''}
      ${contactLines ? `<p style="margin:0 0 3px;font-size:12px;color:#1e293b">${contactLines}</p>` : ''}
      ${socialLines  ? `<p style="margin:0;font-size:11px">${socialLines}</p>` : ''}
    </td>
  </tr>
  ${disclaimer ? `<tr><td colspan="2" style="padding-top:8px;font-size:10px;color:#94a3b8;max-width:480px">${esc(disclaimer)}</td></tr>` : ''}
</table>`;
  }
  return '';
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function update() {
  document.getElementById('preview').innerHTML = buildSignature();
}

function getHTML() {
  return `<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Email Signature</title></head>
<body style="margin:20px;font-family:Arial,sans-serif">
${buildSignature()}
</body></html>`;
}

function copyHTML() {
  const html = buildSignature();
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(html).then(() => showStatus());
  } else {
    const ta = document.createElement('textarea');
    ta.value = html; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showStatus();
  }
}

function showStatus() {
  const msg = document.getElementById('statusMsg');
  msg.style.display = 'inline';
  setTimeout(() => { msg.style.display = 'none'; }, 2000);
}

function downloadHTML() {
  const blob = new Blob([getHTML()], {type: 'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'email-signature.html'; a.click();
  URL.revokeObjectURL(a.href);
}

update();
</script>
<script src="/static/footer.js?v=3"></script>
<script src="/static/app-nav.js?v=3"></script>
</body>
</html>
