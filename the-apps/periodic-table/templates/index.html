<style>
  :root {
    --primary: #0891b2;
    --primary-h: #0e7490;
    --bg: #f0f9ff;
    --surface: #ffffff;
    --border: #e0f2fe;
    --text: #0c1a2e;
    --muted: #64748b;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: linear-gradient(135deg, var(--primary), var(--primary-h));
    color: #fff;
    padding: 1.5rem 2rem;
    text-align: center;
  }
  header h1 { font-size: 1.8rem; font-weight: 800; }
  header p { opacity: 0.85; margin-top: 0.3rem; font-size: 0.95rem; }

  .top-bar {
    max-width: 1300px;
    margin: 1.2rem auto 0;
    padding: 0 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .search-box {
    padding: 0.55rem 1rem;
    border: 2px solid var(--border);
    border-radius: 8px;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
    flex: 1;
    min-width: 180px;
    max-width: 340px;
    background: var(--surface);
    color: var(--text);
  }
  .search-box:focus { border-color: var(--primary); }
  .search-box::placeholder { color: var(--muted); }

  .table-wrap {
    max-width: 1300px;
    margin: 1.2rem auto;
    padding: 0 0.5rem;
    overflow-x: auto;
  }

  .pt-grid {
    display: grid;
    grid-template-columns: repeat(18, minmax(62px, 1fr));
    gap: 3px;
    min-width: 900px;
  }

  .el-cell {
    border-radius: 6px;
    padding: 4px 3px 3px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
    border: 1.5px solid transparent;
    position: relative;
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    min-height: 62px;
  }
  .el-cell:hover {
    transform: scale(1.12);
    z-index: 10;
    box-shadow: 0 4px 16px rgba(0,0,0,0.22);
    border-color: rgba(0,0,0,0.25);
  }
  .el-cell.dimmed { opacity: 0.2; }
  .el-cell.highlighted { opacity: 1; box-shadow: 0 0 0 2.5px #0891b2; }

  .el-num { font-size: 0.55rem; color: rgba(0,0,0,0.6); align-self: flex-start; line-height: 1; position: absolute; top: 3px; left: 4px; }
  .el-sym { font-size: 1.25rem; font-weight: 800; line-height: 1; margin-top: 6px; }
  .el-name { font-size: 0.48rem; color: rgba(0,0,0,0.65); line-height: 1.2; margin-top: 2px; overflow: hidden; white-space: nowrap; }
  .el-weight { font-size: 0.45rem; color: rgba(0,0,0,0.55); position: absolute; bottom: 2px; right: 3px; }

  .spacer { background: transparent !important; border: none !important; cursor: default !important; pointer-events: none; }
  .spacer:hover { transform: none !important; box-shadow: none !important; }

  .label-cell {
    background: transparent;
    border: none;
    cursor: default;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.65rem;
    color: var(--muted);
    font-weight: 600;
  }

  .gap-row { height: 10px; grid-column: 1 / -1; }

  .legend-wrap {
    max-width: 1300px;
    margin: 0.5rem auto 1.5rem;
    padding: 0 1rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem 1rem;
    align-items: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    font-size: 0.8rem;
    color: var(--muted);
    cursor: pointer;
    border-radius: 6px;
    padding: 0.2rem 0.4rem;
    transition: background 0.15s;
  }
  .legend-item:hover { background: rgba(0,0,0,0.06); }
  .legend-dot { width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0; }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 2rem;
    max-width: 560px;
    width: 100%;
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    animation: pop 0.18s ease;
    max-height: 90vh;
    overflow-y: auto;
  }
  @keyframes pop { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal-close {
    position: absolute;
    top: 1rem;
    right: 1rem;
    background: #f1f5f9;
    border: none;
    border-radius: 50%;
    width: 32px;
    height: 32px;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    transition: background 0.15s;
  }
  .modal-close:hover { background: #e2e8f0; }

  .modal-header { display: flex; align-items: center; gap: 1.2rem; margin-bottom: 1.5rem; }
  .modal-sym-badge {
    width: 80px;
    height: 80px;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .modal-sym-badge .msym { font-size: 2.2rem; font-weight: 900; color: rgba(0,0,0,0.85); }
  .modal-sym-badge .mnum { font-size: 0.75rem; color: rgba(0,0,0,0.6); }
  .modal-title { }
  .modal-title h2 { font-size: 1.5rem; font-weight: 800; }
  .modal-title .cat-tag {
    display: inline-block;
    margin-top: 0.3rem;
    padding: 0.2rem 0.7rem;
    border-radius: 999px;
    font-size: 0.78rem;
    font-weight: 700;
    color: rgba(0,0,0,0.75);
  }

  .modal-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
    margin-bottom: 1.2rem;
  }
  .modal-row {
    background: #f8fafc;
    border-radius: 8px;
    padding: 0.6rem 0.8rem;
  }
  .modal-row .row-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
  .modal-row .row-val { font-size: 0.95rem; font-weight: 600; color: var(--text); margin-top: 0.1rem; }

  .modal-desc {
    background: #f0f9ff;
    border-left: 3px solid var(--primary);
    border-radius: 0 8px 8px 0;
    padding: 0.75rem 1rem;
    font-size: 0.92rem;
    color: var(--text);
    line-height: 1.5;
  }

  footer { text-align: center; color: var(--muted); font-size: 0.82rem; padding: 1.5rem; }
@media (max-width: 600px) {
  body { overflow-x: hidden; }
  .pt-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
}
</style>

<body>
<header>
  <h1>Interactive Periodic Table</h1>

<div class="top-bar">

</div>

<div class="legend-wrap" id="legendWrap"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose" title="Close">&#10005;</button>
    <div class="modal-header">
      <div class="modal-sym-badge" id="mBadge">

      </div>
    </div>
    <div class="modal-grid" id="mGrid"></div>
    <div class="modal-desc" id="mDesc"></div>
  </div>
</div>

<footer>Periodic Table &mdash; all data embedded, no external requests</footer>

const elByNum = {};
ELEMENTS.forEach(e => elByNum[e.num] = e);

// Grid layout: each entry is [col, row, num] or null for spacer
// Standard periodic table: 18 cols x 7 rows (periods) + gap + 2 rows lanthanides/actinides
// We'll build the grid cell by cell

function colRow(group, period) {
  return { col: group, row: period };
}

// Special positions for main table
// H=1,1  He=18,1
// Li=1,2 Be=2,2 B=13,2...Ne=18,2
// Na=1,3 ... Ar=18,3
// K=1,4...Kr=18,4
// Rb=1,5...Xe=18,5
// Cs=1,6 Ba=2,6 (La-Lu in lanthanide row) Hf=4,6...Rn=18,6
// Fr=1,7 Ra=2,7 (Ac-Lr in actinide row) Rf=4,7...Og=18,7

// Grid is 18 cols x (7 rows + gap row + 2 rows) = 10 rows effectively
// We'll render rows 1-7 for main table, then a gap, then lanthanides (row 8), actinides (row 9)

function buildGrid() {
  const grid = document.getElementById('ptGrid');
  grid.innerHTML = '';

  // Build cell map: "row,col" -> element object
  const cellMap = {};

  // Place all non-lanthanide/non-actinide elements in main table
  ELEMENTS.forEach(e => {
    if (e.cat === 'Lanthanide' || e.cat === 'Actinide') return;
    if (e.group == null) return;
    cellMap[`${e.period},${e.group}`] = e;
  });

  // La (57) and Ac (89) appear in the main table at group 3
  cellMap['6,3'] = elByNum[57];
  cellMap['7,3'] = elByNum[89];

  // Lanthanides (57-71) in row 9, cols 3-17 — La appears here too
  for (let n = 57, col = 3; n <= 71; n++, col++) {
    cellMap[`9,${col}`] = elByNum[n];
  }
  // Actinides (89-103) in row 10, cols 3-17 — Ac appears here too
  for (let n = 89, col = 3; n <= 103; n++, col++) {
    cellMap[`10,${col}`] = elByNum[n];
  }

  const totalRows = 10;
  const totalCols = 18;

  for (let r = 1; r <= totalRows; r++) {
    if (r === 8) {
      const gap = document.createElement('div');
      gap.className = 'gap-row';
      gap.style.gridColumn = '1 / -1';
      grid.appendChild(gap);
      continue;
    }
    for (let c = 1; c <= totalCols; c++) {
      const el = cellMap[`${r},${c}`];
      const cell = document.createElement('div');
      if (el) {
        const color = CAT_COLORS[el.cat] || CAT_COLORS['Unknown'];
        cell.className = 'el-cell';
        cell.style.background = color + '33';
        cell.style.borderColor = color + '88';
        cell.dataset.num = el.num;
        cell.innerHTML =
          `<span class="el-num">${el.num}</span>` +
          `<span class="el-sym">${el.sym}</span>` +
          `<span class="el-name">${el.name}</span>` +
          `<span class="el-weight">${el.weight}</span>`;
        cell.addEventListener('click', () => openModal(el));
      } else {
        cell.className = 'el-cell spacer';
      }
      grid.appendChild(cell);
    }
  }
}

function openModal(el) {
  const color = CAT_COLORS[el.cat] || CAT_COLORS['Unknown'];
  document.getElementById('mSym').textContent = el.sym;
  document.getElementById('mNum').textContent = '#' + el.num;
  document.getElementById('mName').textContent = el.name;
  const catTag = document.getElementById('mCat');
  catTag.textContent = el.cat;
  catTag.style.background = color + '33';
  catTag.style.color = color;

  const badge = document.getElementById('mBadge');
  badge.style.background = color + '22';
  badge.style.border = '2px solid ' + color + '66';

  const mGrid = document.getElementById('mGrid');
  const rows = [
    ['Atomic Number', el.num],
    ['Atomic Weight', el.weight],
    ['Period', el.period],
    ['Group', el.group || 'N/A'],
    ['Electron Config', el.config],
    ['Melting Point', el.melt !== 'N/A' ? el.melt + ' °C' : 'N/A'],
    ['Boiling Point', el.boil !== 'N/A' ? el.boil + ' °C' : 'N/A'],
    ['Discovered', el.year]
  ];
  mGrid.innerHTML = rows.map(([l, v]) =>
    `<div class="modal-row"><div class="row-label">${l}</div><div class="row-val">${v}</div></div>`
  ).join('');

  document.getElementById('mDesc').textContent = el.desc;
  document.getElementById('modalOverlay').classList.add('open');
}

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

// Search
const searchBox = document.getElementById('searchBox');
searchBox.addEventListener('input', () => {
  const q = searchBox.value.trim().toLowerCase();
  const cells = document.querySelectorAll('.el-cell:not(.spacer)');
  if (!q) {
    cells.forEach(c => { c.classList.remove('dimmed','highlighted'); });
    return;
  }
  cells.forEach(c => {
    const num = parseInt(c.dataset.num);
    const el = elByNum[num];
    const match = el.name.toLowerCase().includes(q) || el.sym.toLowerCase() === q || el.sym.toLowerCase().includes(q);
    if (match) {
      c.classList.remove('dimmed');
      c.classList.add('highlighted');
    } else {
      c.classList.add('dimmed');
      c.classList.remove('highlighted');
    }
  });
});

// Legend
function buildLegend() {
  const wrap = document.getElementById('legendWrap');
  Object.entries(CAT_COLORS).forEach(([cat, color]) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-dot" style="background:${color};"></div><span>${cat}</span>`;
    item.addEventListener('click', () => {
      const q = searchBox.value = '';
      const cells = document.querySelectorAll('.el-cell:not(.spacer)');
      cells.forEach(c => {
        const el = elByNum[parseInt(c.dataset.num)];
        if (el.cat === cat) {
          c.classList.remove('dimmed');
          c.classList.add('highlighted');
        } else {
          c.classList.add('dimmed');
          c.classList.remove('highlighted');
        }
      });
    });
    wrap.appendChild(item);
  });
  // Add "Show All" reset
  const resetItem = document.createElement('div');
  resetItem.className = 'legend-item';
  resetItem.innerHTML = '<span style="font-weight:700;color:var(--primary);">Show All</span>';
  resetItem.addEventListener('click', () => {
    searchBox.value = '';
    document.querySelectorAll('.el-cell').forEach(c => c.classList.remove('dimmed','highlighted'));
  });
  wrap.appendChild(resetItem);
}

buildGrid();
buildLegend();
</script>
</body>
</html>
