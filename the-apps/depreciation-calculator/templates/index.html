<body>
<div class="container">
  <header>
    <h1>Depreciation Calculator</h1>
    <p>Calculate Straight-Line or Declining Balance depreciation with a full schedule.</p>
  </header>

  <div class="card">
    <div class="grid3">
      <div>
        <label for="cost">Asset Cost</label>
        <div class="input-group"><span class="prefix">$</span>
          <input type="number" id="cost" value="100000" min="0" oninput="calc()">
        </div>
      </div>
      <div>
        <label for="salvage">Salvage Value</label>
        <div class="input-group"><span class="prefix">$</span>
          <input type="number" id="salvage" value="10000" min="0" oninput="calc()">
        </div>
      </div>
      <div>
        <label for="life">Useful Life (years)</label>
        <input type="number" id="life" value="5" min="1" max="40" oninput="calc()">
      </div>
      <div>
        <label for="method">Method</label>
        <select id="method" onchange="calc()">
          <option value="sl">Straight-Line (SL)</option>
          <option value="db">Declining Balance (DB)</option>
          <option value="ddb">Double Declining Balance (DDB)</option>
          <option value="syd">Sum-of-Years' Digits (SYD)</option>
        </select>
      </div>
      <div id="dbRateDiv">
        <label for="dbRate">DB Rate (% / year)</label>
        <input type="number" id="dbRate" value="150" min="100" max="200" oninput="calc()">
      </div>
    </div>
  </div>

  <div class="card">
    <canvas id="chart" width="760" height="280"></canvas>
    <div class="dl-row"><button class="btn" onclick="download()">Download PNG</button></div>
  </div>

  <div class="card">
    <div style="overflow-x:auto">
      <table id="schedTable"></table>
    </div>
  </div>
</div>
<script>
function fmt$(v){ return '$'+Math.round(v).toLocaleString(); }

function calc(){
  const cost = parseFloat(document.getElementById('cost').value)||0;
  const salvage = parseFloat(document.getElementById('salvage').value)||0;
  const life = parseInt(document.getElementById('life').value)||1;
  const method = document.getElementById('method').value;
  const dbRatePct = parseFloat(document.getElementById('dbRate').value)||150;
  const depBase = Math.max(0, cost - salvage);

  document.getElementById('dbRateDiv').style.display = method==='db' ? '' : 'none';

  // Build schedule
  let html = `<thead><tr><th>Year</th><th>Depreciation</th><th>Acc. Depreciation</th><th>Book Value</th></tr></thead><tbody>`;
  let accDep = 0;
  let bv = cost;
  let schedule = [];
  for(let y=1;y<=life;y++){
    let dep;
    if(method==='sl') dep = depBase/life;
    else if(method==='db') dep = Math.min(bv*(dbRatePct/100/life), Math.max(0, bv-salvage));
    else if(method==='ddb') dep = Math.min(bv*(2/life), Math.max(0, bv-salvage));
    else { const s=life*(life+1)/2; dep = depBase*(life-y+1)/s; }
    dep = Math.max(0, dep);
    bv -= dep;
    if(bv < salvage){ dep += bv - salvage; bv = salvage; }
    accDep += dep;
    schedule.push({ year:y, dep, accDep, bv });
  }

  schedule.forEach(r => {
    html += `<tr><td>${r.year}</td><td>${fmt$(r.dep)}</td><td>${fmt$(r.accDep)}</td><td>${fmt$(r.bv)}</td></tr>`;
  });
  const finalBV = schedule.length ? schedule[schedule.length-1].bv : cost;
  html += `<tr><td>Total</td><td>${fmt$(depBase)}</td><td>—</td><td>${fmt$(finalBV)}</td></tr>`;
  html += '</tbody>';
  document.getElementById('schedTable').innerHTML = html;

  drawChart(schedule, cost, salvage);
}

function drawChart(schedule, cost, salvage){
  const canvas = document.getElementById('chart');
  const ctx = canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  const pad={top:40,right:30,bottom:50,left:80};
  const cw=W-pad.left-pad.right, ch=H-pad.top-pad.bottom;

  ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#1e293b'; ctx.font='bold 14px system-ui'; ctx.textAlign='center';
  ctx.fillText('Asset Book Value Over Time', W/2, 24);

  for(let i=0;i<=5;i++){
    const y=pad.top+ch-(i/5)*ch;
    ctx.strokeStyle='#e2e8f0'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(pad.left+cw,y); ctx.stroke();
    ctx.fillStyle='#94a3b8'; ctx.font='11px system-ui'; ctx.textAlign='right';
    ctx.fillText(fmt$(cost*i/5), pad.left-6, y+4);
  }

  const pts = [{x:0, bv:cost}, ...schedule.map(r=>({x:r.year, bv:r.bv}))];
  const n = pts.length;

  // Area
  ctx.beginPath();
  pts.forEach((p,i) => {
    const x=pad.left+(p.x/schedule.length)*cw;
    const y=pad.top+ch-(p.bv/cost)*ch;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.lineTo(pad.left+cw, pad.top+ch);
  ctx.lineTo(pad.left, pad.top+ch);
  ctx.closePath();
  ctx.fillStyle='rgba(124,58,237,.12)'; ctx.fill();

  // Line
  ctx.beginPath();
  pts.forEach((p,i) => {
    const x=pad.left+(p.x/schedule.length)*cw;
    const y=pad.top+ch-(p.bv/cost)*ch;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.strokeStyle='#7c3aed'; ctx.lineWidth=2.5; ctx.stroke();

  // Salvage line
  if(salvage>0){
    const sy=pad.top+ch-(salvage/cost)*ch;
    ctx.strokeStyle='#f59e0b'; ctx.lineWidth=1.5; ctx.setLineDash([5,4]);
    ctx.beginPath(); ctx.moveTo(pad.left,sy); ctx.lineTo(pad.left+cw,sy); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#f59e0b'; ctx.font='10px system-ui'; ctx.textAlign='left';
    ctx.fillText('Salvage: '+fmt$(salvage), pad.left+4, sy-4);
  }

  // X labels
  pts.forEach(p => {
    const x=pad.left+(p.x/schedule.length)*cw;
    ctx.fillStyle='#94a3b8'; ctx.font='11px system-ui'; ctx.textAlign='center';
    ctx.fillText('Yr '+p.x, x, pad.top+ch+18);
  });
}

function download(){ const a=document.createElement('a'); a.download='depreciation.png'; a.href=document.getElementById('chart').toDataURL(); a.click(); }

calc();
</script>
