<style>
:root { --bg: #f1f5f9; --card: #ffffff; --border: #e2e8f0; --text: #1e293b; --muted: #64748b; --success-bg: #f0fdf4; --success-fg: #16a34a; --error-bg: #fef2f2; --error-fg: #dc2626; }
.container { max-width: 860px; margin: 0 auto; }
 

.btn-danger { background: var(--error-bg); color: var(--error-fg); border: 1px solid #fecaca; } .btn-danger:hover { background: #fecaca; }
.btn-sm { padding: 0.3rem 0.65rem; font-size: 0.78rem; }
input[type=text] { width: 100%; padding: 0.55rem 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem; font-size: 0.9rem; background: #fff; color: var(--text); outline: none; font-family: inherit; }
input:focus { border-color: var(--brand); }

.date-display { text-align: center; padding: 1rem; }
.date-display .day { font-size: 3rem; font-weight: 900; line-height: 1; color: var(--brand); }
.date-display .full-date { font-size: 1rem; color: var(--muted); margin-top: 0.25rem; }

.add-form { display: flex; gap: 0.5rem; }
.add-form input { flex: 1; }

.habit-list { display: flex; flex-direction: column; gap: 1rem; }

.habit-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 0.875rem; padding: 1.25rem;
  transition: border-color 0.15s;
}
.habit-card.done-today { border-color: #86efac; background: #f0fdf4; }

.habit-top { display: flex; align-items: center; gap: 0.75rem; }
.habit-checkbox { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--border); background: #fff; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.habit-checkbox.checked { background: var(--brand); border-color: var(--brand); }
.habit-name { flex: 1; font-size: 1rem; font-weight: 600; }
.habit-streak { font-size: 0.875rem; color: var(--muted); }
.habit-streak strong { color: var(--text); }

.habit-stats { display: flex; gap: 1rem; margin-top: 0.65rem; padding-left: 2.5rem; font-size: 0.8rem; color: var(--muted); flex-wrap: wrap; }
.habit-stats span strong { color: var(--text); }

.heatmap { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 0.75rem; padding-left: 2.5rem; }
.hm-day { width: 14px; height: 14px; border-radius: 2px; position: relative; }
.hm-day.done { background: #22c55e; }
.hm-day.missed { background: #d1fae5; }
.hm-day.future { background: #f1f5f9; border: 1px solid var(--border); }
.hm-day.today { border: 1.5px solid #15803d; }
@media (max-width: 600px) {
  body { overflow-x: hidden; }
  input[type=text] { width: 100% !important; min-width: 0 !important; }
  .add-form { flex-wrap: wrap !important; } .add-form input[type=text] { flex: 1 !important; min-width: 0 !important; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Habit Tracker</h1>
    <p>Build streaks, stay consistent. All data saved locally in your browser.</p>
  </header>

  <div class="card" style="padding:1rem">
    <div class="date-display">
      <div class="day" id="todayDay"></div>
      <div class="full-date" id="todayDate"></div>
    </div>
  </div>

  <div class="card">
    <div class="add-form">
      <input type="text" id="habitInput" placeholder="New habit name…" maxlength="80">
      <button class="btn btn-primary" id="addHabitBtn">Add Habit</button>
    </div>
  </div>

  <div class="habit-list" id="habitList"></div>

  <div id="emptyState" style="text-align:center; color:var(--muted); padding:2rem; display:none">
    No habits yet. Add one above to get started!
  </div>
</div>

<script>
const STORAGE_KEY = 'habit_tracker_data';

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function dateStr(offset) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { habits: [] }; }
  catch { return { habits: [] }; }
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function computeStreak(completions) {
  let streak = 0;
  let d = new Date();
  const today = todayStr();
  if (!completions[today]) d.setDate(d.getDate() - 1);
  while (true) {
    const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (completions[ds]) { streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  return streak;
}

function computeLongestStreak(completions) {
  const dates = Object.keys(completions).filter(k => completions[k]).sort();
  if (!dates.length) return 0;
  let max = 1, cur = 1;
  for (let i = 1; i < dates.length; i++) {
    const prev = new Date(dates[i-1]);
    const curr = new Date(dates[i]);
    const diff = (curr - prev) / 86400000;
    if (diff === 1) { cur++; if (cur > max) max = cur; }
    else cur = 1;
  }
  return max;
}

function monthCompletionPct(completions) {
  const d = new Date();
  const today = todayStr();
  let days = 0, done = 0;
  for (let i = 0; i < 30; i++) {
    const ds = dateStr(-i);
    if (ds <= today) { days++; if (completions[ds]) done++; }
  }
  return days ? Math.round(done / days * 100) : 0;
}

function renderHeatmap(completions) {
  const today = todayStr();
  const cells = [];
  for (let i = 29; i >= 0; i--) {
    const ds = dateStr(-i);
    const isFuture = ds > today;
    const done = completions[ds];
    const isToday = ds === today;
    let cls = 'hm-day';
    if (isFuture) cls += ' future';
    else if (done) cls += ' done';
    else cls += ' missed';
    if (isToday) cls += ' today';
    cells.push(`<div class="${cls}" title="${ds}"></div>`);
  }
  return cells.join('');
}

function render() {
  const data = loadData();
  const today = todayStr();
  const list = document.getElementById('habitList');
  const empty = document.getElementById('emptyState');

  list.innerHTML = '';
  if (!data.habits.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  data.habits.forEach((habit, idx) => {
    const completions = habit.completions || {};
    const doneToday = !!completions[today];
    const streak = computeStreak(completions);
    const longest = computeLongestStreak(completions);
    const pct = monthCompletionPct(completions);

    const div = document.createElement('div');
    div.className = 'habit-card' + (doneToday ? ' done-today' : '');
    div.innerHTML = `
      <div class="habit-top">
        <div class="habit-checkbox ${doneToday ? 'checked' : ''}" data-idx="${idx}" title="Toggle today">
          ${doneToday ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>' : ''}
        </div>
        <span class="habit-name">${escHtml(habit.name)}</span>
        <span class="habit-streak">&#x1F525; ${streak} day${streak !== 1 ? 's' : ''}</span>
        <button class="btn btn-danger btn-sm" data-del="${idx}" style="margin-left:auto">Delete</button>
      </div>
      <div class="habit-stats">
        <span>Longest streak: <strong>${longest} days</strong></span>
        <span>This month: <strong>${pct}%</strong></span>
        <span>Status: <strong style="color:${doneToday ? 'var(--success-fg)' : 'var(--muted)'}">${doneToday ? 'Done today!' : 'Not yet'}</strong></span>
      </div>
      <div class="heatmap">${renderHeatmap(completions)}</div>
    `;

    div.querySelector('.habit-checkbox').addEventListener('click', function() {
      const i = parseInt(this.dataset.idx);
      const d = loadData();
      if (!d.habits[i].completions) d.habits[i].completions = {};
      if (d.habits[i].completions[today]) {
        delete d.habits[i].completions[today];
      } else {
        d.habits[i].completions[today] = true;
      }
      saveData(d);
      render();
    });

    div.querySelector('[data-del]').addEventListener('click', function() {
      const i = parseInt(this.dataset.del);
      if (confirm('Delete habit "' + data.habits[i].name + '"?')) {
        const d = loadData();
        d.habits.splice(i, 1);
        saveData(d);
        render();
      }
    });

    list.appendChild(div);
  });
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.getElementById('addHabitBtn').addEventListener('click', addHabit);
document.getElementById('habitInput').addEventListener('keydown', e => { if (e.key === 'Enter') addHabit(); });

function addHabit() {
  const input = document.getElementById('habitInput');
  const name = input.value.trim();
  if (!name) return;
  const data = loadData();
  data.habits.push({ name, completions: {} });
  saveData(data);
  input.value = '';
  render();
}

// Date display
const now = new Date();
const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
document.getElementById('todayDay').textContent = days[now.getDay()];
document.getElementById('todayDate').textContent = `${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;

render();

function exportData() {
  var out = {}; out['habit_tracker_data']=localStorage.getItem('habit_tracker_data');
  var b = new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  var a = document.createElement('a'); a.href=URL.createObjectURL(b);
  a.download='habit-tracker-backup.json'; a.click(); URL.revokeObjectURL(a.href);
}
function importData() {
  var inp=document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange=function(e){
    var file=e.target.files[0]; if(!file)return;
    var r=new FileReader();
    r.onload=function(ev){
      try{var d=JSON.parse(ev.target.result);Object.keys(d).forEach(function(k){localStorage.setItem(k,d[k]);});location.reload();}
      catch(err){alert('Invalid backup file.');}
    };r.readAsText(file);
  };inp.click();
}
</script>
<div class="card" style="margin-top:0">
  <p style="font-size:.8rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem">Data</p>
  <div style="display:flex;gap:.5rem;flex-wrap:wrap">
    <button class="btn btn-ghost" onclick="exportData()">Export</button>
    <button class="btn btn-ghost" onclick="importData()">Import</button>
  </div>
</div>
