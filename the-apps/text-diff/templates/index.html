<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="canonical" href="https://jorresapps.onrender.com/text-diff/">
<meta name="description" content="Compare two texts side by side and see differences highlighted in real time. Great for code reviews.">
<meta name="keywords" content="text diff, compare text, text comparison, diff tool, code diff">
<meta name="author" content="Jorres Apps">
<meta property="og:title" content="Text Diff">
<meta property="og:description" content="Compare two texts side by side and see differences highlighted in real time. Great for code reviews.">
<meta property="og:type" content="website">
<meta property="og:image" content="https://jorresapps.onrender.com/static/preview.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://jorresapps.onrender.com/static/preview.png">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Text Diff">
<meta name="twitter:description" content="Compare two texts side by side and see differences highlighted in real time. Great for code reviews.">
<title>Text Diff</title>
<style>
:root { --primary:#4f46e5; --primary-h:#4338ca; --bg:#f1f5f9; --card:#ffffff; --border:#e2e8f0; --text:#1e293b; --muted:#64748b; --add-bg:#dcfce7; --add-fg:#15803d; --rem-bg:#fee2e2; --rem-fg:#b91c1c; --ctx-bg:#f8fafc; }
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:2rem 1rem 4rem}
.container{max-width:960px;margin:0 auto}
header{text-align:center;margin-bottom:2rem}
header h1{font-size:2rem;font-weight:800}
header p{color:var(--muted);margin-top:.4rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:1rem;padding:1.5rem;margin-bottom:1.25rem}
.split{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
label{display:block;font-size:.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.35rem}
textarea{width:100%;padding:.65rem .75rem;border:1px solid var(--border);border-radius:.5rem;font-size:.82rem;font-family:'Cascadia Code','Fira Code','Courier New',monospace;background:#fff;color:var(--text);outline:none;resize:vertical;line-height:1.6}
textarea:focus{border-color:var(--primary)}
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.6rem 1.25rem;border-radius:.5rem;border:none;font-size:.875rem;font-weight:600;cursor:pointer;transition:background .15s;font-family:inherit}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-h)}
.btn-ghost{background:var(--bg);color:var(--text);border:1px solid var(--border)}.btn-ghost:hover{background:var(--border)}
.btn-ghost.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.toolbar{display:flex;gap:.5rem;align-items:center;margin-top:1rem;flex-wrap:wrap}
.stats{margin-left:auto;font-size:.82rem;color:var(--muted);display:flex;gap:1rem}
.stat-add{color:var(--add-fg);font-weight:700}
.stat-rem{color:var(--rem-fg);font-weight:700}
.diff-box{background:var(--card);border:1px solid var(--border);border-radius:1rem;overflow:hidden;margin-bottom:1.25rem;display:none}
.diff-box.visible{display:block}
.diff-header{padding:.65rem 1rem;background:#f8fafc;border-bottom:1px solid var(--border);font-size:.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;gap:1rem}
.diff-content{overflow-x:auto;max-height:520px;overflow-y:auto}
.diff-line{display:flex;font-family:'Cascadia Code','Fira Code','Courier New',monospace;font-size:.8rem;line-height:1.6;min-width:100%}
.diff-line.add{background:var(--add-bg)}
.diff-line.rem{background:var(--rem-bg)}
.diff-line.ctx{background:var(--ctx-bg)}
.diff-line.hunk{background:#ede9fe;color:#6d28d9}
.line-no{width:44px;flex-shrink:0;padding:.05rem .5rem;text-align:right;color:var(--muted);user-select:none;border-right:1px solid var(--border);font-size:.75rem;opacity:.7}
.line-sign{width:22px;flex-shrink:0;text-align:center;font-weight:700}
.line-add .line-sign{color:var(--add-fg)}
.line-rem .line-sign{color:var(--rem-fg)}
.line-text{padding:.05rem .5rem;white-space:pre;flex:1}
.no-diff{text-align:center;padding:2rem;color:var(--muted);font-size:.9rem}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>⇄ Text Diff</h1>
    <p>Compare two blocks of text and see what changed</p>
  </header>

  <div class="card">
    <div class="split">
      <div>
        <label>Original</label>
        <textarea id="textA" rows="14" placeholder="Paste original text here…"></textarea>
      </div>
      <div>
        <label>Modified</label>
        <textarea id="textB" rows="14" placeholder="Paste modified text here…"></textarea>
      </div>
    </div>
    <div class="toolbar">
      <button class="btn btn-primary" onclick="runDiff()">Compare</button>
      <button class="btn btn-ghost" onclick="clearAll()">Clear</button>
      <div class="stats" id="stats" style="display:none">
        <span class="stat-add" id="statAdd"></span>
        <span class="stat-rem" id="statRem"></span>
      </div>
    </div>
  </div>

  <div class="diff-box" id="diffBox">
    <div class="diff-header">
      Diff Output
      <span id="diffMode" style="margin-left:auto;display:flex;gap:.35rem">
        <button class="btn btn-ghost active" id="modeUnified" style="padding:.25rem .65rem;font-size:.75rem" onclick="setMode('unified')">Unified</button>
        <button class="btn btn-ghost" id="modeSplit" style="padding:.25rem .65rem;font-size:.75rem" onclick="setMode('split')">Split</button>
      </span>
    </div>
    <div class="diff-content" id="diffContent"></div>
  </div>
</div>

<script>
let lastDiff = null;
let mode = 'unified';

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') runDiff();
});

async function runDiff() {
  const a = document.getElementById('textA').value;
  const b = document.getElementById('textB').value;
  const res = await fetch('api/diff', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({a, b, mode: 'unified'})
  });
  const data = await res.json();
  if (data.error) { alert(data.error); return; }
  lastDiff = {a, b, lines: data.diff};
  renderDiff();
}

function setMode(m) {
  mode = m;
  document.getElementById('modeUnified').classList.toggle('active', m==='unified');
  document.getElementById('modeSplit').classList.toggle('active', m==='split');
  if (lastDiff) renderDiff();
}

function renderDiff() {
  const {lines} = lastDiff;
  const box = document.getElementById('diffBox');
  const content = document.getElementById('diffContent');

  let added = 0, removed = 0;
  let html = '';
  let lineNo = 0;

  if (!lines.length) {
    content.innerHTML = '<div class="no-diff">✓ No differences found — the texts are identical.</div>';
    box.classList.add('visible');
    document.getElementById('stats').style.display = 'none';
    return;
  }

  for (const line of lines) {
    const text = line.replace(/\n$/, '');
    if (text.startsWith('+++') || text.startsWith('---')) {
      html += `<div class="diff-line ctx"><span class="line-no"></span><span class="line-sign"></span><span class="line-text" style="color:var(--muted)">${esc(text)}</span></div>`;
    } else if (text.startsWith('@@')) {
      html += `<div class="diff-line hunk"><span class="line-no"></span><span class="line-sign"></span><span class="line-text">${esc(text)}</span></div>`;
    } else if (text.startsWith('+')) {
      added++;
      html += `<div class="diff-line add"><span class="line-no"></span><span class="line-sign" style="color:var(--add-fg)">+</span><span class="line-text">${esc(text.slice(1))}</span></div>`;
    } else if (text.startsWith('-')) {
      removed++;
      html += `<div class="diff-line rem"><span class="line-no"></span><span class="line-sign" style="color:var(--rem-fg)">−</span><span class="line-text">${esc(text.slice(1))}</span></div>`;
    } else {
      html += `<div class="diff-line ctx"><span class="line-no"></span><span class="line-sign"></span><span class="line-text">${esc(text.slice(1))}</span></div>`;
    }
  }

  content.innerHTML = html;
  box.classList.add('visible');

  const stats = document.getElementById('stats');
  stats.style.display = 'flex';
  document.getElementById('statAdd').textContent = `+${added} added`;
  document.getElementById('statRem').textContent = `−${removed} removed`;
}

function clearAll() {
  document.getElementById('textA').value = '';
  document.getElementById('textB').value = '';
  document.getElementById('diffBox').classList.remove('visible');
  document.getElementById('stats').style.display = 'none';
  lastDiff = null;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
