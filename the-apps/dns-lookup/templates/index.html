<body>
<header>
  <h1>DNS Lookup</h1>
  <p>Query DNS records for any domain</p>
</header>
<main>
  <div class="card">
    <div class="input-row">
      <input type="text" id="domainInput" placeholder="Enter domain (e.g. example.com)" onkeydown="if(event.key==='Enter')doLookup()">
      <button class="btn" onclick="doLookup()">Lookup</button>
      <button class="btn btn-all" onclick="lookupAll()">All Types</button>
    </div>
    <div class="type-tabs" id="typeTabs">
      <span class="type-tab active" data-type="A" onclick="selectType(this,'A')">A</span>
      <span class="type-tab" data-type="AAAA" onclick="selectType(this,'AAAA')">AAAA</span>
      <span class="type-tab" data-type="MX" onclick="selectType(this,'MX')">MX</span>
      <span class="type-tab" data-type="TXT" onclick="selectType(this,'TXT')">TXT</span>
      <span class="type-tab" data-type="CNAME" onclick="selectType(this,'CNAME')">CNAME</span>
      <span class="type-tab" data-type="NS" onclick="selectType(this,'NS')">NS</span>
      <span class="type-tab" data-type="SOA" onclick="selectType(this,'SOA')">SOA</span>
    </div>
    <div class="quick-row">
      <span class="quick-label">Quick test:</span>
      <button class="btn btn-outline" style="padding:.3rem .75rem;font-size:.8rem" onclick="quickTest('google.com')">google.com</button>
      <button class="btn btn-outline" style="padding:.3rem .75rem;font-size:.8rem" onclick="quickTest('github.com')">github.com</button>
      <button class="btn btn-outline" style="padding:.3rem .75rem;font-size:.8rem" onclick="quickTest('cloudflare.com')">cloudflare.com</button>
    </div>
  </div>

  <div class="card">
    <div id="resultsArea"><div style="color:#94a3b8;font-size:.875rem">Enter a domain and click Lookup to see DNS records.</div></div>
  </div>
</main>

<script>
  let selectedType = 'A';

  function selectType(el, type) {
    document.querySelectorAll('.type-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    selectedType = type;
  }

  async function doLookup() {
    const domain = document.getElementById('domainInput').value.trim();
    if (!domain) return;
    document.getElementById('resultsArea').innerHTML = '<div class="loading">Looking up ' + selectedType + ' records for ' + esc(domain) + '...</div>';
    try {
      const resp = await fetch('api/lookup', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ domain, type: selectedType }) });
      const data = await resp.json();
      renderSingleResult(data, selectedType);
    } catch(e) {
      document.getElementById('resultsArea').innerHTML = `<div class="error-msg">Error: ${e.message}</div>`;
    }
  }

  function renderSingleResult(data, type) {
    if (data.error) { document.getElementById('resultsArea').innerHTML = `<div class="error-msg">${esc(data.error)}</div>`; return; }
    document.getElementById('resultsArea').innerHTML = renderGroup(data, type);
  }

  function renderGroup(data, type) {
    if (data.error) return `<div class="error-msg">${esc(data.error)}</div>`;
    let html = `<div class="result-group">`;
    html += `<div class="result-group-title"><span class="badge">${type}</span> ${esc(data.domain)}</div>`;
    if (data.note && !data.records.length) {
      html += `<div class="empty-note">${esc(data.note)}</div>`;
    } else if (!data.records || !data.records.length) {
      html += `<div class="empty-note">No records found.</div>`;
    } else {
      html += `<table><thead><tr><th>Type</th><th>Value</th><th>TTL</th></tr></thead><tbody>`;
      data.records.forEach(r => {
        html += `<tr><td><span class="badge">${type}</span></td><td>${esc(r.value)}</td><td>${r.ttl}s</td></tr>`;
      });
      html += `</tbody></table>`;
    }
    html += `</div>`;
    return html;
  }

  async function lookupAll() {
    const domain = document.getElementById('domainInput').value.trim();
    if (!domain) return;
    const types = ['A', 'AAAA', 'MX', 'TXT', 'CNAME', 'NS', 'SOA'];
    document.getElementById('resultsArea').innerHTML = '<div class="loading">Querying all record types for ' + esc(domain) + '...</div>';
    const results = [];
    for (const t of types) {
      try {
        const resp = await fetch('api/lookup', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ domain, type: t }) });
        const data = await resp.json();
        results.push({ type: t, data });
      } catch(e) {
        results.push({ type: t, data: { error: e.message } });
      }
    }
    let html = '';
    results.forEach(r => { html += renderGroup(r.data, r.type); });
    document.getElementById('resultsArea').innerHTML = html || '<div class="empty-note">No records found.</div>';
  }

  function quickTest(domain) {
    document.getElementById('domainInput').value = domain;
    doLookup();
  }

  function esc(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
