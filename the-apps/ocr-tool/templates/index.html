<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCR Tool</title>
<style>
:root { --primary: #7c3aed; --primary-h: #6d28d9; --bg: #f1f5f9; --card: #ffffff; --border: #e2e8f0; --text: #1e293b; --muted: #64748b; --success-bg: #f0fdf4; --success-fg: #16a34a; --error-bg: #fef2f2; --error-fg: #dc2626; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem 4rem; }
.container { max-width: 860px; margin: 0 auto; }
header { text-align: center; margin-bottom: 2rem; }
header h1 { font-size: 2rem; font-weight: 800; }
header p { color: var(--muted); margin-top: 0.4rem; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 1rem; padding: 1.75rem; margin-bottom: 1.25rem; }
.btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.6rem 1.25rem; border-radius: 0.5rem; border: none; font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: background 0.15s; font-family: inherit; }
.btn-primary { background: var(--primary); color: #fff; } .btn-primary:hover { background: var(--primary-h); }
.btn-ghost { background: var(--bg); color: var(--text); border: 1px solid var(--border); } .btn-ghost:hover { background: var(--border); }
label { display: block; font-size: 0.78rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.35rem; }
input[type=text], select, textarea { width: 100%; padding: 0.55rem 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem; font-size: 0.9rem; background: #fff; color: var(--text); outline: none; font-family: inherit; }
input:focus, textarea:focus, select:focus { border-color: var(--primary); }
.status { padding: 0.65rem 1rem; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 500; margin-top: 0.75rem; }
.status.error { background: var(--error-bg); color: var(--error-fg); }
.status.success { background: var(--success-bg); color: var(--success-fg); }

.drop-zone {
  border: 2px dashed var(--border); border-radius: 0.75rem; padding: 2rem;
  text-align: center; cursor: pointer; transition: border-color 0.15s, background 0.15s; background: var(--bg);
}
.drop-zone.drag-over { border-color: var(--primary); background: #f5f3ff; }
.drop-zone svg { width: 40px; height: 40px; margin-bottom: 0.5rem; color: var(--muted); }
.drop-zone h3 { font-size: 0.95rem; font-weight: 600; }
.drop-zone p { color: var(--muted); font-size: 0.82rem; margin-top: 0.2rem; }

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; align-items: start; }
@media (max-width: 640px) { .two-col { grid-template-columns: 1fr; } }

.preview-img { max-width: 100%; max-height: 250px; border-radius: 0.5rem; display: block; margin-top: 0.75rem; border: 1px solid var(--border); }

.stats-row { display: flex; gap: 1rem; margin-top: 0.5rem; }
.stat-chip { background: var(--bg); border: 1px solid var(--border); border-radius: 0.375rem; padding: 0.35rem 0.65rem; font-size: 0.8rem; color: var(--muted); }
.stat-chip strong { color: var(--text); }

.result-toolbar { display: flex; gap: 0.5rem; margin-top: 0.75rem; flex-wrap: wrap; }

.install-note { background: #fef9c3; border: 1px solid #fde047; border-radius: 0.5rem; padding: 1rem; font-size: 0.875rem; color: #713f12; margin-top: 0.75rem; }
.install-note code { background: rgba(0,0,0,0.08); padding: 0.1rem 0.3rem; border-radius: 0.25rem; font-family: monospace; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>OCR Tool</h1>
    <p>Extract text from images — no system dependencies required.</p>
  </header>

  <div class="card">
    <div class="drop-zone" id="dropZone">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/>
      </svg>
      <h3>Drop image here or click to browse</h3>
      <p>PNG, JPG, TIFF, BMP, WebP supported</p>
      <input type="file" id="fileInput" accept=".png,.jpg,.jpeg,.tiff,.tif,.bmp,.webp,image/*" style="display:none">
    </div>

    <div id="previewSection" style="display:none; margin-top:0.75rem">
      <div class="two-col">
        <div>
          <label>Image Preview</label>
          <img class="preview-img" id="previewImg" src="" alt="Preview">
        </div>
        <div>
          <div style="margin-bottom:1rem">
            <label>OCR Language</label>
            <select id="langSelect">
              <option value="eng">English</option>
              <option value="spa">Spanish</option>
              <option value="fra">French</option>
              <option value="deu">German</option>
              <option value="chi_sim">Chinese (Simplified)</option>
              <option value="jpn">Japanese</option>
              <option value="por">Portuguese</option>
              <option value="ita">Italian</option>
              <option value="ara">Arabic</option>
            </select>
          </div>
          <button class="btn btn-primary" id="extractBtn" style="width:100%">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 15.75l-2.489-2.489m0 0a3.375 3.375 0 10-4.773-4.773 3.375 3.375 0 004.774 4.774zM21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            Extract Text
          </button>
          <p style="font-size:0.78rem; color:var(--muted); margin-top:0.5rem">Models download automatically on first use.</p>
        </div>
      </div>
    </div>
    <div id="statusMsg"></div>
  </div>

  <div class="card" id="resultCard" style="display:none">
    <label>Extracted Text</label>
    <textarea id="resultText" rows="12" readonly style="font-family:monospace; font-size:0.85rem; resize:vertical"></textarea>
    <div class="stats-row">
      <div class="stat-chip">Words: <strong id="wordCount">0</strong></div>
      <div class="stat-chip">Characters: <strong id="charCount">0</strong></div>
    </div>
    <div class="result-toolbar">
      <button class="btn btn-ghost" id="copyBtn">Copy Text</button>
      <button class="btn btn-ghost" id="downloadBtn">Download .txt</button>
      <button class="btn btn-ghost" id="clearBtn">Clear</button>
    </div>
  </div>
</div>

<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const previewSection = document.getElementById('previewSection');
const previewImg = document.getElementById('previewImg');
const statusMsg = document.getElementById('statusMsg');
const resultCard = document.getElementById('resultCard');
let selectedFile = null;

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f) loadFile(f);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });

function loadFile(f) {
  selectedFile = f;
  const reader = new FileReader();
  reader.onload = e => { previewImg.src = e.target.result; };
  reader.readAsDataURL(f);
  previewSection.style.display = 'block';
  resultCard.style.display = 'none';
  statusMsg.innerHTML = '';
}

document.getElementById('extractBtn').addEventListener('click', async () => {
  if (!selectedFile) return;
  const btn = document.getElementById('extractBtn');
  btn.disabled = true; btn.textContent = 'Extracting…';
  statusMsg.innerHTML = '';
  const fd = new FormData();
  fd.append('file', selectedFile);
  fd.append('lang', document.getElementById('langSelect').value);
  try {
    const resp = await fetch('api/extract', { method: 'POST', body: fd });
    const data = await resp.json();
    if (!resp.ok || data.error) {
      statusMsg.innerHTML = `<div class="status error">${data.error || 'Extraction failed'}</div>`;
      return;
    }
    document.getElementById('resultText').value = data.text;
    document.getElementById('wordCount').textContent = data.word_count;
    document.getElementById('charCount').textContent = data.char_count;
    resultCard.style.display = 'block';
    statusMsg.innerHTML = '<div class="status success">Text extracted successfully!</div>';
  } catch (err) {
    statusMsg.innerHTML = `<div class="status error">${err.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 15.75l-2.489-2.489m0 0a3.375 3.375 0 10-4.773-4.773 3.375 3.375 0 004.774 4.774zM21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg> Extract Text';
  }
});

document.getElementById('copyBtn').addEventListener('click', () => {
  const text = document.getElementById('resultText').value;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy Text', 1500);
  });
});

document.getElementById('downloadBtn').addEventListener('click', () => {
  const text = document.getElementById('resultText').value;
  const blob = new Blob([text], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'extracted_text.txt'; a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('clearBtn').addEventListener('click', () => {
  resultCard.style.display = 'none';
  previewSection.style.display = 'none';
  selectedFile = null;
  statusMsg.innerHTML = '';
  fileInput.value = '';
});
</script>
</body>
</html>
