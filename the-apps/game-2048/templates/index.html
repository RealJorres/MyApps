<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --board: #0f3460;
    --text: #eee;
    --primary: #d97706; --brand: var(--primary);
    --primary-d: #b45309;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; flex-direction: column; align-items: center; padding: 1.5rem 1rem; }
  .game-header {
    width: 100%;
    max-width: 480px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }
  h1 {
    font-size: 2.8rem;
    font-weight: 900;
    color: var(--primary);
    letter-spacing: -1px;
  }
  .scores-wrap {
    display: flex;
    gap: 0.75rem;
  }
  .score-box {
    background: var(--board);
    border-radius: 8px;
    padding: 0.4rem 0.8rem;
    text-align: center;
    min-width: 70px;
  }
  .score-box .score-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #aaa;
  }
  .score-box .score-val {
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--text);
  }
  .controls {
    width: 100%;
    max-width: 480px;
    display: flex;
    gap: 0.6rem;
    margin-bottom: 1rem;
    justify-content: flex-end;
  }
  .btn { background: var(--primary); color: #fff; }
  .btn:hover { background: var(--primary-d); }
  .btn:active { transform: scale(0.97); }
  .btn-secondary {
    background: var(--board);
    color: #aaa;
  }
  .btn-secondary:hover { background: #1a3a60; color: var(--text); }

  .board-container {
    position: relative;
    width: 100%;
    max-width: 480px;
  }
  .board {
    background: var(--board);
    border-radius: 12px;
    padding: 10px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    width: 100%;
    aspect-ratio: 1;
  }
  .cell {
    background: rgba(255,255,255,0.07);
    border-radius: 8px;
  }
  .tile-container {
    position: absolute;
    top: 10px;
    left: 10px;
    right: 10px;
    bottom: 10px;
    pointer-events: none;
  }
  .tile {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    border-radius: 8px;
    transition: top 0.1s ease, left 0.1s ease, transform 0.1s ease;
    user-select: none;
  }
  .tile.new-tile {
    animation: pop-in 0.15s ease forwards;
  }
  .tile.merge-tile {
    animation: merge-pop 0.15s ease forwards;
  }
  @keyframes pop-in {
    0% { transform: scale(0); }
    60% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }
  @keyframes merge-pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  .overlay {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(15, 52, 96, 0.88);
    border-radius: 12px;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.8rem;
    z-index: 10;
    backdrop-filter: blur(3px);
  }
  .overlay.active { display: flex; }
  .overlay h2 {
    font-size: 2rem;
    font-weight: 900;
    color: var(--primary);
  }
  .overlay p {
    color: #ccc;
    font-size: 1rem;
  }
  .overlay .btn-row {
    display: flex;
    gap: 0.75rem;
    margin-top: 0.25rem;
  }
  .hint {
    margin-top: 1rem;
    color: #555;
    font-size: 0.8rem;
    text-align: center;
  }
  @media (max-width: 600px) {
    body { overflow-x: hidden; }
    .overlay .btn-row { flex-wrap: wrap; }
  }
</style>

<body>
<div class="game-header">
  <h1>2048</h1>
  <div class="scores-wrap">
    <div class="score-box">
      <div class="score-label">Score</div>
      <div class="score-val" id="score">0</div>
    </div>
    <div class="score-box">
      <div class="score-label">Best</div>
      <div class="score-val" id="best-score">0</div>
    </div>
  </div>
</div>

<div class="controls">
  <button class="btn btn-secondary" id="undo-btn" onclick="undoMove()">Undo</button>
  <button class="btn" onclick="newGame()">New Game</button>
</div>

<div class="board-container" id="board-container">
  <div class="board" id="board">
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
  </div>
  <div class="tile-container" id="tile-container"></div>
  <div class="overlay" id="win-overlay">
    <h2>You Win!</h2>
    <p id="win-score-msg">You reached 2048!</p>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="continueGame()">Continue</button>
      <button class="btn" onclick="newGame()">New Game</button>
    </div>
  </div>
  <div class="overlay" id="gameover-overlay">
    <h2>Game Over</h2>
    <p id="gameover-score-msg">Score: 0</p>
    <div class="btn-row">
      <button class="btn" onclick="newGame()">New Game</button>
    </div>
  </div>
</div>

<p class="hint">Arrow keys / WASD to move &nbsp;|&nbsp; Swipe on mobile</p>

<script>
  const SIZE = 4;
  let board = [];
  let score = 0;
  let bestScore = parseInt(localStorage.getItem('2048_best') || '0');
  let won = false;
  let keepPlaying = false;
  let prevBoard = null;
  let prevScore = 0;
  let cellSize = 0;
  let gap = 10;

  function newGame() {
    board = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
    score = 0;
    won = false;
    keepPlaying = false;
    prevBoard = null;
    prevScore = 0;
    document.getElementById('win-overlay').classList.remove('active');
    document.getElementById('gameover-overlay').classList.remove('active');
    document.getElementById('undo-btn').style.opacity = '0.4';
    updateScoreDisplay();
    addRandom(board);
    addRandom(board);
    renderTiles(true);
    saveGame();
  }

  function addRandom(b) {
    const empties = [];
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (b[r][c] === 0) empties.push([r, c]);
    if (empties.length === 0) return false;
    const [r, c] = empties[Math.floor(Math.random() * empties.length)];
    b[r][c] = Math.random() < 0.9 ? 2 : 4;
    return [r, c];
  }

  function cloneBoard(b) {
    return b.map(row => [...row]);
  }

  function slide(row) {
    let filtered = row.filter(v => v !== 0);
    let merged = [];
    let mergeScore = 0;
    let i = 0;
    while (i < filtered.length) {
      if (i + 1 < filtered.length && filtered[i] === filtered[i + 1]) {
        merged.push(filtered[i] * 2);
        mergeScore += filtered[i] * 2;
        i += 2;
      } else {
        merged.push(filtered[i]);
        i++;
      }
    }
    while (merged.length < SIZE) merged.push(0);
    return { row: merged, score: mergeScore };
  }

  function move(dir) {
    let moved = false;
    let totalScore = 0;
    let newBoard = cloneBoard(board);

    if (dir === 'left') {
      for (let r = 0; r < SIZE; r++) {
        const { row, score: s } = slide(newBoard[r]);
        if (row.join() !== newBoard[r].join()) moved = true;
        newBoard[r] = row;
        totalScore += s;
      }
    } else if (dir === 'right') {
      for (let r = 0; r < SIZE; r++) {
        const rev = [...newBoard[r]].reverse();
        const { row, score: s } = slide(rev);
        const result = [...row].reverse();
        if (result.join() !== newBoard[r].join()) moved = true;
        newBoard[r] = result;
        totalScore += s;
      }
    } else if (dir === 'up') {
      for (let c = 0; c < SIZE; c++) {
        const col = newBoard.map(r => r[c]);
        const { row, score: s } = slide(col);
        if (row.join() !== col.join()) moved = true;
        for (let r = 0; r < SIZE; r++) newBoard[r][c] = row[r];
        totalScore += s;
      }
    } else if (dir === 'down') {
      for (let c = 0; c < SIZE; c++) {
        const col = newBoard.map(r => r[c]).reverse();
        const { row, score: s } = slide(col);
        const result = [...row].reverse();
        const orig = newBoard.map(r => r[c]);
        if (result.join() !== orig.join()) moved = true;
        for (let r = 0; r < SIZE; r++) newBoard[r][c] = result[r];
        totalScore += s;
      }
    }

    if (!moved) return;

    prevBoard = cloneBoard(board);
    prevScore = score;
    board = newBoard;
    score += totalScore;
    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem('2048_best', bestScore);
    }
    updateScoreDisplay();

    const newPos = addRandom(board);
    renderTiles(false, newPos);

    document.getElementById('undo-btn').style.opacity = '1';

    if (!won && !keepPlaying && hasWon()) {
      won = true;
      document.getElementById('win-score-msg').textContent = 'Score: ' + score;
      setTimeout(() => document.getElementById('win-overlay').classList.add('active'), 200);
    } else if (isGameOver()) {
      document.getElementById('gameover-score-msg').textContent = 'Final Score: ' + score;
      setTimeout(() => document.getElementById('gameover-overlay').classList.add('active'), 200);
    }

    saveGame();
  }

  function hasWon() {
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (board[r][c] >= 2048) return true;
    return false;
  }

  function isGameOver() {
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++) {
        if (board[r][c] === 0) return false;
        if (c + 1 < SIZE && board[r][c] === board[r][c + 1]) return false;
        if (r + 1 < SIZE && board[r][c] === board[r + 1][c]) return false;
      }
    return true;
  }

  function undoMove() {
    if (!prevBoard) return;
    board = cloneBoard(prevBoard);
    score = prevScore;
    prevBoard = null;
    updateScoreDisplay();
    renderTiles(false);
    document.getElementById('undo-btn').style.opacity = '0.4';
    document.getElementById('gameover-overlay').classList.remove('active');
    saveGame();
  }

  function continueGame() {
    keepPlaying = true;
    document.getElementById('win-overlay').classList.remove('active');
  }

  function updateScoreDisplay() {
    document.getElementById('score').textContent = score;
    document.getElementById('best-score').textContent = bestScore;
  }

  function getTileColors(val) {
    const map = {
      2:    { bg: '#eee4da', color: '#776e65' },
      4:    { bg: '#ede0c8', color: '#776e65' },
      8:    { bg: '#f2b179', color: '#fff' },
      16:   { bg: '#f59563', color: '#fff' },
      32:   { bg: '#f67c5f', color: '#fff' },
      64:   { bg: '#f65e3b', color: '#fff' },
      128:  { bg: '#edcf72', color: '#fff' },
      256:  { bg: '#edcc61', color: '#fff' },
      512:  { bg: '#9bc53d', color: '#fff' },
      1024: { bg: '#3da35d', color: '#fff' },
      2048: { bg: '#00c853', color: '#fff' },
    };
    if (map[val]) return map[val];
    return { bg: '#9b59b6', color: '#fff' };
  }

  function getFontSize(val) {
    if (val < 100) return '2rem';
    if (val < 1000) return '1.6rem';
    if (val < 10000) return '1.2rem';
    return '0.9rem';
  }

  function getCellPos(r, c) {
    const container = document.getElementById('tile-container');
    const w = container.offsetWidth;
    const cs = (w - gap * (SIZE - 1)) / SIZE;
    const x = c * (cs + gap);
    const y = r * (cs + gap);
    return { x, y, cs };
  }

  function renderTiles(isNew, newPos) {
    const container = document.getElementById('tile-container');
    container.innerHTML = '';
    const w = container.offsetWidth;
    const cs = (w - gap * (SIZE - 1)) / SIZE;

    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        const val = board[r][c];
        if (val === 0) continue;
        const x = c * (cs + gap);
        const y = r * (cs + gap);
        const tile = document.createElement('div');
        tile.className = 'tile';
        const colors = getTileColors(val);
        tile.style.cssText = `
          width: ${cs}px;
          height: ${cs}px;
          top: ${y}px;
          left: ${x}px;
          background: ${colors.bg};
          color: ${colors.color};
          font-size: ${getFontSize(val)};
        `;
        tile.textContent = val;
        if (isNew) {
          tile.classList.add('new-tile');
        } else if (newPos && newPos[0] === r && newPos[1] === c) {
          tile.classList.add('new-tile');
        }
        container.appendChild(tile);
      }
    }
  }

  function saveGame() {
    localStorage.setItem('2048_board', JSON.stringify(board));
    localStorage.setItem('2048_score', score);
  }

  function loadGame() {
    const savedBoard = localStorage.getItem('2048_board');
    const savedScore = localStorage.getItem('2048_score');
    if (savedBoard) {
      board = JSON.parse(savedBoard);
      score = parseInt(savedScore || '0');
      bestScore = parseInt(localStorage.getItem('2048_best') || '0');
      updateScoreDisplay();
      renderTiles(false);
      return true;
    }
    return false;
  }

  document.addEventListener('keydown', (e) => {
    const map = {
      ArrowLeft: 'left', ArrowRight: 'right', ArrowUp: 'up', ArrowDown: 'down',
      a: 'left', A: 'left', d: 'right', D: 'right',
      w: 'up', W: 'up', s: 'down', S: 'down'
    };
    if (map[e.key]) {
      e.preventDefault();
      move(map[e.key]);
    }
  });

  let touchStartX = 0, touchStartY = 0;
  document.getElementById('board-container').addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  document.getElementById('board-container').addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    const absDx = Math.abs(dx), absDy = Math.abs(dy);
    if (Math.max(absDx, absDy) < 20) return;
    if (absDx > absDy) {
      move(dx > 0 ? 'right' : 'left');
    } else {
      move(dy > 0 ? 'down' : 'up');
    }
  }, { passive: true });

  window.addEventListener('resize', () => renderTiles(false));

  if (!loadGame()) {
    newGame();
  } else {
    document.getElementById('undo-btn').style.opacity = '0.4';
  }

  setTimeout(() => renderTiles(false), 50);
</script>
