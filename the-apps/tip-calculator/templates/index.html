<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tip Calculator</title>
<style>
:root {
  --primary: #059669; --primary-h: #047857;
  --bg: #f1f5f9; --card: #ffffff; --border: #e2e8f0;
  --text: #1e293b; --muted: #64748b;
  --success-bg: #f0fdf4; --success-fg: #16a34a;
  --error-bg: #fef2f2; --error-fg: #dc2626;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem 4rem; }
.container { max-width: 560px; margin: 0 auto; }
header { text-align: center; margin-bottom: 2rem; }
header h1 { font-size: 2rem; font-weight: 800; color: var(--primary); }
header p { color: var(--muted); margin-top: 0.4rem; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 1rem; padding: 1.75rem; margin-bottom: 1.25rem; }
.btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.6rem 1.25rem; border-radius: 0.5rem; border: none; font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: background 0.15s; font-family: inherit; }
.btn-primary { background: var(--primary); color: #fff; } .btn-primary:hover { background: var(--primary-h); }
.btn-ghost { background: var(--bg); color: var(--text); border: 1px solid var(--border); } .btn-ghost:hover { background: var(--border); }
label { display: block; font-size: 0.78rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.35rem; }
input[type=number], input[type=text] { width: 100%; padding: 0.55rem 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem; font-size: 0.9rem; background: #fff; color: var(--text); outline: none; font-family: inherit; }
input:focus { border-color: var(--primary); }
.section-title { font-size: 0.85rem; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 2px solid var(--border); }
.tip-btns { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.75rem; }
.tip-btn { padding: 0.45rem 1rem; border-radius: 0.4rem; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 0.875rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.15s; }
.tip-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
.tip-btn:hover:not(.active) { background: var(--border); }
.custom-tip { display: none; margin-top: 0.4rem; }
.custom-tip.show { display: block; }
.form-row { margin-bottom: 1rem; }
.results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
.result-card { background: var(--bg); border: 1px solid var(--border); border-radius: 0.5rem; padding: 1rem; text-align: center; }
.result-card.highlight { background: var(--primary); border-color: var(--primary-h); }
.result-card.highlight .result-label { color: rgba(255,255,255,0.8); }
.result-card.highlight .result-value { color: white; }
.result-label { font-size: 0.72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; margin-bottom: 0.4rem; }
.result-value { font-size: 1.6rem; font-weight: 800; color: var(--primary); }
.toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 0; border-top: 1px solid var(--border); margin-top: 0.5rem; }
.toggle-label { font-size: 0.875rem; font-weight: 600; }
.toggle-switch { position: relative; display: inline-block; width: 42px; height: 24px; }
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #cbd5e1; border-radius: 24px; transition: 0.2s; }
.slider:before { position: absolute; content: ''; height: 18px; width: 18px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.2s; }
input:checked + .slider { background: var(--primary); }
input:checked + .slider:before { transform: translateX(18px); }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Tip Calculator</h1>
    <p>Split the bill with ease</p>
  </header>

  <div class="card">
    <div class="section-title">Bill Details</div>
    <div class="form-row">
      <label>Bill Amount ($)</label>
      <input type="number" id="billAmount" value="75.00" min="0" step="0.01" oninput="calculate()">
    </div>
    <div class="form-row">
      <label>Tip Percentage</label>
      <div class="tip-btns">
        <button class="tip-btn" onclick="selectTip(10)">10%</button>
        <button class="tip-btn" onclick="selectTip(15)">15%</button>
        <button class="tip-btn active" onclick="selectTip(18)">18%</button>
        <button class="tip-btn" onclick="selectTip(20)">20%</button>
        <button class="tip-btn" onclick="selectTip(25)">25%</button>
        <button class="tip-btn" id="customBtn" onclick="selectCustom()">Custom</button>
      </div>
      <div class="custom-tip" id="customTip">
        <input type="number" id="customPct" value="" min="0" max="200" step="0.5" placeholder="Enter tip %" oninput="calculate()">
      </div>
    </div>
    <div class="form-row">
      <label>Number of People</label>
      <input type="number" id="numPeople" value="2" min="1" step="1" oninput="calculate()">
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Round up per person</span>
      <label class="toggle-switch">
        <input type="checkbox" id="roundUp" onchange="calculate()">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="card">
    <div class="section-title">Results</div>
    <div class="results-grid">
      <div class="result-card">
        <div class="result-label">Tip Amount</div>
        <div class="result-value" id="tipAmount">—</div>
      </div>
      <div class="result-card">
        <div class="result-label">Total Bill</div>
        <div class="result-value" id="totalBill">—</div>
      </div>
      <div class="result-card">
        <div class="result-label">Per Person (tip)</div>
        <div class="result-value" id="perTip">—</div>
      </div>
      <div class="result-card highlight">
        <div class="result-label">Per Person (total)</div>
        <div class="result-value" id="perTotal">—</div>
      </div>
    </div>
  </div>
</div>

<script>
let selectedTip = 18;
let isCustom = false;

function selectTip(pct) {
  selectedTip = pct;
  isCustom = false;
  document.querySelectorAll('.tip-btn').forEach(b => b.classList.remove('active'));
  const btns = document.querySelectorAll('.tip-btn');
  const tipMap = [10, 15, 18, 20, 25];
  const idx = tipMap.indexOf(pct);
  if (idx >= 0) btns[idx].classList.add('active');
  document.getElementById('customTip').classList.remove('show');
  calculate();
}

function selectCustom() {
  isCustom = true;
  document.querySelectorAll('.tip-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('customBtn').classList.add('active');
  document.getElementById('customTip').classList.add('show');
  document.getElementById('customPct').focus();
  calculate();
}

function getTipPct() {
  if (isCustom) return parseFloat(document.getElementById('customPct').value) || 0;
  return selectedTip;
}

function fmt(n) { return '$' + n.toFixed(2); }

function calculate() {
  const bill = parseFloat(document.getElementById('billAmount').value) || 0;
  const tipPct = getTipPct();
  const people = Math.max(1, parseInt(document.getElementById('numPeople').value) || 1);
  const roundUp = document.getElementById('roundUp').checked;

  const tip = bill * tipPct / 100;
  const total = bill + tip;
  let perTip = tip / people;
  let perTotal = total / people;

  if (roundUp) { perTotal = Math.ceil(perTotal); perTip = perTotal - (bill / people); }

  document.getElementById('tipAmount').textContent = fmt(tip);
  document.getElementById('totalBill').textContent = fmt(total);
  document.getElementById('perTip').textContent = fmt(perTip);
  document.getElementById('perTotal').textContent = fmt(perTotal);
}

// Init
document.querySelectorAll('.tip-btn')[2].classList.add('active');
calculate();
</script>
</body>
</html>
