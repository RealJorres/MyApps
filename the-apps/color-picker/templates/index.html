<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Pick any color and get its HEX, RGB, HSL, and CMYK values instantly. A must-have tool for designers.">
<meta name="keywords" content="color picker, color code, HEX color, RGB color, HSL color">
<meta name="author" content="Jorres Apps">
<meta property="og:title" content="Color Picker">
<meta property="og:description" content="Pick any color and get its HEX, RGB, HSL, and CMYK values instantly. A must-have tool for designers.">

<meta property="og:image" content="https://jorresapps.onrender.com/static/preview.png">

<meta property="og:image:height" content="630">

<meta name="twitter:card" content="summary">

<meta name="twitter:description" content="Pick any color and get its HEX, RGB, HSL, and CMYK values instantly. A must-have tool for designers.">
<title>Color Picker</title>
<style>
:root {
  --primary: #7c3aed; --primary-h: #6d28d9;
  --bg: #f1f5f9; --card: #ffffff; --border: #e2e8f0;
  --text: #1e293b; --muted: #64748b;
  --success-bg: #f0fdf4; --success-fg: #16a34a;
  --error-bg: #fef2f2; --error-fg: #dc2626;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem 4rem; }
.container { max-width: 860px; margin: 0 auto; }
header { text-align: center; margin-bottom: 2rem; }
header h1 { font-size: 2rem; font-weight: 800; }
header p { color: var(--muted); margin-top: 0.4rem; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 1rem; padding: 1.75rem; margin-bottom: 1.25rem; }
.btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.6rem 1.25rem; border-radius: 0.5rem; border: none; font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: background 0.15s; font-family: inherit; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-h); }
.btn-ghost { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--border); }
label { display: block; font-size: 0.78rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.35rem; }
input[type=text], input[type=number], textarea, select { width: 100%; padding: 0.55rem 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem; font-size: 0.9rem; background: #fff; color: var(--text); outline: none; font-family: inherit; }
input:focus, textarea:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 15%, transparent); }
.status { margin-top: 0.75rem; padding: 0.65rem 1rem; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 500; }
.status.error { background: var(--error-bg); color: var(--error-fg); }
.status.success { background: var(--success-bg); color: var(--success-fg); }

/* App-specific */
.picker-row {
  display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap;
}
input[type=color] {
  width: 96px; height: 96px; border: none; border-radius: 0.75rem;
  cursor: pointer; padding: 0; background: none; flex-shrink: 0;
}
input[type=color]::-webkit-color-swatch-wrapper { padding: 0; }
input[type=color]::-webkit-color-swatch { border: none; border-radius: 0.75rem; }
.hex-input-wrap { flex: 1; min-width: 140px; }
.hex-input-wrap input { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.05em; font-family: monospace; }

.values-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-top: 0.5rem; }
.value-box { background: var(--bg); border-radius: 0.65rem; padding: 0.9rem 1rem; display: flex; flex-direction: column; gap: 0.4rem; }
.value-box .val-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
.value-box .val-text { font-family: monospace; font-size: 0.95rem; font-weight: 600; word-break: break-all; }
.value-box .copy-btn { align-self: flex-start; margin-top: 0.25rem; padding: 0.3rem 0.75rem; font-size: 0.75rem; }

.swatches-section h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 1rem; }
.swatch-group { margin-bottom: 1rem; }
.swatch-group-label { font-size: 0.75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
.swatch-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }
.swatch { width: 56px; height: 56px; border-radius: 0.5rem; cursor: pointer; border: 2px solid transparent; transition: transform 0.1s, border-color 0.1s; position: relative; }
.swatch:hover { transform: scale(1.1); border-color: var(--text); }
.swatch .swatch-hex { position: absolute; bottom: -1.4rem; left: 50%; transform: translateX(-50%); font-size: 0.6rem; font-family: monospace; color: var(--muted); white-space: nowrap; }
.swatch-wrap { display: flex; flex-direction: column; align-items: center; margin-bottom: 1.5rem; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Color Picker</h1>
    <p>Pick, convert, and explore tints & shades</p>
  </header>

  <div class="card">
    <div class="picker-row">
      <input type="color" id="colorInput" value="#7c3aed">
      <div class="hex-input-wrap">
        <label for="hexText">Hex Value</label>
        <input type="text" id="hexText" value="#7c3aed" maxlength="7" spellcheck="false">
      </div>
    </div>
  </div>

  <div class="card">
    <label style="margin-bottom:1rem;">Color Values</label>
    <div class="values-grid">
      <div class="value-box">
        <span class="val-label">HEX</span>
        <span class="val-text" id="valHex">#7c3aed</span>
        <button class="btn btn-ghost copy-btn" onclick="copyVal('valHex')">Copy</button>
      </div>
      <div class="value-box">
        <span class="val-label">RGB</span>
        <span class="val-text" id="valRgb">rgb(124, 58, 237)</span>
        <button class="btn btn-ghost copy-btn" onclick="copyVal('valRgb')">Copy</button>
      </div>
      <div class="value-box">
        <span class="val-label">HSL</span>
        <span class="val-text" id="valHsl">hsl(262, 83%, 58%)</span>
        <button class="btn btn-ghost copy-btn" onclick="copyVal('valHsl')">Copy</button>
      </div>
      <div class="value-box">
        <span class="val-label">CSS Variable</span>
        <span class="val-text" id="valCss">--color: #7c3aed;</span>
        <button class="btn btn-ghost copy-btn" onclick="copyVal('valCss')">Copy</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="swatches-section">
      <h3>Tints &amp; Shades</h3>
      <p style="font-size:0.82rem;color:var(--muted);margin-bottom:1.25rem;">Click any swatch to set it as the current color</p>
      <div class="swatch-group">
        <div class="swatch-group-label">Tints (toward white)</div>
        <div class="swatch-row" id="tintsRow"></div>
      </div>
      <div class="swatch-group" style="margin-top:1.5rem;">
        <div class="swatch-group-label">Shades (toward black)</div>
        <div class="swatch-row" id="shadesRow"></div>
      </div>
    </div>
  </div>
</div>

<div id="copyToast" style="position:fixed;bottom:2rem;right:2rem;background:#1e293b;color:#fff;padding:0.6rem 1.2rem;border-radius:0.5rem;font-size:0.85rem;font-weight:600;opacity:0;transition:opacity 0.2s;pointer-events:none;">Copied!</div>

<script>
const colorInput = document.getElementById('colorInput');
const hexText = document.getElementById('hexText');

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}
function rgbToHsl(r,g,b) {
  r/=255; g/=255; b/=255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;
  if(max===min){h=s=0;}
  else{
    const d=max-min;
    s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){
      case r: h=((g-b)/d+(g<b?6:0))/6; break;
      case g: h=((b-r)/d+2)/6; break;
      case b: h=((r-g)/d+4)/6; break;
    }
  }
  return {h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)};
}
function mixColor(hex, target, amount) {
  const {r,g,b} = hexToRgb(hex);
  const tr = target==='white'?255:0, tg = target==='white'?255:0, tb = target==='white'?255:0;
  const nr = Math.round(r + (tr-r)*amount);
  const ng = Math.round(g + (tg-g)*amount);
  const nb = Math.round(b + (tb-b)*amount);
  return '#'+[nr,ng,nb].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function updateAll(hex) {
  hex = hex.toLowerCase();
  const {r,g,b} = hexToRgb(hex);
  const {h,s,l} = rgbToHsl(r,g,b);
  document.getElementById('valHex').textContent = hex;
  document.getElementById('valRgb').textContent = `rgb(${r}, ${g}, ${b})`;
  document.getElementById('valHsl').textContent = `hsl(${h}, ${s}%, ${l}%)`;
  document.getElementById('valCss').textContent = `--color: ${hex};`;
  renderSwatches(hex);
}

function renderSwatches(hex) {
  const tintsRow = document.getElementById('tintsRow');
  const shadesRow = document.getElementById('shadesRow');
  tintsRow.innerHTML = '';
  shadesRow.innerHTML = '';
  [0.2,0.4,0.6,0.8,0.9].forEach(amt => {
    const c = mixColor(hex,'white',amt);
    tintsRow.appendChild(makeSwatch(c));
  });
  [0.2,0.4,0.6,0.8,0.9].forEach(amt => {
    const c = mixColor(hex,'black',amt);
    shadesRow.appendChild(makeSwatch(c));
  });
}

function makeSwatch(hex) {
  const wrap = document.createElement('div');
  wrap.className = 'swatch-wrap';
  const s = document.createElement('div');
  s.className = 'swatch';
  s.style.background = hex;
  s.title = hex;
  s.onclick = () => setColor(hex);
  const label = document.createElement('span');
  label.className = 'swatch-hex';
  label.textContent = hex;
  wrap.appendChild(s);
  wrap.appendChild(label);
  return wrap;
}

function setColor(hex) {
  colorInput.value = hex;
  hexText.value = hex;
  updateAll(hex);
}

colorInput.addEventListener('input', e => {
  const hex = e.target.value;
  hexText.value = hex;
  updateAll(hex);
});

hexText.addEventListener('input', e => {
  let val = e.target.value.trim();
  if(!val.startsWith('#')) val = '#'+val;
  if(/^#[0-9a-fA-F]{6}$/.test(val)) {
    colorInput.value = val;
    updateAll(val);
  }
});

function copyVal(id) {
  const text = document.getElementById(id).textContent;
  navigator.clipboard.writeText(text).then(() => showToast());
}

let toastTimer;
function showToast() {
  const t = document.getElementById('copyToast');
  t.style.opacity='1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.style.opacity='0',1500);
}

updateAll('#7c3aed');
</script>
</body>
</html>
