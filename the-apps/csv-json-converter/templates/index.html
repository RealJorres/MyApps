<body>
<header>
  <div>
    <h1>CSV ↔ JSON Converter</h1>
    <p>Convert between CSV and JSON formats instantly</p>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('csv2json')">CSV → JSON</div>
  <div class="tab" onclick="switchTab('json2csv')">JSON → CSV</div>
</div>

<!-- CSV to JSON -->
<div id="panel-csv2json" class="panel active">
  <div class="controls">
    <label for="c2j-delim">Delimiter:</label>
    <select id="c2j-delim" onchange="convert('csv2json')">
      <option value=",">Comma (,)</option>
      <option value=";">Semicolon (;)</option>
      <option value="&#9;">Tab (\t)</option>
      <option value="|">Pipe (|)</option>
    </select>
  </div>
  <div class="editor-row">
    <div class="editor-col">
      <div class="editor-label">CSV Input</div>
      <textarea id="c2j-input" placeholder="Paste CSV here..." oninput="convert('csv2json')">name,age,city
Alice,30,New York
Bob,25,London
Carol,35,Tokyo</textarea>
    </div>
    <div class="mid-col">
      <span class="arrow">→</span>
      <button class="btn btn-primary" onclick="convert('csv2json')">Convert</button>
    </div>
    <div class="editor-col">
      <div class="editor-label">JSON Output</div>
      <textarea id="c2j-output" readonly placeholder="JSON will appear here..."></textarea>
      <div class="info-bar">
        <span id="c2j-count" class="count-badge" style="display:none"></span>
        <div class="output-actions">
          <button class="btn btn-secondary btn-sm" onclick="copyOutput('c2j-output')">Copy</button>
          <button class="btn btn-secondary btn-sm" onclick="downloadOutput('c2j-output','output.json','application/json')">Download</button>
        </div>
      </div>
      <div id="c2j-error" class="error-box"></div>
    </div>
  </div>
</div>

<!-- JSON to CSV -->
<div id="panel-json2csv" class="panel">
  <div class="controls">
    <label for="j2c-delim">Delimiter:</label>
    <select id="j2c-delim" onchange="convert('json2csv')">
      <option value=",">Comma (,)</option>
      <option value=";">Semicolon (;)</option>
      <option value="&#9;">Tab (\t)</option>
      <option value="|">Pipe (|)</option>
    </select>
  </div>
  <div class="editor-row">
    <div class="editor-col">
      <div class="editor-label">JSON Input</div>
      <textarea id="j2c-input" placeholder="Paste JSON array here..." oninput="convert('json2csv')">[
  {"name": "Alice", "age": 30, "city": "New York"},
  {"name": "Bob", "age": 25, "city": "London"},
  {"name": "Carol", "age": 35, "city": "Tokyo"}
]</textarea>
    </div>
    <div class="mid-col">
      <span class="arrow">→</span>
      <button class="btn btn-primary" onclick="convert('json2csv')">Convert</button>
    </div>
    <div class="editor-col">
      <div class="editor-label">CSV Output</div>
      <textarea id="j2c-output" readonly placeholder="CSV will appear here..."></textarea>
      <div class="info-bar">
        <span id="j2c-count" class="count-badge" style="display:none"></span>
        <div class="output-actions">
          <button class="btn btn-secondary btn-sm" onclick="copyOutput('j2c-output')">Copy</button>
          <button class="btn btn-secondary btn-sm" onclick="downloadOutput('j2c-output','output.csv','text/csv')">Download</button>
        </div>
      </div>
      <div id="j2c-error" class="error-box"></div>
    </div>
  </div>
</div>

<script>
function switchTab(id) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['csv2json','json2csv'][i] === id));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
}

async function convert(mode) {
  if (mode === 'csv2json') {
    const text = document.getElementById('c2j-input').value;
    const delimiter = document.getElementById('c2j-delim').value;
    const errEl = document.getElementById('c2j-error');
    const countEl = document.getElementById('c2j-count');
    try {
      const r = await fetch('api/csv-to-json', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({text, delimiter}) });
      const data = await r.json();
      if (data.error) { errEl.textContent = data.error; errEl.classList.add('visible'); document.getElementById('c2j-output').value = ''; countEl.style.display='none'; return; }
      errEl.classList.remove('visible');
      document.getElementById('c2j-output').value = data.result;
      countEl.textContent = data.count + ' rows'; countEl.style.display='inline-block';
    } catch(e) { errEl.textContent = e.message; errEl.classList.add('visible'); }
  } else {
    const text = document.getElementById('j2c-input').value;
    const delimiter = document.getElementById('j2c-delim').value;
    const errEl = document.getElementById('j2c-error');
    const countEl = document.getElementById('j2c-count');
    try {
      const r = await fetch('api/json-to-csv', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({text, delimiter}) });
      const data = await r.json();
      if (data.error) { errEl.textContent = data.error; errEl.classList.add('visible'); document.getElementById('j2c-output').value = ''; countEl.style.display='none'; return; }
      errEl.classList.remove('visible');
      document.getElementById('j2c-output').value = data.result;
      countEl.textContent = data.count + ' rows'; countEl.style.display='inline-block';
    } catch(e) { errEl.textContent = e.message; errEl.classList.add('visible'); }
  }
}

function copyOutput(id) {
  const el = document.getElementById(id);
  if (!el.value) return;
  navigator.clipboard.writeText(el.value).then(() => { /* copied */ });
}

function downloadOutput(id, filename, mime) {
  const el = document.getElementById(id);
  if (!el.value) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([el.value], {type: mime}));
  a.download = filename; a.click();
}

// Auto-convert on load
convert('csv2json');
convert('json2csv');
</script>
