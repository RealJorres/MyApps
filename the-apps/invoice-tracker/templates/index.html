<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="canonical" href="https://jorresapps.onrender.com/invoice-tracker/">
<meta name="robots" content="index, follow">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='6' y='6' width='40' height='40' rx='12' fill='%233B82F6'/%3E%3Crect x='54' y='6' width='40' height='40' rx='12' fill='%238B5CF6'/%3E%3Crect x='6' y='54' width='40' height='40' rx='12' fill='%2310B981'/%3E%3Crect x='54' y='54' width='40' height='40' rx='12' fill='%23F97316'/%3E%3C/svg%3E">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Tracker</title>
<style>
:root{--primary:#0891b2;--bg:#f1f5f9;--card:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:2rem 1rem 4rem}
.container{max-width:960px;margin:0 auto}
header{text-align:center;margin-bottom:2rem}
header h1{font-size:2rem;font-weight:800}
header p{color:var(--muted);margin-top:.4rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:1rem;padding:1.5rem;margin-bottom:1.25rem}
label{display:block;font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.35rem}
input,select{padding:.5rem .7rem;border:1px solid var(--border);border-radius:.5rem;font-size:.875rem;background:#fff;color:var(--text);outline:none;font-family:inherit;width:100%}
input:focus,select:focus{border-color:var(--primary)}
.grid-form{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.75rem;align-items:end}
.btn{padding:.5rem 1.1rem;border:none;border-radius:.5rem;font-size:.875rem;font-weight:600;cursor:pointer}
.btn-primary{background:var(--primary);color:#fff}
.btn-danger{background:#dc2626;color:#fff}
.btn-sm{padding:.28rem .65rem;font-size:.78rem}
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:1rem;margin-bottom:1.25rem}
.stat{background:var(--card);border:1px solid var(--border);border-radius:.75rem;padding:1rem;text-align:center}
.stat .val{font-size:1.4rem;font-weight:800}
.stat .lbl{font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:.15rem}
.filter-row{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.75rem;align-items:center}
.filter-btn{padding:.35rem .85rem;border:1px solid var(--border);border-radius:2rem;font-size:.8rem;font-weight:600;cursor:pointer;background:#fff;color:var(--muted)}
.filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
table{width:100%;border-collapse:collapse;font-size:.875rem}
th{padding:.5rem .75rem;text-align:left;font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;border-bottom:2px solid var(--border);cursor:pointer;white-space:nowrap}
th:hover{color:var(--primary)}
td{padding:.6rem .75rem;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover td{background:#f8fafc}
.badge{display:inline-block;padding:.18rem .6rem;border-radius:2rem;font-size:.72rem;font-weight:700}
.badge-paid{background:#d1fae5;color:#065f46}
.badge-unpaid{background:#fef3c7;color:#92400e}
.badge-overdue{background:#fee2e2;color:#991b1b}
.overdue-row td{background:#fff7f7}
.empty{text-align:center;color:var(--muted);padding:2rem}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🧾 Invoice Tracker</h1>
    <p>Log invoices, track status, and monitor outstanding amounts. Saved in your browser.</p>
  </header>

  <!-- Stats -->
  <div class="stats" id="stats"></div>

  <!-- Add Invoice -->
  <div class="card">
    <p style="font-weight:700;margin-bottom:.75rem">Add Invoice</p>
    <div class="grid-form">
      <div><label>Invoice #</label><input type="text" id="invNum" placeholder="INV-001"></div>
      <div><label>Client</label><input type="text" id="invClient" placeholder="Client name"></div>
      <div><label>Amount</label><input type="number" id="invAmount" placeholder="0.00" min="0" step="0.01"></div>
      <div><label>Issue Date</label><input type="date" id="invIssue"></div>
      <div><label>Due Date</label><input type="date" id="invDue"></div>
      <div><label>Status</label>
        <select id="invStatus">
          <option value="unpaid">Unpaid</option>
          <option value="paid">Paid</option>
          <option value="overdue">Overdue</option>
        </select>
      </div>
      <div><label>Notes</label><input type="text" id="invNotes" placeholder="Optional..."></div>
      <div style="align-self:end"><button class="btn btn-primary" onclick="addInvoice()" style="width:100%">+ Add</button></div>
    </div>
  </div>

  <!-- Invoice List -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem;margin-bottom:.75rem">
      <div class="filter-row" style="margin:0">
        <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
        <button class="filter-btn" onclick="setFilter('unpaid',this)">Unpaid</button>
        <button class="filter-btn" onclick="setFilter('overdue',this)">Overdue</button>
        <button class="filter-btn" onclick="setFilter('paid',this)">Paid</button>
      </div>
      <input type="text" id="searchBox" placeholder="Search client or #..." style="width:200px" oninput="renderList()">
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th onclick="sort('num')">Invoice #</th>
            <th onclick="sort('client')">Client</th>
            <th onclick="sort('amount')">Amount</th>
            <th onclick="sort('issue')">Issue Date</th>
            <th onclick="sort('due')">Due Date</th>
            <th>Status</th>
            <th>Notes</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="invoiceBody"></tbody>
      </table>
    </div>
  </div>
</div>
<script>
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
const KEY = 'invoices_v2';
let invoices = JSON.parse(localStorage.getItem(KEY) || '[]');
let filterStatus = 'all';
let sortKey = 'due';
let sortDir = 1;

// Sample data
if (!invoices.length) {
  const today = new Date().toISOString().split('T')[0];
  const past = d => { const dt=new Date(); dt.setDate(dt.getDate()-d); return dt.toISOString().split('T')[0]; };
  const future = d => { const dt=new Date(); dt.setDate(dt.getDate()+d); return dt.toISOString().split('T')[0]; };
  invoices = [
    {id:1,num:'INV-001',client:'Acme Corp',amount:5200,issue:past(30),due:past(5),status:'overdue',notes:''},
    {id:2,num:'INV-002',client:'Global Tech',amount:12800,issue:past(20),due:future(10),status:'unpaid',notes:'Net 30'},
    {id:3,num:'INV-003',client:'Blue Sky LLC',amount:3400,issue:past(45),due:past(15),status:'paid',notes:''},
    {id:4,num:'INV-004',client:'Sunrise Media',amount:7600,issue:past(10),due:future(20),status:'unpaid',notes:'Pending review'},
  ];
  save();
}

function save() { localStorage.setItem(KEY, JSON.stringify(invoices)); }

function addInvoice() {
  const num = document.getElementById('invNum').value.trim();
  const client = document.getElementById('invClient').value.trim();
  const amount = parseFloat(document.getElementById('invAmount').value) || 0;
  const issue = document.getElementById('invIssue').value;
  const due = document.getElementById('invDue').value;
  const status = document.getElementById('invStatus').value;
  const notes = document.getElementById('invNotes').value.trim();
  if (!client || !amount) { alert('Client and amount are required.'); return; }
  invoices.push({ id: Date.now(), num: num || 'INV-'+Date.now(), client, amount, issue, due, status, notes });
  save(); render();
  ['invNum','invClient','invAmount','invNotes'].forEach(id => document.getElementById(id).value = '');
}

function deleteInvoice(id) {
  invoices = invoices.filter(i => i.id !== id); save(); render();
}

function toggleStatus(id) {
  const inv = invoices.find(i => i.id === id);
  if (!inv) return;
  const cycle = {unpaid:'paid', paid:'overdue', overdue:'unpaid'};
  inv.status = cycle[inv.status] || 'unpaid';
  save(); render();
}

function setFilter(f, btn) {
  filterStatus = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function sort(key) {
  if (sortKey === key) sortDir *= -1;
  else { sortKey = key; sortDir = 1; }
  renderList();
}

function fmt$(v) { return '$' + parseFloat(v).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function fmtDate(d) { if(!d) return '—'; const dt=new Date(d+'T00:00:00'); return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function isOverdue(inv) { if(!inv.due) return false; return inv.status!=='paid' && new Date(inv.due+'T00:00:00') < new Date(); }

function renderStats() {
  const total = invoices.reduce((a,i)=>a+i.amount, 0);
  const paid = invoices.filter(i=>i.status==='paid').reduce((a,i)=>a+i.amount,0);
  const outstanding = invoices.filter(i=>i.status!=='paid').reduce((a,i)=>a+i.amount,0);
  const overdue = invoices.filter(i=>i.status==='overdue'||isOverdue(i)).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="val" style="color:#0891b2">${invoices.length}</div><div class="lbl">Total Invoices</div></div>
    <div class="stat"><div class="val" style="color:#059669">${fmt$(paid)}</div><div class="lbl">Paid</div></div>
    <div class="stat"><div class="val" style="color:#d97706">${fmt$(outstanding)}</div><div class="lbl">Outstanding</div></div>
    <div class="stat"><div class="val" style="color:#dc2626">${overdue}</div><div class="lbl">Overdue</div></div>
  `;
}

function renderList() {
  const search = document.getElementById('searchBox').value.toLowerCase();
  let list = invoices.filter(i => {
    if (filterStatus !== 'all' && i.status !== filterStatus) return false;
    if (search && !i.client.toLowerCase().includes(search) && !i.num.toLowerCase().includes(search)) return false;
    return true;
  });
  // Sort
  list.sort((a,b) => {
    let va = a[sortKey==='num'?'num':sortKey==='amount'?'amount':sortKey==='issue'?'issue':sortKey==='due'?'due':'client'];
    let vb = b[sortKey==='num'?'num':sortKey==='amount'?'amount':sortKey==='issue'?'issue':sortKey==='due'?'due':'client'];
    if (sortKey === 'amount') return (va-vb)*sortDir;
    return (va||'').localeCompare(vb||'')*sortDir;
  });

  const tbody = document.getElementById('invoiceBody');
  if (!list.length) { tbody.innerHTML = `<tr><td colspan="8" class="empty">No invoices found.</td></tr>`; return; }
  tbody.innerHTML = list.map(inv => {
    const overdue = isOverdue(inv);
    const badgeClass = inv.status==='paid'?'badge-paid':overdue?'badge-overdue':'badge-unpaid';
    const label = inv.status==='paid'?'Paid':overdue?'Overdue':'Unpaid';
    return `<tr class="${overdue?'overdue-row':''}">
      <td><strong>${esc(inv.num)}</strong></td>
      <td>${esc(inv.client)}</td>
      <td style="font-weight:700">${fmt$(inv.amount)}</td>
      <td>${fmtDate(inv.issue)}</td>
      <td style="color:${overdue?'#dc2626':'inherit'}">${fmtDate(inv.due)}</td>
      <td><span class="badge ${badgeClass}" style="cursor:pointer" onclick="toggleStatus(${inv.id})" title="Click to cycle status">${label}</span></td>
      <td style="color:var(--muted);font-size:.8rem">${esc(inv.notes||'—')}</td>
      <td><button class="btn btn-danger btn-sm" onclick="deleteInvoice(${inv.id})">✕</button></td>
    </tr>`;
  }).join('');
}

function render() { renderStats(); renderList(); }

// Set default dates
const today = new Date().toISOString().split('T')[0];
const nextMonth = new Date(); nextMonth.setDate(nextMonth.getDate()+30);
document.getElementById('invIssue').value = today;
document.getElementById('invDue').value = nextMonth.toISOString().split('T')[0];
render();
</script>
</body>
</html>
