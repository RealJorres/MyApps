<body>
<div class="container">
  <header>
    <h1>Barcode Generator</h1>
    <p>Generate Code 128 barcodes from any text. Download as PNG.</p>
  </header>

  <div class="card">
    <div class="row">
      <div class="field" style="flex:2">
        <label for="barcodeText">Text / Value</label>
        <input type="text" id="barcodeText" value="PRODUCT-00123" oninput="generate()" placeholder="Enter text or number...">
        <div class="hint">Supports all printable ASCII characters.</div>
      </div>
      <div class="field">
        <label for="barColor">Bar Color</label>
        <input type="color" id="barColor" value="#000000" oninput="generate()" style="height:38px;padding:.3rem">
      </div>
      <div class="field">
        <label for="barHeight">Bar Height (px)</label>
        <input type="number" id="barHeight" value="80" min="40" max="200" oninput="generate()">
      </div>
    </div>
    <div class="row" style="margin-top:.75rem">
      <div class="field">
        <label for="moduleW">Module Width (px)</label>
        <input type="number" id="moduleW" value="2" min="1" max="5" oninput="generate()">
      </div>
      <div class="field">
        <label for="showText">Show Text</label>
        <select id="showText" onchange="generate()">
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="canvas-wrap">
      <canvas id="barcode"></canvas>
    </div>
    <div id="errMsg" class="err" style="display:none"></div>
    <div class="dl-row">
      <button class="btn btn-primary" onclick="download()">Download PNG</button>
      <button class="btn btn-outline" onclick="copyText()">Copy Text</button>
    </div>
  </div>
</div>
<script>
// Code 128 B encoding (value 0 = ASCII 32 = space)
// Each array: [b1,s1,b2,s2,b3,s3] widths, sum = 11
const C128 = [
  [2,1,2,2,2,2],[2,2,2,1,2,2],[2,2,2,2,2,1],[1,2,1,2,2,3],[1,2,1,3,2,2],
  [1,3,1,2,2,2],[1,2,2,2,1,3],[1,2,2,3,1,2],[1,3,2,2,1,2],[2,2,1,2,1,3],
  [2,2,1,3,1,2],[2,3,1,2,1,2],[1,1,2,2,3,2],[1,2,2,1,3,2],[1,2,2,2,3,1],
  [1,1,3,2,2,2],[1,2,3,1,2,2],[1,2,3,2,2,1],[2,2,3,2,1,1],[2,2,1,1,3,2],
  [2,2,1,2,3,1],[2,1,3,2,1,2],[2,2,3,1,1,2],[3,1,2,1,3,1],[3,1,1,2,2,2],
  [3,2,1,1,2,2],[3,2,1,2,2,1],[3,1,2,2,1,2],[3,2,2,1,1,2],[3,2,2,2,1,1],
  [2,1,2,1,2,3],[2,1,2,3,2,1],[2,3,2,1,2,1],[1,1,1,3,2,3],[1,3,1,1,2,3],
  [1,3,1,3,2,1],[1,1,2,3,1,3],[1,3,2,1,1,3],[1,3,2,3,1,1],[2,1,1,3,1,3],
  [2,3,1,1,1,3],[2,3,1,3,1,1],[1,1,2,1,3,3],[1,1,2,3,3,1],[1,3,2,1,3,1],
  [1,1,3,1,2,3],[1,1,3,3,2,1],[1,3,3,1,2,1],[3,1,3,1,2,1],[2,1,1,3,3,1],
  [2,3,1,1,3,1],[2,1,3,1,1,3],[2,1,3,3,1,1],[2,1,3,1,3,1],[3,1,1,1,2,3],
  [3,3,1,1,2,1],[3,1,2,1,1,3],[3,1,2,3,1,1],[3,3,2,1,1,1],[3,1,4,1,1,1],
  [2,2,1,4,1,1],[4,3,1,1,1,1],[1,1,1,2,2,4],[1,1,1,4,2,2],[1,2,1,1,2,4],
  [1,2,1,4,2,1],[1,4,1,1,2,2],[1,4,1,2,2,1],[1,1,2,2,1,4],[1,1,2,4,1,2],
  [1,2,2,1,1,4],[1,2,2,4,1,1],[1,4,2,1,1,2],[1,4,2,2,1,1],[2,4,1,2,1,1],
  [2,2,1,1,1,4],[4,1,3,1,1,1],[2,4,1,1,1,2],[1,3,4,1,1,1],[1,1,1,2,4,2],
  [1,2,1,1,4,2],[1,2,1,2,4,1],[1,1,4,2,1,2],[1,2,4,1,1,2],[1,2,4,2,1,1],
  [4,1,1,2,1,2],[4,2,1,1,1,2],[4,2,1,2,1,1],[2,1,2,1,4,1],[2,1,4,1,2,1],
  [4,1,2,1,2,1],[1,1,1,1,4,3],[1,1,1,3,4,1],[1,3,1,1,4,1],[1,1,4,1,1,3],
  [1,1,4,3,1,1],[4,1,1,1,1,3],[4,1,1,3,1,1],[1,1,3,1,4,1],[1,1,4,1,3,1],
  [3,1,1,1,4,1],[4,1,1,1,3,1],[2,1,1,4,1,2],[2,1,1,2,1,4],[2,1,1,2,3,2]
];
// Start B = value 104, Stop = value 106
const START_B = [2,1,1,2,3,2]; // Code 128 Start B
const STOP    = [2,3,3,1,1,1,2]; // Code 128 Stop (7 elements, 13 modules)

function encode(text) {
  const modules = [];
  // Quiet zone (10 modules)
  for(let i=0;i<10;i++) modules.push(0);

  // Start B
  let bar = true;
  START_B.forEach(w => { for(let i=0;i<w;i++) modules.push(bar?1:0); bar=!bar; });

  // Checksum = start value (104)
  let checksum = 104;

  // Data
  for(let i=0;i<text.length;i++){
    const code = text.charCodeAt(i);
    if(code < 32 || code > 126) return null; // unsupported char
    const val = code - 32;
    checksum += (i+1) * val;
    // Do NOT reset bar here — parity must continue from previous symbol
    C128[val].forEach(w => { for(let j=0;j<w;j++) modules.push(bar?1:0); bar=!bar; });
  }

  // Check character — parity continues from data
  const checkVal = checksum % 103;
  C128[checkVal].forEach(w => { for(let j=0;j<w;j++) modules.push(bar?1:0); bar=!bar; });

  // Stop — parity continues from check character
  STOP.forEach(w => { for(let j=0;j<w;j++) modules.push(bar?1:0); bar=!bar; });

  // Quiet zone
  for(let i=0;i<10;i++) modules.push(0);

  return modules;
}

function generate() {
  const text = document.getElementById('barcodeText').value;
  const errEl = document.getElementById('errMsg');
  if (!text) return;

  // Validate
  for(let i=0;i<text.length;i++){
    const c = text.charCodeAt(i);
    if(c < 32 || c > 126){ errEl.textContent = `Character "${text[i]}" is not supported by Code 128 B.`; errEl.style.display=''; return; }
  }
  errEl.style.display = 'none';

  const modules = encode(text);
  if(!modules) return;

  const mw = parseInt(document.getElementById('moduleW').value) || 2;
  const bh = parseInt(document.getElementById('barHeight').value) || 80;
  const showText = document.getElementById('showText').value === 'yes';
  const color = document.getElementById('barColor').value;
  const textH = showText ? 24 : 0;
  const padV = 12;

  const canvas = document.getElementById('barcode');
  canvas.width = modules.length * mw;
  canvas.height = bh + textH + padV * 2;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  modules.forEach((bit, i) => {
    if(bit) {
      ctx.fillStyle = color;
      ctx.fillRect(i * mw, padV, mw, bh);
    }
  });

  if(showText) {
    ctx.fillStyle = '#333';
    ctx.font = `${mw * 4}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(text, canvas.width/2, padV + bh + textH - 4);
  }
}

function download() {
  const a = document.createElement('a');
  a.download = 'barcode.png';
  a.href = document.getElementById('barcode').toDataURL();
  a.click();
}

function copyText() {
  const text = document.getElementById('barcodeText').value;
  navigator.clipboard.writeText(text).then(()=>alert('Text copied!'));
}

generate();
</script>
