<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="canonical" href="https://jorresapps.onrender.com/swot-analysis/">
<meta name="robots" content="index, follow">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect x='2' y='2' width='60' height='60' rx='14' fill='%230d1117'/%3E%3Crect x='14' y='14' width='12' height='12' rx='3' fill='%23ffffff'/%3E%3Crect x='30' y='14' width='12' height='12' rx='3' fill='%23ffffff' opacity='0.35'/%3E%3Crect x='30' y='30' width='12' height='12' rx='3' fill='%23ffffff'/%3E%3Crect x='14' y='46' width='12' height='12' rx='3' fill='%232f57ff'/%3E%3Crect x='30' y='46' width='12' height='12' rx='3' fill='%23ffffff'/%3E%3C/svg%3E">
<link rel="stylesheet" href="/static/base.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SWOT Analysis Board | Jorres Apps</title>
<style>
:root{--bg:#f1f5f9;--card:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b}
body{ padding:2rem 1rem 4rem; }
.container{max-width:900px;margin:0 auto}
header{text-align:center;margin-bottom:2rem}
header h1{font-size:2rem;font-weight:800}
header p{color:var(--muted);margin-top:.4rem}
.toolbar{display:flex;gap:.75rem;align-items:center;flex-wrap:wrap;margin-bottom:1.25rem}
.toolbar input{flex:1;min-width:200px;padding:.55rem .75rem;border:1px solid var(--border);border-radius:.5rem;font-size:.95rem;background:#fff;color:var(--text);outline:none;font-family:inherit}
.btn{padding:.55rem 1.1rem;border:none;border-radius:.5rem;font-size:.9rem;font-weight:600;cursor:pointer}
.btn-outline{background:#fff;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{background:var(--bg)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:600px){.grid{grid-template-columns:1fr}}
.quadrant{border-radius:1rem;padding:1.25rem;min-height:200px}
.q-S{background:#dbeafe;border:2px solid #3b82f6}
.q-W{background:#fee2e2;border:2px solid #ef4444}
.q-O{background:#d1fae5;border:2px solid #10b981}
.q-T{background:#fef3c7;border:2px solid #f59e0b}
.quadrant h2{font-size:1.1rem;font-weight:800;margin-bottom:.75rem;display:flex;align-items:center;gap:.4rem}
.q-S h2{color:#1d4ed8}.q-W h2{color:#dc2626}.q-O h2{color:#065f46}.q-T h2{color:#92400e}
.add-row{display:flex;gap:.4rem;margin-bottom:.75rem}
.add-row input{flex:1;padding:.45rem .65rem;border:1px solid rgba(0,0,0,.1);border-radius:.4rem;font-size:.875rem;background:rgba(255,255,255,.7);color:var(--text);outline:none;font-family:inherit}
.add-row input:focus{background:#fff}
.add-btn{padding:.45rem .8rem;border:none;border-radius:.4rem;font-size:.875rem;font-weight:700;cursor:pointer;white-space:nowrap}
.q-S .add-btn{background:#3b82f6;color:#fff}
.q-W .add-btn{background:#ef4444;color:#fff}
.q-O .add-btn{background:#10b981;color:#fff}
.q-T .add-btn{background:#f59e0b;color:#fff}
.items-list{display:flex;flex-direction:column;gap:.4rem}
.item{display:flex;align-items:flex-start;gap:.4rem;background:rgba(255,255,255,.8);border-radius:.5rem;padding:.5rem .7rem;font-size:.875rem;line-height:1.4}
.item span{flex:1}
.item button{background:none;border:none;cursor:pointer;color:rgba(0,0,0,.35);font-size:1rem;padding:0;flex-shrink:0}
.item button:hover{color:rgba(0,0,0,.6)}
.count-badge{display:inline-flex;align-items:center;justify-content:center;width:1.4rem;height:1.4rem;border-radius:50%;font-size:.75rem;font-weight:700;background:rgba(255,255,255,.6)}
@media print{
  .toolbar,.add-row{display:none}
  body{ padding:1rem; }
  .grid{gap:.5rem}
  .quadrant{min-height:160px}
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>SWOT Analysis Board</h1>
    <p>Map Strengths, Weaknesses, Opportunities, and Threats.</p>
  </header>

  <div class="toolbar">
    <input type="text" id="boardTitle" value="My SWOT Analysis" placeholder="Analysis title...">
    <button class="btn btn-outline" onclick="clearAll()">Clear All</button>
    <button class="btn btn-outline" onclick="window.print()">Print</button>
  </div>

  <div class="grid">
    <div class="quadrant q-S" id="q-S">
      <h2>Strengths <span class="count-badge" id="cnt-S">0</span></h2>
      <div class="add-row">
        <input type="text" id="inp-S" placeholder="Add a strength..." onkeydown="if(event.key==='Enter')addItem('S')">
        <button class="add-btn" onclick="addItem('S')">+ Add</button>
      </div>
      <div class="items-list" id="list-S"></div>
    </div>
    <div class="quadrant q-W" id="q-W">
      <h2>Weaknesses <span class="count-badge" id="cnt-W">0</span></h2>
      <div class="add-row">
        <input type="text" id="inp-W" placeholder="Add a weakness..." onkeydown="if(event.key==='Enter')addItem('W')">
        <button class="add-btn" onclick="addItem('W')">+ Add</button>
      </div>
      <div class="items-list" id="list-W"></div>
    </div>
    <div class="quadrant q-O" id="q-O">
      <h2>Opportunities <span class="count-badge" id="cnt-O">0</span></h2>
      <div class="add-row">
        <input type="text" id="inp-O" placeholder="Add an opportunity..." onkeydown="if(event.key==='Enter')addItem('O')">
        <button class="add-btn" onclick="addItem('O')">+ Add</button>
      </div>
      <div class="items-list" id="list-O"></div>
    </div>
    <div class="quadrant q-T" id="q-T">
      <h2>Threats <span class="count-badge" id="cnt-T">0</span></h2>
      <div class="add-row">
        <input type="text" id="inp-T" placeholder="Add a threat..." onkeydown="if(event.key==='Enter')addItem('T')">
        <button class="add-btn" onclick="addItem('T')">+ Add</button>
      </div>
      <div class="items-list" id="list-T"></div>
    </div>
  </div>
</div>
<script>
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
const DATA_KEY = 'swot_data';
let data = JSON.parse(localStorage.getItem(DATA_KEY) || '{"S":[],"W":[],"O":[],"T":[]}');

function save() { localStorage.setItem(DATA_KEY, JSON.stringify(data)); }

function addItem(q) {
  const inp = document.getElementById('inp-'+q);
  const text = inp.value.trim();
  if (!text) return;
  data[q].push({ id: Date.now(), text });
  inp.value = '';
  save(); renderQ(q);
}

function removeItem(q, id) {
  data[q] = data[q].filter(i => i.id !== id);
  save(); renderQ(q);
}

function renderQ(q) {
  const list = document.getElementById('list-'+q);
  list.innerHTML = data[q].map(item =>
    `<div class="item"><span>${esc(item.text)}</span><button onclick="removeItem('${q}',${item.id})" title="Remove">×</button></div>`
  ).join('');
  document.getElementById('cnt-'+q).textContent = data[q].length;
}

function clearAll() {
  if (!confirm('Clear all items?')) return;
  data = {S:[],W:[],O:[],T:[]};
  save(); ['S','W','O','T'].forEach(renderQ);
}

['S','W','O','T'].forEach(renderQ);
</script>
<script src="/static/footer.js?v=3"></script>
<script src="/static/app-nav.js?v=3"></script>
</body>
</html>
