<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Editor</title>
<style>
:root {
  --primary: #0f766e;
  --primary-h: #0d6b63;
  --bg: #f1f5f9; --card: #ffffff; --border: #e2e8f0;
  --text: #1e293b; --muted: #64748b;
  --success-bg: #f0fdf4; --success-fg: #16a34a;
  --error-bg: #fef2f2;   --error-fg: #dc2626;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
.top-bar {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 0.75rem 1.5rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  flex-wrap: wrap;
}
.top-bar h1 { font-size: 1.15rem; font-weight: 800; flex: 1; min-width: 120px; }
.top-bar h1 span { color: var(--primary); }

.btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.5rem 1rem; border-radius: 0.5rem; border: none; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: background 0.15s; font-family: inherit; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-h); }
.btn-ghost { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--border); }
.btn-ghost.active { background: var(--primary); color: #fff; border-color: var(--primary); }

.view-toggle { display: flex; gap: 0.25rem; }

.editor-area {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  min-height: 0;
  height: calc(100vh - 56px);
}
.editor-area.view-editor { grid-template-columns: 1fr 0; }
.editor-area.view-preview { grid-template-columns: 0 1fr; }

.pane {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-right: 1px solid var(--border);
}
.pane:last-child { border-right: none; }
.pane-header {
  padding: 0.4rem 1rem;
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  background: #f8fafc;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.editor-pane { overflow: hidden; }
.editor-pane.hidden { display: none; }
.preview-pane { overflow-y: auto; }
.preview-pane.hidden { display: none; }

#editorArea {
  flex: 1;
  width: 100%;
  height: 100%;
  padding: 1.25rem;
  border: none;
  outline: none;
  font-family: 'Cascadia Code', 'Fira Code', 'Courier New', monospace;
  font-size: 0.9rem;
  line-height: 1.7;
  resize: none;
  background: #fff;
  color: var(--text);
  tab-size: 2;
}

.preview-content {
  padding: 1.5rem 2rem;
  max-width: 780px;
  margin: 0 auto;
}

/* Preview typography */
.preview-content h1, .preview-content h2, .preview-content h3,
.preview-content h4, .preview-content h5, .preview-content h6 {
  margin-top: 1.5em; margin-bottom: 0.5em; font-weight: 700; line-height: 1.3;
  color: var(--text);
}
.preview-content h1 { font-size: 2rem; border-bottom: 2px solid var(--border); padding-bottom: 0.3em; }
.preview-content h2 { font-size: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.2em; }
.preview-content h3 { font-size: 1.2rem; }
.preview-content h4 { font-size: 1rem; }
.preview-content p { margin-bottom: 1em; line-height: 1.7; }
.preview-content ul, .preview-content ol { margin: 0.5em 0 1em 1.5em; }
.preview-content li { margin-bottom: 0.3em; line-height: 1.6; }
.preview-content a { color: var(--primary); text-decoration: underline; }
.preview-content code {
  background: #f1f5f9;
  color: #be185d;
  padding: 0.15em 0.4em;
  border-radius: 0.25rem;
  font-family: 'Cascadia Code', 'Fira Code', monospace;
  font-size: 0.875em;
}
.preview-content pre {
  background: #1e293b;
  color: #e2e8f0;
  padding: 1rem 1.25rem;
  border-radius: 0.75rem;
  overflow-x: auto;
  margin: 1em 0;
}
.preview-content pre code {
  background: none;
  color: inherit;
  padding: 0;
  font-size: 0.85rem;
}
.preview-content blockquote {
  border-left: 4px solid var(--primary);
  margin: 1em 0;
  padding: 0.5em 1em;
  background: #f0fdfa;
  color: var(--muted);
  border-radius: 0 0.5rem 0.5rem 0;
}
.preview-content table { width: 100%; border-collapse: collapse; margin: 1em 0; }
.preview-content th { background: #f8fafc; font-weight: 700; text-align: left; }
.preview-content th, .preview-content td { padding: 0.5rem 0.75rem; border: 1px solid var(--border); }
.preview-content tr:nth-child(even) td { background: #f8fafc; }
.preview-content hr { border: none; border-top: 2px solid var(--border); margin: 1.5em 0; }
.preview-content img { max-width: 100%; border-radius: 0.5rem; }
</style>
</head>
<body>
<div class="top-bar">
  <h1>Markdown <span>Editor</span></h1>
  <div class="view-toggle">
    <button class="btn btn-ghost" id="btnSplit" onclick="setView('split')" title="Split view">Split</button>
    <button class="btn btn-ghost" id="btnEditor" onclick="setView('editor')" title="Editor only">Editor</button>
    <button class="btn btn-ghost" id="btnPreview" onclick="setView('preview')" title="Preview only">Preview</button>
  </div>
  <button class="btn btn-ghost" onclick="copyHTML()">Copy HTML</button>
  <button class="btn btn-ghost" onclick="downloadHTML()">Download HTML</button>
</div>

<div class="editor-area" id="editorArea_wrapper">
  <div class="pane editor-pane" id="editorPane">
    <div class="pane-header">Editor</div>
    <textarea id="editorArea" placeholder="# Hello World&#10;&#10;Start typing **Markdown** here…&#10;&#10;- Item 1&#10;- Item 2&#10;&#10;```python&#10;print('Hello!')&#10;```" spellcheck="false"></textarea>
  </div>
  <div class="pane preview-pane" id="previewPane">
    <div class="pane-header">Preview</div>
    <div class="preview-content" id="previewContent"></div>
  </div>
</div>

<script>
let debounceTimer = null;
let lastText = null;
let currentHTML = '';
let currentView = 'split';

const viewMap = {
  split: { wrapper: '', editor: '', preview: '', btnSplit: true },
  editor: { wrapper: 'view-editor', editor: '', preview: 'hidden', btnEditor: true },
  preview: { wrapper: 'view-preview', editor: 'hidden', preview: '', btnPreview: true }
};

function setView(v) {
  currentView = v;
  const wrapper = document.getElementById('editorArea_wrapper');
  wrapper.className = 'editor-area ' + (v === 'split' ? '' : 'view-' + v);
  document.getElementById('editorPane').classList.toggle('hidden', v === 'preview');
  document.getElementById('previewPane').classList.toggle('hidden', v === 'editor');
  ['btnSplit','btnEditor','btnPreview'].forEach(id => {
    document.getElementById(id).classList.toggle('active', id === 'btn' + v.charAt(0).toUpperCase() + v.slice(1));
  });
}

document.getElementById('editorArea').addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(renderPreview, 400);
});

document.getElementById('editorArea').addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = e.target.selectionStart, en = e.target.selectionEnd;
    e.target.value = e.target.value.substring(0, s) + '  ' + e.target.value.substring(en);
    e.target.selectionStart = e.target.selectionEnd = s + 2;
  }
});

function renderPreview() {
  const text = document.getElementById('editorArea').value;
  if (text === lastText) return;
  lastText = text;
  fetch('api/render', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text })
  })
  .then(r => r.json())
  .then(d => {
    if (d.html !== undefined) {
      currentHTML = d.html;
      document.getElementById('previewContent').innerHTML = d.html;
    }
  });
}

function copyHTML() {
  navigator.clipboard.writeText(currentHTML).then(() => {
    const btn = event.target;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy HTML', 1500);
  });
}

function downloadHTML() {
  const title = 'Markdown Output';
  const full = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>${title}</title>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 780px; margin: 2rem auto; padding: 0 1rem; color: #1e293b; line-height: 1.7; }
h1,h2,h3,h4,h5,h6 { margin-top: 1.5em; margin-bottom: 0.5em; }
h1 { border-bottom: 2px solid #e2e8f0; padding-bottom: 0.3em; }
h2 { border-bottom: 1px solid #e2e8f0; padding-bottom: 0.2em; }
code { background: #f1f5f9; color: #be185d; padding: 0.15em 0.4em; border-radius: 0.25rem; font-family: monospace; }
pre { background: #1e293b; color: #e2e8f0; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; }
pre code { background: none; color: inherit; padding: 0; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 0.5rem 0.75rem; border: 1px solid #e2e8f0; }
th { background: #f8fafc; font-weight: 700; }
blockquote { border-left: 4px solid #0f766e; margin: 1em 0; padding: 0.5em 1em; background: #f0fdfa; color: #64748b; }
</style>
</head>
<body>
${currentHTML}
</body>
</html>`;
  const blob = new Blob([full], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'output.html'; a.click();
  URL.revokeObjectURL(url);
}

setView('split');
document.getElementById('btnSplit').classList.add('active');

// Render default placeholder on load
setTimeout(renderPreview, 100);
</script>
</body>
</html>
