  display: none;

  scrollbar-width: none;

  font-family: inherit; white-space: nowrap;

@media (max-width: 767px) {
  body { overflow-x: hidden; }
  .mobile-pane-bar { display: flex; }

  /* On mobile: hide the 3-column grid, show one pane at a time */

  .ed-pane { display: none; min-height: 260px; }
  .ed-pane.mobile-active { display: flex; }
  .ed-pane.mobile-active textarea { min-height: 260px; resize: none; }

  /* Preview pane visibility controlled by mobile-active too */
  .preview-pane { display: none; }

  textarea { min-width: 0 !important; }

  /* Simplify header on mobile */

<body>
<header>
  <h1>HTML Previewer</h1>
  <button class="hbtn run" onclick="runCode()">▶ Run</button>
  <button class="hbtn" onclick="clearAll()">Clear</button>
  <button class="hbtn" onclick="loadExample()">Load Example</button>
  <label class="auto-label"><input type="checkbox" id="autoRun" checked> Auto-run</label>
  <button class="hbtn" id="themeToggle" onclick="toggleTheme()" title="Toggle light/dark editor theme">Light mode</button>
</header>
<!-- Mobile pane switcher (hidden on desktop) -->
<div class="mobile-pane-bar" id="mobilePaneBar" role="tablist" aria-label="Editor pane selector">
  <button class="mpane-btn active" onclick="setMobilePane('html',this)" role="tab" aria-selected="true">HTML</button>
  <button class="mpane-btn" onclick="setMobilePane('css',this)" role="tab" aria-selected="false">CSS</button>
  <button class="mpane-btn" onclick="setMobilePane('js',this)" role="tab" aria-selected="false">JS</button>
  <button class="mpane-btn" onclick="setMobilePane('preview',this)" role="tab" aria-selected="false">Preview</button>
</div>

<div class="main">
  <div class="editors" id="editorsGrid">
    <div class="ed-pane mobile-active" id="paneHtml" role="tabpanel" aria-label="HTML editor">
      <div class="ed-label">HTML</div>
      <textarea id="htmlEd" placeholder="<h1>Hello World</h1>" oninput="autoRun()"></textarea>
    </div>
    <div class="ed-pane" id="paneCss" role="tabpanel" aria-label="CSS editor">
      <div class="ed-label">CSS</div>
      <textarea id="cssEd" placeholder="" oninput="autoRun()" aria-label="CSS editor"></textarea>
    </div>
    <div class="ed-pane" id="paneJs" role="tabpanel" aria-label="JavaScript editor">
      <div class="ed-label">JavaScript</div>
      <textarea id="jsEd" placeholder="console.log('hello')" oninput="autoRun()"></textarea>
    </div>
  </div>
  <div class="preview-pane" id="panePreview">
    <div class="preview-toolbar">
      <span class="preview-label">Preview</span>
      <button class="device-btn active" onclick="setDevice('full',this)">Full</button>
      <button class="device-btn" onclick="setDevice('1024px',this)">Tablet</button>
      <button class="device-btn" onclick="setDevice('375px',this)">Mobile</button>
    </div>
    <div class="iframe-wrap" id="iframeWrap">
      <iframe id="preview" sandbox="allow-scripts"></iframe>
    </div>
  </div>
</div>
<script>
let debounceTimer;

/* ── Theme toggle (light / dark) ────────── */
var _lightMode = localStorage.getItem('hp_light') === '1';
function applyTheme() {
  document.body.classList.toggle('body-light', _lightMode);
  var btn = document.getElementById('themeToggle');
  if (btn) btn.textContent = _lightMode ? 'Dark mode' : 'Light mode';
}
function toggleTheme() { _lightMode = !_lightMode; localStorage.setItem('hp_light', _lightMode ? '1' : '0'); applyTheme(); }
applyTheme();

/* ── Mobile pane switching ─────────────────── */
function setMobilePane(pane, btn) {
  const paneMap = { html:'paneHtml', css:'paneCss', js:'paneJs', preview:'panePreview' };
  // Hide all
  Object.values(paneMap).forEach(id => {
    var el = document.getElementById(id);
    if (el) el.classList.remove('mobile-active');
  });
  // Show selected
  var target = document.getElementById(paneMap[pane]);
  if (target) target.classList.add('mobile-active');
  // Update tab buttons
  document.querySelectorAll('.mpane-btn').forEach(b => {
    b.classList.remove('active');
    b.setAttribute('aria-selected', 'false');
  });
  if (btn) { btn.classList.add('active'); btn.setAttribute('aria-selected', 'true'); }
  // Run code when switching to preview
  if (pane === 'preview') runCode();
}

/* On desktop, always show all panes */
function handleResize() {
  if (window.innerWidth >= 768) {
    ['paneHtml','paneCss','paneJs','panePreview'].forEach(id => {
      var el = document.getElementById(id);
      if (el) { el.classList.remove('mobile-active'); el.style.display = ''; }
    });
  }
}
window.addEventListener('resize', handleResize);

function runCode() {
  const html = document.getElementById('htmlEd').value;
  const css  = document.getElementById('cssEd').value;
  const js   = document.getElementById('jsEd').value;
  const doc = `<!DOCTYPE html><html><head><style>${css}</style></head><body>${html}<script>${js}<\/script></body></html>`;
  const frame = document.getElementById('preview');
  frame.srcdoc = doc;
}

function autoRun() {
  if (!document.getElementById('autoRun').checked) return;
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(runCode, 400);
}

function setDevice(w, btn) {
  document.querySelectorAll('.device-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const frame = document.getElementById('preview');
  frame.style.maxWidth = w === 'full' ? '' : w;
}

function clearAll() {
  ['htmlEd','cssEd','jsEd'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('preview').srcdoc = '';
}

function loadExample() {
  document.getElementById('htmlEd').value =
`<div class="card">
  <h1>Hello from HTML Previewer!</h1>
  <p>Edit the HTML, CSS, and JS panes above.</p>
  <button onclick="greet()">Click me</button>
  <p id="msg"></p>
</div>`;
  document.getElementById('cssEd').value =
`body { display: flex; justify-content: center; padding: 2rem; }
.card { background: #fff; border-radius: 12px; padding: 2rem; box-shadow: 0 4px 20px rgba(0,0,0,.1); max-width: 400px; text-align: center; }
h1 { color: #3b82f6; margin-bottom: .75rem; }
button { padding: .5rem 1.5rem; background: #3b82f6; color: #fff; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }`;
  document.getElementById('jsEd').value =
`function greet() {
  document.getElementById('msg').textContent = 'The preview is live.';
}`;
  runCode();
}

runCode();
</script>
