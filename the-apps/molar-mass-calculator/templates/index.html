};

function parseFormula(f) {
  const stack = [{}];
  let i = 0;
  while (i < f.length) {
    if (f[i] === '(') {
      stack.push({});
      i++;
    } else if (f[i] === ')') {
      i++;
      let numStr = '';
      while (i < f.length && /\d/.test(f[i])) numStr += f[i++];
      const n   = numStr ? parseInt(numStr) : 1;
      const top = stack.pop();
      if (!stack.length) throw new Error('Unmatched )');
      for (const [el, cnt] of Object.entries(top))
        stack[stack.length-1][el] = (stack[stack.length-1][el] || 0) + cnt * n;
    } else if (/[A-Z]/.test(f[i])) {
      let sym = f[i++];
      while (i < f.length && /[a-z]/.test(f[i])) sym += f[i++];
      if (!ELEMENTS[sym]) throw new Error('Unknown element: ' + sym);
      let numStr = '';
      while (i < f.length && /\d/.test(f[i])) numStr += f[i++];
      const n = numStr ? parseInt(numStr) : 1;
      stack[stack.length-1][sym] = (stack[stack.length-1][sym] || 0) + n;
    } else if (/\d/.test(f[i])) {
      throw new Error('Unexpected digit at position ' + i + ' — numbers must follow an element symbol or )');
    } else {
      throw new Error('Invalid character: "' + f[i] + '"');
    }
  }
  if (stack.length > 1) throw new Error('Unclosed parenthesis');
  return stack[0];
}

function onInput() {
  const val = document.getElementById('formulaInput').value;
  document.getElementById('clearBtn').style.display = val ? 'flex' : 'none';
  document.getElementById('formulaInput').classList.remove('error');
  if (!val.trim()) { hideResults(); clearError(); return; }
  calculate(val.trim());
}

function calculate(formula) {
  try {
    const counts = parseFormula(formula);
    if (!Object.keys(counts).length) { hideResults(); return; }

    let total = 0;
    const breakdown = Object.entries(counts).map(([sym, cnt]) => {
      const el = ELEMENTS[sym];
      const contribution = el.m * cnt;
      total += contribution;
      return { sym, name: el.n, cnt, mass: el.m, contribution };
    });

    // Display result card
    document.getElementById('resultMass').textContent = total.toFixed(3);
    document.getElementById('resultFormula').textContent = formula;
    document.getElementById('resultCard').classList.add('show');

    // Build breakdown table
    const tbody = document.getElementById('breakdownBody');
    const tfoot = document.getElementById('breakdownFoot');
    tbody.innerHTML = '';
    breakdown.forEach(row => {
      const pct = (row.contribution / total * 100).toFixed(1);
      const tr  = document.createElement('tr');
      tr.innerHTML = `
        <td class="td-symbol">${row.sym}</td>
        <td>${row.name}</td>
        <td>${row.cnt}</td>
        <td>${row.mass.toFixed(4)}</td>
        <td>${row.contribution.toFixed(4)}</td>
        <td class="td-pct">${pct}%</td>
        <td class="td-bar-wrap"><div class="td-bar"><div class="td-bar-fill" style="width:${pct}%"></div></div></td>`;
      tbody.appendChild(tr);
    });
    tfoot.innerHTML = `<tr><td colspan="4"><strong>Total</strong></td><td><strong>${total.toFixed(3)}</strong></td><td colspan="2"><strong>g/mol</strong></td></tr>`;
    document.getElementById('breakdownCard').style.display = 'block';
    clearError();
  } catch(e) {
    showError(e.message);
    hideResults();
    document.getElementById('formulaInput').classList.add('error');
  }
}

function hideResults() {
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('breakdownCard').style.display = 'none';
}
function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = 'Error: ' + msg;
  el.classList.add('show');
}
function clearError() {
  document.getElementById('errorMsg').classList.remove('show');
}
function clearFormula() {
  document.getElementById('formulaInput').value = '';
  document.getElementById('formulaInput').classList.remove('error');
  document.getElementById('clearBtn').style.display = 'none';
  hideResults();
  clearError();
  document.getElementById('formulaInput').focus();
}
function setFormula(f) {
  document.getElementById('formulaInput').value = f;
  document.getElementById('clearBtn').style.display = 'flex';
  calculate(f);
}
function copyResult() {
  const mass    = document.getElementById('resultMass').textContent;
  const formula = document.getElementById('resultFormula').textContent;
  navigator.clipboard.writeText(mass + ' g/mol (' + formula + ')').then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
  });
}

document.getElementById('formulaInput').focus();
</script>
