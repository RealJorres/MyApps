<style>
:root {
  --primary: #0f766e; --brand: var(--primary); --primary-h: #0d6b63;
  --bg: #f1f5f9; --card: #ffffff; --border: #e2e8f0;
  --text: #1e293b; --muted: #64748b;
  --success-bg: #f0fdf4; --success-fg: #16a34a;
  --error-bg: #fef2f2; --error-fg: #dc2626;
}
body { padding: 2rem 1rem 4rem; }
.container { max-width: 1200px; margin: 0 auto; }
header { text-align: center; margin-bottom: 2rem; }
header h1 { font-size: 2rem; font-weight: 800; color: var(--primary); }
header p { color: var(--muted); margin-top: 0.4rem; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 1rem; padding: 1.75rem; margin-bottom: 1.25rem; }
.btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.6rem 1.25rem; border-radius: 0.5rem; border: none; font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: background 0.15s; font-family: inherit; }
 
.btn-ghost { background: var(--bg); color: var(--text); border: 1px solid var(--border); } .btn-ghost:hover { background: var(--border); }
 
.btn-sm { padding: 0.3rem 0.7rem; font-size: 0.78rem; }
input[type=text], input[type=number], input[type=email], input[type=date], input[type=color], textarea, select { width: 100%; padding: 0.55rem 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem; font-size: 0.9rem; background: #fff; color: var(--text); outline: none; font-family: inherit; }
input:focus, textarea:focus, select:focus { border-color: var(--primary); }
textarea { resize: vertical; min-height: 80px; }
.layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; align-items: start; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.form-grid.three { grid-template-columns: 1fr 1fr 1fr; }
.form-grid.four { grid-template-columns: 1fr 1fr 1fr 1fr; }
.full { grid-column: 1 / -1; }
.section-title { font-size: 0.85rem; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 2px solid var(--border); }
.items-table { width: 100%; border-collapse: collapse; margin-bottom: 0.75rem; }
.items-table th { font-size: 0.75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; padding: 0.4rem 0.5rem; text-align: left; border-bottom: 1px solid var(--border); }
.items-table td { padding: 0.4rem 0.3rem; vertical-align: middle; }
.items-table td input { padding: 0.4rem 0.5rem; font-size: 0.85rem; }
.items-table .total-cell { font-weight: 600; color: var(--primary); padding-right: 0.5rem; font-size: 0.9rem; }
.preview-area { position: sticky; top: 1rem; }
.preview-invoice { background: white; padding: 2rem; border: 1px solid var(--border); border-radius: 0.75rem; font-size: 0.85rem; min-height: 400px; }
.inv-header { margin-bottom: 1.5rem; }
.inv-biz-name { font-size: 1.4rem; font-weight: 800; }
.inv-biz-details { color: #64748b; font-size: 0.8rem; margin-top: 0.25rem; white-space: pre-line; }
.inv-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
.inv-meta-block { }
.inv-meta-label { font-size: 0.72rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; }
.inv-meta-value { font-size: 0.9rem; font-weight: 600; margin-top: 0.15rem; }
.inv-invoice-num { font-size: 1.2rem; font-weight: 800; }
.inv-table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
.inv-table th { padding: 0.5rem 0.75rem; text-align: left; font-size: 0.75rem; font-weight: 700; color: white; text-transform: uppercase; }
.inv-table th:not(:first-child) { text-align: right; }
.inv-table td { padding: 0.45rem 0.75rem; font-size: 0.82rem; border-bottom: 1px solid #f1f5f9; }
.inv-table td:not(:first-child) { text-align: right; }
.inv-table .subtotal-row td { border-top: 1px solid #e2e8f0; border-bottom: none; padding-top: 0.65rem; color: #64748b; }
.inv-table .total-row td { font-weight: 800; font-size: 0.95rem; border-top: 2px solid var(--primary); border-bottom: none; padding-top: 0.5rem; }
.inv-notes { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #e2e8f0; }
.inv-notes-label { font-size: 0.72rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; margin-bottom: 0.4rem; }
.totals-summary { text-align: right; margin-top: 0.5rem; }
.totals-summary .row { display: flex; justify-content: flex-end; gap: 2rem; padding: 0.25rem 0; font-size: 0.85rem; }
.totals-summary .grand { font-weight: 800; font-size: 1rem; padding-top: 0.4rem; border-top: 2px solid var(--border); margin-top: 0.25rem; }
.color-row { display: flex; align-items: center; gap: 0.75rem; }
.color-row input[type=color] { width: 48px; height: 38px; padding: 2px; cursor: pointer; border-radius: 0.4rem; }
.color-row input[type=text] { flex: 1; }
.download-bar { text-align: center; margin-top: 1rem; }
/* Mobile: Form / Preview toggle bar */
.mobile-inv-tabs {
  display: none;
  gap: 0;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: .75rem;
  padding: .3rem;
  margin-bottom: 1.25rem;
}
.mob-inv-btn {
  flex: 1; padding: .6rem; border: none;
  font-size: .9rem; font-weight: 700;
  cursor: pointer; border-radius: .5rem;
  font-family: inherit; transition: all .15s;
  background: none; color: var(--muted);
}
.mob-inv-btn.active { background: var(--primary); color: #fff; }

@media (max-width: 767px) {
  body { overflow-x: hidden; }
  .mobile-inv-tabs { display: flex; }

  /* Single-column layout on mobile */
  .layout { grid-template-columns: 1fr !important; gap: 0; }
  .form-grid, .form-grid.three, .form-grid.four, .inv-meta {
    grid-template-columns: 1fr 1fr !important;
  }

  /* Form/preview show/hide controlled by JS */
  .preview-area { position: static !important; }

  input[type=text], input[type=number], input[type=email], textarea, select {
    width: 100% !important; min-width: 0 !important;
  }
  /* Keep color swatch its natural size */
  input[type=color] { width: 48px !important; }

  /* Items table scrolls horizontally */
  .items-table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; white-space: nowrap; }
  .items-table thead, .items-table tbody, .items-table tr { display: table; width: 100%; table-layout: fixed; }
  .items-table tbody { display: block; }

  /* Compact download button */
  .download-bar button { width: 100% !important; justify-content: center; }
}

/* Very small screens: single-column forms */
@media (max-width: 420px) {
  .form-grid, .form-grid.three, .form-grid.four, .inv-meta {
    grid-template-columns: 1fr !important;
  }
  .full { grid-column: 1 !important; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Invoice Manager</h1>
    <p>Create professional invoices and track their payment status.</p>
  </header>

  <!-- Tab nav -->
  <div style="display:flex;gap:0;background:#fff;border:1px solid var(--border);border-radius:.75rem;padding:.3rem;margin-bottom:1.5rem;max-width:360px">
    <button id="invTabCreate" onclick="switchInvTab('create')" style="flex:1;padding:.6rem 1rem;border:none;background:var(--primary);color:#fff;font-size:.9rem;font-weight:600;cursor:pointer;border-radius:.5rem;font-family:inherit">Create Invoice</button>
    <button id="invTabTrack" onclick="switchInvTab('track')" style="flex:1;padding:.6rem 1rem;border:none;background:none;color:var(--muted);font-size:.9rem;font-weight:600;cursor:pointer;border-radius:.5rem;font-family:inherit">Track Invoices</button>
  </div>

  <!-- CREATE TAB -->
  <div id="invPanelCreate">
  <!-- Mobile Form/Preview toggle (hidden on desktop) -->
  <div class="mobile-inv-tabs" id="mobileInvTabs">
    <button class="mob-inv-btn active" id="mobBtnForm" onclick="setMobInvTab('form')">Form</button>
    <button class="mob-inv-btn" id="mobBtnPreview" onclick="setMobInvTab('preview')">Preview</button>
  </div>

  <div class="layout">
    <!-- LEFT: Form -->
    <div class="form-col" id="invFormCol">
      <!-- Business Info -->
      <div class="card">
        <div class="section-title">Your Business</div>
        <div class="form-grid">
          <div class="full">
            <label for="business_name">Business Name</label>
            <input type="text" id="business_name" placeholder="Acme Corp" oninput="updatePreview()">
          </div>
          <div class="full">
            <label for="business_address">Business Address</label>
            <textarea id="business_address" placeholder="123 Main St&#10;City, State 12345" oninput="updatePreview()"></textarea>
          </div>
          <div>
            <label for="business_email">Business Email</label>
            <input type="email" id="business_email" placeholder="hello@acme.com" oninput="updatePreview()">
          </div>
          <div>
            <label for="accent_color_pick">Accent Color</label>
            <div class="color-row">
              <input type="color" id="accent_color_pick" value="#0f766e" oninput="syncColor(this.value)">
              <input type="text" id="accent_color" value="#0f766e" placeholder="#0f766e" oninput="syncColorText(this.value)">
            </div>
          </div>
        </div>
      </div>
      <!-- Invoice Details -->
      <div class="card">
        <div class="section-title">Invoice Details</div>
        <div class="form-grid four">
          <div>
            <label for="invoice_number">Invoice #</label>
            <input type="text" id="invoice_number" value="001" oninput="updatePreview()">
          </div>
          <div>
            <label for="invoice_date">Date</label>
            <input type="date" id="invoice_date" oninput="updatePreview()">
          </div>
          <div>
            <label for="due_date">Due Date</label>
            <input type="date" id="due_date" oninput="updatePreview()">
          </div>
          <div>
            <label for="currency">Currency</label>
            <select id="currency" onchange="updatePreview()">
              <option value="$">$ USD</option>
              <option value="€">€ EUR</option>
              <option value="£">£ GBP</option>
              <option value="¥">¥ JPY</option>
            </select>
          </div>
        </div>
      </div>
      <!-- Bill To -->
      <div class="card">
        <div class="section-title">Bill To</div>
        <div class="form-grid">
          <div>
            <label for="client_name">Client Name</label>
            <input type="text" id="client_name" placeholder="Client name" oninput="updatePreview()">
          </div>
          <div>
            <label for="client_email">Client Email</label>
            <input type="email" id="client_email" placeholder="client@email.com" oninput="updatePreview()">
          </div>
        </div>
      </div>
      <!-- Line Items -->
      <div class="card">
        <div class="section-title">Line Items</div>
        <table class="items-table">
          <thead>
            <tr>
              <th style="width:45%">Description</th>
              <th style="width:12%">Qty</th>
              <th style="width:18%">Unit Price</th>
              <th style="width:15%">Total</th>
              <th style="width:10%"></th>
            </tr>
          </thead>
          <tbody id="items-body"></tbody>
        </table>
        <button class="btn btn-ghost btn-sm" onclick="addItem()">+ Add Item</button>
      </div>
      <!-- Tax & Notes -->
      <div class="card">
        <div class="section-title">Tax &amp; Notes</div>
        <div class="form-grid">
          <div>
            <label for="tax_rate">Tax Rate (%)</label>
            <input type="number" id="tax_rate" value="0" min="0" max="100" step="0.1" oninput="updatePreview()">
          </div>
          <div class="full">
            <label for="notes">Notes</label>
            <textarea id="notes" placeholder="Payment terms, bank details, thank you message..." oninput="updatePreview()"></textarea>
          </div>
        </div>
      </div>
    </div>
    <!-- RIGHT: Preview -->
    <div class="preview-area" id="invPreviewCol">
      <div class="card">
        <div class="section-title">Live Preview</div>
        <div class="preview-invoice" id="preview"></div>
        <div class="download-bar" style="margin-top:1.25rem;">
          <button class="btn btn-primary" onclick="downloadPDF()" style="width:100%;justify-content:center;padding:0.75rem;">
            Download PDF
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
  </div><!-- /invPanelCreate -->

  <!-- TRACK TAB -->
  <div id="invPanelTrack" style="display:none">
    <div class="stats" id="invStats"></div>
    <div class="card">
      <p style="font-weight:700;margin-bottom:.75rem">Add Invoice</p>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.75rem;align-items:end">
        <div><label for="invNum">Invoice #</label><input type="text" id="invNum" placeholder="INV-001"></div>
        <div><label for="invClient">Client</label><input type="text" id="invClient" placeholder="Client name"></div>
        <div><label for="invAmount">Amount</label><input type="number" id="invAmount" placeholder="0.00" min="0" step="0.01"></div>
        <div><label for="invIssue">Issue Date</label><input type="date" id="invIssue"></div>
        <div><label for="invDue">Due Date</label><input type="date" id="invDue"></div>
        <div><label for="invStatus">Status</label>
          <select id="invStatus">
            <option value="unpaid">Unpaid</option>
            <option value="paid">Paid</option>
            <option value="overdue">Overdue</option>
          </select>
        </div>
        <div><label for="invNotes">Notes</label><input type="text" id="invNotes" placeholder="Optional…"></div>
        <div style="align-self:end"><button class="btn btn-primary" onclick="addTrackedInvoice()" style="width:100%">+ Add</button></div>
      </div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem;margin-bottom:.75rem">
        <div style="display:flex;gap:.5rem;flex-wrap:wrap">
          <button class="inv-filter-btn inv-filter-active" onclick="setInvFilter('all',this)">All</button>
          <button class="inv-filter-btn" onclick="setInvFilter('unpaid',this)">Unpaid</button>
          <button class="inv-filter-btn" onclick="setInvFilter('overdue',this)">Overdue</button>
          <button class="inv-filter-btn" onclick="setInvFilter('paid',this)">Paid</button>
        </div>
        <input type="text" id="invSearch" placeholder="Search client or #…" style="width:200px" oninput="renderInvList()">
      </div>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:.875rem">
          <thead>
            <tr>
              <th onclick="sortInv('num')" style="padding:.5rem .75rem;text-align:left;font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;border-bottom:2px solid var(--border);cursor:pointer">Invoice #</th>
              <th onclick="sortInv('client')" style="padding:.5rem .75rem;text-align:left;font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;border-bottom:2px solid var(--border);cursor:pointer">Client</th>
              <th onclick="sortInv('amount')" style="padding:.5rem .75rem;text-align:left;font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;border-bottom:2px solid var(--border);cursor:pointer">Amount</th>
              <th onclick="sortInv('issue')" style="padding:.5rem .75rem;text-align:left;font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;border-bottom:2px solid var(--border);cursor:pointer">Issue</th>
              <th onclick="sortInv('due')" style="padding:.5rem .75rem;text-align:left;font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;border-bottom:2px solid var(--border);cursor:pointer">Due</th>
              <th style="padding:.5rem .75rem;text-align:left;font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;border-bottom:2px solid var(--border)">Status</th>
              <th style="padding:.5rem .75rem;text-align:left;font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;border-bottom:2px solid var(--border)">Notes</th>
              <th style="border-bottom:2px solid var(--border)"></th>
            </tr>
          </thead>
          <tbody id="invTableBody"></tbody>
        </table>
      </div>
    </div>
  </div><!-- /invPanelTrack -->

</div><!-- /container -->

<style>
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:1rem;margin-bottom:1.25rem}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:.75rem;padding:1rem;text-align:center}
.stat-card .sv{font-size:1.4rem;font-weight:800}
.stat-card .sl{font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:.15rem}
.inv-filter-btn{padding:.35rem .85rem;border:1px solid var(--border);border-radius:2rem;font-size:.8rem;font-weight:600;cursor:pointer;background:#fff;color:var(--muted);font-family:inherit}
.inv-filter-btn.inv-filter-active{background:var(--primary);color:#fff;border-color:var(--primary)}
.inv-badge{display:inline-block;padding:.18rem .6rem;border-radius:2rem;font-size:.72rem;font-weight:700;cursor:pointer}
.inv-badge-paid{background:#d1fae5;color:#065f46}
.inv-badge-unpaid{background:#fef3c7;color:#92400e}
.inv-badge-overdue{background:#fee2e2;color:#991b1b}
</style>

<script>
// Set today's date as default
const today = new Date().toISOString().split('T')[0];
document.getElementById('invoice_date').value = today;
const due = new Date(); due.setDate(due.getDate() + 30);
document.getElementById('due_date').value = due.toISOString().split('T')[0];

let accentColor = '#0f766e';

function syncColor(val) {
  accentColor = val;
  document.getElementById('accent_color').value = val;
  updatePreview();
}
function syncColorText(val) {
  if (/^#[0-9a-fA-F]{6}$/.test(val)) {
    accentColor = val;
    document.getElementById('accent_color_pick').value = val;
    updatePreview();
  }
}

let itemCount = 0;
function addItem(desc='', qty=1, price=0) {
  itemCount++;
  const id = itemCount;
  const tbody = document.getElementById('items-body');
  const tr = document.createElement('tr');
  tr.id = 'item-row-' + id;
  tr.innerHTML = `
    <td><input type="text" value="${desc}" placeholder="Service description" oninput="calcRow(${id});updatePreview()"></td>
    <td><input type="number" value="${qty}" min="0" step="0.01" oninput="calcRow(${id});updatePreview()"></td>
    <td><input type="number" value="${price}" min="0" step="0.01" oninput="calcRow(${id});updatePreview()"></td>
    <td class="total-cell" id="row-total-${id}">${getCurrency()}0.00</td>
    <td><button class="btn btn-danger btn-sm" onclick="removeItem(${id})"><span aria-hidden="true">&#x2715;</span><span class="sr-only">Remove</span></button></td>
  `;
  tbody.appendChild(tr);
  calcRow(id);
  updatePreview();
}
function calcRow(id) {
  const row = document.getElementById('item-row-' + id);
  if (!row) return;
  const inputs = row.querySelectorAll('input[type=number]');
  const qty = parseFloat(inputs[0].value) || 0;
  const price = parseFloat(inputs[1].value) || 0;
  document.getElementById('row-total-' + id).textContent = getCurrency() + (qty * price).toFixed(2);
}
function removeItem(id) {
  document.getElementById('item-row-' + id)?.remove();
  updatePreview();
}
function getCurrency() {
  return document.getElementById('currency').value;
}
function getItems() {
  const rows = document.querySelectorAll('#items-body tr');
  return Array.from(rows).map(tr => {
    const inputs = tr.querySelectorAll('input');
    return {
      description: inputs[0].value,
      qty: inputs[1].value,
      price: inputs[2].value
    };
  });
}
function calcTotals() {
  const items = getItems();
  const currency = getCurrency();
  const taxRate = parseFloat(document.getElementById('tax_rate').value) || 0;
  let subtotal = 0;
  items.forEach(i => { subtotal += (parseFloat(i.qty)||0) * (parseFloat(i.price)||0); });
  const tax = subtotal * taxRate / 100;
  const grand = subtotal + tax;
  return { subtotal, tax, grand, taxRate, currency };
}
function updatePreview() {
  const bizName = document.getElementById('business_name').value || 'Your Business';
  const bizAddr = document.getElementById('business_address').value || '';
  const bizEmail = document.getElementById('business_email').value || '';
  const invNum = document.getElementById('invoice_number').value || '001';
  const date = document.getElementById('invoice_date').value || '';
  const dueDate = document.getElementById('due_date').value || '';
  const clientName = document.getElementById('client_name').value || '';
  const clientEmail = document.getElementById('client_email').value || '';
  const notes = document.getElementById('notes').value || '';
  const items = getItems();
  const { subtotal, tax, grand, taxRate, currency } = calcTotals();

  let itemRows = items.map(i => {
    const total = (parseFloat(i.qty)||0) * (parseFloat(i.price)||0);
    return `<tr>
      <td>${escHtml(i.description)}</td>
      <td style="text-align:right">${i.qty}</td>
      <td style="text-align:right">${currency}${parseFloat(i.price||0).toFixed(2)}</td>
      <td style="text-align:right">${currency}${total.toFixed(2)}</td>
    </tr>`;
  }).join('');

  let taxRow = taxRate > 0 ? `<tr class="subtotal-row"><td colspan="3" style="text-align:right">Tax (${taxRate}%)</td><td style="text-align:right">${currency}${tax.toFixed(2)}</td></tr>` : '';

  document.getElementById('preview').innerHTML = `
    <div class="inv-header">
      <div class="inv-biz-name" style="color:${accentColor}">${escHtml(bizName)}</div>
      ${bizAddr ? `<div class="inv-biz-details">${escHtml(bizAddr)}</div>` : ''}
      ${bizEmail ? `<div style="color:#64748b;font-size:0.8rem">${escHtml(bizEmail)}</div>` : ''}
    </div>
    <div class="inv-meta">
      <div>
        ${clientName ? `<div class="inv-meta-block"><div class="inv-meta-label">Bill To</div><div class="inv-meta-value">${escHtml(clientName)}</div>${clientEmail ? `<div style="color:#64748b;font-size:0.8rem">${escHtml(clientEmail)}</div>` : ''}</div>` : ''}
      </div>
      <div style="text-align:right">
        <div class="inv-invoice-num" style="color:${accentColor}">INVOICE #${escHtml(invNum)}</div>
        ${date ? `<div style="color:#64748b;font-size:0.8rem;margin-top:0.3rem">Date: ${date}</div>` : ''}
        ${dueDate ? `<div style="color:#64748b;font-size:0.8rem">Due: ${dueDate}</div>` : ''}
      </div>
    </div>
    <table class="inv-table">
      <thead style="background:${accentColor}">
        <tr>
          <th>Description</th>
          <th>Qty</th>
          <th>Unit Price</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody>${itemRows}</tbody>
      <tfoot>
        <tr class="subtotal-row"><td colspan="3" style="text-align:right">Subtotal</td><td style="text-align:right">${currency}${subtotal.toFixed(2)}</td></tr>
        ${taxRow}
        <tr class="total-row"><td colspan="3" style="text-align:right;color:${accentColor}">TOTAL</td><td style="text-align:right;color:${accentColor}">${currency}${grand.toFixed(2)}</td></tr>
      </tfoot>
    </table>
    ${notes ? `<div class="inv-notes"><div class="inv-notes-label">Notes</div><div style="font-size:0.82rem;white-space:pre-line">${escHtml(notes)}</div></div>` : ''}
  `;
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
async function downloadPDF() {
  const payload = {
    business_name: document.getElementById('business_name').value,
    business_address: document.getElementById('business_address').value,
    business_email: document.getElementById('business_email').value,
    invoice_number: document.getElementById('invoice_number').value,
    date: document.getElementById('invoice_date').value,
    due_date: document.getElementById('due_date').value,
    currency: document.getElementById('currency').value,
    client_name: document.getElementById('client_name').value,
    client_email: document.getElementById('client_email').value,
    tax_rate: document.getElementById('tax_rate').value,
    notes: document.getElementById('notes').value,
    color: accentColor,
    items: getItems()
  };
  try {
    const res = await fetch('api/generate', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    if (!res.ok) throw new Error('Failed');
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `invoice-${payload.invoice_number}.pdf`; a.click();
    URL.revokeObjectURL(url);
  } catch(e) { alert('Error generating PDF: ' + e.message); }
}

/* ── Mobile form/preview toggle ──────────────────────── */
function setMobInvTab(tab) {
  var isForm = tab === 'form';
  var form    = document.getElementById('invFormCol');
  var preview = document.getElementById('invPreviewCol');
  var btnF    = document.getElementById('mobBtnForm');
  var btnP    = document.getElementById('mobBtnPreview');
  if (window.innerWidth >= 768) return; // desktop: both always visible
  if (form)    form.style.display    = isForm ? '' : 'none';
  if (preview) preview.style.display = isForm ? 'none' : '';
  if (btnF) { btnF.classList.toggle('active', isForm); }
  if (btnP) { btnP.classList.toggle('active', !isForm); }
  if (!isForm) updatePreview(); // refresh preview when switching to it
}

// On mobile, hide preview panel by default
(function(){
  if (window.innerWidth < 768) {
    var preview = document.getElementById('invPreviewCol');
    if (preview) preview.style.display = 'none';
  }
  window.addEventListener('resize', function(){
    var form    = document.getElementById('invFormCol');
    var preview = document.getElementById('invPreviewCol');
    if (window.innerWidth >= 768) {
      if (form)    form.style.display    = '';
      if (preview) preview.style.display = '';
    }
  });
})();

/* ── Tab switching ───────────────────────────────────── */
function switchInvTab(tab){
  const isCreate = tab==='create';
  document.getElementById('invPanelCreate').style.display = isCreate ? '' : 'none';
  document.getElementById('invPanelTrack').style.display  = isCreate ? 'none' : '';
  const btnC = document.getElementById('invTabCreate');
  const btnT = document.getElementById('invTabTrack');
  btnC.style.background = isCreate ? 'var(--primary)' : 'none';
  btnC.style.color       = isCreate ? '#fff' : 'var(--muted)';
  btnT.style.background  = isCreate ? 'none' : 'var(--primary)';
  btnT.style.color        = isCreate ? 'var(--muted)' : '#fff';
  if (!isCreate) renderInvTracker();
}

/* ── Invoice Tracker ─────────────────────────────────── */
const INV_KEY = 'invoices_v2';
let trackedInvoices = JSON.parse(localStorage.getItem(INV_KEY) || '[]');
let invFilterStatus = 'all';
let invSortKey = 'due';
let invSortDir = 1;

// Seed sample data if empty
if (!trackedInvoices.length) {
  const past  = d => { const dt=new Date(); dt.setDate(dt.getDate()-d); return dt.toISOString().split('T')[0]; };
  const future= d => { const dt=new Date(); dt.setDate(dt.getDate()+d); return dt.toISOString().split('T')[0]; };
  trackedInvoices = [
    {id:1,num:'INV-001',client:'Acme Corp',   amount:5200, issue:past(30), due:past(5),   status:'overdue', notes:''},
    {id:2,num:'INV-002',client:'Global Tech',  amount:12800,issue:past(20), due:future(10),status:'unpaid',  notes:'Net 30'},
    {id:3,num:'INV-003',client:'Blue Sky LLC', amount:3400, issue:past(45), due:past(15),  status:'paid',    notes:''},
    {id:4,num:'INV-004',client:'Sunrise Media',amount:7600, issue:past(10), due:future(20),status:'unpaid',  notes:'Pending review'},
  ];
  localStorage.setItem(INV_KEY, JSON.stringify(trackedInvoices));
}

function saveInv(){ localStorage.setItem(INV_KEY, JSON.stringify(trackedInvoices)); }

function addTrackedInvoice(){
  const num    = document.getElementById('invNum').value.trim();
  const client = document.getElementById('invClient').value.trim();
  const amount = parseFloat(document.getElementById('invAmount').value) || 0;
  const issue  = document.getElementById('invIssue').value;
  const due    = document.getElementById('invDue').value;
  const status = document.getElementById('invStatus').value;
  const notes  = document.getElementById('invNotes').value.trim();
  if (!client || !amount) { alert('Client and amount are required.'); return; }
  trackedInvoices.push({ id:Date.now(), num:num||'INV-'+Date.now(), client, amount, issue, due, status, notes });
  saveInv(); renderInvTracker();
  ['invNum','invClient','invAmount','invNotes'].forEach(id=>document.getElementById(id).value='');
}

function deleteTrackedInvoice(id){
  trackedInvoices = trackedInvoices.filter(i=>i.id!==id); saveInv(); renderInvTracker();
}

function toggleInvStatus(id){
  const inv = trackedInvoices.find(i=>i.id===id); if (!inv) return;
  const cycle={unpaid:'paid',paid:'overdue',overdue:'unpaid'};
  inv.status = cycle[inv.status]||'unpaid';
  saveInv(); renderInvTracker();
}

function setInvFilter(f,btn){
  invFilterStatus=f;
  document.querySelectorAll('.inv-filter-btn').forEach(b=>b.classList.remove('inv-filter-active'));
  btn.classList.add('inv-filter-active');
  renderInvList();
}

function sortInv(key){
  if(invSortKey===key)invSortDir*=-1; else{invSortKey=key;invSortDir=1;}
  renderInvList();
}

function fmt$(v){ return '$'+parseFloat(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDt(d){ if(!d)return '—'; const dt=new Date(d+'T00:00:00'); return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function isInvOverdue(inv){ if(!inv.due)return false; return inv.status!=='paid'&&new Date(inv.due+'T00:00:00')<new Date(); }

function renderInvStats(){
  const paid = trackedInvoices.filter(i=>i.status==='paid').reduce((a,i)=>a+i.amount,0);
  const outstanding = trackedInvoices.filter(i=>i.status!=='paid').reduce((a,i)=>a+i.amount,0);
  const overdue = trackedInvoices.filter(i=>i.status==='overdue'||isInvOverdue(i)).length;
  document.getElementById('invStats').innerHTML=`
    <div class="stat-card"><div class="sv" style="color:var(--primary)">${trackedInvoices.length}</div><div class="sl">Total</div></div>
    <div class="stat-card"><div class="sv" style="color:#059669">${fmt$(paid)}</div><div class="sl">Paid</div></div>
    <div class="stat-card"><div class="sv" style="color:#d97706">${fmt$(outstanding)}</div><div class="sl">Outstanding</div></div>
    <div class="stat-card"><div class="sv" style="color:#dc2626">${overdue}</div><div class="sl">Overdue</div></div>`;
}

function renderInvList(){
  const q = document.getElementById('invSearch')?.value?.toLowerCase()||'';
  let list = trackedInvoices.filter(i=>{
    if(invFilterStatus!=='all'&&i.status!==invFilterStatus)return false;
    if(q&&!i.client.toLowerCase().includes(q)&&!i.num.toLowerCase().includes(q))return false;
    return true;
  });
  list.sort((a,b)=>{
    const va=a[invSortKey], vb=b[invSortKey];
    if(invSortKey==='amount')return(va-vb)*invSortDir;
    return (va||'').toString().localeCompare((vb||'').toString())*invSortDir;
  });
  const tbody=document.getElementById('invTableBody');
  if(!list.length){tbody.innerHTML='<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:2rem">No invoices found.</td></tr>';return;}
  tbody.innerHTML=list.map(inv=>{
    const ov=isInvOverdue(inv);
    const bc=inv.status==='paid'?'inv-badge-paid':ov?'inv-badge-overdue':'inv-badge-unpaid';
    const bl=inv.status==='paid'?'Paid':ov?'Overdue':'Unpaid';
    return `<tr style="${ov?'background:#fff7f7':''}">
      <td style="padding:.6rem .75rem;border-bottom:1px solid var(--border)"><strong>${escHtml(inv.num)}</strong></td>
      <td style="padding:.6rem .75rem;border-bottom:1px solid var(--border)">${escHtml(inv.client)}</td>
      <td style="padding:.6rem .75rem;border-bottom:1px solid var(--border);font-weight:700">${fmt$(inv.amount)}</td>
      <td style="padding:.6rem .75rem;border-bottom:1px solid var(--border)">${fmtDt(inv.issue)}</td>
      <td style="padding:.6rem .75rem;border-bottom:1px solid var(--border);color:${ov?'#dc2626':'inherit'}">${fmtDt(inv.due)}</td>
      <td style="padding:.6rem .75rem;border-bottom:1px solid var(--border)"><span class="inv-badge ${bc}" onclick="toggleInvStatus(${inv.id})" title="Click to cycle status">${bl}</span></td>
      <td style="padding:.6rem .75rem;border-bottom:1px solid var(--border);color:var(--muted);font-size:.8rem">${escHtml(inv.notes||'—')}</td>
      <td style="padding:.6rem .75rem;border-bottom:1px solid var(--border)"><button class="btn btn-danger btn-sm" onclick="deleteTrackedInvoice(${inv.id})"><span aria-hidden="true">&#x2715;</span><span class="sr-only">Remove</span></button></td>
    </tr>`;
  }).join('');
}

function renderInvTracker(){
  // Set default dates
  const today2 = new Date().toISOString().split('T')[0];
  const nd = new Date(); nd.setDate(nd.getDate()+30);
  document.getElementById('invIssue').value = today2;
  document.getElementById('invDue').value = nd.toISOString().split('T')[0];
  renderInvStats(); renderInvList();
}
