<body>
<header><h1>Chess vs AI</h1></header>
<div class="container">
  <div class="board-wrap">
    <div id="status">Your turn — <span>White</span></div>
    <div id="board"></div>
    <div class="coords" id="files"></div>
  </div>
  <div class="side-panel">
    <div class="panel-box">
      <h3>Game</h3>
      <select id="diffSel">
        <option value="1">Easy (depth 1)</option>
        <option value="2" selected>Medium (depth 2)</option>
        <option value="3">Hard (depth 3)</option>
      </select>
      <button class="btn btn-new" onclick="newGame()">New Game</button>
      <button class="btn btn-undo" onclick="undoMove()">Undo</button>
    </div>
    <div class="panel-box">
      <h3>Captured</h3>
      <div class="captured" id="capW"></div>
      <div style="font-size:.7rem;color:#475569;margin:.3rem 0">Black captures:</div>
      <div class="captured" id="capB"></div>
    </div>
    <div class="panel-box">
      <h3>Move History</h3>
      <div class="move-list" id="moveList"></div>
    </div>
  </div>
</div>
<script>
// ── Piece constants ──────────────────────────────────
const EMPTY=0,P=1,N=2,B=3,R=4,Q=5,K=6;
const W=8,BL=16;
const GLYPHS={[W|P]:'♙',[W|N]:'♘',[W|B]:'♗',[W|R]:'♖',[W|Q]:'♕',[W|K]:'♔',
              [BL|P]:'♟',[BL|N]:'♞',[BL|B]:'♝',[BL|R]:'♜',[BL|Q]:'♛',[BL|K]:'♚'};
const color=p=>p&W?W:p&BL?BL:0;
const type=p=>p&7;

// ── Board state ──────────────────────────────────────
let board,turn,selected,legalMoves,history,captured,lastMove,gameOver;

function initBoard(){
  board=new Array(64).fill(0);
  const back=[R,N,B,Q,K,B,N,R];
  for(let i=0;i<8;i++){board[i]=BL|back[i];board[8+i]=BL|P;board[48+i]=W|P;board[56+i]=W|back[i];}
}

function newGame(){
  // Kill any running AI search so stale results don't arrive after reset
  if(aiWorker){aiWorker.terminate();aiWorker=null;}
  initBoard();
  turn=W; selected=null; legalMoves=[]; history=[]; captured={[W]:[],[BL]:[]};
  lastMove=null; gameOver=false;
  render(); updateStatus('Your turn','White');
}

// ── Move generation ──────────────────────────────────
const dirs={[N]:[-17,-15,-10,-6,6,10,15,17],[B]:[-9,-7,7,9],[R]:[-8,-1,1,8],[Q]:[-9,-8,-7,-1,1,7,8,9]};
const sliders=new Set([B,R,Q]);

function inBounds(sq){ return sq>=0&&sq<64; }
function sameRow(a,b){ return Math.floor(a/8)===Math.floor(b/8); }

function pseudoMoves(bd,sq){
  const p=bd[sq], c=color(p), t=type(p), mv=[];
  if(!p) return mv;
  if(t===P){
    const dir=c===W?-8:8, startRow=c===W?6:1, row=Math.floor(sq/8);
    const fwd=sq+dir;
    if(inBounds(fwd)&&!bd[fwd]){mv.push(fwd);const fwd2=sq+2*dir;if(row===startRow&&!bd[fwd2])mv.push(fwd2);}
    for(const cap of[sq+dir-1,sq+dir+1]){
      if(inBounds(cap)&&Math.abs((cap%8)-(sq%8))===1&&bd[cap]&&color(bd[cap])!==c) mv.push(cap);
    }
    return mv;
  }
  if(sliders.has(t)){
    for(const d of dirs[t]){
      let cur=sq+d;
      while(inBounds(cur)){
        if(Math.abs((cur%8)-((cur-d)%8))>1) break; // prevent wrapping across board edge
        if(bd[cur]){if(color(bd[cur])!==c)mv.push(cur);break;}
        mv.push(cur); cur+=d;
      }
    }
    return mv;
  }
  // Knight / King
  for(const d of dirs[t===K?Q:N]){
    const to=sq+d;
    if(!inBounds(to)) continue;
    if(t===K&&Math.abs((to%8)-(sq%8))>1) continue;
    if(t===N){const dr=Math.abs(Math.floor(to/8)-Math.floor(sq/8)),dc=Math.abs((to%8)-(sq%8));if(dr+dc!==3||dr===0||dc===0) continue;}
    if(!bd[to]||color(bd[to])!==c) mv.push(to);
  }
  return mv;
}

function isInCheck(bd,c){
  const kSq=bd.findIndex(p=>p===(c|K));
  if(kSq<0) return true;
  const opp=c===W?BL:W;
  for(let sq=0;sq<64;sq++){if(color(bd[sq])===opp&&pseudoMoves(bd,sq).includes(kSq)) return true;}
  return false;
}

function legalMovesFor(bd,sq){
  return pseudoMoves(bd,sq).filter(to=>{
    const nb=[...bd]; nb[to]=nb[sq]; nb[sq]=0;
    return !isInCheck(nb,color(bd[sq]));
  });
}

// ── Evaluation ──────────────────────────────────────
const VALS={[P]:100,[N]:320,[B]:330,[R]:500,[Q]:900,[K]:20000};
const PST={[P]:[0,0,0,0,0,0,0,0,50,50,50,50,50,50,50,50,10,10,20,30,30,20,10,10,5,5,10,25,25,10,5,5,0,0,0,20,20,0,0,0,5,-5,-10,0,0,-10,-5,5,5,10,10,-20,-20,10,10,5,0,0,0,0,0,0,0,0],
           [N]:[-50,-40,-30,-30,-30,-30,-40,-50,-40,-20,0,0,0,0,-20,-40,-30,0,10,15,15,10,0,-30,-30,5,15,20,20,15,5,-30,-30,0,15,20,20,15,0,-30,-30,5,10,15,15,10,5,-30,-40,-20,0,5,5,0,-20,-40,-50,-40,-30,-30,-30,-30,-40,-50]};

function evaluate(bd){
  let score=0;
  for(let i=0;i<64;i++){
    const p=bd[i];if(!p)continue;
    const t=type(p),c=color(p),v=VALS[t]||0;
    const pst=(PST[t]??(new Array(64).fill(0)));
    const idx=c===W?i:(63-i);
    score+=(c===W?1:-1)*(v+(pst[idx]||0));
  }
  return score;
}

function minimax(bd,depth,alpha,beta,maximizing){
  if(depth===0) return evaluate(bd);
  const c=maximizing?W:BL;
  let moves=[];
  for(let sq=0;sq<64;sq++){if(color(bd[sq])===c)moves.push(...legalMovesFor(bd,sq).map(to=>({from:sq,to})));}
  if(!moves.length) return isInCheck(bd,c)?( maximizing?-20000:20000):0;
  if(maximizing){
    let v=-Infinity;
    for(const m of moves){const nb=[...bd];nb[m.to]=nb[m.from];nb[m.from]=0;v=Math.max(v,minimax(nb,depth-1,alpha,beta,false));alpha=Math.max(alpha,v);if(beta<=alpha)break;}
    return v;
  } else {
    let v=Infinity;
    for(const m of moves){const nb=[...bd];nb[m.to]=nb[m.from];nb[m.from]=0;v=Math.min(v,minimax(nb,depth-1,alpha,beta,true));beta=Math.min(beta,v);if(beta<=alpha)break;}
    return v;
  }
}

function bestMove(bd,depth){
  let best=null,bestVal=Infinity;
  for(let sq=0;sq<64;sq++){
    if(color(bd[sq])!==BL) continue;
    for(const to of legalMovesFor(bd,sq)){
      const nb=[...bd];nb[to]=nb[sq];nb[sq]=0;
      const v=minimax(nb,depth-1,-Infinity,Infinity,true);
      if(v<bestVal){bestVal=v;best={from:sq,to};}
    }
  }
  return best;
}

// ── UI ───────────────────────────────────────────────
function render(){
  const bel=document.getElementById('board');
  bel.innerHTML='';
  for(let r=0;r<8;r++){
    for(let f=0;f<8;f++){
      const sq=r*8+f, div=document.createElement('div');
      div.className='sq '+((r+f)%2===0?'light':'dark');
      div.dataset.sq=sq;
      if(lastMove&&(sq===lastMove.from||sq===lastMove.to)) div.classList.add('last');
      if(sq===selected) div.classList.add('selected');
      if(legalMoves.includes(sq)) div.classList.add('legal');
      const p=board[sq]; if(p){const sp=document.createElement('span');sp.textContent=GLYPHS[p]||'';sp.className=color(p)===W?'pw':'pb';div.appendChild(sp);}
      div.onclick=()=>clickSq(sq);
      bel.appendChild(div);
    }
  }
  // files
  const fl=document.getElementById('files');
  fl.innerHTML=['a','b','c','d','e','f','g','h'].map(f=>`<div>${f}</div>`).join('');
  // captured
  document.getElementById('capW').textContent=(captured[W]||[]).map(p=>GLYPHS[W|p]||'').join('');
  document.getElementById('capB').textContent=(captured[BL]||[]).map(p=>GLYPHS[BL|p]||'').join('');
  // move history
  const ml=document.getElementById('moveList');
  ml.innerHTML='';
  for(let i=0;i<history.length;i+=2){
    const n=Math.floor(i/2)+1;
    ml.innerHTML+=`<div class="move-row"><b>${n}.</b><span>${history[i]||''}</span><span>${history[i+1]||''}</span></div>`;
  }
  ml.scrollTop=ml.scrollHeight;
}

function toAN(sq){ return 'abcdefgh'[sq%8]+(8-Math.floor(sq/8)); }

function clickSq(sq){
  if(gameOver||turn!==W) return;
  if(selected!==null){
    if(legalMoves.includes(sq)){
      doMove(selected,sq,true);
      return;
    }
  }
  if(board[sq]&&color(board[sq])===W){
    selected=sq; legalMoves=legalMovesFor(board,sq); render();
  } else {
    selected=null; legalMoves=[]; render();
  }
}

function doMove(from,to,isHuman){
  const cap=board[to];
  if(cap){ const c=color(cap); captured[c===W?BL:W].push(type(cap)); }
  const notation=toAN(from)+toAN(to);
  board[to]=board[from]; board[from]=0;
  // pawn promotion
  if(type(board[to])===P&&(to<8||to>=56)) board[to]=(color(board[to]))|Q;
  lastMove={from,to};
  selected=null; legalMoves=[];
  history.push(notation);
  if(isHuman){
    turn=BL; render(); updateStatus('AI thinking…','Black');
    setTimeout(aiMove,80);
  } else {
    turn=W; render();
    // check for checkmate/stalemate/check
    const wMoves=getAllMoves(board,W);
    if(!wMoves.length){
      if(isInCheck(board,W)){updateStatus('Checkmate! Black wins ♟','');}
      else{updateStatus('Stalemate — Draw','');}
      gameOver=true; return;
    }
    if(isInCheck(board,W)){updateStatus('Your turn — <span style="color:#ef4444">⚠ In Check!</span>','');}
    else{updateStatus('Your turn','White');}
  }
}

function getAllMoves(bd,c){
  const mv=[];
  for(let sq=0;sq<64;sq++){if(color(bd[sq])===c)mv.push(...legalMovesFor(bd,sq).map(to=>({from:sq,to})));}
  return mv;
}

// ── Web Worker (inline Blob) — non-blocking AI with hard time limit ─────
const WORKER_SRC=`
const P=1,N=2,B=3,R=4,Q=5,K=6,W=8,BL=16;
const color=p=>p&8?8:p&16?16:0;
const type=p=>p&7;
const dirs={[N]:[-17,-15,-10,-6,6,10,15,17],[B]:[-9,-7,7,9],[R]:[-8,-1,1,8],[Q]:[-9,-8,-7,-1,1,7,8,9]};
const sliders=new Set([B,R,Q]);
function inBounds(sq){return sq>=0&&sq<64;}
function pseudoMoves(bd,sq){
  const p=bd[sq],c=color(p),t=type(p),mv=[];
  if(!p)return mv;
  if(t===P){
    const dir=c===W?-8:8,startRow=c===W?6:1,row=Math.floor(sq/8);
    const fwd=sq+dir;
    if(inBounds(fwd)&&!bd[fwd]){mv.push(fwd);const f2=sq+2*dir;if(row===startRow&&!bd[f2])mv.push(f2);}
    for(const cap of[sq+dir-1,sq+dir+1]){if(inBounds(cap)&&Math.abs((cap%8)-(sq%8))===1&&bd[cap]&&color(bd[cap])!==c)mv.push(cap);}
    return mv;
  }
  if(sliders.has(t)){
    for(const d of dirs[t]){let cur=sq+d;while(inBounds(cur)){if(Math.abs((cur%8)-((cur-d)%8))>1)break;if(bd[cur]){if(color(bd[cur])!==c)mv.push(cur);break;}mv.push(cur);cur+=d;}}
    return mv;
  }
  for(const d of dirs[t===K?Q:N]){const to=sq+d;if(!inBounds(to))continue;if(t===K&&Math.abs((to%8)-(sq%8))>1)continue;if(t===N){const dr=Math.abs(Math.floor(to/8)-Math.floor(sq/8)),dc=Math.abs((to%8)-(sq%8));if(dr+dc!==3||dr===0||dc===0)continue;}if(!bd[to]||color(bd[to])!==c)mv.push(to);}
  return mv;
}
function isInCheck(bd,c){
  const kSq=bd.findIndex(p=>p===(c|K));if(kSq<0)return true;
  const opp=c===W?BL:W;
  for(let sq=0;sq<64;sq++){if(color(bd[sq])===opp&&pseudoMoves(bd,sq).includes(kSq))return true;}
  return false;
}
function legalFor(bd,sq){
  return pseudoMoves(bd,sq).filter(to=>{const nb=[...bd];nb[to]=nb[sq];nb[sq]=0;return !isInCheck(nb,color(bd[sq]));});
}
const VALS={[P]:100,[N]:320,[B]:330,[R]:500,[Q]:900,[K]:20000};
const PST={[P]:[0,0,0,0,0,0,0,0,50,50,50,50,50,50,50,50,10,10,20,30,30,20,10,10,5,5,10,25,25,10,5,5,0,0,0,20,20,0,0,0,5,-5,-10,0,0,-10,-5,5,5,10,10,-20,-20,10,10,5,0,0,0,0,0,0,0,0],
           [N]:[-50,-40,-30,-30,-30,-30,-40,-50,-40,-20,0,0,0,0,-20,-40,-30,0,10,15,15,10,0,-30,-30,5,15,20,20,15,5,-30,-30,0,15,20,20,15,0,-30,-30,5,10,15,15,10,5,-30,-40,-20,0,5,5,0,-20,-40,-50,-40,-30,-30,-30,-30,-40,-50]};
function evaluate(bd){
  let s=0;for(let i=0;i<64;i++){const p=bd[i];if(!p)continue;const t=type(p),c=color(p),v=VALS[t]||0;const pst=PST[t]||(new Array(64).fill(0));s+=(c===W?1:-1)*(v+(pst[c===W?i:63-i]||0));}return s;
}

// deadline is set before each search; minimax cuts off when exceeded
let _deadline=0;
function minimax(bd,depth,alpha,beta,max){
  if(Date.now()>_deadline)return evaluate(bd); // hard time cut-off
  if(depth===0)return evaluate(bd);
  const c=max?W:BL;const moves=[];
  for(let sq=0;sq<64;sq++){if(color(bd[sq])===c)for(const to of legalFor(bd,sq))moves.push({from:sq,to});}
  if(!moves.length)return isInCheck(bd,c)?(max?-20000:20000):0;
  if(max){let v=-Infinity;for(const m of moves){const nb=[...bd];nb[m.to]=nb[m.from];nb[m.from]=0;v=Math.max(v,minimax(nb,depth-1,alpha,beta,false));alpha=Math.max(alpha,v);if(beta<=alpha)break;}return v;}
  else{let v=Infinity;for(const m of moves){const nb=[...bd];nb[m.to]=nb[m.from];nb[m.from]=0;v=Math.min(v,minimax(nb,depth-1,alpha,beta,true));beta=Math.min(beta,v);if(beta<=alpha)break;}return v;}
}

// Iterative deepening: search depth 1..maxDepth, keep best result, stop if deadline hit
function bestMoveIter(bd,maxDepth,msLimit){
  _deadline=Date.now()+msLimit;
  let best=null;
  for(let d=1;d<=maxDepth;d++){
    if(Date.now()>=_deadline)break;
    let candidate=null,bestVal=Infinity;
    for(let sq=0;sq<64;sq++){
      if(color(bd[sq])!==BL)continue;
      for(const to of legalFor(bd,sq)){
        if(Date.now()>_deadline)break;
        const nb=[...bd];nb[to]=nb[sq];nb[sq]=0;
        const v=minimax(nb,d-1,-Infinity,Infinity,true);
        if(v<bestVal){bestVal=v;candidate={from:sq,to};}
      }
    }
    if(candidate)best=candidate; // only commit a full-depth result
  }
  return best;
}
self.onmessage=function(e){self.postMessage(bestMoveIter(e.data.board,e.data.depth,e.data.ms));};
`;

let aiWorker=null;
function getWorker(){
  if(!aiWorker){
    const blob=new Blob([WORKER_SRC],{type:'application/javascript'});
    aiWorker=new Worker(URL.createObjectURL(blob));
  }
  return aiWorker;
}

// Time limits per difficulty (ms) — AI always responds within this window
const THINK_MS={1:800,2:1500,3:2500};

function aiMove(){
  const depth=parseInt(document.getElementById('diffSel').value);
  const ms=THINK_MS[depth]||1500;
  const worker=getWorker();
  worker.onmessage=function(e){
    const mv=e.data;
    if(!mv){gameOver=true;updateStatus('Checkmate! White wins ♙','');return;}
    doMove(mv.from,mv.to,false);
  };
  worker.postMessage({board:[...board],depth,ms});
}

function updateStatus(msg,who){
  document.getElementById('status').innerHTML=msg+(who?` — <span>${who}</span>`:'');
}

function undoMove(){
  if(history.length<2||gameOver) return;
  const movesToReplay=[...history];
  movesToReplay.pop();movesToReplay.pop();
  // Re-initialise then replay all kept moves
  initBoard();
  turn=W; selected=null; legalMoves=[]; history=[]; captured={[W]:[],[BL]:[]};
  lastMove=null; gameOver=false;
  for(const notation of movesToReplay){
    const from='abcdefgh'.indexOf(notation[0])+(8-parseInt(notation[1]))*8;
    const to='abcdefgh'.indexOf(notation[2])+(8-parseInt(notation[3]))*8;
    const cap=board[to];
    if(cap){const c=color(cap);captured[c===W?BL:W].push(type(cap));}
    board[to]=board[from];board[from]=0;
    if(type(board[to])===P&&(to<8||to>=56)) board[to]=(color(board[to]))|Q;
    lastMove={from,to};
    history.push(notation);
    turn=turn===W?BL:W;
  }
  turn=W; render(); updateStatus('Your turn','White');
}

newGame();
</script>
