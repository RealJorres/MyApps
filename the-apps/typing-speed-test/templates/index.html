<title>Typing Speed Test | Jorres Apps</title>
<style>
:root {
  --bg: #0f172a; --surface: #1e293b; --border: #334155;
  --text: #e2e8f0; --muted: #64748b; --primary: #0891b2; --brand: var(--primary); --accent: #38bdf8;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; padding: 2rem 1rem 4rem;
}
h1 { font-size: 1.8rem; font-weight: 700; color: var(--accent); margin-bottom: 0.25rem; }
.subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
.wrap { width: 100%; max-width: 760px; }

/* Stats */
.stats-bar {
  display: flex; gap: 1rem; justify-content: space-between;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 1rem 1.5rem; margin-bottom: 1rem;
}
.stat { display: flex; flex-direction: column; align-items: center; gap: 0.2rem; }
.stat-value { font-size: 1.8rem; font-weight: 700; color: var(--accent); line-height: 1; }
.stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
.timer-val { color: var(--primary) !important; }

/* Progress bar */
.prog-wrap { background: var(--border); border-radius: 4px; height: 4px; margin-bottom: 1rem; overflow: hidden; }
.prog-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); width: 0%; transition: width 0.5s linear; }

/* Main typing container */
.typing-box {
  background: var(--surface); border: 2px solid var(--border);
  border-radius: 12px; margin-bottom: 1rem; cursor: text;
}
.typing-box:focus-within { border-color: var(--primary); }

/* Text display */
.text-display {
  padding: 1.25rem 1.5rem;
  font-size: 1.1rem; line-height: 2;
  font-family: 'Courier New', monospace;
  letter-spacing: 0.03em;
  border-bottom: 1px solid var(--border);
  word-break: break-word;
  overflow-wrap: break-word;
}
.ch { color: var(--muted); }
.ch.correct { color: #86efac; }
.ch.wrong { color: #fff; background: #ef4444; border-radius: 2px; }
.ch.cursor { outline: 2px solid var(--accent); outline-offset: 1px; border-radius: 1px; }

/* Typing input */
.typing-input {
  width: 100%; background: transparent; border: none; outline: none;
  padding: 0.85rem 1.5rem;
  font-size: 1rem; font-family: 'Courier New', monospace;
  color: var(--text); resize: none; height: 60px;
  caret-color: var(--accent); display: block;
}
.typing-input::placeholder { color: var(--muted); font-family: inherit; }

/* Status + controls */
.status-msg { text-align: center; font-size: 0.85rem; color: var(--muted); margin-bottom: 0.75rem; min-height: 1.2em; }
.btn-row { display: flex; gap: 0.75rem; justify-content: center; margin-bottom: 1.5rem; }
.btn {
  background: var(--primary); color: #fff; border: none;
  border-radius: 8px; padding: 0.6rem 1.4rem;
  font-size: 0.9rem; font-weight: 600; cursor: pointer;
  transition: background 0.15s; font-family: inherit;
}
.btn:hover { background: #0e7490; }

/* Results */
.results-panel {
  display: none; background: var(--surface); border: 1px solid var(--primary);
  border-radius: 12px; padding: 1.75rem; margin-bottom: 1.5rem; text-align: center;
}
.results-panel.show { display: block; }
.results-panel h2 { font-size: 1rem; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1.25rem; }
.results-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 0.75rem; margin-bottom: 1.25rem; }
.res-item { background: var(--bg); border-radius: 8px; padding: 0.85rem; }
.res-big { font-size: 2.2rem; font-weight: 800; color: var(--accent); line-height: 1; }
.res-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 0.2rem; }

/* History */
.history { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; }
.history h3 { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 0.85rem; }
.hist-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
.hist-table th { text-align: left; padding: 0.35rem 0.5rem; color: var(--muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border); }
.hist-table td { padding: 0.45rem 0.5rem; border-bottom: 1px solid var(--border); }
.hist-table tr:last-child td { border-bottom: none; }
.hist-table td:first-child { color: var(--accent); font-weight: 700; }
.empty { color: var(--muted); font-size: 0.85rem; text-align: center; padding: 0.5rem; }
@media (max-width: 600px) {
  body { overflow-x: hidden; }
  .results-grid { grid-template-columns: 1fr 1fr !important; }
  .hist-table { display: block; overflow-x: auto; }
}
</style>
</head>
<body>
<h1>Typing Speed Test</h1>
<p class="subtitle">60 seconds — how fast can you type?</p>

<div class="wrap">
  <div class="stats-bar">
    <div class="stat"><span class="stat-value" id="wpm">0</span><span class="stat-label">WPM</span></div>
    <div class="stat"><span class="stat-value" id="acc">100%</span><span class="stat-label">Accuracy</span></div>
    <div class="stat"><span class="stat-value" id="chars">0</span><span class="stat-label">Characters</span></div>
    <div class="stat"><span class="stat-value timer-val" id="timer">1:00</span><span class="stat-label">Time Left</span></div>
  </div>

  <div class="prog-wrap"><div class="prog-fill" id="prog"></div></div>

  <div class="typing-box" onclick="document.getElementById('inp').focus()">
    <div class="text-display" id="display"></div>
    <textarea id="inp" class="typing-input" placeholder="Click here and start typing…"
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
  </div>

  <p class="status-msg" id="msg">Click the box and start typing to begin!</p>

  <div class="btn-row">
    <button class="btn" onclick="reset()">New Test</button>
  </div>

  <div class="results-panel" id="results">
    <h2>Results</h2>
    <div class="results-grid">
      <div class="res-item"><div class="res-big" id="r-wpm">0</div><div class="res-label">Words Per Minute</div></div>
      <div class="res-item"><div class="res-big" id="r-acc">0%</div><div class="res-label">Accuracy</div></div>
      <div class="res-item"><div class="res-big" id="r-chars">0/0</div><div class="res-label">Correct / Wrong</div></div>
      <div class="res-item"><div class="res-big" id="r-time">0s</div><div class="res-label">Time Taken</div></div>
    </div>
    <button class="btn" onclick="reset()">Try Again</button>
  </div>

  <div class="history">
    <h3>Recent Results</h3>
    <div id="hist"></div>
  </div>
</div>

<script>
const SENTENCES = [
  "The quick brown fox jumps over the lazy dog near the old riverbank.",
  "Programming is the art of telling a computer what to do in a language it understands.",
  "She sells seashells by the seashore and the shells she sells are surely seashells.",
  "To be or not to be that is the question whether tis nobler in the mind to suffer.",
  "The only way to do great work is to love what you do and never settle for anything less.",
  "In the beginning there was code and the code was good and developers everywhere rejoiced.",
  "A journey of a thousand miles begins with a single step taken in the right direction.",
  "All that glitters is not gold often have you heard that told many a man his life hath sold.",
  "The rain in Spain stays mainly in the plain while the sun shines bright for everyone.",
  "Pack my box with five dozen liquor jugs and watch the quirky zebras jump nearby."
];

let src = '', chars = [], started = false, done = false;
let timeLeft = 60, startTime = null;
let timerID = null, statsID = null;
let totalKeys = 0, correctKeys = 0;

function pickText() {
  const pool = [...SENTENCES].sort(() => Math.random() - 0.5);
  return pool.slice(0, 3).join(' ');
}

function buildDisplay(text) {
  const el = document.getElementById('display');
  el.innerHTML = '';
  chars = [];
  for (let i = 0; i < text.length; i++) {
    const s = document.createElement('span');
    s.className = 'ch';
    s.textContent = text[i];
    el.appendChild(s);
    chars.push(s);
  }
  if (chars[0]) chars[0].classList.add('cursor');
}

function start() {
  started = true; startTime = Date.now();
  document.getElementById('msg').textContent = 'Keep going!';
  timerID = setInterval(() => {
    timeLeft--;
    const m = Math.floor(timeLeft / 60);
    const s = String(timeLeft % 60).padStart(2, '0');
    const el = document.getElementById('timer');
    el.textContent = m + ':' + s;
    document.getElementById('prog').style.width = ((60 - timeLeft) / 60 * 100) + '%';
    if (timeLeft <= 10) el.style.color = '#f87171';
    if (timeLeft <= 0) finish();
  }, 1000);
  statsID = setInterval(liveStats, 500);
}

function liveStats() {
  const elapsed = (Date.now() - startTime) / 60000;
  document.getElementById('wpm').textContent = elapsed > 0 ? Math.round(correctKeys / 5 / elapsed) : 0;
  document.getElementById('acc').textContent = (totalKeys > 0 ? Math.round(correctKeys / totalKeys * 100) : 100) + '%';
  document.getElementById('chars').textContent = totalKeys;
}

function finish() {
  if (done) return;
  done = true;
  clearInterval(timerID); clearInterval(statsID);
  const elapsed = (Date.now() - startTime) / 1000;
  const wpm = Math.round(correctKeys / 5 / (elapsed / 60));
  const acc = totalKeys > 0 ? Math.round(correctKeys / totalKeys * 100) : 100;
  document.getElementById('inp').disabled = true;
  document.getElementById('msg').textContent = 'Test complete!';
  document.getElementById('r-wpm').textContent = wpm;
  document.getElementById('r-acc').textContent = acc + '%';
  document.getElementById('r-chars').textContent = correctKeys + ' / ' + (totalKeys - correctKeys);
  document.getElementById('r-time').textContent = Math.round(elapsed) + 's';
  document.getElementById('results').classList.add('show');
  saveHistory({ wpm, acc, date: new Date().toLocaleDateString() });
  renderHistory();
}

function reset() {
  clearInterval(timerID); clearInterval(statsID);
  started = done = false; timeLeft = 60; totalKeys = correctKeys = 0; startTime = null;
  document.getElementById('timer').textContent = '1:00';
  document.getElementById('timer').style.color = '';
  document.getElementById('wpm').textContent = '0';
  document.getElementById('acc').textContent = '100%';
  document.getElementById('chars').textContent = '0';
  document.getElementById('prog').style.width = '0%';
  document.getElementById('results').classList.remove('show');
  document.getElementById('msg').textContent = 'Click the box and start typing to begin!';
  document.getElementById('inp').disabled = false;
  document.getElementById('inp').value = '';
  src = pickText();
  buildDisplay(src);
  renderHistory();
  document.getElementById('inp').focus();
}

document.getElementById('inp').addEventListener('input', function() {
  if (done) return;
  if (!started && this.value.length > 0) start();
  const typed = this.value;
  totalKeys = typed.length;
  correctKeys = 0;
  chars.forEach((s, i) => {
    s.className = 'ch';
    if (i < typed.length) {
      if (typed[i] === src[i]) { s.classList.add('correct'); correctKeys++; }
      else s.classList.add('wrong');
    }
  });
  const cur = typed.length < chars.length ? typed.length : chars.length - 1;
  if (chars[cur]) chars[cur].classList.add('cursor');
  liveStats();
  if (typed.length >= src.length) finish();
});

document.getElementById('inp').addEventListener('keydown', e => { if (e.key === 'Tab') e.preventDefault(); });

function saveHistory(e) {
  let h = JSON.parse(localStorage.getItem('tst_h') || '[]');
  h.unshift(e); if (h.length > 5) h = h.slice(0, 5);
  localStorage.setItem('tst_h', JSON.stringify(h));
}

function renderHistory() {
  const h = JSON.parse(localStorage.getItem('tst_h') || '[]');
  const el = document.getElementById('hist');
  if (!h.length) { el.innerHTML = '<p class="empty">No results yet.</p>'; return; }
  el.innerHTML = '<table class="hist-table"><thead><tr><th>WPM</th><th>Accuracy</th><th>Date</th></tr></thead><tbody>'
    + h.map(r => `<tr><td>${r.wpm}</td><td>${r.acc}%</td><td>${r.date}</td></tr>`).join('')
    + '</tbody></table>';
}

reset();
</script>

<script src="/static/app-nav.js"></script>
</body>
