<style>
:root{--primary:#1d4ed8; --brand: var(--primary);--bg:#f1f5f9;--card:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b}
.container{max-width:720px;margin:0 auto}
.input-row{display:flex;gap:.75rem;align-items:flex-end;flex-wrap:wrap}
.input-row .field{flex:1;min-width:180px}
input[type=text],input[type=number]{width:100%;padding:.55rem .75rem;border:1px solid var(--border);border-radius:.5rem;font-size:.95rem;background:#fff;color:var(--text);outline:none;font-family:inherit}
input:focus{border-color:var(--primary)}
.btn { background: var(--primary); color: #fff; }
.btn:hover{opacity:.85}
.results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;margin-bottom:1.25rem}
.rc{background:var(--bg);border:1px solid var(--border);border-radius:.75rem;padding:1rem}
.rc .rl{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.3rem}
.rc .rv{font-size:1.05rem;font-weight:700;color:var(--primary);word-break:break-all}
.bits-row{display:flex;gap:2px;flex-wrap:wrap;margin-top:.5rem}
.bit{width:20px;height:20px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700}
.bit.net{background:#1d4ed8;color:#fff}
.bit.host{background:#e2e8f0;color:#64748b}
.error{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;border-radius:.5rem;padding:.75rem 1rem;font-size:.875rem;display:none}
#output{display:none}
@media (max-width: 600px) {
  body { overflow-x: hidden; }
  .results-grid { grid-template-columns: 1fr !important; }
  input[type=text] { width: 100% !important; min-width: 0 !important; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>CIDR / Subnet Calculator</h1>
    <p>Enter an IP address with CIDR prefix to compute network details.</p>
  </header>

  <div class="card">
    <div class="input-row">
      <div class="field">
        <label for="cidr">IP Address / CIDR</label>
        <input type="text" id="cidr" placeholder="192.168.1.0/24" value="192.168.1.0/24">
      </div>
      <button class="btn" onclick="calculate()">Calculate</button>
    </div>
    <div class="error" id="err"></div>
  </div>

  <div id="output">
    <div class="results-grid" id="grid"></div>
    <div class="card">
      <div style="font-size:.875rem;font-weight:700;margin-bottom:.75rem">Address Bit Layout</div>
      <div class="bits-row" id="bits"></div>
      <div style="display:flex;gap:1.25rem;margin-top:.6rem;font-size:.78rem;flex-wrap:wrap">
        <span><span style="display:inline-block;width:12px;height:12px;background:#1d4ed8;border-radius:2px;vertical-align:middle;margin-right:4px"></span>Network bits</span>
        <span><span style="display:inline-block;width:12px;height:12px;background:#e2e8f0;border-radius:2px;vertical-align:middle;margin-right:4px"></span>Host bits</span>
      </div>
    </div>
  </div>
</div>

<script>
function ipToInt(ip){
  return ip.split('.').reduce((acc,o)=>(acc<<8)+parseInt(o),0)>>>0;
}
function intToIp(n){
  return [(n>>>24)&255,(n>>>16)&255,(n>>>8)&255,n&255].join('.');
}
function intToBin(n){
  return ('00000000000000000000000000000000'+(n>>>0).toString(2)).slice(-32);
}
function calculate(){
  const raw=document.getElementById('cidr').value.trim();
  const err=document.getElementById('err');
  const output=document.getElementById('output');
  err.style.display='none';output.style.display='none';
  const m=raw.match(/^(\d+\.\d+\.\d+\.\d+)\/(\d+)$/);
  if(!m){err.textContent='Invalid format. Use x.x.x.x/prefix (e.g. 192.168.1.0/24)';err.style.display='block';return;}
  const ip=m[1],prefix=parseInt(m[2]);
  if(prefix<0||prefix>32){err.textContent='Prefix must be 0–32';err.style.display='block';return;}
  const parts=ip.split('.').map(Number);
  if(parts.some(p=>p<0||p>255)){err.textContent='Each octet must be 0–255';err.style.display='block';return;}

  const ipInt=ipToInt(ip);
  const maskInt=prefix===0?0:(0xFFFFFFFF<<(32-prefix))>>>0;
  const wildcardInt=(~maskInt)>>>0;
  const networkInt=(ipInt&maskInt)>>>0;
  const broadcastInt=(networkInt|wildcardInt)>>>0;
  const firstHost=prefix>=31?networkInt:(networkInt+1)>>>0;
  const lastHost=prefix>=31?broadcastInt:(broadcastInt-1)>>>0;
  const numHosts=prefix>=32?1:prefix===31?2:Math.pow(2,32-prefix)-2;

  const rows=[
    ['Network Address',intToIp(networkInt)],
    ['Broadcast Address',intToIp(broadcastInt)],
    ['Subnet Mask',intToIp(maskInt)],
    ['Wildcard Mask',intToIp(wildcardInt)],
    ['First Usable Host',prefix>=31?'N/A':intToIp(firstHost)],
    ['Last Usable Host',prefix>=31?'N/A':intToIp(lastHost)],
    ['Usable Hosts',numHosts.toLocaleString()],
    ['Total Addresses',Math.pow(2,32-prefix).toLocaleString()],
    ['CIDR Notation',intToIp(networkInt)+'/'+prefix],
    ['IP Class',ipClass(parts[0])],
  ];
  document.getElementById('grid').innerHTML=rows.map(([l,v])=>`<div class="rc"><div class="rl">${l}</div><div class="rv">${v}</div></div>`).join('');

  const bin=intToBin(ipInt);
  document.getElementById('bits').innerHTML=bin.split('').map((b,i)=>`<div class="bit ${i<prefix?'net':'host'}">${b}</div>`).join('');
  output.style.display='block';
}
function ipClass(first){
  if(first<128)return 'A';
  if(first<192)return 'B';
  if(first<224)return 'C';
  if(first<240)return 'D (Multicast)';
  return 'E (Reserved)';
}
document.getElementById('cidr').addEventListener('keydown',e=>{if(e.key==='Enter')calculate();});
calculate();
</script>
