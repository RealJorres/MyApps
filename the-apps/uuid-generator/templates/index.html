<style>
:root {
  --primary: #d97706; --brand: var(--primary); --primary-h: #b45309;
  --bg: #f1f5f9; --card: #ffffff; --border: #e2e8f0;
  --text: #1e293b; --muted: #64748b;
  --success-bg: #f0fdf4; --success-fg: #16a34a;
  --error-bg: #fef2f2; --error-fg: #dc2626;
}
body { padding: 2rem 1rem 4rem; }
.container { max-width: 860px; margin: 0 auto; }
header { text-align: center; margin-bottom: 2rem; }
header h1 { font-size: 2rem; font-weight: 800; color: var(--primary); }
header p { color: var(--muted); margin-top: 0.4rem; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 1rem; padding: 1.75rem; margin-bottom: 1.25rem; }
.btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.6rem 1.25rem; border-radius: 0.5rem; border: none; font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: background 0.15s; font-family: inherit; }
.btn-primary { background: var(--primary); color: #fff; } .btn-primary:hover { background: var(--primary-h); }
.btn-ghost { background: var(--bg); color: var(--text); border: 1px solid var(--border); } .btn-ghost:hover { background: var(--border); }
.btn-sm { padding: 0.3rem 0.65rem; font-size: 0.78rem; }
input[type=number], select { padding: 0.55rem 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem; font-size: 0.9rem; background: #fff; color: var(--text); outline: none; font-family: inherit; }
input:focus, select:focus { border-color: var(--primary); }
.controls { display: flex; flex-wrap: wrap; gap: 1.25rem; align-items: flex-end; }
.control-group { display: flex; flex-direction: column; }
.toggle-group { display: flex; border: 1px solid var(--border); border-radius: 0.5rem; overflow: hidden; }
.toggle-btn { padding: 0.5rem 1.1rem; font-size: 0.875rem; font-weight: 600; cursor: pointer; border: none; background: var(--bg); color: var(--muted); font-family: inherit; transition: all 0.15s; }
.toggle-btn.active { background: var(--primary); color: white; }
.section-title { font-size: 0.85rem; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 2px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.uuid-list { display: flex; flex-direction: column; gap: 0.5rem; }
.uuid-row { display: flex; align-items: center; gap: 0.75rem; background: var(--bg); border: 1px solid var(--border); border-radius: 0.5rem; padding: 0.6rem 0.9rem; }
.uuid-text { flex: 1; font-family: 'Courier New', monospace; font-size: 0.9rem; letter-spacing: 0.03em; color: var(--text); word-break: break-all; }
.copy-flash { color: var(--success-fg) !important; }
@media (max-width: 600px) {
  body { overflow-x: hidden; }
  input[type=number], select { width: 100% !important; min-width: 0 !important; }
}

<body>
<div class="container">
  <header>
    <h1>UUID Generator</h1>
    <p>Generate UUIDs in multiple formats instantly</p>
  </header>

  <div class="card">
    <div class="controls">
      <div class="control-group">
        <label for="v4-btn">Version</label>
        <div class="toggle-group">
          <button class="toggle-btn active" id="v4-btn" onclick="setVersion(4)">v4 (Random)</button>
          <button class="toggle-btn" id="v1-btn" onclick="setVersion(1)">v1 (Timestamp)</button>
        </div>
      </div>
      <div class="control-group">
        <label for="count">Count</label>
        <input type="number" id="count" value="5" min="1" max="100" style="width:90px">
      </div>
      <div class="control-group">
        <label for="fmt-lower">Format</label>
        <div class="toggle-group">
          <button class="toggle-btn active" id="fmt-lower" onclick="setFormat('lower')">lowercase</button>
          <button class="toggle-btn" id="fmt-upper" onclick="setFormat('upper')">UPPERCASE</button>
          <button class="toggle-btn" id="fmt-nohyphen" onclick="setFormat('nohyphen')">no-hyphens</button>
        </div>
      </div>
      <div class="control-group" style="margin-left:auto">
        <label for="resultsCard">&nbsp;</label>
        <button class="btn btn-primary" onclick="generate()">Generate</button>
      </div>
    </div>
  </div>

  <div class="card" id="resultsCard" style="display:none">
    <div class="section-title">
      Results
      <button class="btn btn-ghost btn-sm" onclick="copyAll()">Copy All</button>
    </div>
    <div class="uuid-list" id="uuidList"></div>
  </div>
</div>

<script>
let version = 4;
let format = 'lower';

function setVersion(v) {
  version = v;
  document.getElementById('v4-btn').classList.toggle('active', v === 4);
  document.getElementById('v1-btn').classList.toggle('active', v === 1);
}
function setFormat(f) {
  format = f;
  document.getElementById('fmt-lower').classList.toggle('active', f === 'lower');
  document.getElementById('fmt-upper').classList.toggle('active', f === 'upper');
  document.getElementById('fmt-nohyphen').classList.toggle('active', f === 'nohyphen');
}

function uuidV4() {
  if (crypto.randomUUID) return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

function uuidV1() {
  const now = Date.now();
  const timeHi = Math.floor(now / 0x100000000);
  const timeLow = now & 0xFFFFFFFF;
  const r = () => Math.floor(Math.random() * 0x10000).toString(16).padStart(4, '0');
  const node = Array.from({length: 6}, () => Math.floor(Math.random() * 256).toString(16).padStart(2, '0')).join('');
  const tl = timeLow.toString(16).padStart(8, '0');
  const tm = ((timeHi & 0xFFFF)).toString(16).padStart(4, '0');
  const th = ((timeHi >>> 16 & 0x0FFF) | 0x1000).toString(16).padStart(4, '0');
  const cs = (Math.floor(Math.random() * 0x3FFF) | 0x8000).toString(16).padStart(4, '0');
  return `${tl}-${tm}-${th}-${cs}-${node}`;
}

function applyFormat(uuid) {
  if (format === 'upper') return uuid.toUpperCase();
  if (format === 'nohyphen') return uuid.replace(/-/g, '');
  return uuid.toLowerCase();
}

function generate() {
  const count = Math.min(Math.max(parseInt(document.getElementById('count').value) || 5, 1), 100);
  const uuids = Array.from({length: count}, () => applyFormat(version === 4 ? uuidV4() : uuidV1()));
  const list = document.getElementById('uuidList');
  list.innerHTML = '';
  uuids.forEach(uuid => {
    const row = document.createElement('div');
    row.className = 'uuid-row';
    row.innerHTML = `<span class="uuid-text">${uuid}</span><button class="btn btn-ghost btn-sm" onclick="copyOne(this, '${uuid}')">Copy</button>`;
    list.appendChild(row);
  });
  document.getElementById('resultsCard').style.display = '';
}

function copyOne(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    const span = btn.previousElementSibling;
    span.classList.add('copy-flash');
    btn.textContent = 'Copied!';
    setTimeout(() => { span.classList.remove('copy-flash'); btn.textContent = 'Copy'; }, 1200);
  });
}

function copyAll() {
  const uuids = Array.from(document.querySelectorAll('.uuid-text')).map(el => el.textContent);
  navigator.clipboard.writeText(uuids.join('\n')).then(() => alert('All UUIDs copied!'));
}

// Generate on load
generate();
</script>
