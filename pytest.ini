[pytest]
testpaths = tests
# Keep the default run fast & hermetic: e2e (browser) tests are opt-in.
# Run them with:  pytest tests/ -m e2e   (or)  pytest tests/test_e2e.py
addopts = -m "not e2e"
markers =
    contract: per-app contract test (loads the app and checks shared-asset wiring)
    e2e: end-to-end browser test (Playwright; needs a live server + chromium)
